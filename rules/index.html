<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rules — NBN</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111827; color: #f3f4f6; min-height: 100vh;
    }
    a { color: #60a5fa; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: #1f2937;
      border-right: 1px solid #374151;
      padding: 1.5rem 0;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .sidebar-top {
      padding: 0 1rem 1.25rem;
      border-bottom: 1px solid #374151;
      margin-bottom: 0.75rem;
    }

    .sidebar-back {
      font-size: 0.8rem;
      color: #9ca3af;
      display: block;
      margin-bottom: 0.75rem;
    }
    .sidebar-back:hover { color: #f3f4f6; }

    .sidebar-title {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #6b7280;
    }

    .nav-list {
      list-style: none;
      padding: 0 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .nav-item button {
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      color: #d1d5db;
      font-size: 0.875rem;
      padding: 0.45rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .nav-item button:hover { background: #374151; color: #f3f4f6; }
    .nav-item button.active { background: #1d4ed8; color: #fff; font-weight: 600; }

    /* ── Main content ── */
    .main {
      flex: 1;
      min-width: 0;
      padding: 2rem 2.5rem 4rem;
      max-width: 820px;
    }

    .content-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid #374151;
      gap: 1rem;
    }

    .content-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .header-actions { display: flex; gap: 0.5rem; align-items: center; }

    .btn {
      padding: 0.4rem 0.9rem;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.12s;
    }
    .btn-edit { background: #374151; color: #e5e7eb; border-color: #4b5563; }
    .btn-edit:hover { background: #4b5563; }
    .btn-save { background: #1d4ed8; color: #fff; }
    .btn-save:hover { background: #1e40af; }
    .btn-cancel { background: #374151; color: #e5e7eb; border-color: #4b5563; }
    .btn-cancel:hover { background: #4b5563; }

    .save-status {
      font-size: 0.78rem;
      color: #6b7280;
    }
    .save-status.ok { color: #34d399; }
    .save-status.err { color: #f87171; }

    /* ── Rendered markdown ── */
    #md-view {
      line-height: 1.7;
      color: #d1d5db;
    }
    #md-view h1 { font-size: 1.5rem; font-weight: 700; margin: 1.5rem 0 0.75rem; color: #f3f4f6; letter-spacing: -0.02em; }
    #md-view h2 { font-size: 1.15rem; font-weight: 700; margin: 1.75rem 0 0.6rem; color: #e5e7eb; padding-bottom: 0.4rem; border-bottom: 1px solid #374151; }
    #md-view h3 { font-size: 1rem; font-weight: 700; margin: 1.25rem 0 0.4rem; color: #e5e7eb; }
    #md-view h4 { font-size: 0.9rem; font-weight: 700; margin: 1rem 0 0.35rem; color: #e5e7eb; }
    #md-view p { margin-bottom: 0.7rem; font-size: 0.9rem; }
    #md-view ul, #md-view ol { padding-left: 1.5rem; margin-bottom: 0.7rem; }
    #md-view li { font-size: 0.9rem; margin-bottom: 0.25rem; }
    #md-view code {
      font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
      font-size: 0.82em; background: #0f172a; color: #a5b4fc;
      padding: 0.1em 0.35em; border-radius: 4px; border: 1px solid #374151;
    }
    #md-view pre {
      background: #0f172a; border: 1px solid #374151; border-radius: 8px;
      padding: 1rem 1.25rem; overflow-x: auto; margin-bottom: 1rem;
    }
    #md-view pre code { background: none; border: none; padding: 0; font-size: 0.85em; color: #c4b5fd; }
    #md-view table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-bottom: 1rem; }
    #md-view th { text-align: left; padding: 0.4rem 0.75rem; background: #1f2937; color: #9ca3af; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
    #md-view td { padding: 0.45rem 0.75rem; border-top: 1px solid #1f2937; }
    #md-view tr:hover td { background: #1f2937; }
    #md-view blockquote { border-left: 3px solid #3b82f6; margin: 0.75rem 0; padding: 0.5rem 1rem; background: #1c2f45; border-radius: 0 6px 6px 0; color: #93c5fd; }
    #md-view hr { border: none; border-top: 1px solid #374151; margin: 1.5rem 0; }
    #md-view strong { color: #f3f4f6; }

    /* ── Editor ── */
    #md-editor {
      display: none;
      width: 100%;
      min-height: 500px;
      background: #0f172a;
      border: 1px solid #374151;
      border-radius: 8px;
      color: #d1d5db;
      font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
      font-size: 0.85rem;
      line-height: 1.7;
      padding: 1rem 1.25rem;
      resize: vertical;
      outline: none;
    }
    #md-editor:focus { border-color: #3b82f6; }

    .loading { color: #6b7280; font-size: 0.9rem; padding: 1rem 0; }
    .empty { color: #6b7280; font-size: 0.9rem; font-style: italic; padding: 1rem 0; }
  </style>
</head>
<body>
<div class="layout">

  <!-- ── Sidebar ── -->
  <nav class="sidebar">
    <div class="sidebar-top">
      <a class="sidebar-back" href="/">← Home</a>
      <div class="sidebar-title">League Rules</div>
    </div>
    <ul class="nav-list" id="nav-list">
      <li class="loading" style="padding: 0.5rem 1rem;">Loading…</li>
    </ul>
  </nav>

  <!-- ── Content ── -->
  <div class="main">
    <div class="content-header">
      <h1 id="page-title">Select a rule set</h1>
      <div class="header-actions">
        <span class="save-status" id="save-status"></span>
        <button class="btn btn-edit" id="btn-edit" style="display:none" onclick="startEdit()">Edit</button>
        <button class="btn btn-save" id="btn-save" style="display:none" onclick="saveEdit()">Save</button>
        <button class="btn btn-cancel" id="btn-cancel" style="display:none" onclick="cancelEdit()">Cancel</button>
      </div>
    </div>

    <div id="md-view"><p class="empty">Choose a rule category from the sidebar.</p></div>
    <textarea id="md-editor" spellcheck="false"></textarea>
  </div>

</div>
<script>
  const API = '';
  let currentSlug = null;
  let currentContent = '';
  let isEditing = false;
  let canEdit = false;

  // ── Auth check ──
  const token = localStorage.getItem('nbn_token');
  if (token) {
    fetch('/api/me', { headers: { Authorization: `Bearer ${token}` } })
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (data?.roles?.some(r => r === 'rosters' || r === 'admin')) {
          canEdit = true;
          if (currentSlug) document.getElementById('btn-edit').style.display = '';
        }
      })
      .catch(() => {});
  }

  // ── Load nav ──
  fetch('/api/rules')
    .then(r => r.json())
    .then(rules => {
      const list = document.getElementById('nav-list');
      list.innerHTML = '';
      rules.forEach(rule => {
        const li = document.createElement('li');
        li.className = 'nav-item';
        li.dataset.slug = rule.slug;
        const btn = document.createElement('button');
        btn.textContent = rule.label;
        btn.onclick = () => loadRule(rule.slug, rule.label);
        li.appendChild(btn);
        list.appendChild(li);
      });

      // Auto-load slug from hash or first item
      const hash = location.hash.replace('#', '');
      const first = rules.find(r => r.slug === hash) || rules[0];
      if (first) loadRule(first.slug, first.label);
    })
    .catch(() => {
      document.getElementById('nav-list').innerHTML = '<li style="padding:0.5rem 1rem;color:#f87171;font-size:0.85rem;">Failed to load rules</li>';
    });

  function loadRule(slug, label) {
    if (isEditing) cancelEdit();
    currentSlug = slug;
    location.hash = slug;

    document.getElementById('page-title').textContent = label;

    // Update nav active state
    document.querySelectorAll('.nav-item button').forEach(btn => {
      btn.classList.toggle('active', btn.closest('.nav-item').dataset.slug === slug);
    });

    const view = document.getElementById('md-view');
    view.innerHTML = '<p class="loading">Loading…</p>';
    document.getElementById('btn-edit').style.display = 'none';
    document.getElementById('save-status').textContent = '';

    fetch(`/api/rules/${slug}`)
      .then(r => r.json())
      .then(data => {
        currentContent = data.content || '';
        renderMarkdown(currentContent);
        if (canEdit) document.getElementById('btn-edit').style.display = '';
      })
      .catch(() => {
        view.innerHTML = '<p style="color:#f87171;">Failed to load content.</p>';
      });
  }

  function renderMarkdown(md) {
    const view = document.getElementById('md-view');
    if (!md.trim()) {
      view.innerHTML = '<p class="empty">No content yet.</p>';
    } else {
      view.innerHTML = marked.parse(md);
    }
  }

  function startEdit() {
    if (!currentSlug) return;
    isEditing = true;
    document.getElementById('md-view').style.display = 'none';
    const editor = document.getElementById('md-editor');
    editor.value = currentContent;
    editor.style.display = '';
    editor.focus();
    document.getElementById('btn-edit').style.display = 'none';
    document.getElementById('btn-save').style.display = '';
    document.getElementById('btn-cancel').style.display = '';
    document.getElementById('save-status').textContent = '';
  }

  function cancelEdit() {
    isEditing = false;
    document.getElementById('md-editor').style.display = 'none';
    document.getElementById('md-view').style.display = '';
    document.getElementById('btn-save').style.display = 'none';
    document.getElementById('btn-cancel').style.display = 'none';
    document.getElementById('btn-edit').style.display = canEdit ? '' : 'none';
    document.getElementById('save-status').textContent = '';
  }

  function saveEdit() {
    if (!currentSlug || !token) return;
    const content = document.getElementById('md-editor').value;
    const status = document.getElementById('save-status');
    status.textContent = 'Saving…';
    status.className = 'save-status';

    fetch(`/api/rules/${currentSlug}`, {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ content }),
    })
      .then(r => {
        if (!r.ok) throw new Error(r.status);
        return r.json();
      })
      .then(() => {
        currentContent = content;
        renderMarkdown(currentContent);
        cancelEdit();
        status.textContent = 'Saved';
        status.className = 'save-status ok';
        setTimeout(() => { status.textContent = ''; }, 3000);
      })
      .catch(err => {
        status.textContent = err.message === '403' ? 'Token invalid' : 'Save failed';
        status.className = 'save-status err';
      });
  }

  // Ctrl+S / Cmd+S to save while editing
  document.addEventListener('keydown', e => {
    if (isEditing && e.key === 's' && (e.metaKey || e.ctrlKey)) {
      e.preventDefault();
      saveEdit();
    }
  });
</script>
<script src="/nav.js"></script>
<script src="/token-badge.js"></script>
</body>
</html>
