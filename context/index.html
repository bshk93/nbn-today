<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/logo.png">
  <link rel="stylesheet" href="/css/shared.css">
  <title>Claude Context — NBN</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111827;
      color: #f3f4f6;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    a { color: #60a5fa; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .page {
      max-width: 900px;
      margin: 0 auto;
    }


    header { margin-bottom: 1.5rem; }
    header h1 {
      font-size: 1.875rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    header p {
      color: #9ca3af;
      margin-top: 0.4rem;
      font-size: 0.9rem;
    }

    .search-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .search-row input {
      flex: 1;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 8px;
      color: #f3f4f6;
      font-size: 0.9rem;
      padding: 0.55rem 0.875rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-row input::placeholder { color: #6b7280; }
    .search-row input:focus { border-color: #60a5fa; }

    .match-info {
      font-size: 0.8rem;
      color: #9ca3af;
      white-space: nowrap;
      min-width: 6rem;
      text-align: right;
    }

    .nav-btns {
      display: flex;
      gap: 0.375rem;
    }
    .nav-btns button {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 6px;
      color: #9ca3af;
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0.3rem 0.6rem;
      transition: background 0.15s, color 0.15s;
    }
    .nav-btns button:hover { background: #374151; color: #f3f4f6; }
    .nav-btns button:disabled { opacity: 0.3; cursor: default; }

    .card {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 2rem 2.25rem;
    }

    /* markdown prose */
    #content h1 { display: none; } /* page already has a title */
    #content h2 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #f9fafb;
      border-bottom: 1px solid #374151;
      padding-bottom: 0.4rem;
      margin: 2.25rem 0 1rem;
    }
    #content h2:first-child { margin-top: 0; }
    #content h3 {
      font-size: 1rem;
      font-weight: 600;
      color: #e5e7eb;
      margin: 1.5rem 0 0.6rem;
    }
    #content h4 {
      font-size: 0.875rem;
      font-weight: 600;
      color: #d1d5db;
      margin: 1.25rem 0 0.5rem;
    }
    #content p {
      color: #d1d5db;
      font-size: 0.9rem;
      line-height: 1.7;
      margin-bottom: 0.75rem;
    }
    #content ul, #content ol {
      color: #d1d5db;
      font-size: 0.9rem;
      line-height: 1.7;
      margin: 0.5rem 0 0.75rem 1.5rem;
    }
    #content li { margin-bottom: 0.25rem; }
    #content code {
      background: #111827;
      border: 1px solid #374151;
      border-radius: 4px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.8em;
      padding: 0.1em 0.35em;
    }
    #content pre {
      background: #111827;
      border: 1px solid #374151;
      border-radius: 8px;
      overflow-x: auto;
      padding: 1rem 1.25rem;
      margin: 0.75rem 0 1rem;
    }
    #content pre code {
      background: none;
      border: none;
      font-size: 0.82rem;
      padding: 0;
    }
    #content table {
      border-collapse: collapse;
      font-size: 0.85rem;
      margin: 0.75rem 0 1rem;
      width: 100%;
    }
    #content th {
      background: #111827;
      border: 1px solid #374151;
      color: #9ca3af;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 0.45rem 0.75rem;
      text-align: left;
      text-transform: uppercase;
    }
    #content td {
      border: 1px solid #283141;
      color: #d1d5db;
      padding: 0.4rem 0.75rem;
      vertical-align: top;
    }
    #content tr:hover td { background: #253042; }
    #content strong { color: #f9fafb; font-weight: 600; }
    #content hr {
      border: none;
      border-top: 1px solid #374151;
      margin: 1.5rem 0;
    }
    #content blockquote {
      border-left: 3px solid #374151;
      color: #9ca3af;
      font-style: italic;
      margin: 0.75rem 0;
      padding-left: 1rem;
    }

    /* search highlights */
    mark {
      background: #854d0e;
      border-radius: 2px;
      color: #fef3c7;
      padding: 0 2px;
    }
    mark.current {
      background: #d97706;
      color: #fff;
    }

    #loading {
      color: #6b7280;
      font-size: 0.9rem;
      padding: 2rem 0;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="page">
    <nav class="nav"><a href="/">← NBN Home</a></nav>

    <header>
      <h1>Claude Context</h1>
      <p>Project documentation, architecture notes, and data model reference for this codebase.</p>
    </header>

    <div class="search-row">
      <input type="text" id="search" placeholder="Search docs…" autocomplete="off" spellcheck="false">
      <div class="nav-btns">
        <button id="prev-btn" disabled>↑</button>
        <button id="next-btn" disabled>↓</button>
      </div>
      <div class="match-info" id="match-info"></div>
    </div>

    <div class="card">
      <div id="loading">Loading…</div>
      <div id="content" style="display:none"></div>
    </div>
  </div>

  <script>
    const contentEl = document.getElementById('content');
    const loadingEl = document.getElementById('loading');
    const searchEl  = document.getElementById('search');
    const matchInfo = document.getElementById('match-info');
    const prevBtn   = document.getElementById('prev-btn');
    const nextBtn   = document.getElementById('next-btn');

    let rawHTML = '';
    let marks = [];
    let currentIdx = -1;

    fetch('/CLAUDE.md')
      .then(r => r.text())
      .then(md => {
        rawHTML = marked.parse(md);
        contentEl.innerHTML = rawHTML;
        loadingEl.style.display = 'none';
        contentEl.style.display = '';
      })
      .catch(() => {
        loadingEl.textContent = 'Failed to load CLAUDE.md.';
      });

    function clearHighlights() {
      contentEl.innerHTML = rawHTML;
      marks = [];
      currentIdx = -1;
    }

    function highlight(query) {
      clearHighlights();
      if (!query) {
        matchInfo.textContent = '';
        prevBtn.disabled = true;
        nextBtn.disabled = true;
        return;
      }

      const walker = document.createTreeWalker(contentEl, NodeFilter.SHOW_TEXT);
      const textNodes = [];
      let node;
      while ((node = walker.nextNode())) textNodes.push(node);

      const re = new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
      textNodes.forEach(tn => {
        const val = tn.nodeValue;
        if (!re.test(val)) return;
        re.lastIndex = 0;

        const frag = document.createDocumentFragment();
        let last = 0, m;
        while ((m = re.exec(val)) !== null) {
          if (m.index > last) frag.appendChild(document.createTextNode(val.slice(last, m.index)));
          const mark = document.createElement('mark');
          mark.textContent = m[0];
          frag.appendChild(mark);
          marks.push(mark);
          last = re.lastIndex;
        }
        if (last < val.length) frag.appendChild(document.createTextNode(val.slice(last)));
        tn.parentNode.replaceChild(frag, tn);
      });

      const count = marks.length;
      if (count === 0) {
        matchInfo.textContent = 'No matches';
        prevBtn.disabled = true;
        nextBtn.disabled = true;
        return;
      }

      prevBtn.disabled = false;
      nextBtn.disabled = false;
      goTo(0);
    }

    function goTo(idx) {
      if (!marks.length) return;
      if (currentIdx >= 0) marks[currentIdx].classList.remove('current');
      currentIdx = (idx + marks.length) % marks.length;
      marks[currentIdx].classList.add('current');
      marks[currentIdx].scrollIntoView({ block: 'center', behavior: 'smooth' });
      matchInfo.textContent = `${currentIdx + 1} / ${marks.length}`;
    }

    let debounceTimer;
    searchEl.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => highlight(searchEl.value.trim()), 150);
    });

    searchEl.addEventListener('keydown', e => {
      if (!marks.length) return;
      if (e.key === 'Enter') { e.preventDefault(); goTo(e.shiftKey ? currentIdx - 1 : currentIdx + 1); }
    });

    nextBtn.addEventListener('click', () => goTo(currentIdx + 1));
    prevBtn.addEventListener('click', () => goTo(currentIdx - 1));
  </script>
  <script src="/nav.js"></script>
</body>
</html>
