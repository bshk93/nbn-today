<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/logo.png">
  <link rel="stylesheet" href="/css/shared.css">
  <title>Cap Settings — NBN</title>
  <style>
    .page { max-width: 720px; margin: 0 auto; }
    header { margin-bottom: 2rem; }
    header h1 { font-size: 1.875rem; font-weight: 700; letter-spacing: -0.02em; }
    header p { color: #9ca3af; margin-top: 0.4rem; font-size: 0.9rem; }

    .auth-banner {
      background: #1f2937; border: 1px solid #374151; border-radius: 10px;
      padding: 1.25rem 1.5rem; margin-bottom: 1.5rem;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    }
    .auth-banner p { font-size: 0.875rem; color: #9ca3af; }
    .btn {
      font-size: 0.8rem; font-weight: 600; font-family: inherit; cursor: pointer;
      padding: 0.35rem 0.75rem; border-radius: 6px; border: none;
    }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-primary:disabled { background: #374151; color: #6b7280; cursor: default; }

    .seasons { display: flex; flex-direction: column; gap: 1.25rem; }

    .season-card {
      background: #1f2937; border: 1px solid #374151; border-radius: 10px;
      padding: 1.25rem 1.5rem;
    }
    .season-card h2 {
      font-size: 1rem; font-weight: 700; margin-bottom: 1rem;
      color: #60a5fa; font-family: ui-monospace, 'Cascadia Code', monospace;
    }
    .fields {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem 1.25rem;
      margin-bottom: 1rem;
    }
    .field { display: flex; flex-direction: column; gap: 0.3rem; }
    .field label {
      font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: #6b7280;
    }
    .field input {
      background: #111827; border: 1px solid #374151; border-radius: 6px;
      color: #f3f4f6; font-size: 0.85rem; font-family: inherit;
      padding: 0.35rem 0.5rem; outline: none; width: 100%;
    }
    .field input:focus { border-color: #3b82f6; }
    .field .hint { font-size: 0.72rem; color: #4b5563; }

    .card-footer {
      display: flex; align-items: center; gap: 0.75rem; margin-top: 0.25rem;
    }
    .status { font-size: 0.78rem; }
    .status.ok  { color: #22c55e; }
    .status.err { color: #ef4444; }

    .ly-card {
      background: #1f2937; border: 1px solid #374151; border-radius: 10px;
      padding: 1.25rem 1.5rem; margin-bottom: 1.5rem;
    }
    .ly-card h2 {
      font-size: 1rem; font-weight: 700; margin-bottom: 0.25rem;
    }
    .ly-current {
      font-size: 0.85rem; color: #9ca3af; margin-bottom: 1rem;
    }
    .ly-current b {
      color: #60a5fa; font-family: ui-monospace, 'Cascadia Code', monospace; font-weight: 700;
    }
    .ly-row {
      display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap;
      padding: 0.5rem 0; border-top: 1px solid #2b3544; font-size: 0.85rem;
    }
    .ly-row .ly-season {
      font-family: ui-monospace, 'Cascadia Code', monospace; font-weight: 700;
      color: #f3f4f6; width: 3.5rem;
    }
    .ly-row .ly-note { color: #6b7280; font-size: 0.75rem; }
    .ly-row input[type="date"] {
      background: #111827; border: 1px solid #374151; border-radius: 6px;
      color: #f3f4f6; font-size: 0.82rem; font-family: inherit;
      padding: 0.3rem 0.45rem; outline: none;
    }
    .ly-row input[type="date"]:focus { border-color: #3b82f6; }
    .btn-ghost { background: transparent; color: #9ca3af; border: 1px solid #374151; }
    .btn-ghost:hover { color: #f3f4f6; border-color: #4b5563; }

    @media (max-width: 540px) {
      .fields { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="page">
    <nav class="nav"></nav>
    <header>
      <h1>Cap Settings</h1>
      <p>Salary cap, apron thresholds, and exception amounts by season.</p>
    </header>

    <div class="auth-banner" id="auth-banner" style="display:none">
      <p id="auth-msg">A committee token is required to edit these values.</p>
      <button class="btn btn-primary" id="auth-btn">Enter Token</button>
    </div>

    <div id="league-year"></div>

    <div class="seasons" id="seasons">
      <p style="color:#6b7280;font-size:0.875rem;">Loading…</p>
    </div>
  </div>

  <script>
    const FIELDS = [
      { key: 'cap',          label: 'Salary Cap' },
      { key: 'apron1',       label: '1st Apron' },
      { key: 'apron2',       label: '2nd Apron' },
      { key: 'hard_cap',     label: 'Hard Cap' },
      { key: 'ntmle_amount', label: 'Non-Taxpayer MLE' },
      { key: 'tmle_amount',  label: 'Taxpayer MLE' },
      { key: 'room_amount',  label: 'Room Exception' },
      { key: 'bae_amount',   label: 'Bi-Annual Exception' },
    ];

    function currentSeason() {
      const now = new Date();
      const y = now.getFullYear() % 100;
      const m = now.getMonth() + 1;
      return m < 7
        ? `${String(y - 1).padStart(2, '0')}-${String(y).padStart(2, '0')}`
        : `${String(y).padStart(2, '0')}-${String((y + 1) % 100).padStart(2, '0')}`;
    }

    function nextSeason(s) {
      const [a, b] = s.split('-').map(Number);
      return `${String((a + 1) % 100).padStart(2, '0')}-${String((b + 1) % 100).padStart(2, '0')}`;
    }

    // Default rollover for a season: July 1 of its first calendar year ('26-27' -> '2026-07-01').
    function defaultStart(season) {
      return `20${season.split('-')[0]}-07-01`;
    }

    function fmtDollars(v) {
      return v ? '$' + Number(v).toLocaleString('en-US') : '';
    }

    function getToken() { return localStorage.getItem('nbn_token'); }
    function setToken(t) { localStorage.setItem('nbn_token', t); }

    function promptToken(cb) {
      const t = window.prompt('Enter your NBN committee token:');
      if (t && t.trim()) { setToken(t.trim()); cb(t.trim()); }
    }

    function renderLeagueYear(leagueData, canAdvance) {
      const cur = leagueData.current_season;
      const rollovers = leagueData.rollovers || {};
      const container = document.getElementById('league-year');
      container.innerHTML = '';

      const card = document.createElement('div');
      card.className = 'ly-card';
      card.innerHTML = `
        <h2>League Year</h2>
        <p class="ly-current">The cap/contract clock. Current league year: <b>${cur}</b>.
        Default rollover is July 1; set an earlier date to advance the league year now.</p>`;

      if (!canAdvance) {
        if (getToken()) {
          const note = document.createElement('p');
          note.className = 'ly-note';
          note.textContent = 'BOD or admin role required to change the rollover date.';
          card.appendChild(note);
        }
        container.appendChild(card);
        return;
      }

      // Rows for: current season, next season, and any season with an override set.
      const seasons = [...new Set([cur, nextSeason(cur), ...Object.keys(rollovers)])]
        .sort((a, b) => a.localeCompare(b));

      seasons.forEach(season => {
        const override = rollovers[season];
        const row = document.createElement('div');
        row.className = 'ly-row';

        const label = document.createElement('span');
        label.className = 'ly-season';
        label.textContent = season;

        const begins = document.createElement('span');
        begins.style.color = '#9ca3af';
        begins.textContent = 'begins';

        const input = document.createElement('input');
        input.type = 'date';
        input.value = override || defaultStart(season);

        const save = document.createElement('button');
        save.className = 'btn btn-primary';
        save.textContent = 'Save';

        const status = document.createElement('span');
        status.className = 'status';

        row.appendChild(label);
        row.appendChild(begins);
        row.appendChild(input);
        row.appendChild(save);

        const note = document.createElement('span');
        note.className = 'ly-note';
        note.textContent = override ? `overridden (default ${defaultStart(season)})` : 'default';
        row.appendChild(note);

        if (override) {
          const reset = document.createElement('button');
          reset.className = 'btn btn-ghost';
          reset.textContent = 'Reset to Jul 1';
          reset.addEventListener('click', async () => {
            reset.disabled = true; status.textContent = 'Resetting…'; status.className = 'status';
            try {
              const r = await fetch(`/api/league-year/${season}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${getToken()}` },
              });
              if (!r.ok) throw new Error();
              location.reload();
            } catch { status.textContent = 'Error.'; status.className = 'status err'; reset.disabled = false; }
          });
          row.appendChild(reset);
        }

        row.appendChild(status);

        save.addEventListener('click', async () => {
          save.disabled = true; status.textContent = 'Saving…'; status.className = 'status';
          try {
            const r = await fetch(`/api/league-year/${season}`, {
              method: 'PUT',
              headers: { 'Authorization': `Bearer ${getToken()}`, 'Content-Type': 'application/json' },
              body: JSON.stringify({ effective: input.value }),
            });
            if (r.status === 403) {
              status.textContent = 'Not authorized.'; status.className = 'status err'; save.disabled = false; return;
            }
            if (!r.ok) throw new Error();
            location.reload();
          } catch { status.textContent = 'Error saving.'; status.className = 'status err'; save.disabled = false; }
        });

        card.appendChild(row);
      });

      container.appendChild(card);
    }

    function renderSeasons(capLevels, canEdit, cur) {
      const next = nextSeason(cur);
      const all  = new Set([...Object.keys(capLevels), cur, next]);
      const seasons = [...all].sort((a, b) => b.localeCompare(a));

      const container = document.getElementById('seasons');
      container.innerHTML = '';

      seasons.forEach(season => {
        const data = capLevels[season] || {};
        const card = document.createElement('div');
        card.className = 'season-card';

        const h2 = document.createElement('h2');
        h2.textContent = season;
        card.appendChild(h2);

        const fieldsDiv = document.createElement('div');
        fieldsDiv.className = 'fields';

        const inputs = {};
        FIELDS.forEach(({ key, label }) => {
          const wrap = document.createElement('div');
          wrap.className = 'field';
          const lbl = document.createElement('label');
          lbl.textContent = label;
          const inp = document.createElement('input');
          inp.type = 'number';
          inp.value = data[key] || '';
          inp.placeholder = '0';
          inp.disabled = !canEdit;
          const hint = document.createElement('div');
          hint.className = 'hint';
          hint.textContent = fmtDollars(data[key]);
          inp.addEventListener('input', () => { hint.textContent = fmtDollars(inp.value); });
          wrap.appendChild(lbl);
          wrap.appendChild(inp);
          wrap.appendChild(hint);
          fieldsDiv.appendChild(wrap);
          inputs[key] = inp;
        });
        card.appendChild(fieldsDiv);

        if (canEdit) {
          const footer = document.createElement('div');
          footer.className = 'card-footer';
          const btn = document.createElement('button');
          btn.className = 'btn btn-primary';
          btn.textContent = 'Save';
          const status = document.createElement('span');
          status.className = 'status';
          footer.appendChild(btn);
          footer.appendChild(status);
          card.appendChild(footer);

          btn.addEventListener('click', async () => {
            btn.disabled = true;
            status.textContent = 'Saving…';
            status.className = 'status';
            const token = getToken();
            const body = {};
            FIELDS.forEach(({ key }) => { body[key] = Number(inputs[key].value) || 0; });
            try {
              const r = await fetch(`/api/cap-levels/${season}`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
              });
              if (r.status === 403) {
                localStorage.removeItem('nbn_token');
                status.textContent = 'Token rejected — refresh and re-enter.';
                status.className = 'status err';
              } else if (!r.ok) {
                throw new Error('Save failed');
              } else {
                status.textContent = 'Saved.';
                status.className = 'status ok';
                setTimeout(() => { status.textContent = ''; }, 3000);
              }
            } catch {
              status.textContent = 'Error saving.';
              status.className = 'status err';
            }
            btn.disabled = false;
          });
        }

        container.appendChild(card);
      });
    }

    async function init() {
      const token = getToken();
      const authBanner = document.getElementById('auth-banner');
      const authMsg    = document.getElementById('auth-msg');
      const authBtn    = document.getElementById('auth-btn');

      let canEdit = false;     // rosters/admin — edit cap numbers
      let canAdvance = false;  // bod/admin — change the league-year rollover

      if (!token) {
        authMsg.textContent = 'A committee token is required to edit these values.';
        authBanner.style.display = '';
        authBtn.addEventListener('click', () => promptToken(() => location.reload()));
      } else {
        const meResp = await fetch('/api/me', {
          headers: { 'Authorization': `Bearer ${token}` }
        }).catch(() => null);

        if (!meResp || !meResp.ok) {
          authMsg.textContent = 'Token invalid or expired.';
          authBanner.style.display = '';
          authBtn.textContent = 'Re-enter Token';
          authBtn.addEventListener('click', () => promptToken(() => location.reload()));
        } else {
          const me = await meResp.json();
          canEdit = me.roles.some(r => r === 'rosters' || r === 'admin');
          canAdvance = me.roles.some(r => r === 'bod' || r === 'admin');
          if (!canEdit && !canAdvance) {
            authMsg.textContent = `Signed in as ${me.name}, but this role cannot edit league settings.`;
            authBanner.style.display = '';
            authBtn.style.display = 'none';
          }
        }
      }

      const [capResp, lyResp] = await Promise.all([
        fetch('/api/cap-levels').catch(() => null),
        fetch('/api/league-year').catch(() => null),
      ]);
      const capLevels = (capResp && capResp.ok) ? await capResp.json() : {};
      const leagueData = (lyResp && lyResp.ok)
        ? await lyResp.json()
        : { current_season: currentSeason(), rollovers: {} };

      renderLeagueYear(leagueData, canAdvance);
      renderSeasons(capLevels, canEdit, leagueData.current_season);
    }

    init();
  </script>
  <script src="/nav.js"></script>
</body>
</html>
