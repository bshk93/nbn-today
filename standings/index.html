<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/logo.png">
  <title>Standings — NBN</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111827;
      color: #f3f4f6;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    a { color: #60a5fa; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .page { max-width: 900px; margin: 0 auto; }

    .nav { margin-bottom: 1.75rem; font-size: 0.875rem; color: #9ca3af; }
    .nav a { color: #9ca3af; }
    .nav a:hover { color: #f3f4f6; }

    header { margin-bottom: 1.25rem; }
    header h1 { font-size: 1.875rem; font-weight: 700; letter-spacing: -0.02em; }

    /* Tabs */
    .tab-row {
      display: flex;
      gap: 0.25rem;
      border-bottom: 1px solid #374151;
      margin-bottom: 1.5rem;
    }

    .tab-btn {
      padding: 0.5rem 1.1rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: #6b7280;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      cursor: pointer;
      transition: color 0.1s;
    }

    .tab-btn:hover { color: #d1d5db; }
    .tab-btn.active { color: #f3f4f6; border-bottom-color: #60a5fa; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .controls label { font-size: 0.85rem; color: #9ca3af; }

    select {
      background: #1f2937;
      border: 1px solid #374151;
      color: #f3f4f6;
      padding: 0.4rem 0.75rem;
      border-radius: 6px;
      font-size: 0.875rem;
      cursor: pointer;
    }

    select:focus { outline: none; border-color: #60a5fa; }

    /* Standings tables */
    .conferences {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }

    @media (max-width: 680px) { .conferences { grid-template-columns: 1fr; } }

    .conf-block h2 {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 0.6rem;
    }

    .table-wrap {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 12px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      white-space: nowrap;
    }

    thead th {
      padding: 0.6rem 0.75rem;
      text-align: left;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #6b7280;
      border-bottom: 1px solid #374151;
    }

    thead th.right { text-align: right; }

    tbody tr { border-bottom: 1px solid #283141; transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #263244; }

    td { padding: 0.55rem 0.75rem; color: #d1d5db; }
    td.seed { color: #6b7280; font-size: 0.78rem; width: 2rem; }
    td.team { font-weight: 600; color: #f3f4f6; }
    td.right { text-align: right; font-variant-numeric: tabular-nums; }
    td.muted { color: #9ca3af; }
    td.result { padding-right: 0.75rem; }

    .result-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      letter-spacing: 0.03em;
    }

    .result-champion   { background: #78350f; color: #fbbf24; }
    .result-runnerup   { background: #1c2533; color: #9ca3af; border: 1px solid #374151; }
    .result-conffinals { background: #1c2d24; color: #6ee7b7; }
    .result-second     { background: #1e2d3d; color: #93c5fd; }
    .result-first      { background: #27212b; color: #c4b5fd; }

    /* Bracket */
    #bracket-content { overflow-x: auto; }

    .bracket-container {
      display: grid;
      grid-template-rows: auto 1fr 1fr;
      min-width: 560px;
    }

    .bracket-round-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6b7280;
      text-align: center;
      padding-bottom: 0.5rem;
    }

    .bracket-round-cell {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .bracket-round-cell .series-card { width: 100%; }

    .bracket-connector { overflow: visible; }

    .bracket-finals-cell {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .series-card {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 8px;
      overflow: hidden;
    }

    .series-card-pending {
      border-color: #1f2937;
      border-style: dashed;
      min-height: 52px;
    }

    .series-team {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.4rem 0.65rem;
      font-size: 0.82rem;
      color: #9ca3af;
      border-bottom: 1px solid #283141;
    }

    .series-team:last-child { border-bottom: none; }

    .series-team.winner {
      color: #f3f4f6;
      font-weight: 600;
      background: #263244;
    }

    .series-team.champion { background: #1c1305; color: #fbbf24; font-weight: 700; }

    .series-team .team-name { flex: 1; }

    .series-team .seed-badge {
      font-size: 0.68rem;
      color: #4b5563;
      margin-right: 0.4rem;
    }

    .series-team.winner .seed-badge { color: #6b7280; }

    .series-team .wins {
      font-size: 0.78rem;
      font-variant-numeric: tabular-nums;
      color: #4b5563;
      min-width: 1.2rem;
      text-align: right;
    }

    .series-team.winner .wins { color: #60a5fa; }

    .finals-card { border-color: #4b5563; }
    .finals-card .series-team.champion .wins { color: #fbbf24; }

    #status { text-align: center; padding: 3rem; color: #6b7280; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="page">
    <nav class="nav"><a href="/">← Home</a></nav>

    <header>
      <h1>Standings &amp; Playoffs</h1>
    </header>

    <div class="tab-row">
      <button class="tab-btn active" data-tab="standings">Standings</button>
      <button class="tab-btn" data-tab="playoffs">Playoffs</button>
    </div>

    <div class="tab-panel active" id="tab-standings">
      <div class="controls">
        <label for="season-select">Season</label>
        <select id="season-select"></select>
      </div>
      <div id="standings-content"><div id="status">Loading…</div></div>
    </div>

    <div class="tab-panel" id="tab-playoffs">
      <div class="controls">
        <label for="bracket-season-select">Season</label>
        <select id="bracket-season-select"></select>
      </div>
      <div id="bracket-content"><div id="status">Loading…</div></div>
    </div>
  </div>

  <script>
    // ── Tab logic ─────────────────────────────────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });

    // ── CSV parser ────────────────────────────────────────────────────────────
    function parseCSV(text) {
      const lines = text.trim().split('\n');
      const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());
      return lines.slice(1).map(line => {
        const vals = [];
        let cur = '', inQ = false;
        for (const ch of line) {
          if (ch === '"') { inQ = !inQ; }
          else if (ch === ',' && !inQ) { vals.push(cur); cur = ''; }
          else { cur += ch; }
        }
        vals.push(cur);
        const row = {};
        headers.forEach((h, i) => row[h] = (vals[i] ?? '').trim());
        return row;
      });
    }

    // ── Standings tab ─────────────────────────────────────────────────────────
    const RESULT_ORDER = ['Champion', 'Runner-Up', 'Conf Finals', 'Second Round', 'First Round', 'Missed'];

    function resultBadge(result) {
      if (!result || result === 'Missed') return '';
      const cls = {
        'Champion':    'result-champion',
        'Runner-Up':   'result-runnerup',
        'Conf Finals': 'result-conffinals',
        'Second Round':'result-second',
        'First Round': 'result-first',
      }[result] || '';
      const label = {
        'Champion':    '🏆 Champion',
        'Runner-Up':   'Runner-Up',
        'Conf Finals': 'Conf Finals',
        'Second Round':'2nd Round',
        'First Round': '1st Round',
      }[result] || result;
      return `<span class="result-badge ${cls}">${label}</span>`;
    }

    function gb(leaderW, leaderL, w, l) {
      const diff = ((leaderW - w) + (l - leaderL)) / 2;
      return diff === 0 ? '—' : diff.toFixed(1);
    }

    function renderConference(rows, confName) {
      const leaderW = +rows[0].W, leaderL = +rows[0].L;
      const wrap = document.createElement('div');
      wrap.className = 'conf-block';
      const h2 = document.createElement('h2');
      h2.textContent = confName;
      wrap.appendChild(h2);
      const tableWrap = document.createElement('div');
      tableWrap.className = 'table-wrap';
      const tbl = document.createElement('table');
      tbl.innerHTML = `<thead><tr>
        <th></th><th>Team</th>
        <th class="right">W</th><th class="right">L</th>
        <th class="right">PCT</th><th class="right">GB</th>
        <th class="right">PPG</th><th class="right">OPPG</th>
        <th class="right">+/−</th><th></th>
      </tr></thead>`;
      const tbody = document.createElement('tbody');
      rows.forEach(row => {
        const tr = document.createElement('tr');
        const seedNum = row.SEED_NUM || row.SEED.replace(/\D/g, '');
        const pct = (+row.PCT).toFixed(3).replace(/^0/, '');
        tr.innerHTML = `
          <td class="seed">${seedNum}</td>
          <td class="team">${row.TEAM}</td>
          <td class="right">${row.W}</td>
          <td class="right">${row.L}</td>
          <td class="right">${pct}</td>
          <td class="right muted">${gb(leaderW, leaderL, +row.W, +row.L)}</td>
          <td class="right">${(+row.PPG).toFixed(1)}</td>
          <td class="right">${(+row.OPPG).toFixed(1)}</td>
          <td class="right">${(+row.DIFF) >= 0 ? '+' : ''}${(+row.DIFF).toFixed(1)}</td>
          <td class="result">${resultBadge(row.PLAYOFF_RESULT)}</td>`;
        tbody.appendChild(tr);
      });
      tbl.appendChild(tbody);
      tableWrap.appendChild(tbl);
      wrap.appendChild(tableWrap);
      return wrap;
    }

    function renderStandings(rows, season) {
      const seasonRows = rows.filter(r => r.SEASON === season);
      const east = seasonRows.filter(r => r.SEED.startsWith('East')).sort((a, b) => +a.SEED_NUM - +b.SEED_NUM);
      const west = seasonRows.filter(r => r.SEED.startsWith('West')).sort((a, b) => +a.SEED_NUM - +b.SEED_NUM);
      const content = document.getElementById('standings-content');
      content.innerHTML = '';
      const grid = document.createElement('div');
      grid.className = 'conferences';
      grid.appendChild(renderConference(east, 'Eastern Conference'));
      grid.appendChild(renderConference(west, 'Western Conference'));
      content.appendChild(grid);
    }

    // ── Bracket tab ───────────────────────────────────────────────────────────
    const ROUND_LABELS = { '1': 'First Round', '2': 'Conference Semifinals', '3': 'Conference Finals', '4': 'Finals' };

    function seedConf(seed) {
      if (!seed) return '';
      return seed.startsWith('East') ? 'E' : 'W';
    }

    function seedNum(seed) {
      return seed ? seed.replace(/\D/g, '') : '';
    }

    function seriesCard(series, isChampSeries) {
      const card = document.createElement('div');
      card.className = 'series-card' + (isChampSeries ? ' finals-card' : '');

      [
        { team: series.T1, seed: series.T1_SEED, wins: +series.T1_W },
        { team: series.T2, seed: series.T2_SEED, wins: +series.T2_W },
      ].forEach(({ team, seed, wins }) => {
        const isWinner = team === series.WINNER;
        const isChamp = isChampSeries && isWinner;
        const row = document.createElement('div');
        row.className = 'series-team' + (isWinner ? (isChamp ? ' champion' : ' winner') : '');

        const seedSpan = document.createElement('span');
        seedSpan.className = 'seed-badge';
        seedSpan.textContent = seedConf(seed) + seedNum(seed);

        const nameSpan = document.createElement('span');
        nameSpan.className = 'team-name';
        nameSpan.textContent = team;

        const winsSpan = document.createElement('span');
        winsSpan.className = 'wins';
        winsSpan.textContent = wins;

        row.appendChild(seedSpan);
        row.appendChild(nameSpan);
        row.appendChild(winsSpan);
        card.appendChild(row);
      });

      return card;
    }

    function makeConnectorSVG(nLeft, nRight) {
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('viewBox', '0 0 100 100');
      svg.setAttribute('preserveAspectRatio', 'none');
      svg.style.cssText = 'width:100%;height:100%;display:block';
      for (let i = 0; i < nRight; i++) {
        const topY = (2 * i + 0.5) / nLeft * 100;
        const botY = (2 * i + 1.5) / nLeft * 100;
        const midY = (i + 0.5) / nRight * 100;
        const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        p.setAttribute('d', `M0,${topY}L50,${topY}L50,${botY}L0,${botY}M50,${midY}L100,${midY}`);
        p.setAttribute('stroke', '#374151');
        p.setAttribute('stroke-width', '1.5');
        p.setAttribute('fill', 'none');
        p.setAttribute('vector-effect', 'non-scaling-stroke');
        svg.appendChild(p);
      }
      return svg;
    }

    function makeRoundCell(series, isChamp) {
      const cell = document.createElement('div');
      cell.className = 'bracket-round-cell';
      series.forEach(s => {
        const wrap = document.createElement('div');
        wrap.style.cssText = 'flex:1;display:flex;align-items:center';
        wrap.appendChild(seriesCard(s, isChamp));
        cell.appendChild(wrap);
      });
      return cell;
    }

    function makePlaceholderCell(count) {
      const cell = document.createElement('div');
      cell.className = 'bracket-round-cell';
      for (let i = 0; i < count; i++) {
        const wrap = document.createElement('div');
        wrap.style.cssText = 'flex:1;display:flex;align-items:center';
        const card = document.createElement('div');
        card.className = 'series-card series-card-pending';
        wrap.appendChild(card);
        cell.appendChild(wrap);
      }
      return cell;
    }

    function renderBracket(rows, season) {
      const content = document.getElementById('bracket-content');
      content.innerHTML = '';

      const seasonRows = rows.filter(r => r.SEASON === season);
      if (!seasonRows.length) {
        content.innerHTML = '<div id="status">No playoff data for this season.</div>';
        return;
      }

      // Total rounds comes from ROUND_LABELS so in-progress seasons don't
      // misidentify the last available round as the Finals.
      const totalRounds = Math.max(...Object.keys(ROUND_LABELS).map(Number));
      const champRoundKey = String(totalRounds);
      const nonChampRoundKeys = Array.from({length: totalRounds - 1}, (_, i) => String(i + 1));
      const finalsCol = nonChampRoundKeys.length * 2 + 1;

      const container = document.createElement('div');
      container.className = 'bracket-container';
      container.style.gridTemplateColumns = Array.from(
        {length: finalsCol}, (_, i) => i % 2 === 0 ? '1fr' : '28px'
      ).join(' ');

      const isEast = s => s.T1_SEED?.startsWith('East') || s.T2_SEED?.startsWith('East');
      const isWest = s => s.T1_SEED?.startsWith('West') || s.T2_SEED?.startsWith('West');

      // Round-1 canonical sort key: sort by whichever of seeds 1/4/3/2 is in the series.
      // This gives the bracket order 1v_, 4v_, 3v_, 2v_ regardless of who the opponent is
      // (opponent may be 5–10 depending on the season's play-in format).
      function r1BracketKey(s) {
        const minS = Math.min(+s.T1_SEED_NUM || 99, +s.T2_SEED_NUM || 99);
        if (minS === 1) return 0;
        if (minS === 4) return 1;
        if (minS === 3) return 2;
        if (minS === 2) return 3;
        return 99;
      }

      // Pre-sort round 1 for each conference, then tag every team with its bracket half
      // (0 = top half: positions 0–1; 1 = bottom half: positions 2–3).
      // This lets us correctly sort round-2+ series even after upsets leave no 1/2/3/4-seed
      // in a matchup (e.g. a 5v9 or 7v8 round-2 series).
      const r1Rows = seasonRows.filter(r => r.ROUND === '1');
      const eastR1 = r1Rows.filter(isEast).sort((a, b) => r1BracketKey(a) - r1BracketKey(b));
      const westR1 = r1Rows.filter(isWest).sort((a, b) => r1BracketKey(a) - r1BracketKey(b));
      const bracketHalf = new Map(); // team name → 0 (top) or 1 (bottom)
      [eastR1, westR1].forEach(r1 => {
        r1.forEach((s, i) => {
          bracketHalf.set(s.T1, i < 2 ? 0 : 1);
          bracketHalf.set(s.T2, i < 2 ? 0 : 1);
        });
      });

      function sortSeries(a, b, rnd) {
        if (rnd === '1') return r1BracketKey(a) - r1BracketKey(b);
        // For round 2+, both teams in a series come from the same bracket half;
        // use min() as a fallback in case only one team appears in the half map.
        const halfA = Math.min(bracketHalf.get(a.T1) ?? 1, bracketHalf.get(a.T2) ?? 1);
        const halfB = Math.min(bracketHalf.get(b.T1) ?? 1, bracketHalf.get(b.T2) ?? 1);
        if (halfA !== halfB) return halfA - halfB;
        // Tiebreaker (reseeded brackets where teams crossed halves): better seed first.
        const minSA = Math.min(+a.T1_SEED_NUM || 99, +a.T2_SEED_NUM || 99);
        const minSB = Math.min(+b.T1_SEED_NUM || 99, +b.T2_SEED_NUM || 99);
        return minSA - minSB;
      }

      // Infer expected series count for a round from the nearest earlier round with data.
      function inferCount(roundKey, isConfFn) {
        for (let r = +roundKey; r >= 1; r--) {
          const n = seasonRows.filter(row => row.ROUND === String(r)).filter(isConfFn).length;
          if (n) return Math.max(1, Math.round(n / Math.pow(2, +roundKey - r)));
        }
        return 1;
      }

      nonChampRoundKeys.forEach((rnd, i) => {
        const col = i * 2 + 1;
        const roundSeries = seasonRows.filter(r => r.ROUND === rnd);
        const east = roundSeries.filter(isEast).sort((a, b) => sortSeries(a, b, rnd));
        const west = roundSeries.filter(isWest).sort((a, b) => sortSeries(a, b, rnd));

        const label = document.createElement('div');
        label.className = 'bracket-round-label';
        label.textContent = ROUND_LABELS[rnd] || `Round ${rnd}`;
        label.style.cssText = `grid-column:${col};grid-row:1`;
        container.appendChild(label);

        const eastCell = east.length ? makeRoundCell(east, false) : makePlaceholderCell(inferCount(rnd, isEast));
        eastCell.style.cssText = `grid-column:${col};grid-row:2`;
        container.appendChild(eastCell);

        const westCell = west.length ? makeRoundCell(west, false) : makePlaceholderCell(inferCount(rnd, isWest));
        westCell.style.cssText = `grid-column:${col};grid-row:3`;
        container.appendChild(westCell);

        const connCol = col + 1;
        const isLastNonChamp = i === nonChampRoundKeys.length - 1;

        if (!isLastNonChamp) {
          const nextRnd = nonChampRoundKeys[i + 1];
          const curEast = east.length || inferCount(rnd, isEast);
          const curWest = west.length || inferCount(rnd, isWest);
          const nextEast = inferCount(nextRnd, isEast);
          const nextWest = inferCount(nextRnd, isWest);

          const ec = document.createElement('div');
          ec.className = 'bracket-connector';
          ec.style.cssText = `grid-column:${connCol};grid-row:2`;
          ec.appendChild(makeConnectorSVG(curEast, nextEast));
          container.appendChild(ec);

          const wc = document.createElement('div');
          wc.className = 'bracket-connector';
          wc.style.cssText = `grid-column:${connCol};grid-row:3`;
          wc.appendChild(makeConnectorSVG(curWest, nextWest));
          container.appendChild(wc);
        } else {
          const fc = document.createElement('div');
          fc.className = 'bracket-connector';
          fc.style.cssText = `grid-column:${connCol};grid-row:2/4`;
          fc.appendChild(makeConnectorSVG(2, 1));
          container.appendChild(fc);
        }
      });

      const finalsLabel = document.createElement('div');
      finalsLabel.className = 'bracket-round-label';
      finalsLabel.textContent = ROUND_LABELS[champRoundKey] || 'Finals';
      finalsLabel.style.cssText = `grid-column:${finalsCol};grid-row:1`;
      container.appendChild(finalsLabel);

      const champSeries = seasonRows.filter(r => r.ROUND === champRoundKey);
      const finalsCell = document.createElement('div');
      finalsCell.className = 'bracket-finals-cell';
      finalsCell.style.cssText = `grid-column:${finalsCol};grid-row:2/4`;
      if (champSeries.length) {
        champSeries.forEach(s => finalsCell.appendChild(seriesCard(s, true)));
      } else {
        const card = document.createElement('div');
        card.className = 'series-card series-card-pending';
        card.style.width = '100%';
        finalsCell.appendChild(card);
      }
      container.appendChild(finalsCell);

      content.appendChild(container);
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    async function init() {
      const [standRes, bracketRes] = await Promise.all([
        fetch('/standings/standings-history.csv'),
        fetch('/standings/playoff-brackets.csv'),
      ]);

      if (!standRes.ok || !bracketRes.ok) {
        document.getElementById('status').textContent = 'Failed to load data.';
        return;
      }

      const standRows   = parseCSV(await standRes.text());
      const bracketRows = parseCSV(await bracketRes.text());

      // Populate standings season selector
      const seasons = [...new Set(standRows.map(r => r.SEASON))].sort().reverse();
      const sel = document.getElementById('season-select');
      seasons.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s; opt.textContent = s;
        sel.appendChild(opt);
      });

      // Populate bracket season selector (only seasons with bracket data)
      const bracketSeasons = [...new Set(bracketRows.map(r => r.SEASON))].sort().reverse();
      const bsel = document.getElementById('bracket-season-select');
      bracketSeasons.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s; opt.textContent = s;
        bsel.appendChild(opt);
      });

      renderStandings(standRows, seasons[0]);
      if (bracketSeasons.length) renderBracket(bracketRows, bracketSeasons[0]);

      sel.addEventListener('change', () => renderStandings(standRows, sel.value));
      bsel.addEventListener('change', () => renderBracket(bracketRows, bsel.value));
    }

    init();
  </script>
  <script src="/nav.js"></script>
  <script src="/token-badge.js"></script>
</body>
</html>
