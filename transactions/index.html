<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transactions — NBN</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111827;
      color: #f3f4f6;
      min-height: 100vh;
    }


    .nav { margin-bottom: 1.75rem; font-size: 0.875rem; color: #9ca3af; }
    .nav a { color: #9ca3af; }
    .nav a:hover { color: #f3f4f6; }

    main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
    }

    /* ── Auth bar ── */
    .auth-bar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      color: #9ca3af;
    }

    .auth-bar button {
      background: #374151;
      border: 1px solid #4b5563;
      color: #f3f4f6;
      border-radius: 6px;
      padding: 0.3rem 0.75rem;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .auth-bar button:hover { background: #4b5563; }

    /* ── Form card ── */
    .form-card {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .form-card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
      color: #e5e7eb;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.875rem 1.25rem;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .form-field.full { grid-column: 1 / -1; }

    .form-field label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #9ca3af;
    }

    .form-field input,
    .form-field select,
    .form-field textarea {
      background: #111827;
      border: 1px solid #374151;
      color: #f3f4f6;
      border-radius: 6px;
      padding: 0.5rem 0.625rem;
      font-size: 0.875rem;
      font-family: inherit;
      width: 100%;
    }

    .form-field input:focus,
    .form-field select:focus,
    .form-field textarea:focus {
      outline: none;
      border-color: #3b82f6;
    }

    .form-field select option[disabled] { color: #6b7280; }

    .radio-group {
      display: flex;
      gap: 1rem;
      align-items: center;
      padding: 0.5rem 0;
    }

    .radio-group label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.875rem;
      font-weight: normal;
      text-transform: none;
      letter-spacing: 0;
      color: #f3f4f6;
      cursor: pointer;
    }

    /* ── Salary rows ── */
    .salary-rows { display: flex; flex-direction: column; gap: 0.4rem; }

    .salary-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .salary-row input { flex: 1; }

    .salary-row .year-input { max-width: 5rem; }

    .salary-row .hold-select {
      flex: 0 0 auto;
      width: 9rem;
      background: #111827;
      border: 1px solid #374151;
      color: #f3f4f6;
      border-radius: 6px;
      padding: 0.5rem 0.5rem;
      font-size: 0.8rem;
      font-family: inherit;
    }

    .salary-row button {
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      padding: 0 0.25rem;
    }

    .add-salary-btn {
      margin-top: 0.4rem;
      background: none;
      border: 1px dashed #374151;
      color: #6b7280;
      border-radius: 6px;
      padding: 0.3rem 0.75rem;
      cursor: pointer;
      font-size: 0.8rem;
      width: 100%;
    }

    .add-salary-btn:hover { border-color: #4b5563; color: #9ca3af; }

    /* ── Pick fields ── */
    #pick-fields { display: none; }
    #pick-fields.visible { display: contents; }

    /* ── Submit row ── */
    .form-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 1.25rem;
    }

    .btn-submit {
      background: #2563eb;
      border: none;
      color: #fff;
      border-radius: 8px;
      padding: 0.55rem 1.5rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-submit:hover { background: #1d4ed8; }
    .btn-submit:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }

    .form-status {
      font-size: 0.85rem;
    }

    .form-status.ok { color: #34d399; }
    .form-status.err { color: #f87171; }

    /* ── Token modal ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 1.5rem;
      width: 360px;
      max-width: 90vw;
      display: flex;
      flex-direction: column;
      gap: 0.875rem;
    }

    .modal h3 { font-size: 1rem; font-weight: 600; }

    .modal input {
      background: #111827;
      border: 1px solid #374151;
      color: #f3f4f6;
      border-radius: 6px;
      padding: 0.5rem 0.625rem;
      font-size: 0.875rem;
      width: 100%;
    }

    .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }

    .modal-actions button {
      border-radius: 6px;
      padding: 0.4rem 1rem;
      font-size: 0.85rem;
      cursor: pointer;
      border: none;
    }

    .btn-cancel { background: #374151; color: #f3f4f6; }
    .btn-save   { background: #2563eb; color: #fff; }

    /* ── Filters ── */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
      align-items: center;
    }

    .filter-label {
      font-size: 0.75rem;
      color: #6b7280;
      margin-right: 0.25rem;
    }

    .chip {
      background: #1f2937;
      border: 1px solid #374151;
      color: #9ca3af;
      border-radius: 999px;
      padding: 0.2rem 0.75rem;
      font-size: 0.78rem;
      cursor: pointer;
      user-select: none;
    }

    .chip.active { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    thead th {
      text-align: left;
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid #374151;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #6b7280;
      white-space: nowrap;
    }

    tbody tr { border-bottom: 1px solid #1f2937; }
    tbody tr:hover { background: #1f2937; }

    tbody td {
      padding: 0.625rem 0.75rem;
      vertical-align: middle;
      color: #d1d5db;
    }

    td a { color: #60a5fa; text-decoration: none; }
    td a:hover { text-decoration: underline; }

    .badge {
      display: inline-block;
      border-radius: 999px;
      padding: 0.15rem 0.6rem;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .badge-sign    { background: #064e3b; color: #34d399; }
    .badge-pick    { background: #1e3a5f; color: #93c5fd; }
    .badge-option  { background: #431407; color: #fb923c; }

    .del-col { display: none; width: 1px; }
    .txn-table.admin-mode .del-col { display: table-cell; }
    .delete-txn-btn {
      background: none; border: none; color: #4b5563; cursor: pointer;
      font-size: 1rem; padding: 0.15rem 0.4rem; border-radius: 4px; line-height: 1;
    }
    .delete-txn-btn:hover { color: #f87171; }
    .badge-release        { background: #450a0a; color: #f87171; }
    .badge-convert_twoway { background: #1c1917; color: #a8a29e; }
    .badge-callup  { background: #451a03; color: #fb923c; }
    .badge-calldown { background: #451a03; color: #fb923c; }
    .badge-trade   { background: #2e1065; color: #c084fc; }
    .badge-tbd     { background: #374151; color: #6b7280; font-size: 0.68rem; }

    /* ── Trade builder ── */
    .trade-leg { background: #111827; border: 1px solid #374151; border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem; }
    .trade-leg-header { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
    .trade-team-sel { background: #111827; border: 1px solid #374151; color: #f3f4f6; border-radius: 6px; padding: 0.38rem 0.5rem; font-size: 0.85rem; font-family: inherit; outline: none; }
    .trade-team-sel:focus { border-color: #3b82f6; }
    .trade-leg-arrow { color: #6b7280; font-size: 1.1rem; }
    .trade-asset-row { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.3rem; flex-wrap: wrap; }
    .trade-asset-sel { flex: 1; min-width: 160px; background: #111827; border: 1px solid #374151; color: #f3f4f6; border-radius: 6px; padding: 0.38rem 0.5rem; font-size: 0.82rem; font-family: inherit; outline: none; }
    .trade-asset-sel:focus { border-color: #3b82f6; }
    .trade-prot-inp { width: 5rem; background: #111827; border: 1px solid #374151; color: #f3f4f6; border-radius: 6px; padding: 0.38rem 0.5rem; font-size: 0.82rem; font-family: inherit; outline: none; }
    .trade-prot-inp:focus { border-color: #3b82f6; }
    .trade-swap-sel { background: #111827; border: 1px solid #374151; color: #f3f4f6; border-radius: 6px; padding: 0.38rem 0.5rem; font-size: 0.82rem; font-family: inherit; outline: none; }
    .trade-swap-sel:focus { border-color: #3b82f6; }
    .trade-add-asset-btn { background: none; border: 1px dashed #374151; color: #6b7280; border-radius: 4px; padding: 0.2rem 0.6rem; cursor: pointer; font-size: 0.78rem; font-family: inherit; margin-top: 0.15rem; }
    .trade-add-asset-btn:hover { border-color: #4b5563; color: #9ca3af; }
    .trade-add-main-btn { width: 100%; background: none; border: 1px dashed #374151; color: #6b7280; border-radius: 6px; padding: 0.4rem; cursor: pointer; font-size: 0.82rem; font-family: inherit; margin-bottom: 0.75rem; }
    .trade-add-main-btn:hover { border-color: #4b5563; color: #9ca3af; }
    .remove-leg-btn, .remove-asset-btn { background: none; border: none; color: #4b5563; cursor: pointer; font-size: 1rem; line-height: 1; padding: 0 0.25rem; }
    .remove-leg-btn:hover, .remove-asset-btn:hover { color: #f87171; }
    .legality-section { border: 1px solid #374151; border-radius: 8px; overflow: hidden; margin-top: 1rem; margin-bottom: 0.75rem; }
    .legality-header { background: #1a2535; padding: 0.45rem 0.75rem; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #6b7280; border-bottom: 1px solid #374151; }
    .legality-row { display: flex; align-items: center; justify-content: space-between; padding: 0.45rem 0.75rem; font-size: 0.82rem; color: #9ca3af; border-bottom: 1px solid #283141; }
    .legality-row:last-child { border-bottom: none; }

    .empty-state {
      text-align: center;
      color: #6b7280;
      padding: 3rem 0;
      font-size: 0.9rem;
    }

    /* ── Player autocomplete ── */
    .player-wrap { position: relative; }

    .player-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 2px);
      left: 0;
      right: 0;
      background: #1f2937;
      border: 1px solid #4b5563;
      border-radius: 6px;
      max-height: 220px;
      overflow-y: auto;
      z-index: 50;
    }

    .player-dropdown.open { display: block; }

    .pd-item {
      padding: 0.45rem 0.625rem;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .pd-item:hover, .pd-item.focused { background: #374151; }

    .pd-item .pd-slug {
      font-size: 0.72rem;
      color: #6b7280;
      margin-left: 0.5rem;
    }

    @media (max-width: 640px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-field.full { grid-column: 1; }
    }
  </style>
</head>
<body>
<script src="/nav.js"></script>

<main>
  <nav class="nav"><a href="/">← Home</a></nav>
  <h1>Transactions</h1>

  <div class="auth-bar" id="auth-bar">
    <span id="auth-status">Not signed in</span>
    <button id="auth-btn">Sign in</button>
  </div>

  <!-- New transaction form (shown when authenticated) -->
  <div class="form-card" id="form-card" style="display:none">
    <h2>New Transaction</h2>
    <div class="form-grid">

      <div class="form-field">
        <label>Type</label>
        <select id="f-type">
          <option value="sign">Free Agency Signing</option>
          <option value="pick">Draft Pick</option>
          <option value="option">Option Decision</option>
          <option value="release">Release</option>
          <option value="trade">Trade</option>
          <option value="convert_twoway">Convert Two-Way</option>
        </select>
      </div>

      <!-- sign-only -->
      <div class="form-field" id="f-date-field">
        <label>Date</label>
        <input type="date" id="f-date">
      </div>

      <div class="form-field">
        <label>Player</label>
        <div class="player-wrap">
          <input type="text" id="f-player-display" placeholder="Search by name…" autocomplete="off">
          <div class="player-dropdown" id="player-dropdown"></div>
          <input type="hidden" id="f-player-slug">
        </div>
      </div>

      <!-- sign-only -->
      <div class="form-field" id="f-team-field">
        <label>Team</label>
        <select id="f-team">
          <option value="">— select —</option>
          <option>ATL</option><option>BKN</option><option>BOS</option><option>CHA</option>
          <option>CHI</option><option>CLE</option><option>DAL</option><option>DEN</option>
          <option>DET</option><option>GSW</option><option>HOU</option><option>IND</option>
          <option>LAC</option><option>LAL</option><option>MEM</option><option>MIA</option>
          <option>MIL</option><option>MIN</option><option>NOP</option><option>NYK</option>
          <option>OKC</option><option>ORL</option><option>PHI</option><option>PHX</option>
          <option>POR</option><option>SAC</option><option>SAS</option><option>TOR</option>
          <option>UTA</option><option>WAS</option>
        </select>
      </div>

      <!-- sign-only: signing method -->
      <div class="form-field" id="f-signing-method-field" style="display:none">
        <label>Signing Method</label>
        <select id="f-signing-method">
          <option value="">— select —</option>
          <option value="cap_space">Cap Space</option>
          <option value="bird_rights">Bird Rights</option>
          <option value="ntmle">Non-Taxpayer MLE (NTMLE)</option>
          <option value="tmle">Taxpayer MLE (TMLE)</option>
          <option value="room_exception">Room Exception</option>
          <option value="bae">Bi-Annual Exception (BAE)</option>
          <option value="sign_and_trade">Sign-and-Trade</option>
        </select>
        <span id="mle-hint" style="display:none;font-size:0.75rem;margin-top:0.25rem"></span>
      </div>

      <!-- sign-only: bird rights subtype -->
      <div class="form-field" id="f-bird-rights-field" style="display:none">
        <label>Bird Rights Type</label>
        <select id="f-bird-rights-type">
          <option value="QVFA">QVFA (Qualifying Veteran)</option>
          <option value="EQVFA">EQVFA (Early Qualifying Veteran)</option>
          <option value="Non-QVFA">Non-QVFA</option>
        </select>
      </div>

      <!-- pick-only -->
      <div class="form-field" id="f-pick-year-field" style="display:none">
        <label>Draft Year</label>
        <select id="f-pick-year-sel">
          <option value="">— loading —</option>
        </select>
      </div>

      <!-- pick-only -->
      <div class="form-field" id="f-pick-sel-field" style="display:none">
        <label>Pick</label>
        <select id="f-pick-sel">
          <option value="">— select draft year —</option>
        </select>
      </div>

      <!-- option-only -->
      <div class="form-field" id="f-opt-year-field" style="display:none">
        <label>Option Year</label>
        <input type="text" id="f-opt-year" readonly style="opacity:0.6;cursor:default">
      </div>

      <div class="form-field" id="f-opt-type-field" style="display:none">
        <label>Option Type</label>
        <input type="text" id="f-opt-type-display" readonly style="opacity:0.6;cursor:default">
        <input type="hidden" id="f-opt-type">
      </div>

      <div class="form-field" id="f-opt-decision-field" style="display:none">
        <label>Decision</label>
        <div class="radio-group">
          <label><input type="radio" name="opt-decision" value="accept" checked> Accept</label>
          <label><input type="radio" name="opt-decision" value="decline"> Decline</label>
        </div>
      </div>

      <div class="form-field" id="f-opt-hold-field" style="display:none">
        <label>Cap Hold Type</label>
        <select id="f-opt-hold">
          <option value="UFA">UFA Hold</option>
          <option value="RFA">RFA Hold</option>
        </select>
      </div>

      <div class="form-field" id="f-opt-hold-amount-field" style="display:none">
        <label>Cap Hold Amount</label>
        <input type="text" id="f-opt-hold-amount" placeholder="$0,000,000">
      </div>

      <div class="form-field" id="f-contract-type-field">
        <label>Contract Type</label>
        <div class="radio-group">
          <label><input type="radio" name="contract-type" value="player" checked> Player</label>
          <label><input type="radio" name="contract-type" value="two-way"> Two-Way</label>
        </div>
      </div>

      <div class="form-field full" id="f-salaries-field">
        <label>Salaries</label>
        <div class="salary-rows" id="salary-rows"></div>
        <button class="add-salary-btn" id="add-salary-btn" type="button">+ Add season</button>
      </div>

      <div class="form-field full">
        <label>Note <span style="font-weight:normal;text-transform:none;letter-spacing:0;color:#6b7280">(optional)</span></label>
        <input type="text" id="f-description" placeholder="e.g. 4yr max deal">
      </div>

    </div>

    <!-- Trade builder (shown instead of form-grid when type = "trade") -->
    <div id="trade-builder" style="display:none">
      <div class="form-grid" style="margin-bottom:1rem">
        <div class="form-field">
          <label>Date</label>
          <input type="date" id="f-trade-date">
        </div>
        <div class="form-field">
          <label>Note <span style="font-weight:normal;text-transform:none;letter-spacing:0;color:#6b7280">(optional)</span></label>
          <input type="text" id="f-trade-description" placeholder="e.g. 3-team blockbuster">
        </div>
      </div>
      <div id="trade-legs"></div>
      <button type="button" id="add-leg-btn" class="trade-add-main-btn">+ Add Leg</button>
      <div class="legality-section">
        <div class="legality-header">Legality</div>
        <div class="legality-row"><span>Salary matching</span><span class="badge badge-tbd">TBD</span></div>
        <div class="legality-row"><span>Roster sizes</span><span class="badge badge-tbd">TBD</span></div>
        <div class="legality-row"><span>Pick sending rules</span><span class="badge badge-tbd">TBD</span></div>
        <div class="legality-row"><span>Apron restrictions</span><span class="badge badge-tbd">TBD</span></div>
      </div>
    </div>

    <div class="form-actions">
      <button class="btn-submit" id="submit-btn" type="button">Submit Transaction</button>
      <span class="form-status" id="form-status"></span>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters" id="filters">
    <span class="filter-label">Type:</span>
    <span class="chip active" data-filter="type" data-value="">All</span>
    <span class="chip" data-filter="type" data-value="sign">Signings</span>
    <span class="chip" data-filter="type" data-value="pick">Draft Picks</span>
    <span class="chip" data-filter="type" data-value="option">Options</span>
    <span class="chip" data-filter="type" data-value="release">Releases</span>
    <span class="chip" data-filter="type" data-value="trade">Trades</span>
  </div>

  <!-- Log table -->
  <div class="table-wrap">
    <table id="txn-table" class="txn-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Type</th>
          <th>Team</th>
          <th>Player</th>
          <th>Details</th>
          <th>Note</th>
          <th class="del-col"></th>
        </tr>
      </thead>
      <tbody id="txn-tbody">
        <tr><td colspan="6" class="empty-state">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- Token modal -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <h3>Enter Bearer Token</h3>
    <input type="password" id="modal-token-input" placeholder="Paste your token…">
    <div class="modal-actions">
      <button class="btn-cancel" id="modal-cancel">Cancel</button>
      <button class="btn-save" id="modal-save">Save</button>
    </div>
  </div>
</div>

<script>
const TOKEN_KEY = 'nbn_token';

const HOLD_OPTIONS = [
  ['', 'Guaranteed'],
  ['UFA', 'UFA Hold'],
  ['RFA', 'RFA Hold'],
  ['PLAYER_OPT', 'Player Option'],
  ['TEAM_OPT', 'Team Option'],
  ['NON_GTD', 'Non-Guaranteed'],
];

// ── State ──────────────────────────────────────────────────────────────────

let bios = {};

let capLevelsData = {}; // season → { cap, apron1, ntmle_amount, ... }
let legCounter = 0;
let activeTypeFilter = '';
let currentToken = localStorage.getItem(TOKEN_KEY) || '';
let isAdmin = false;

const TEAM_ABBRS = ['ATL','BKN','BOS','CHA','CHI','CLE','DAL','DEN','DET','GSW','HOU','IND','LAC','LAL','MEM','MIA','MIL','MIN','NOP','NYK','OKC','ORL','PHI','PHX','POR','SAC','SAS','TOR','UTA','WAS'];

// ── Init ───────────────────────────────────────────────────────────────────
(async function init() {
  setDefaultDate();
  addSalaryRow();
  renderAuthBar();
  setupTypeSwitch();
  setupPlayerSearch();
  setupSalaryRows();
  setupOptionDecision();
  setupFilters();
  setupModal();
  setupSubmit();
  setupTrade();

  if (currentToken) {
    const meRes = await fetch('/api/me', { headers: { 'Authorization': `Bearer ${currentToken}` } })
      .then(r => r.ok ? r.json() : { roles: [] }).catch(() => ({ roles: [] }));
    isAdmin = (meRes.roles || []).includes('admin');
    document.querySelector('.txn-table').classList.toggle('admin-mode', isAdmin);
  }

  const [txnRes, biosRes, picksRes, mapRes, statesRes, capRes] = await Promise.allSettled([
    fetch('/api/transactions?limit=500').then(r => r.json()),
    fetch('/api/players').then(r => r.json()),
    fetch('/api/picks').then(r => r.json()),
    fetch('/api/team-map').then(r => r.json()),
    fetch('/api/team-state').then(r => r.ok ? r.json() : {}),
    fetch('/api/cap-levels').then(r => r.ok ? r.json() : {}),
  ]);

  if (biosRes.status === 'fulfilled') bios = biosRes.value;
  if (txnRes.status === 'fulfilled') allTransactions = txnRes.value.transactions || [];
  if (picksRes.status === 'fulfilled') allPicks = picksRes.value || [];
  if (mapRes.status === 'fulfilled') teamMap = mapRes.value;
  if (statesRes.status === 'fulfilled') {
    const raw = statesRes.value;
    Object.keys(raw).forEach(team => {
      teamStates[team] = { ...raw[team].current, bae_available: raw[team].bae_available };
    });
  }
  if (capRes.status === 'fulfilled') capLevelsData = capRes.value;
  populatePickYears();

  renderTable();
})();

// ── Auth ───────────────────────────────────────────────────────────────────
function renderAuthBar() {
  const bar = document.getElementById('auth-bar');
  const status = document.getElementById('auth-status');
  const btn = document.getElementById('auth-btn');
  const formCard = document.getElementById('form-card');

  if (currentToken) {
    status.textContent = 'Signed in';
    btn.textContent = 'Sign out';
    formCard.style.display = '';
  } else {
    status.textContent = 'Not signed in';
    btn.textContent = 'Sign in';
    formCard.style.display = 'none';
    isAdmin = false;
  }
  document.querySelector('.txn-table').classList.toggle('admin-mode', isAdmin);
}

function setupModal() {
  const backdrop = document.getElementById('modal-backdrop');
  const input = document.getElementById('modal-token-input');

  document.getElementById('auth-btn').addEventListener('click', () => {
    if (currentToken) {
      currentToken = '';
      localStorage.removeItem(TOKEN_KEY);
      renderAuthBar();
      return;
    }
    backdrop.classList.add('open');
    input.value = '';
    input.focus();
  });

  document.getElementById('modal-cancel').addEventListener('click', () => {
    backdrop.classList.remove('open');
  });

  document.getElementById('modal-save').addEventListener('click', saveToken);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') saveToken(); });

  backdrop.addEventListener('click', e => {
    if (e.target === backdrop) backdrop.classList.remove('open');
  });
}

function saveToken() {
  const input = document.getElementById('modal-token-input');
  const t = input.value.trim();
  if (!t) return;
  currentToken = t;
  localStorage.setItem(TOKEN_KEY, t);
  document.getElementById('modal-backdrop').classList.remove('open');
  fetch('/api/me', { headers: { 'Authorization': `Bearer ${t}` } })
    .then(r => r.ok ? r.json() : { roles: [] })
    .then(data => {
      isAdmin = (data.roles || []).includes('admin');
      renderAuthBar();
      renderTable();
    })
    .catch(() => { renderAuthBar(); renderTable(); });
}

function currentSeasonStr() {
  const now = new Date();
  const y = now.getFullYear() % 100;
  const m = now.getMonth() + 1;
  return m < 7
    ? `${String(y - 1).padStart(2, '0')}-${String(y).padStart(2, '0')}`
    : `${String(y).padStart(2, '0')}-${String((y + 1) % 100).padStart(2, '0')}`;
}

function fmtDollarsShort(v) {
  if (!v) return '$0';
  const m = v / 1e6;
  return m >= 1 ? `$${m.toFixed(1)}M` : `$${Math.round(v / 1e3)}K`;
}

function updateMleHint() {
  const hint = document.getElementById('mle-hint');
  const method = document.getElementById('f-signing-method').value;
  const team = document.getElementById('f-team')?.value;
  const birdField = document.getElementById('f-bird-rights-field');
  if (birdField) birdField.style.display = method === 'bird_rights' ? '' : 'none';

  const poolMethods = ['ntmle', 'tmle', 'room_exception', 'bae'];
  if (!team || !poolMethods.includes(method)) { hint.style.display = 'none'; return; }

  const curYr = currentSeasonStr();
  const cl = capLevelsData[curYr] || {};
  const state = teamStates[team] || {};

  if (method === 'bae') {
    hint.style.display = '';
    const available = !state.bae_used && (state.bae_available !== false);
    hint.style.color = available ? '#34d399' : '#f87171';
    hint.textContent = state.bae_used ? 'BAE: already used this season'
      : state.bae_available === false ? 'BAE: not available (used last season)'
      : `BAE: ${fmtDollarsShort(cl.bae_amount || 0)} available`;
    return;
  }

  const total = method === 'tmle' ? (cl.tmle_amount || 0) : (cl.ntmle_amount || 0);
  if (!total) { hint.style.display = 'none'; return; }
  const remaining = Math.max(0, total - (state.mle_used || 0));
  hint.style.display = '';
  hint.style.color = remaining > 0 ? '#34d399' : '#f87171';
  hint.textContent = `${fmtDollarsShort(remaining)} remaining of ${fmtDollarsShort(total)}`;
}

// Wire up signing method + team change → hint update
document.getElementById('f-signing-method').addEventListener('change', updateMleHint);
document.getElementById('f-team').addEventListener('change', updateMleHint);

function populatePickYears() {
  const sel = document.getElementById('f-pick-year-sel');
  const years = [...new Set(allPicks.map(p => p.year))].sort((a, b) => b - a);
  sel.innerHTML = years.length
    ? years.map(y => `<option value="${y}">${y}</option>`).join('')
    : '<option value="">No picks available</option>';
  if (years.length) populatePickSel(years[0]);
}

function effectivePickOwner(p, yearPicks) {
  // Mirrors the draft page's effectiveOwner logic
  const swapTakesFrom = {};
  yearPicks.forEach(q => {
    if (q.swap_conveys === true && q.swap_owner) swapTakesFrom[q.swap_owner] = q.owner;
  });
  return p.swap_conveys === true ? p.swap_owner : (swapTakesFrom[p.orig] ?? p.owner);
}

function populatePickSel(year) {
  const sel = document.getElementById('f-pick-sel');
  const yearPicks = allPicks.filter(p => p.year === +year);
  const available = yearPicks
    .filter(p => !p.player)
    .map(p => ({ ...p, effectiveOwner: effectivePickOwner(p, yearPicks) }))
    .sort((a, b) => a.round - b.round || (a.pick ?? 999) - (b.pick ?? 999));

  if (!available.length) {
    sel.innerHTML = '<option value="">No unassigned picks this year</option>';
    return;
  }

  sel.innerHTML = '<option value="">— select a pick —</option>' + available.map(p => {
    const num = p.pick != null ? `#${p.pick}` : 'TBD';
    const origin = p.effectiveOwner !== p.orig ? ` ← ${p.orig}` : '';
    const label = `R${p.round} ${num} — ${p.effectiveOwner}${origin}`;
    return `<option value='${JSON.stringify({year: p.year, round: p.round, orig: p.orig, pick_number: p.pick, owner: p.effectiveOwner})}'>${label}</option>`;
  }).join('');
}

document.getElementById('f-pick-year-sel').addEventListener('change', function() {

});

// ── Player search ──────────────────────────────────────────────────────────
function setupPlayerSearch() {
  const displayInput = document.getElementById('f-player-display');
  const slugInput = document.getElementById('f-player-slug');
  const dropdown = document.getElementById('player-dropdown');
  let focusedIndex = -1;

  displayInput.addEventListener('input', function() {
    slugInput.value = '';
    const q = this.value.trim().toLowerCase();
    if (q.length < 2) { dropdown.classList.remove('open'); return; }

    const txnType = document.getElementById('f-type').value;
    let pool;
    if (txnType === 'option') {
      pool = Object.entries(bios).filter(([, bio]) => {
        const holds = parseCapHolds(bio.cap_holds || '');
        return holds.some(h => h.type === 'PLAYER_OPT' || h.type === 'TEAM_OPT');
      });
    } else if (txnType === 'release') {
      pool = Object.entries(bios).filter(([, bio]) => bio.type === 'player' || bio.type === 'two-way');
    } else if (txnType === 'convert_twoway') {
      pool = Object.entries(bios).filter(([, bio]) => bio.type === 'two-way');
    } else if (txnType === 'sign') {
      pool = Object.entries(bios).filter(([slug, bio]) => !teamMap[slug] && !bio.retired && bio.type !== 'dead');
    } else {
      pool = Object.entries(bios);
    }
    const matches = pool
      .map(([slug, bio]) => ({ slug, name: bioDisplayName(bio) }))
      .filter(({ slug, name }) => name.toLowerCase().includes(q) || slug.includes(q))
      .slice(0, 20);

    if (!matches.length) { dropdown.classList.remove('open'); return; }

    dropdown.innerHTML = matches.map((m, i) =>
      `<div class="pd-item" data-slug="${m.slug}" data-name="${m.name}">${m.name}<span class="pd-slug">${m.slug}</span></div>`
    ).join('');
    dropdown.classList.add('open');
    focusedIndex = -1;

    dropdown.querySelectorAll('.pd-item').forEach(el => {
      el.addEventListener('mousedown', e => {
        e.preventDefault();
        selectPlayer(el.dataset.slug, el.dataset.name);
      });
    });
  });

  displayInput.addEventListener('keydown', function(e) {
    const items = dropdown.querySelectorAll('.pd-item');
    if (!dropdown.classList.contains('open') || !items.length) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); setFocus(items, ++focusedIndex); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); setFocus(items, --focusedIndex); }
    else if (e.key === 'Enter' && focusedIndex >= 0) {
      e.preventDefault();
      const el = items[focusedIndex];
      selectPlayer(el.dataset.slug, el.dataset.name);
    } else if (e.key === 'Escape') { dropdown.classList.remove('open'); }
  });

  displayInput.addEventListener('blur', () => {
    setTimeout(() => dropdown.classList.remove('open'), 150);
  });

  function setFocus(items, idx) {
    items.forEach(el => el.classList.remove('focused'));
    focusedIndex = Math.max(0, Math.min(idx, items.length - 1));
    items[focusedIndex].classList.add('focused');
  }

  function selectPlayer(slug, name) {
    slugInput.value = slug;
    displayInput.value = name;
    dropdown.classList.remove('open');
    onPlayerSelected(slug);
  }
}

function parseCapHolds(val) {
  if (!val) return [];
  if (typeof val === 'object') return Object.entries(val).map(([year, type]) => ({ year, type }));
  return String(val).split(',').map(s => {
    const [year, type] = s.trim().split(':');
    return { year: (year || '').trim(), type: (type || '').trim() };
  }).filter(h => h.year && h.type);
}

function seasonStart(s) {
  const m = s && s.match(/^(\d{2})-/);
  return m ? parseInt(m[1]) : 0;
}

function onPlayerSelected(slug) {
  if (document.getElementById('f-type').value !== 'option') return;
  const bio = bios[slug];
  if (!bio) return;
  const optHolds = parseCapHolds(bio.cap_holds || '')
    .filter(h => h.type === 'PLAYER_OPT' || h.type === 'TEAM_OPT')
    .sort((a, b) => seasonStart(a.year) - seasonStart(b.year));
  if (!optHolds.length) return;
  const earliest = optHolds[0];
  document.getElementById('f-opt-year').value = earliest.year;
  document.getElementById('f-opt-type').value = earliest.type;
  document.getElementById('f-opt-type-display').value =
    earliest.type === 'PLAYER_OPT' ? 'Player Option' : 'Team Option';
  const optSalary = bio.salaries && bio.salaries[earliest.year] ? bio.salaries[earliest.year] : '';
  document.getElementById('f-opt-hold-amount').value = optSalary;
}

function setupSalaryRows() {
  document.getElementById('add-salary-btn').addEventListener('click', () => addSalaryRow());
}

function addSalaryRow(year, amount, holdType) {
  const container = document.getElementById('salary-rows');
  const row = document.createElement('div');
  row.className = 'salary-row';

  const yearIn = document.createElement('input');
  yearIn.type = 'text'; yearIn.className = 'year-input'; yearIn.placeholder = 'YY-YY';
  yearIn.value = year || nextSalaryYear(); yearIn.maxLength = 5;

  const amountIn = document.createElement('input');
  amountIn.type = 'text'; amountIn.placeholder = '$0,000,000';
  amountIn.value = amount || '';

  const holdSel = document.createElement('select');
  holdSel.className = 'hold-select';
  HOLD_OPTIONS.forEach(([v, l]) => {
    const opt = document.createElement('option');
    opt.value = v; opt.textContent = l;
    if (v === (holdType || '')) opt.selected = true;
    holdSel.appendChild(opt);
  });

  const removeBtn = document.createElement('button');
  removeBtn.type = 'button'; removeBtn.textContent = '×';
  removeBtn.addEventListener('click', () => row.remove());

  row.appendChild(yearIn); row.appendChild(amountIn); row.appendChild(holdSel); row.appendChild(removeBtn);
  container.appendChild(row);
}

function nextSalaryYear() {
  const rows = document.querySelectorAll('.salary-row .year-input');
  if (!rows.length) {
    const now = new Date();
    const yr = now.getMonth() >= 7 ? now.getFullYear() + 1 : now.getFullYear();
    return `${String(yr).slice(-2)}-${String(yr + 1).slice(-2)}`;
  }
  const last = rows[rows.length - 1].value;
  const m = last.match(/^(\d{2})-(\d{2})$/);
  if (!m) return '';
  const nextEnd = parseInt(m[2]) + 1;
  return `${m[2]}-${String(nextEnd).padStart(2, '0')}`;
}

function collectSalaries() {
  const salaries = {};
  const cap_holds = {};
  document.querySelectorAll('.salary-row').forEach(row => {
    const yr  = row.querySelector('.year-input').value.trim();
    const amt = row.querySelectorAll('input')[1].value.trim();
    const hold = row.querySelector('.hold-select').value;
    if (yr && amt) salaries[yr] = amt;
    if (yr && hold) cap_holds[yr] = hold;
  });
  return { salaries, cap_holds };
}

function addTradeLeg(fromTeam, toTeam) {
  const legId = ++legCounter;
  const legs = document.getElementById('trade-legs');

  const leg = document.createElement('div');
  leg.className = 'trade-leg';
  leg.dataset.legId = legId;

  // ── Header: From → To selects + remove button ──
  const header = document.createElement('div');
  header.className = 'trade-leg-header';

  const fromSel = document.createElement('select');
  fromSel.className = 'trade-team-sel';
  fromSel.dataset.role = 'from';
  const toSel = document.createElement('select');
  toSel.className = 'trade-team-sel';
  toSel.dataset.role = 'to';

  [fromSel, toSel].forEach(sel => {
    const blank = document.createElement('option');
    blank.value = ''; blank.textContent = '— Team —';
    sel.appendChild(blank);
    TEAM_ABBRS.forEach(abbr => {
      const o = document.createElement('option');
      o.value = abbr; o.textContent = abbr;
      sel.appendChild(o);
    });
  });
  if (fromTeam) fromSel.value = fromTeam;
  if (toTeam) toSel.value = toTeam;

  const arrow = document.createElement('span');
  arrow.className = 'trade-leg-arrow';
  arrow.textContent = '→';

  const removeLegBtn = document.createElement('button');
  removeLegBtn.type = 'button';
  removeLegBtn.className = 'remove-leg-btn';
  removeLegBtn.title = 'Remove leg';
  removeLegBtn.textContent = '×';
  removeLegBtn.style.marginLeft = 'auto';
  removeLegBtn.addEventListener('click', () => leg.remove());

  header.append(fromSel, arrow, toSel, removeLegBtn);

  // ── Players section ──
  const playerLabel = sectionLabel('Players');
  const playerRows = document.createElement('div');
  playerRows.dataset.section = 'players';
  const addPlayerBtn = document.createElement('button');
  addPlayerBtn.type = 'button';
  addPlayerBtn.className = 'trade-add-asset-btn';
  addPlayerBtn.textContent = '+ Add Player';
  addPlayerBtn.addEventListener('click', () => addPlayerRow(leg));

  // ── Picks section ──
  const pickLabel = sectionLabel('Picks');
  const pickRows = document.createElement('div');
  pickRows.dataset.section = 'picks';
  const addPickBtn = document.createElement('button');
  addPickBtn.type = 'button';
  addPickBtn.className = 'trade-add-asset-btn';
  addPickBtn.textContent = '+ Add Pick';
  addPickBtn.addEventListener('click', () => addPickRow(leg));

  leg.append(header, playerLabel, playerRows, addPlayerBtn, pickLabel, pickRows, addPickBtn);
  legs.appendChild(leg);

  fromSel.addEventListener('change', () => refreshLegAssets(leg));
  return leg;
}

function sectionLabel(text) {
  const el = document.createElement('div');
  el.style.cssText = 'font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#6b7280;margin-bottom:0.35rem;margin-top:0.5rem;';

  buildPlayerOptions(sel, fromTeam);

  const removeBtn = document.createElement('button');
  removeBtn.type = 'button';
  removeBtn.className = 'remove-asset-btn';
  removeBtn.textContent = '×';
  removeBtn.addEventListener('click', () => row.remove());

  row.append(sel, removeBtn);
  section.appendChild(row);
}

function buildPlayerOptions(sel, fromTeam) {
  sel.innerHTML = '<option value="">— select player —</option>';
  if (!fromTeam) return;
  Object.entries(bios)
    .filter(([slug]) => (teamMap[slug] || '').toUpperCase() === fromTeam.toUpperCase())
    .map(([slug, bio]) => ({ slug, name: bioDisplayName(bio) }))
    .sort((a, b) => a.name.localeCompare(b.name))
    .forEach(({ slug, name }) => {
      const o = document.createElement('option');
      o.value = slug; o.textContent = name;
      sel.appendChild(o);
    });

  swapLabel.style.cssText = 'font-size:0.75rem;color:#6b7280;white-space:nowrap;';

  swapSel.className = 'trade-swap-sel';

  TEAM_ABBRS.forEach(abbr => {

  removeBtn.textContent = '×';

  row.append(sel, protLabel, protInp, swapLabel, swapSel, removeBtn);

function buildPickOptions(sel, fromTeam, currentValue) {
  sel.innerHTML = '<option value="">— select pick —</option>';
  if (!fromTeam) return;
  const usedIds = getUsedPickIds();
  if (currentValue) usedIds.delete(currentValue);
  allPicks
    .filter(p => (p.owner || '').toUpperCase() === fromTeam.toUpperCase() && !p.player && !usedIds.has(tradePickId(p)))
    .sort((a, b) => a.year - b.year || a.round - b.round)
    .forEach(p => {
      const o = document.createElement('option');
      o.value = tradePickId(p);
      o.textContent = tradePickLabel(p);
      o.dataset.year = p.year;
      o.dataset.round = p.round;
      o.dataset.orig = p.orig;
      sel.appendChild(o);
    });
}

function getUsedPickIds() {
  const used = new Set();
  document.querySelectorAll('#trade-legs .trade-asset-row[data-asset-type="pick"] .trade-asset-sel').forEach(sel => {
    if (sel.value) used.add(sel.value);
  });
  return used;
}

function tradePickId(p) {
  return `${p.year}|${p.round}|${p.orig}`;
}

function tradePickLabel(p) {
  return `${p.year} R${p.round} ${p.orig}`;
}

function refreshLegAssets(leg) {
  const fromTeam = leg.querySelector('[data-role="from"]').value;
  leg.querySelectorAll('.trade-asset-row[data-asset-type="player"] .trade-asset-sel').forEach(sel => {
    const cur = sel.value;
    buildPlayerOptions(sel, fromTeam);
    if (cur) sel.value = cur;
  });
  leg.querySelectorAll('.trade-asset-row[data-asset-type="pick"] .trade-asset-sel').forEach(sel => {
    const cur = sel.value;
    buildPickOptions(sel, fromTeam, cur);
    if (cur) sel.value = cur;
  });
}

function collectTrade() {
  const date = document.getElementById('f-trade-date').value;
  const description = document.getElementById('f-trade-description').value.trim();
  const transfers = [];
  document.querySelectorAll('#trade-legs .trade-leg').forEach(leg => {
    const from_team = leg.querySelector('[data-role="from"]').value;
    const to_team = leg.querySelector('[data-role="to"]').value;
    if (!from_team || !to_team) return;
    const assets = [];
    leg.querySelectorAll('.trade-asset-row[data-asset-type="player"]').forEach(row => {
      const slug = row.querySelector('.trade-asset-sel').value;
      if (slug) assets.push({ type: 'player', slug });
    });
    leg.querySelectorAll('.trade-asset-row[data-asset-type="pick"]').forEach(row => {
      const sel = row.querySelector('.trade-asset-sel');
      if (!sel.value) return;
      const opt = sel.options[sel.selectedIndex];
      const asset = {
        type: 'pick',
        year: parseInt(opt.dataset.year),
        round: parseInt(opt.dataset.round),
        orig: opt.dataset.orig,
      };
      const prot = row.querySelector('.trade-prot-inp').value;
      const swap = row.querySelector('.trade-swap-sel').value;
      if (prot) asset.protection = parseInt(prot);
      if (swap) asset.swap_with = swap;
      assets.push(asset);
    });
    if (assets.length) transfers.push({ from_team, to_team, assets });
  });
  return { date, description, transfers };
}

// ── Filters ────────────────────────────────────────────────────────────────
function setupFilters() {
  document.querySelectorAll('.chip[data-filter="type"]').forEach(chip => {
    chip.addEventListener('click', function() {
      document.querySelectorAll('.chip[data-filter="type"]').forEach(c => c.classList.remove('active'));
      this.classList.add('active');
      activeTypeFilter = this.dataset.value;
      renderTable();
    });
  });
}

// ── Submit ─────────────────────────────────────────────────────────────────
function setupSubmit() {
  document.getElementById('submit-btn').addEventListener('click', submitTransaction);
}

async function submitTransaction() {
  const status = document.getElementById('form-status');
  const btn = document.getElementById('submit-btn');

  const type = document.getElementById('f-type').value;
  const playerSlug = document.getElementById('f-player-slug').value.trim();
  const contractType = document.querySelector('input[name="contract-type"]:checked').value;
  const { salaries, cap_holds } = collectSalaries();
  let description = type === 'trade'
    ? document.getElementById('f-trade-description').value.trim()
    : document.getElementById('f-description').value.trim();

  if (!type) { setStatus('err', 'Select a transaction type.'); return; }
  if (!playerSlug && type !== 'trade') { setStatus('err', 'Select a player from the dropdown.'); return; }

  const contract = { type: contractType, salaries, cap_holds };
  let date, details;

  if (type === 'sign') {
    date = document.getElementById('f-date').value;
    const team = document.getElementById('f-team').value;
    const signingMethod = document.getElementById('f-signing-method').value || null;
    const birdRightsType = signingMethod === 'bird_rights'
      ? (document.getElementById('f-bird-rights-type').value || null) : null;
    if (!date) { setStatus('err', 'Date is required.'); return; }
    if (!team) { setStatus('err', 'Select a team.'); return; }
    details = {
      player: playerSlug, team, contract,
      ...(signingMethod ? { signing_method: signingMethod } : {}),
      ...(birdRightsType ? { bird_rights_type: birdRightsType } : {}),
    };
  } else if (type === 'pick') {
    date = new Date().toISOString().slice(0, 10);
    const pickVal = document.getElementById('f-pick-sel').value;
    if (!pickVal) { setStatus('err', 'Select a pick.'); return; }
    const pick = JSON.parse(pickVal);
    details = {
      player: playerSlug,
      team: pick.owner,
      pick: { year: pick.year, round: pick.round, orig: pick.orig, pick_number: pick.pick_number },
      contract,
    };
  } else if (type === 'option') {
    date = document.getElementById('f-date').value;
    const year = document.getElementById('f-opt-year').value;
    const option_type = document.getElementById('f-opt-type').value;
    const decision = document.querySelector('input[name="opt-decision"]:checked').value;
    const cap_hold_type   = document.getElementById('f-opt-hold').value;
    const cap_hold_amount = document.getElementById('f-opt-hold-amount').value.trim() || null;
    if (!date) { setStatus('err', 'Date is required.'); return; }
    if (!year || !option_type) { setStatus('err', 'Select a player with an option year.'); return; }
    if (decision === 'decline' && !cap_hold_amount) { setStatus('err', 'Cap hold amount is required for a decline.'); return; }
    details = { player: playerSlug, decision, option_type, year, cap_hold_type, cap_hold_amount };
  } else if (type === 'release') {
    date = document.getElementById('f-date').value;
    if (!date) { setStatus('err', 'Date is required.'); return; }
    details = { player: playerSlug };
  } else if (type === 'convert_twoway') {
    date = document.getElementById('f-date').value;
    if (!date) { setStatus('err', 'Date is required.'); return; }
    if (!Object.keys(salaries).length) { setStatus('err', 'At least one salary year is required.'); return; }
    details = { player: playerSlug, contract: { type: 'player', salaries, cap_holds } };
  } else if (type === 'trade') {
    const trade = collectTrade();
    if (!trade.date) { setStatus('err', 'Date is required.'); return; }
    if (trade.transfers.length < 2) { setStatus('err', 'A trade needs at least 2 legs with assets.'); return; }
    date = trade.date;
    details = { transfers: trade.transfers, legality: 'tbd' };
  } else {
    setStatus('err', 'Unsupported transaction type.'); return;
  }

  const body = { type, date, description, details };

  btn.disabled = true;
  setStatus('', 'Submitting…');

  try {
    const res = await fetch('/api/transactions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${currentToken}`,
      },
      body: JSON.stringify(body),
    });

    if (res.status === 401 || res.status === 403) {
      currentToken = '';
      localStorage.removeItem(TOKEN_KEY);
      renderAuthBar();
      setStatus('err', 'Token rejected — please sign in again.');
      return;
    }

    const data = await res.json();
    if (!res.ok) {
      setStatus('err', data.detail || `Error ${res.status}`);
      return;
    }

    // Prepend to local list and re-render
    allTransactions.unshift(data);
    renderTable();
    setStatus('ok', 'Transaction recorded.');
    resetForm();
  } catch (e) {
    setStatus('err', 'Network error.');
  } finally {
    btn.disabled = false;
  }
}

function resetForm() {
  document.getElementById('f-player-display').value = '';
  document.getElementById('f-player-slug').value = '';
  document.getElementById('f-team').value = '';
  document.getElementById('f-signing-method').value = '';
  document.getElementById('f-bird-rights-field').style.display = 'none';
  document.getElementById('mle-hint').style.display = 'none';
  document.getElementById('f-description').value = '';
  document.getElementById('salary-rows').innerHTML = '';
  addSalaryRow();
  setDefaultDate();
  document.getElementById('f-opt-year').value = '';
  document.getElementById('f-opt-type').value = '';
  document.getElementById('f-opt-type-display').value = '';
  document.querySelector('input[name="opt-decision"][value="accept"]').checked = true;
  document.getElementById('f-opt-hold-field').style.display        = 'none';
  document.getElementById('f-opt-hold-amount-field').style.display = 'none';
  document.getElementById('f-opt-hold-amount').value = '';
  // Re-populate pick selector to reflect newly assigned pick
  const yearSel = document.getElementById('f-pick-year-sel');
  if (yearSel.value) populatePickSel(+yearSel.value);
  // Trade builder
  document.getElementById('trade-legs').innerHTML = '';
  legCounter = 0;
  addTradeLeg();
  addTradeLeg();
  document.getElementById('f-trade-date').value = new Date().toISOString().slice(0, 10);
  document.getElementById('f-trade-description').value = '';
}

function setStatus(cls, msg) {
  const el = document.getElementById('form-status');
  el.className = 'form-status' + (cls ? ' ' + cls : '');
  el.textContent = msg;
}

// ── Delete ─────────────────────────────────────────────────────────────────
document.getElementById('txn-tbody').addEventListener('click', async function(e) {
  const btn = e.target.closest('.delete-txn-btn');
  if (!btn) return;
  const id = btn.dataset.id;
  if (!confirm('Delete this transaction record?\n\nThis only removes it from the log — it does not reverse any roster or bio changes.')) return;
  btn.disabled = true;
  try {
    const res = await fetch(`/api/transactions/${id}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${currentToken}` },
    });
    if (res.ok) {
      allTransactions = allTransactions.filter(t => t.id !== id);
      renderTable();
    } else {
      const data = await res.json().catch(() => ({}));
      alert(data.detail || `Error ${res.status}`);
      btn.disabled = false;
    }
  } catch {
    alert('Network error.');
    btn.disabled = false;
  }
});

// ── Table rendering ────────────────────────────────────────────────────────
function renderTable() {
  const tbody = document.getElementById('txn-tbody');
  let txns = allTransactions;

  if (activeTypeFilter) {
    txns = txns.filter(t => t.type === activeTypeFilter);
  }

  if (!txns.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No transactions yet.</td></tr>';
    return;
  }

  tbody.innerHTML = txns.map(renderRow).join('');
}

function renderRow(t) {
  const d = t.details || {};
  const dateStr = fmtDate(t.date);
  const badge = `<span class="badge badge-${t.type}">${typeLabel(t.type)}</span>`;
  let teamCell, playerCell;
  if (t.type === 'trade') {
    const teams = d.teams || [];
    teamCell = teams.length ? teams.map(tm => `<a href="/teams/${tm}">${escHtml(tm)}</a>`).join(' · ') : '—';
    playerCell = '—';
  } else {
    teamCell = d.team ? `<a href="/teams/${d.team}">${d.team}</a>` : '—';
    playerCell = renderPlayerCell(d.player);
  }
  const detailsCell = renderDetailsCell(t);
  const note = escHtml(t.description || '');
  const delCell = `<td class="del-col"><button class="delete-txn-btn" data-id="${escHtml(t.id)}" title="Delete transaction">×</button></td>`;
  return `<tr><td>${dateStr}</td><td>${badge}</td><td>${teamCell}</td><td>${playerCell}</td><td>${detailsCell}</td><td style="color:#6b7280">${note}</td>${delCell}</tr>`;
}

function renderPlayerCell(slug) {
  if (!slug) return '—';
  const bio = bios[slug];
  const name = bio ? bioDisplayName(bio) : slug;
  return `<a href="/players/?p=${slug}">${escHtml(name)}</a>`;
}

function renderDetailsCell(t) {
  const d = t.details || {};
  if (t.type === 'sign' || t.type === 'pick') {
    const c = d.contract || {};
    const years = Object.keys(c.salaries || {}).length;
    const total = Object.values(c.salaries || {}).reduce((sum, v) => {
      const n = parseInt(v.replace(/[^0-9]/g, ''), 10) || 0;
      return sum + n;
    }, 0);
    const contractStr = years
      ? `${years}yr / $${(total / 1e6).toFixed(1)}M`
      : (c.type === 'two-way' ? 'Two-Way' : '');

    if (t.type === 'pick' && d.pick) {
      const p = d.pick;
      const pickStr = `${p.year} R${p.round} ${p.orig}${p.pick_number ? ' #' + p.pick_number : ''}`;
      return `${escHtml(pickStr)}${contractStr ? ' · ' + escHtml(contractStr) : ''}`;
    }
    const METHOD_LABELS = { bird_rights: 'Bird Rights', ntmle: 'NTMLE', tmle: 'TMLE',
      room_exception: 'Room Exc.', bae: 'BAE', sign_and_trade: 'S&T' };
    let methodStr = '';
    if (d.signing_method && d.signing_method !== 'cap_space') {
      methodStr = ' · ' + (METHOD_LABELS[d.signing_method] || d.signing_method);
      if (d.bird_rights_type) methodStr += ` (${d.bird_rights_type})`;
    }
    return escHtml(contractStr + methodStr);
  }
  if (t.type === 'option') {
    const optLabel = d.option_type === 'PLAYER_OPT' ? 'Player Opt' : 'Team Opt';
    const yearStr = escHtml(d.year || '');
    if (d.decision === 'accept') {
      return `${yearStr} ${escHtml(optLabel)} — accepted`;
    } else {
      return `${yearStr} ${escHtml(optLabel)} — declined → ${escHtml(d.cap_hold_type || 'UFA')} hold`;
    }
  }
  if (t.type === 'convert_twoway') {
    const c = d.contract || {};
    const years = Object.keys(c.salaries || {}).length;
    const total = Object.values(c.salaries || {}).reduce((sum, v) => {
      const n = parseInt(v.replace(/[^0-9]/g, ''), 10) || 0;
      return sum + n;
    }, 0);
    return years ? escHtml(`${years}yr / $${(total / 1e6).toFixed(1)}M`) : '';
  }
  if (t.type === 'release') {
    const dc = d.dead_cap || {};
    const entries = Object.entries(dc);
    if (!entries.length) return 'No dead cap';
    const total = entries.reduce((sum, [, v]) => sum + (parseInt(v.replace(/[^0-9]/g, ''), 10) || 0), 0);
    const years = entries.map(([yr]) => yr).join(', ');
    return `Dead cap: $${(total / 1e6).toFixed(1)}M (${escHtml(years)})`;
  }
  if (t.type === 'trade') {
    const transfers = d.transfers || [];
    return transfers.map(tr => {
      const assetStrs = (tr.assets || []).map(a => {
        if (a.type === 'player') {
          const bio = bios[a.slug];
          const name = bio ? bioDisplayName(bio) : a.slug;
          return `<a href="/players/?p=${escHtml(a.slug)}">${escHtml(name)}</a>`;
        }
        if (a.type === 'pick') {
          let s = `${a.year} R${a.round} ${a.orig}`;
          const mods = [];
          if (a.protection) mods.push(`top-${a.protection} prot.`);
          if (a.swap_with) mods.push(`swap w/ ${a.swap_with}`);
          if (mods.length) s += ` (${mods.join(', ')})`;
          return escHtml(s);
        }
        return '';
      }).filter(Boolean).join(' · ');
      return `${escHtml(tr.from_team)} → ${escHtml(tr.to_team)}: ${assetStrs || '—'}`;
    }).join('<br>');
  }
  return '';
}

// ── Helpers ────────────────────────────────────────────────────────────────
function bioDisplayName(bio) {
  if (!bio || !bio.name) return '';
  // bio.name is "LAST, FIRST" → "First Last"
  const parts = bio.name.split(', ');
  if (parts.length === 2) {
    return toTitleCase(parts[1]) + ' ' + toTitleCase(parts[0]);
  }
  return toTitleCase(bio.name);
}

function toTitleCase(s) {
  return s.replace(/\w\S*/g, w => w[0].toUpperCase() + w.slice(1).toLowerCase());
}

function fmtDate(iso) {
  if (!iso) return '—';
  const [y, m, d] = iso.split('-').map(Number);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[m - 1]} ${d}, ${y}`;
}

function typeLabel(type) {
  const labels = { sign: 'Signing', pick: 'Draft Pick', option: 'Option', release: 'Release', trade: 'Trade', convert_twoway: 'Two-Way Conversion' };
  return labels[type] || type;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
