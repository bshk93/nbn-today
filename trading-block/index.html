<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trading Block — NBN</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111827;
      color: #f3f4f6;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    a { color: #60a5fa; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .page { max-width: 1100px; margin: 0 auto; }

    .nav { margin-bottom: 1.75rem; font-size: 0.875rem; color: #9ca3af; }
    .nav a { color: #9ca3af; }
    .nav a:hover { color: #f3f4f6; }

    header { margin-bottom: 1.75rem; }
    header h1 { font-size: 1.875rem; font-weight: 700; letter-spacing: -0.02em; }
    header p { color: #9ca3af; margin-top: 0.4rem; font-size: 0.9rem; }

    .table-wrap {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 12px;
      overflow-x: auto;
    }

    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; white-space: nowrap; }

    thead th {
      padding: 0.7rem 1rem;
      text-align: left;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #6b7280;
      border-bottom: 1px solid #374151;
      cursor: pointer;
      user-select: none;
    }
    thead th:hover { color: #d1d5db; }
    thead th[data-active="true"] { color: #f3f4f6; }

    .sort-arrow { margin-left: 4px; opacity: 0.4; font-size: 0.65rem; }
    th[data-active="true"] .sort-arrow { opacity: 1; }

    tbody tr:nth-child(odd)  { background: #111827; }
    tbody tr:nth-child(even) { background: #1a2234; }
    tbody tr:hover { background: #263044; }

    td { padding: 0.55rem 1rem; color: #d1d5db; border-top: 1px solid #1f2937; }
    td.right  { text-align: right; }
    td.center { text-align: center; }
    td.muted  { color: #6b7280; }
    td.bold   { font-weight: 600; color: #f3f4f6; }
    td.ovr-cell { font-weight: 700; text-align: right; }
    td.notes-cell { color: #9ca3af; font-size: 0.8rem; white-space: normal; min-width: 140px; max-width: 260px; }

    td.cap-ufa        { background: hsl(45,  60%, 20%); color: hsl(45,  90%, 72%); }
    td.cap-rfa        { background: hsl(25,  60%, 20%); color: hsl(25,  90%, 72%); }
    td.cap-player-opt { background: hsl(120, 50%, 17%); color: hsl(120, 75%, 68%); }
    td.cap-team-opt   { background: hsl(210, 55%, 20%); color: hsl(210, 75%, 70%); }
    td.cap-non-gtd    { color: #4b5563; text-decoration: line-through; }

    .cap-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem 1.25rem;
      padding: 0.6rem 1rem 0.75rem;
      font-size: 0.75rem;
      color: #9ca3af;
      border-top: 1px solid #283141;
    }
    .cap-legend-item { display: flex; align-items: center; gap: 0.35rem; }
    .cap-swatch { display: inline-block; width: 10px; height: 10px; border-radius: 2px; }

    #status { text-align: center; padding: 3rem; color: #6b7280; font-size: 0.9rem; }

    /* Edit panel */
    .edit-panel {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
    }
    .edit-panel h2 {
      font-size: 0.9rem;
      font-weight: 700;
      color: #f3f4f6;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .team-badge {
      background: #3b82f6;
      color: #fff;
      font-size: 0.68rem;
      padding: 0.1rem 0.45rem;
      border-radius: 4px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .entry-list { margin-bottom: 0.75rem; }
    .entry-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.4rem 0;
      border-bottom: 1px solid #374151;
    }
    .entry-row:last-child { border-bottom: none; }
    .entry-player { font-weight: 600; color: #f3f4f6; flex: 1; font-size: 0.875rem; }
    .entry-notes  { color: #9ca3af; font-size: 0.8rem; flex: 2; }
    .btn-remove {
      background: transparent;
      border: 1px solid #374151;
      border-radius: 4px;
      color: #6b7280;
      cursor: pointer;
      font-size: 0.75rem;
      padding: 0.15rem 0.45rem;
      font-family: inherit;
      white-space: nowrap;
    }
    .btn-remove:hover { border-color: #ef4444; color: #ef4444; }

    .add-row { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; margin-bottom: 0.75rem; }
    .add-row select, .add-row input[type="text"] {
      background: #111827;
      border: 1px solid #374151;
      border-radius: 6px;
      color: #d1d5db;
      font-size: 0.8rem;
      padding: 0.35rem 0.6rem;
      font-family: inherit;
      outline: none;
    }
    .add-row select:focus, .add-row input[type="text"]:focus { border-color: #3b82f6; }
    .add-row select { min-width: 200px; }
    .add-row input[type="text"] { flex: 1; min-width: 160px; }

    .panel-actions { display: flex; gap: 0.5rem; align-items: center; }
    .btn-action {
      background: transparent;
      border: 1px solid #3b82f6;
      border-radius: 6px;
      color: #60a5fa;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.35rem 0.9rem;
      font-family: inherit;
    }
    .btn-action:hover { background: rgba(59,130,246,0.15); }
    .btn-action:disabled { opacity: 0.5; cursor: default; }
    .save-status { font-size: 0.78rem; color: #9ca3af; }

    /* Sign-in prompt */
    .signin-prompt { font-size: 0.8rem; color: #6b7280; margin-bottom: 1.5rem; }
    .signin-prompt button {
      background: transparent;
      border: none;
      color: #60a5fa;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: inherit;
      padding: 0;
      text-decoration: underline;
    }

    /* Token modal */
    .token-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .token-modal {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 1.5rem;
      width: 360px;
      max-width: 90vw;
    }
    .token-modal h3 { font-size: 1rem; font-weight: 700; margin-bottom: 0.4rem; }
    .token-modal p  { font-size: 0.8rem; color: #9ca3af; margin-bottom: 1rem; }
    .token-modal input {
      width: 100%;
      background: #111827;
      border: 1px solid #374151;
      border-radius: 6px;
      color: #f3f4f6;
      font-size: 0.875rem;
      font-family: monospace;
      padding: 0.5rem 0.75rem;
      margin-bottom: 1rem;
    }
    .token-modal input:focus { outline: none; border-color: #3b82f6; }
    .token-modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }
    .btn-tok-cancel {
      padding: 0.35rem 0.8rem; border: 1px solid #374151; border-radius: 6px;
      font-size: 0.8rem; font-weight: 600; cursor: pointer;
      background: transparent; color: #d1d5db; font-family: inherit;
    }
    .btn-tok-submit {
      padding: 0.35rem 0.8rem; border: 1px solid #3b82f6; border-radius: 6px;
      font-size: 0.8rem; font-weight: 600; cursor: pointer;
      background: transparent; color: #60a5fa; font-family: inherit;
    }
  </style>
</head>
<body>
  <div class="page">
    <nav class="nav"><a href="/">← Nothing But Net</a></nav>
    <header>
      <h1>Trading Block</h1>
      <p>Players available for trade. Click any column header to sort.</p>
    </header>

    <div id="edit-panel" style="display:none"></div>
    <div id="signin-prompt" class="signin-prompt" style="display:none">
      Team member? <button id="signin-btn">Enter your token</button> to manage your trading block.
    </div>

    <div class="table-wrap" id="table-wrap">
      <div id="status">Loading…</div>
    </div>
  </div>

  <script>
    const VALID_TEAMS_LC = new Set([
      'atl','bkn','bos','cha','chi','cle','dal','den','det','gsw',
      'hou','ind','lac','lal','mem','mia','mil','min','nop','nyk',
      'okc','orl','phi','phx','por','sac','sas','tor','uta','was',
    ]);
    const TOKEN_KEY = 'nbn_token';
    const CUR_YR = '25-26';

    const getToken = () => localStorage.getItem(TOKEN_KEY);
    const setToken = t => localStorage.setItem(TOKEN_KEY, t);

    const CAP_HOLD_CSS = {
      UFA: 'cap-ufa', RFA: 'cap-rfa',
      PLAYER_OPT: 'cap-player-opt', TEAM_OPT: 'cap-team-opt', NON_GTD: 'cap-non-gtd',
    };
    const CAP_HOLD_LABELS = {
      UFA: 'UFA Hold', RFA: 'RFA Hold',
      PLAYER_OPT: 'Player Option', TEAM_OPT: 'Team Option', NON_GTD: 'Non-Guaranteed',
    };
    const CAP_SWATCH_COLORS = {
      UFA: 'hsl(45,60%,35%)', RFA: 'hsl(25,60%,35%)',
      PLAYER_OPT: 'hsl(120,50%,30%)', TEAM_OPT: 'hsl(210,55%,35%)', NON_GTD: '#374151',
    };

    function parseCapHolds(str) {
      const map = {};
      if (!str) return map;
      str.split(',').forEach(pair => {
        const [yr, type] = pair.split(':');
        if (yr && type) map[yr] = type;
      });
      return map;
    }

    let sortField = 'ovr';
    let sortDir = -1;
    let COLS = [];
    let tableRows = [];
    let salaryYears = [];
    let myTeam = null;
    let myRoster = [];
    let pendingEntries = [];
    let ovrRange = { min: 0, max: 100 };
    let tbData = {};

    function parseLine(line) {
      const out = []; let cur = '', quoted = false;
      for (const ch of line) {
        if (ch === '"') { quoted = !quoted; }
        else if (ch === ',' && !quoted) { out.push(cur); cur = ''; }
        else { cur += ch; }
      }
      out.push(cur);
      return out;
    }

    function parseCSV(text) {
      const lines = text.trim().split('\n');
      const headers = parseLine(lines[0]);
      return lines.slice(1).map(line => {
        const vals = parseLine(line);
        const obj = {};
        headers.forEach((h, i) => { obj[h] = vals[i] ?? ''; });
        return obj;
      });
    }

    function buildCols() {
      COLS = [
        { key: 'team',   label: 'Team',   sortField: 'team',   cls: '',             defaultDir:  1, numeric: false },
        { key: 'player', label: 'Player', sortField: 'player', cls: 'bold',         defaultDir:  1, numeric: false },
        { key: 'pos',    label: 'POS',    sortField: 'pos',    cls: 'muted center', defaultDir:  1, numeric: false },
        { key: 'ovr',    label: 'OVR',    sortField: 'ovr',    cls: 'ovr-cell',     defaultDir: -1, numeric: true  },
        { key: 'age',    label: 'AGE',    sortField: 'age',    cls: 'right',        defaultDir:  1, numeric: true  },
      ];
      salaryYears.forEach(yr => {
        COLS.push({ key: yr, label: yr, sortField: yr, cls: 'right', defaultDir: -1, numeric: false });
      });
      COLS.push({ key: 'notes', label: 'Notes', sortField: 'notes', cls: 'notes-cell', defaultDir: 1, numeric: false });
    }

    function sortRows(rows) {
      return [...rows].sort((a, b) => {
        let av = a[sortField], bv = b[sortField];
        const col = COLS.find(c => c.sortField === sortField);
        if (col && col.numeric) {
          av = parseFloat(av) || 0;
          bv = parseFloat(bv) || 0;
        } else {
          av = (av || '').toLowerCase();
          bv = (bv || '').toLowerCase();
        }
        return av < bv ? -sortDir : av > bv ? sortDir : 0;
      });
    }

    let currentTbody = null;

    function buildTable() {
      const table = document.createElement('table');
      const thead = table.createTHead();
      const hr = thead.insertRow();

      COLS.forEach(col => {
        const th = document.createElement('th');
        const isActive = col.sortField === sortField;
        th.appendChild(document.createTextNode(col.label));
        const arrow = document.createElement('span');
        arrow.className = 'sort-arrow';
        arrow.textContent = isActive ? (sortDir === -1 ? '↓' : '↑') : '↓';
        th.appendChild(arrow);
        th.dataset.active = isActive;
        if (col.cls.includes('right') || col.cls.includes('ovr-cell')) th.style.textAlign = 'right';
        if (col.cls.includes('center')) th.style.textAlign = 'center';

        th.addEventListener('click', () => {
          if (sortField === col.sortField) { sortDir *= -1; }
          else { sortField = col.sortField; sortDir = col.defaultDir; }
          thead.querySelectorAll('th').forEach(t => {
            t.dataset.active = false;
            t.querySelector('.sort-arrow').textContent = '↓';
          });
          th.dataset.active = true;
          th.querySelector('.sort-arrow').textContent = sortDir === -1 ? '↓' : '↑';
          rebuildBody(currentTbody);
        });

        hr.appendChild(th);
      });

      currentTbody = table.createTBody();
      rebuildBody(currentTbody);
      return table;
    }

    function rebuildBody(tbody) {
      tbody.innerHTML = '';

      if (tableRows.length === 0) {
        const tr = tbody.insertRow();
        const td = tr.insertCell();
        td.colSpan = COLS.length;
        td.id = 'status';
        td.style.cssText = 'text-align:center;padding:3rem;color:#6b7280;font-size:0.9rem;';
        td.textContent = 'No players on the trading block yet.';
        return;
      }

      sortRows(tableRows).forEach(row => {
        const tr = tbody.insertRow();
        COLS.forEach(col => {
          const td = tr.insertCell();
          col.cls.split(' ').forEach(c => c && td.classList.add(c));

          if (col.key === 'team') {
            const a = document.createElement('a');
            a.href = `/teams/${row.team}/`;
            a.textContent = row.team;
            td.appendChild(a);
          } else if (col.key === 'ovr') {
            td.textContent = row.ovr || '—';
            if (row.ovr && ovrRange.max > ovrRange.min) {
              const n = parseFloat(row.ovr);
              if (!isNaN(n)) {
                const t = (n - ovrRange.min) / (ovrRange.max - ovrRange.min);
                td.style.background = `hsl(${Math.round(t * 120)}, 55%, 18%)`;
                td.style.color     = `hsl(${Math.round(t * 120)}, 80%, 72%)`;
              }
            }
          } else if (/^\d{2}-\d{2}$/.test(col.key)) {
            td.textContent = row[col.key] || '—';
            const capType = parseCapHolds(row.cap_holds)[col.key];
            if (capType && CAP_HOLD_CSS[capType]) td.classList.add(CAP_HOLD_CSS[capType]);
          } else {
            td.textContent = row[col.key] || '—';
          }
        });
      });
    }

    // ── Edit panel ────────────────────────────────────────────────────────────

    function renderEditPanel() {
      const panel = document.getElementById('edit-panel');
      panel.innerHTML = '';
      panel.style.display = '';
      panel.className = 'edit-panel';

      const h2 = document.createElement('h2');
      h2.innerHTML = `Managing Trading Block <span class="team-badge">${myTeam}</span>`;
      panel.appendChild(h2);

      // Current entries
      const entryList = document.createElement('div');
      entryList.className = 'entry-list';

      if (pendingEntries.length === 0) {
        const empty = document.createElement('p');
        empty.style.cssText = 'color:#6b7280;font-size:0.8rem;padding:0.4rem 0 0.75rem;';
        empty.textContent = 'No players on the block yet. Add one below.';
        entryList.appendChild(empty);
      } else {
        pendingEntries.forEach((entry, i) => {
          const row = document.createElement('div');
          row.className = 'entry-row';

          const playerSpan = document.createElement('span');
          playerSpan.className = 'entry-player';
          playerSpan.textContent = entry.player;

          const notesSpan = document.createElement('span');
          notesSpan.className = 'entry-notes';
          if (entry.notes) {
            notesSpan.textContent = entry.notes;
          } else {
            notesSpan.innerHTML = '<em style="opacity:0.45">no notes</em>';
          }

          const removeBtn = document.createElement('button');
          removeBtn.className = 'btn-remove';
          removeBtn.textContent = '✕ Remove';
          removeBtn.addEventListener('click', () => {
            pendingEntries.splice(i, 1);
            renderEditPanel();
          });

          row.appendChild(playerSpan);
          row.appendChild(notesSpan);
          row.appendChild(removeBtn);
          entryList.appendChild(row);
        });
      }
      panel.appendChild(entryList);

      // Add row
      const addRow = document.createElement('div');
      addRow.className = 'add-row';

      const onBlock = new Set(pendingEntries.map(e => e.player));
      const available = myRoster.filter(r => r.TYPE !== 'dead' && !onBlock.has(r.PLAYER));

      const sel = document.createElement('select');
      const defaultOpt = document.createElement('option');
      defaultOpt.value = '';
      defaultOpt.textContent = available.length ? 'Select player…' : 'All players added';
      sel.appendChild(defaultOpt);
      available.forEach(r => {
        const opt = document.createElement('option');
        opt.value = r.PLAYER;
        opt.textContent = r.PLAYER;
        sel.appendChild(opt);
      });

      const notesInput = document.createElement('input');
      notesInput.type = 'text';
      notesInput.placeholder = 'Notes (optional)…';
      notesInput.maxLength = 120;

      const addBtn = document.createElement('button');
      addBtn.className = 'btn-action';
      addBtn.textContent = 'Add';
      addBtn.disabled = available.length === 0;
      addBtn.addEventListener('click', () => {
        const player = sel.value;
        if (!player) return;
        pendingEntries.push({ player, notes: notesInput.value.trim() });
        renderEditPanel();
      });

      addRow.appendChild(sel);
      addRow.appendChild(notesInput);
      addRow.appendChild(addBtn);
      panel.appendChild(addRow);

      // Save
      const actions = document.createElement('div');
      actions.className = 'panel-actions';

      const saveBtn = document.createElement('button');
      saveBtn.className = 'btn-action';
      saveBtn.textContent = 'Save';

      const saveStatus = document.createElement('span');
      saveStatus.className = 'save-status';

      saveBtn.addEventListener('click', async () => {
        saveBtn.disabled = true;
        saveStatus.textContent = 'Saving…';
        try {
          const res = await fetch(`/api/trading-block/${myTeam}`, {
            method: 'PUT',
            headers: {
              Authorization: `Bearer ${getToken()}`,
              'Content-Type': 'application/json',
            },
            body: JSON.stringify(pendingEntries),
          });
          if (res.status === 403) {
            localStorage.removeItem(TOKEN_KEY);
            saveStatus.textContent = 'Token invalid — please refresh and re-enter.';
            return;
          }
          if (!res.ok) throw new Error(res.statusText);
          saveStatus.textContent = 'Saved!';
          setTimeout(() => location.reload(), 600);
        } catch {
          saveStatus.textContent = 'Save failed.';
          saveBtn.disabled = false;
        }
      });

      actions.appendChild(saveBtn);
      actions.appendChild(saveStatus);
      panel.appendChild(actions);
    }

    // ── Token modal ───────────────────────────────────────────────────────────

    function promptToken(onSuccess) {
      const overlay = document.createElement('div');
      overlay.className = 'token-overlay';
      overlay.innerHTML = `
        <div class="token-modal">
          <h3>Team token required</h3>
          <p>Enter your team token to manage your trading block. It will be saved in this browser.</p>
          <input type="password" placeholder="Paste token…" autocomplete="off" />
          <div class="token-modal-actions">
            <button class="btn-tok-cancel">Cancel</button>
            <button class="btn-tok-submit">Continue</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);
      const input = overlay.querySelector('input');
      input.focus();
      overlay.querySelector('.btn-tok-cancel').addEventListener('click', () => overlay.remove());
      overlay.querySelector('.btn-tok-submit').addEventListener('click', () => {
        const val = input.value.trim();
        if (!val) return;
        setToken(val);
        overlay.remove();
        onSuccess(val);
      });
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') overlay.querySelector('.btn-tok-submit').click();
        if (e.key === 'Escape') overlay.remove();
      });
    }

    // ── Auth ──────────────────────────────────────────────────────────────────

    async function checkAuth() {
      const token = getToken();
      if (!token) return null;
      try {
        const res = await fetch('/api/me', { headers: { Authorization: `Bearer ${token}` } });
        return res.ok ? res.json() : null;
      } catch { return null; }
    }

    async function activateEditPanel(rosterData) {
      if (!myRoster.length && myTeam) {
        const r = await fetch(`/${myTeam.toLowerCase()}-roster.csv`);
        if (r.ok) { myRoster = parseCSV(await r.text()); rosterData[myTeam] = myRoster; }
      }
      pendingEntries = [...(tbData[myTeam] || [])];
      renderEditPanel();
    }

    // ── Main ──────────────────────────────────────────────────────────────────

    (async () => {
      const statusEl = document.getElementById('status');
      const wrap = document.getElementById('table-wrap');
      const signinPrompt = document.getElementById('signin-prompt');

      try {
        const [tb, userInfo] = await Promise.all([
          fetch('/api/trading-block').then(r => { if (!r.ok) throw r; return r.json(); }),
          checkAuth(),
        ]);
        tbData = tb;

        const teamRole = userInfo && userInfo.roles.find(r => VALID_TEAMS_LC.has(r));
        if (teamRole) myTeam = teamRole.toUpperCase();

        // Which roster CSVs to fetch
        const teamsWithEntries = Object.keys(tb).filter(t => tb[t].length > 0);
        const teamsToFetch = [...new Set([...teamsWithEntries, ...(myTeam ? [myTeam] : [])])];

        const rosterData = {};
        if (teamsToFetch.length > 0) {
          const results = await Promise.allSettled(
            teamsToFetch.map(t =>
              fetch(`/${t.toLowerCase()}-roster.csv`).then(r => r.ok ? r.text() : null)
            )
          );
          teamsToFetch.forEach((t, i) => {
            const res = results[i];
            if (res.status === 'fulfilled' && res.value) rosterData[t] = parseCSV(res.value);
          });
        }

        // Detect salary year columns
        const salaryYearSet = new Set();
        Object.values(rosterData).forEach(rows => {
          if (rows.length > 0) {
            Object.keys(rows[0])
              .filter(k => /^\d{2}-\d{2}$/.test(k) && k >= CUR_YR)
              .forEach(k => salaryYearSet.add(k));
          }
        });
        salaryYears = [...salaryYearSet].sort();

        // Build flat table rows by joining trading block entries with roster data
        tableRows = [];
        Object.entries(tb).forEach(([team, entries]) => {
          entries.forEach(({ player, notes }) => {
            const pr = (rosterData[team] || []).find(r => r.PLAYER === player) || {};
            const row = { team, player, pos: pr.POS || '—', ovr: pr.OVR || '', age: pr.AGE || '', notes: notes || '', cap_holds: pr.CAP_HOLDS || '' };
            salaryYears.forEach(yr => { row[yr] = pr[yr] || '—'; });
            tableRows.push(row);
          });
        });

        // OVR heatmap range
        const ovrVals = tableRows.map(r => parseFloat(r.ovr)).filter(v => !isNaN(v));
        if (ovrVals.length > 1) ovrRange = { min: Math.min(...ovrVals), max: Math.max(...ovrVals) };

        buildCols();

        // Set up edit panel or sign-in prompt
        if (myTeam) {
          myRoster = rosterData[myTeam] || [];
          await activateEditPanel(rosterData);
        } else if (!userInfo) {
          signinPrompt.style.display = '';
          document.getElementById('signin-btn').addEventListener('click', () => {
            promptToken(async () => {
              const info = await checkAuth();
              const role = info && info.roles.find(r => VALID_TEAMS_LC.has(r));
              if (role) {
                signinPrompt.style.display = 'none';
                myTeam = role.toUpperCase();
                myRoster = rosterData[myTeam] || [];
                await activateEditPanel(rosterData);
              } else {
                signinPrompt.innerHTML = 'No team role found for this token.';
              }
            });
          });
        }

        statusEl.remove();
        wrap.appendChild(buildTable());

        // Cap hold legend
        const allCapTypes = new Set();
        tableRows.forEach(r => Object.values(parseCapHolds(r.cap_holds)).forEach(t => allCapTypes.add(t)));
        if (allCapTypes.size > 0) {
          const legend = document.createElement('div');
          legend.className = 'cap-legend';
          ['PLAYER_OPT', 'TEAM_OPT', 'UFA', 'RFA', 'NON_GTD'].forEach(type => {
            if (!allCapTypes.has(type)) return;
            const item = document.createElement('span');
            item.className = 'cap-legend-item';
            const swatch = document.createElement('span');
            swatch.className = 'cap-swatch';
            swatch.style.background = CAP_SWATCH_COLORS[type];
            item.appendChild(swatch);
            item.appendChild(document.createTextNode(CAP_HOLD_LABELS[type]));
            legend.appendChild(item);
          });
          wrap.appendChild(legend);
        }
      } catch {
        statusEl.textContent = 'Failed to load trading block.';
      }
    })();
  </script>
  <script src="/token-badge.js"></script>
</body>
</html>
