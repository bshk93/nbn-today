<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/logo.png">
  <link rel="stylesheet" href="/css/shared.css">
  <title>Write — NBN News</title>
  <style>
    .page { max-width: 820px; margin: 0 auto; }
    header { margin-bottom: 1.75rem; }
    header h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.02em; }

    #auth-gate { background: #1f2937; border: 1px solid #374151; border-radius: 12px; padding: 2rem; text-align: center; }
    #auth-gate h2 { font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; }
    #auth-gate p { color: #9ca3af; font-size: 0.875rem; margin-bottom: 1.25rem; }
    #auth-gate input { width: 100%; max-width: 340px; background: #111827; border: 1px solid #374151; color: #f3f4f6; border-radius: 6px; padding: 0.5rem 0.75rem; font-size: 0.875rem; font-family: monospace; display: block; margin: 0 auto 0.75rem; }
    #auth-gate input:focus { outline: none; border-color: #3b82f6; }

    #editor-form { display: none; }
    .field { margin-bottom: 1.25rem; }
    .field label { display: block; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #6b7280; margin-bottom: 0.4rem; }
    .field input[type="text"] { width: 100%; background: #1f2937; border: 1px solid #374151; color: #f3f4f6; border-radius: 8px; padding: 0.6rem 0.85rem; font-size: 1rem; font-family: inherit; }
    .field input[type="text"]:focus { outline: none; border-color: #3b82f6; }
    .field .hint { font-size: 0.73rem; color: #4b5563; margin-top: 0.35rem; }
    #title-input { font-size: 1.35rem; font-weight: 700; }

    /* Cover preview */
    .cover-preview { margin-top: 0.6rem; border-radius: 8px; overflow: hidden; border: 1px solid #374151; display: none; }
    .cover-preview img { width: 100%; max-height: 240px; object-fit: cover; display: block; }

    /* Tags */
    .tags-row { display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center; }
    .tag-token { display: inline-flex; align-items: center; gap: 0.35rem; background: #1e3a5f; border: 1px solid #1d4ed8; color: #93c5fd; border-radius: 5px; padding: 0.18rem 0.5rem; font-size: 0.75rem; font-weight: 600; }
    .tag-token button { background: none; border: none; color: #93c5fd; cursor: pointer; font-size: 0.9rem; line-height: 1; padding: 0; }
    #tag-input { background: #1f2937; border: 1px solid #374151; color: #f3f4f6; border-radius: 6px; padding: 0.35rem 0.6rem; font-size: 0.8rem; font-family: inherit; min-width: 140px; }
    #tag-input:focus { outline: none; border-color: #3b82f6; }

    .action-bar { display: flex; align-items: center; justify-content: space-between; margin-top: 1.5rem; flex-wrap: wrap; gap: 0.75rem; }
    .action-left { display: flex; gap: 0.5rem; }
    .action-right { display: flex; gap: 0.5rem; align-items: center; }
    button { font-family: inherit; cursor: pointer; border-radius: 6px; font-size: 0.85rem; font-weight: 500; padding: 0.45rem 1rem; border: 1px solid transparent; }
    .btn-primary { background: #2563eb; border-color: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-secondary { background: #1f2937; border-color: #374151; color: #d1d5db; }
    .btn-secondary:hover { background: #263244; border-color: #4b5563; }
    .btn-secondary:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-danger { background: transparent; border-color: #374151; color: #f87171; }
    .btn-danger:hover { background: #3b1f1f; border-color: #ef4444; }
    .status-msg { font-size: 0.8rem; color: #6b7280; }
    .status-msg.ok { color: #4ade80; }
    .status-msg.err { color: #f87171; }

    .submitted-banner { background: #3b1f00; border: 1px solid #b45309; border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.85rem; color: #fbbf24; margin-bottom: 1.25rem; display: none; }

    /* Markdown editor */
    .editor-wrap { background: #1f2937; border: 1px solid #374151; border-radius: 10px; overflow: hidden; }
    .editor-bar { display: flex; align-items: center; gap: 0.2rem; padding: 0.35rem 0.5rem; border-bottom: 1px solid #374151; background: #18212f; }
    .fmt-btn { background: transparent; border: none; border-radius: 4px; color: #6b7280; cursor: pointer; font-family: inherit; font-size: 0.73rem; font-weight: 700; line-height: 1; padding: 0.28rem 0.42rem; min-width: 1.6rem; text-align: center; }
    .fmt-btn:hover { background: #374151; color: #d1d5db; }
    .fmt-sep { width: 1px; height: 13px; background: #2d3748; margin: 0 0.1rem; flex-shrink: 0; }
    .mode-tabs { display: flex; background: #111827; border-radius: 5px; padding: 2px; margin-left: auto; }
    .mode-tab { padding: 0.18rem 0.6rem; font-size: 0.72rem; font-weight: 600; color: #4b5563; background: transparent; border: none; border-radius: 3px; cursor: pointer; font-family: inherit; }
    .mode-tab:hover { color: #9ca3af; }
    .mode-tab.active { background: #374151; color: #e5e7eb; }
    #body-write { display: block; width: 100%; min-height: 360px; background: transparent; border: none; color: #e5e7eb; caret-color: #60a5fa; outline: none; resize: vertical; font-family: ui-monospace, 'Cascadia Code', 'SF Mono', Menlo, monospace; font-size: 0.875rem; line-height: 1.8; padding: 1rem 1.25rem; }
    #body-write::placeholder { color: #374151; }
    #body-preview { display: none; min-height: 360px; padding: 1.1rem 1.4rem; color: #d1d5db; font-size: 0.9rem; line-height: 1.75; }
    #body-preview h1, #body-preview h2, #body-preview h3 { color: #f3f4f6; font-weight: 700; margin: 1.4em 0 0.5em; line-height: 1.3; }
    #body-preview h1 { font-size: 1.4rem; } #body-preview h2 { font-size: 1.15rem; } #body-preview h3 { font-size: 1rem; }
    #body-preview p { margin: 0.7em 0; }
    #body-preview img { max-width: 100%; border-radius: 6px; margin: 0.6em 0; }
    #body-preview ul, #body-preview ol { padding-left: 1.5em; margin: 0.7em 0; }
    #body-preview blockquote { border-left: 3px solid #4b5563; color: #9ca3af; margin: 0.8em 0; padding: 0.1em 0 0.1em 1em; }
    #body-preview code { background: #111827; border-radius: 4px; color: #a5b4fc; font-family: ui-monospace, monospace; font-size: 0.84em; padding: 0.1em 0.35em; }
    #body-preview pre { background: #111827; border-radius: 6px; overflow-x: auto; padding: 0.9em 1em; margin: 0.75em 0; }
    #body-preview pre code { background: none; padding: 0; color: #e5e7eb; }
    #body-preview a { color: #60a5fa; }
    #body-preview hr { border: none; border-top: 1px solid #374151; margin: 1.5em 0; }
    #body-preview strong { color: #f3f4f6; }
    #body-preview table { border-collapse: collapse; width: 100%; margin: 0.75em 0; }
    #body-preview th, #body-preview td { border: 1px solid #374151; padding: 0.4em 0.75em; }
  </style>
</head>
<body>
<div class="page">
  <div class="nav"><a href="/news/">← News</a></div>
  <header><h1 id="page-title">Write an Article</h1></header>

  <div id="auth-gate">
    <h2>Sign in to write</h2>
    <p>You need a valid member token to draft or submit articles.</p>
    <input type="password" id="gate-token" placeholder="Paste your token" autocomplete="off">
    <div><button class="btn-primary" onclick="gateSignIn()">Sign in</button></div>
  </div>

  <div id="editor-form">
    <div class="submitted-banner" id="submitted-banner">
      This article is in the submission queue awaiting editorial review. Edits are still allowed.
    </div>

    <div class="field">
      <label for="title-input">Headline</label>
      <input type="text" id="title-input" placeholder="Article headline…" maxlength="200">
    </div>

    <div class="field">
      <label for="cover-input">Cover image URL <span style="text-transform:none;font-weight:400;color:#4b5563;">(optional)</span></label>
      <input type="text" id="cover-input" placeholder="https://…" oninput="updateCoverPreview()">
      <div class="hint">Shown as the hero image on the feed and at the top of the article.</div>
      <div class="cover-preview" id="cover-preview"><img id="cover-img" alt="" referrerpolicy="no-referrer"></div>
    </div>

    <div class="field">
      <label>Tags <span style="text-transform:none;font-weight:400;color:#4b5563;">(up to 6)</span></label>
      <div class="tags-row" id="tags-row">
        <input type="text" id="tag-input" placeholder="Add a tag + Enter" maxlength="24">
      </div>
    </div>

    <div class="field">
      <label>Body</label>
      <div class="editor-wrap">
        <div class="editor-bar">
          <button type="button" class="fmt-btn" title="Bold (Ctrl+B)" onclick="fmt('**','**')"><b>B</b></button>
          <button type="button" class="fmt-btn" title="Italic (Ctrl+I)" onclick="fmt('_','_')"><i style="font-style:italic">I</i></button>
          <div class="fmt-sep"></div>
          <button type="button" class="fmt-btn" title="Heading 2" onclick="fmtLine('## ')">H2</button>
          <button type="button" class="fmt-btn" title="Heading 3" onclick="fmtLine('### ')">H3</button>
          <div class="fmt-sep"></div>
          <button type="button" class="fmt-btn" title="Blockquote" onclick="fmtLine('> ')">❝</button>
          <button type="button" class="fmt-btn" title="Bullet list" onclick="fmtLine('- ')">• —</button>
          <button type="button" class="fmt-btn" title="Link (Ctrl+K)" onclick="fmtLink()">🔗</button>
          <button type="button" class="fmt-btn" title="Image" onclick="fmtImage()">🖼</button>
          <div class="mode-tabs">
            <button type="button" class="mode-tab active" data-mode="write" onclick="setMode('write')">Write</button>
            <button type="button" class="mode-tab" data-mode="preview" onclick="setMode('preview')">Preview</button>
          </div>
        </div>
        <textarea id="body-write" placeholder="Write your article in Markdown…&#10;&#10;Add images with ![caption](https://image-url)&#10;&#10;## A section heading&#10;&#10;Your reporting here." spellcheck="true"></textarea>
        <div id="body-preview"></div>
      </div>
    </div>

    <div class="action-bar">
      <div class="action-left">
        <button class="btn-danger" id="btn-delete" onclick="doDelete()" style="display:none;">Delete Draft</button>
      </div>
      <div class="action-right">
        <span class="status-msg" id="status-msg"></span>
        <button class="btn-secondary" id="btn-save" onclick="doSave()">Save Draft</button>
        <button class="btn-primary" id="btn-submit" onclick="doPublish()">Publish</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script>
const API = '/api';
const params = new URLSearchParams(location.search);
let articleId = null;
let isSubmitted = false;
let tags = [];

marked.use({ gfm: true, breaks: true });
function getToken() { return localStorage.getItem('nbn_token'); }

// ── Editor helpers ──
function getEditorValue() { return document.getElementById('body-write').value; }
function setEditorValue(t) { document.getElementById('body-write').value = t || ''; }
function renderPreview() { document.getElementById('body-preview').innerHTML = marked.parse(getEditorValue() || ''); }
function setMode(mode) {
  const write = document.getElementById('body-write'), preview = document.getElementById('body-preview');
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  if (mode === 'preview') { renderPreview(); write.style.display = 'none'; preview.style.display = 'block'; }
  else { write.style.display = 'block'; preview.style.display = 'none'; write.focus(); }
}
function fmt(before, after) {
  const ta = document.getElementById('body-write');
  const s = ta.selectionStart, e = ta.selectionEnd, sel = ta.value.slice(s, e);
  ta.setRangeText(before + (sel || 'text') + after, s, e, 'select');
  if (!sel) { ta.selectionStart = s + before.length; ta.selectionEnd = s + before.length + 4; }
  ta.focus();
}
function fmtLine(prefix) {
  const ta = document.getElementById('body-write');
  const s = ta.selectionStart, lineStart = ta.value.lastIndexOf('\n', s - 1) + 1;
  if (ta.value.slice(lineStart).startsWith(prefix)) ta.setRangeText('', lineStart, lineStart + prefix.length, 'end');
  else ta.setRangeText(prefix, lineStart, lineStart, 'end');
  ta.focus();
}
function fmtLink() {
  const ta = document.getElementById('body-write');
  const s = ta.selectionStart, e = ta.selectionEnd, sel = ta.value.slice(s, e);
  ta.setRangeText(`[${sel || 'link text'}](url)`, s, e, 'select');
  if (!sel) { ta.selectionStart = s + 1; ta.selectionEnd = s + 9; }
  ta.focus();
}
function fmtImage() {
  const url = prompt('Image URL:');
  if (!url) return;
  const ta = document.getElementById('body-write');
  const s = ta.selectionStart;
  ta.setRangeText(`![](${url})`, s, ta.selectionEnd, 'end');
  ta.focus();
}
document.addEventListener('keydown', e => {
  if (document.activeElement.id !== 'body-write') return;
  if ((e.ctrlKey || e.metaKey) && e.key === 'b') { e.preventDefault(); fmt('**', '**'); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'i') { e.preventDefault(); fmt('_', '_'); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); fmtLink(); }
});

// ── Cover preview ──
function updateCoverPreview() {
  const url = document.getElementById('cover-input').value.trim();
  const wrap = document.getElementById('cover-preview'), img = document.getElementById('cover-img');
  if (url) { img.src = url; wrap.style.display = 'block'; } else { wrap.style.display = 'none'; }
}

// ── Tags ──
function renderTags() {
  const row = document.getElementById('tags-row');
  row.querySelectorAll('.tag-token').forEach(t => t.remove());
  const input = document.getElementById('tag-input');
  tags.forEach((t, i) => {
    const tok = document.createElement('span');
    tok.className = 'tag-token';
    tok.innerHTML = `${escHtml(t)} <button type="button" title="Remove" onclick="removeTag(${i})">×</button>`;
    row.insertBefore(tok, input);
  });
}
function addTag(raw) {
  const t = raw.trim();
  if (!t || tags.length >= 6) return;
  if (tags.some(x => x.toLowerCase() === t.toLowerCase())) return;
  tags.push(t); renderTags();
}
function removeTag(i) { tags.splice(i, 1); renderTags(); }
function escHtml(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
document.getElementById('tag-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); addTag(e.target.value); e.target.value = ''; }
  else if (e.key === 'Backspace' && !e.target.value && tags.length) { removeTag(tags.length - 1); }
});

function setStatus(msg, cls) { const el = document.getElementById('status-msg'); el.textContent = msg; el.className = 'status-msg' + (cls ? ' ' + cls : ''); }
function setLoading(on) { document.getElementById('btn-save').disabled = on; document.getElementById('btn-submit').disabled = on; }

function payload() {
  return {
    title: document.getElementById('title-input').value.trim(),
    body: getEditorValue(),
    cover_image: document.getElementById('cover-input').value.trim() || null,
    tags,
  };
}

async function gateSignIn() {
  const token = document.getElementById('gate-token').value.trim();
  if (!token) return;
  try {
    const res = await fetch(`${API}/members/me`, { headers: { Authorization: `Bearer ${token}` } });
    if (!res.ok) { alert('Invalid token.'); return; }
    localStorage.setItem('nbn_token', token);
    init();
  } catch { alert('Could not sign in. Check your connection.'); }
}
document.getElementById('gate-token').addEventListener('keydown', e => { if (e.key === 'Enter') gateSignIn(); });

function showEditor() {
  document.getElementById('auth-gate').style.display = 'none';
  document.getElementById('editor-form').style.display = 'block';
}

async function loadExisting(id) {
  const token = getToken();
  try {
    const res = await fetch(`${API}/news/${id}`, { headers: token ? { Authorization: `Bearer ${token}` } : {} });
    if (!res.ok) { alert('Could not load article.'); return; }
    const a = await res.json();
    articleId = a.id;
    document.getElementById('title-input').value = a.title || '';
    setEditorValue(a.body || '');
    document.getElementById('cover-input').value = a.cover_image || '';
    updateCoverPreview();
    tags = (a.tags || []).slice(); renderTags();
    isSubmitted = a.status !== 'draft';
    if (isSubmitted) {
      const banner = document.getElementById('submitted-banner');
      banner.style.display = 'block';
      banner.textContent = a.status === 'published'
        ? 'This article is published and live. Your edits will update it immediately.'
        : 'This article is in the submission queue awaiting editorial review. Edits are still allowed.';
      document.getElementById('btn-submit').style.display = 'none';
      document.getElementById('btn-delete').style.display = 'none';
      document.getElementById('page-title').textContent = 'Edit Article';
      document.getElementById('btn-save').textContent = 'Save Changes';
    } else {
      document.getElementById('btn-delete').style.display = '';
      document.getElementById('page-title').textContent = 'Edit Draft';
    }
  } catch { alert('Failed to load article.'); }
}

async function doSave() {
  const p = payload();
  const token = getToken();
  if (!token) return;
  if (!p.title) { setStatus('Headline is required.', 'err'); document.getElementById('title-input').focus(); return; }
  setLoading(true); setStatus('Saving…');
  try {
    if (articleId) {
      const res = await fetch(`${API}/news/${articleId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify(p),
      });
      if (!res.ok) { const e = await res.json(); throw new Error(e.detail || 'Save failed'); }
      setStatus('Saved.', 'ok');
    } else {
      const res = await fetch(`${API}/news`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify(p),
      });
      if (!res.ok) { const e = await res.json(); throw new Error(e.detail || 'Create failed'); }
      const a = await res.json();
      articleId = a.id;
      history.replaceState(null, '', `/news/new/?id=${articleId}`);
      document.getElementById('btn-delete').style.display = '';
      setStatus('Draft saved.', 'ok');
    }
  } catch (err) { setStatus(err.message, 'err'); }
  finally { setLoading(false); }
}

async function doPublish() {
  if (!payload().title) { setStatus('Headline is required.', 'err'); document.getElementById('title-input').focus(); return; }
  await doSave();
  if (!articleId) return;
  const token = getToken();
  if (!confirm('Publish this article? It will be visible to everyone.')) return;
  setLoading(true); setStatus('Publishing…');
  try {
    const res = await fetch(`${API}/news/${articleId}/publish`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({}),
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.detail || 'Publish failed'); }
    location.href = `/news/view/?id=${articleId}`;
  } catch (err) { setStatus(err.message, 'err'); setLoading(false); }
}

// Approval-gated path: send the draft to the editorial queue instead of
// publishing directly. Unused while authors can self-publish, kept so BOD
// approval can be re-enabled (set REQUIRE_PUBLISH_APPROVAL in the API) without
// rebuilding this flow.
async function doSubmit() {
  if (!payload().title) { setStatus('Headline is required.', 'err'); document.getElementById('title-input').focus(); return; }
  await doSave();
  if (!articleId) return;
  const token = getToken();
  if (!confirm('Submit this article for review? An editor will publish it from the queue.')) return;
  setLoading(true); setStatus('Submitting…');
  try {
    const res = await fetch(`${API}/news/${articleId}/submit`, { method: 'POST', headers: { Authorization: `Bearer ${token}` } });
    if (!res.ok) { const e = await res.json(); throw new Error(e.detail || 'Submit failed'); }
    location.href = `/news/view/?id=${articleId}`;
  } catch (err) { setStatus(err.message, 'err'); setLoading(false); }
}

async function doDelete() {
  if (!articleId) return;
  if (!confirm('Delete this draft? This cannot be undone.')) return;
  const token = getToken();
  try {
    const res = await fetch(`${API}/news/${articleId}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
    if (!res.ok) { const e = await res.json(); throw new Error(e.detail || 'Delete failed'); }
    location.href = '/news/';
  } catch (err) { alert(err.message); }
}

async function init() {
  const token = getToken();
  if (!token) { document.getElementById('auth-gate').style.display = 'block'; document.getElementById('editor-form').style.display = 'none'; return; }
  try {
    const res = await fetch(`${API}/members/me`, { headers: { Authorization: `Bearer ${token}` } });
    if (!res.ok) { localStorage.removeItem('nbn_token'); document.getElementById('auth-gate').style.display = 'block'; return; }
  } catch { document.getElementById('auth-gate').style.display = 'block'; return; }
  showEditor();
  const id = params.get('id');
  if (id) { articleId = id; await loadExisting(id); }
}

init();
</script>
  <script src="/nav.js"></script>
</body>
</html>
