<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Players — NBN</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111827;
      color: #f3f4f6;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    a { color: #60a5fa; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .page { max-width: 1200px; margin: 0 auto; }

    .nav { margin-bottom: 1.75rem; font-size: 0.875rem; color: #9ca3af; }
    .nav a { color: #9ca3af; }
    .nav a:hover { color: #f3f4f6; }

    header { margin-bottom: 1.25rem; display: flex; align-items: center; gap: 1.25rem; }
    .header-text { display: flex; flex-direction: column; }
    header h1 { font-size: 1.875rem; font-weight: 700; letter-spacing: -0.02em; }
    header p { color: #9ca3af; margin-top: 0.4rem; font-size: 0.9rem; }

    .profile-photo {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      object-position: top center;
      background: #374151;
      flex-shrink: 0;
    }

    #status { color: #9ca3af; font-size: 0.9rem; padding: 2rem 0; }

    /* index grid */
    .player-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 0.75rem;
    }

    .player-card {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      text-decoration: none;
      color: #f3f4f6;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .player-card:hover { background: #263244; border-color: #4b6a9b; text-decoration: none; }
    .player-card.champion { border-color: #f59e0b; }
    .player-card.champion:hover { border-color: #fbbf24; }

    .player-photo {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      object-position: top center;
      background: #374151;
      flex-shrink: 0;
    }

    .player-photo-placeholder {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #374151;
      flex-shrink: 0;
    }

    /* toggle */
    .toggle-bar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }

    .toggle-btn {
      padding: 0.35rem 0.9rem;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 6px;
      color: #9ca3af;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .toggle-btn:hover { background: #263244; color: #d1d5db; }
    .toggle-btn.active { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }

    /* section headings */
    .section-heading {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #6b7280;
      margin: 1.75rem 0 0.6rem;
    }

    /* table wrapper */
    .table-wrap {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 12px;
      overflow-x: auto;
      margin-bottom: 0.5rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
      white-space: nowrap;
    }

    thead th {
      padding: 0.65rem 0.9rem;
      text-align: left;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #6b7280;
      border-bottom: 1px solid #374151;
      cursor: pointer;
      user-select: none;
    }

    thead th:hover { color: #d1d5db; }
    thead th[data-active="true"] { color: #93c5fd; }

    thead th .sort-arrow { margin-left: 4px; opacity: 0; font-size: 0.65rem; }
    thead th[data-active="true"] .sort-arrow { opacity: 1; }
    thead th.right { text-align: right; }

    tbody tr {
      border-bottom: 1px solid #283141;
      transition: background 0.1s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #263244; }

    td {
      padding: 0.6rem 0.9rem;
      color: #d1d5db;
    }

    td.right { text-align: right; font-variant-numeric: tabular-nums; }
    td.muted  { color: #9ca3af; }

    .career-row { border-top: 2px solid #374151 !important; }
    .career-row td { font-weight: 600; color: #f3f4f6; }

    .filter-bar {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .filter-search,
    .filter-team {
      padding: 0.5rem 0.75rem;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 8px;
      color: #f3f4f6;
      font-size: 0.875rem;
      font-family: inherit;
      outline: none;
    }

    .filter-search { flex: 1; min-width: 180px; }
    .filter-search::placeholder { color: #6b7280; }
    .filter-search:focus,
    .filter-team:focus { border-color: #3b82f6; }

    .filter-team { cursor: pointer; min-width: 140px; }

    .filter-count { color: #6b7280; font-size: 0.85rem; align-self: center; white-space: nowrap; }

    .no-results { color: #6b7280; font-size: 0.9rem; padding: 1.5rem 0; }
  </style>
</head>
<body>
<div class="page">
  <nav class="nav" id="nav"></nav>
  <header>
    <div class="header-text">
      <h1 id="page-title">Players</h1>
      <p id="page-sub"></p>
    </div>
  </header>
  <div id="content"><div id="status">Loading...</div></div>
</div>

<script>
(function () {
  const slug = new URLSearchParams(location.search).get('p');

  // ── CSV helpers ──────────────────────────────────────────────────────────────

  function parseLine(line) {
    const out = [];
    let cur = '', quoted = false;
    for (const ch of line) {
      if (ch === '"') { quoted = !quoted; }
      else if (ch === ',' && !quoted) { out.push(cur); cur = ''; }
      else { cur += ch; }
    }
    out.push(cur);
    return out;
  }

  function parseCSV(text) {
    const lines = text.trim().split('\n');
    const headers = parseLine(lines[0]).map(h => h.trim());
    return lines.slice(1).map(line => {
      const vals = parseLine(line);
      const obj = {};
      headers.forEach((h, i) => { obj[h] = (vals[i] ?? '').trim(); });
      return obj;
    });
  }

  // ── Sort helper ──────────────────────────────────────────────────────────────

  function sortVal(row, field) {
    const v = row[field];
    if (v === undefined || v === '' || v === 'NA') return -Infinity;
    if (field === 'SEASON') {
      const n = parseFloat(v);
      if (!isNaN(n)) return v.includes(' ') ? n + 0.5 : n;
    }
    const n = parseFloat(v);
    return isNaN(n) ? v.toLowerCase() : n;
  }

  // ── Season aggregation (toggle) ──────────────────────────────────────────────

  const SUM_FIELDS  = ['G','MIN','PTS','REB','AST','STL','BLK','TOV','PF','FGM','FGA','3PM','3PA','FTM','FTA','GMSC'];
  const HIGH_FIELDS = ['HIGH_P','HIGH_R','HIGH_A','HIGH_S','HIGH_B','HIGH_3PM','HIGH_GMSC'];

  function aggregateBySeasonRows(rows) {
    const map = new Map();
    rows.forEach(r => {
      if (!map.has(r.SEASON)) {
        map.set(r.SEASON, { ...r, _teams: [r.TEAM] });
      } else {
        const s = map.get(r.SEASON);
        s._teams.push(r.TEAM);
        SUM_FIELDS.forEach(f  => { s[f] = String(+s[f] + +r[f]); });
        HIGH_FIELDS.forEach(f => { s[f] = String(Math.max(+s[f], +r[f])); });
        if (r.LAST_DATE > s.LAST_DATE) s.LAST_DATE = r.LAST_DATE;
      }
    });
    return Array.from(map.values()).map(r => ({
      ...r,
      TEAM: r._teams.length > 1 ? `${r._teams.length}TM` : r._teams[0],
    }));
  }

  // ── Career summary rows ──────────────────────────────────────────────────────

  function careerStatsRow(rows) {
    const r = { SEASON: 'Career', TEAM: '—', LAST_DATE: '' };
    SUM_FIELDS.forEach(f => { r[f] = String(rows.reduce((a, row) => a + +row[f], 0)); });
    return r;
  }

  function careerHighsRow(rows) {
    const r = { SEASON: 'Career', TEAM: '—', LAST_DATE: '', G: String(rows.reduce((a, row) => a + +row.G, 0)) };
    HIGH_FIELDS.forEach(f => { r[f] = String(rows.reduce((a, row) => Math.max(a, +row[f]), 0)); });
    return r;
  }

  // ── Column definitions ───────────────────────────────────────────────────────

  const pg  = (f, d = 1) => r => (+r[f] && +r.G) ? (+r[f] / +r.G).toFixed(d) : '0';
  const pct = (m, a)     => r => +r[a] ? (+r[m] / +r[a] * 100).toFixed(1) + '%' : '—';
  const ts  = r => {
    const denom = 2 * (+r.FGA + 0.44 * +r.FTA);
    return denom ? (+r.PTS / denom * 100).toFixed(1) + '%' : '—';
  };
  const R = 'right';

  const SEASON_COLS = [
    { key: 'SEASON', label: 'Season', sortField: 'SEASON',  defaultDir: -1 },
    { key: 'TEAM',   label: 'Team',   sortField: 'TEAM',    defaultDir:  1, cls: 'muted' },
    { key: 'G',      label: 'G',      sortField: 'G',       defaultDir: -1, cls: R },
    { key: 'MPG',    label: 'MPG',    sortField: 'MIN',     defaultDir: -1, cls: R, display: pg('MIN') },
    { key: 'PPG',    label: 'PPG',    sortField: 'PTS',     defaultDir: -1, cls: R, display: pg('PTS') },
    { key: 'RPG',    label: 'RPG',    sortField: 'REB',     defaultDir: -1, cls: R, display: pg('REB') },
    { key: 'APG',    label: 'APG',    sortField: 'AST',     defaultDir: -1, cls: R, display: pg('AST') },
    { key: 'SPG',    label: 'SPG',    sortField: 'STL',     defaultDir: -1, cls: R, display: pg('STL') },
    { key: 'BPG',    label: 'BPG',    sortField: 'BLK',     defaultDir: -1, cls: R, display: pg('BLK') },
    { key: 'TOPG',   label: 'TOPG',   sortField: 'TOV',     defaultDir:  1, cls: R, display: pg('TOV') },
    { key: 'PFPG',   label: 'PFPG',   sortField: 'PF',      defaultDir:  1, cls: R, display: pg('PF')  },
    { key: 'FG',     label: 'FG%',    sortField: 'FGM',     defaultDir: -1, cls: R, display: pct('FGM','FGA') },
    { key: '3P',     label: '3P%',    sortField: '3PM',     defaultDir: -1, cls: R, display: pct('3PM','3PA') },
    { key: 'FT',     label: 'FT%',    sortField: 'FTM',     defaultDir: -1, cls: R, display: pct('FTM','FTA') },
    { key: 'TS',     label: 'TS%',    sortField: 'PTS',     defaultDir: -1, cls: R, display: ts },
    { key: 'GMSC',   label: 'GMSC',   sortField: 'GMSC',    defaultDir: -1, cls: R, display: pg('GMSC') },
    { key: 'FGMPG',  label: 'FGM',    sortField: 'FGM',     defaultDir: -1, cls: R, display: pg('FGM') },
    { key: 'FGAPG',  label: 'FGA',    sortField: 'FGA',     defaultDir: -1, cls: R, display: pg('FGA') },
    { key: '3PMPG',  label: '3PM',    sortField: '3PM',     defaultDir: -1, cls: R, display: pg('3PM') },
    { key: '3PAPG',  label: '3PA',    sortField: '3PA',     defaultDir: -1, cls: R, display: pg('3PA') },
    { key: 'FTMPG',  label: 'FTM',    sortField: 'FTM',     defaultDir: -1, cls: R, display: pg('FTM') },
    { key: 'FTAPG',  label: 'FTA',    sortField: 'FTA',     defaultDir: -1, cls: R, display: pg('FTA') },
  ];

  const HIGHS_COLS = [
    { key: 'SEASON',    label: 'Season', sortField: 'SEASON',    defaultDir: -1 },
    { key: 'TEAM',      label: 'Team',   sortField: 'TEAM',      defaultDir:  1, cls: 'muted' },
    { key: 'G',         label: 'G',      sortField: 'G',         defaultDir: -1, cls: R },
    { key: 'HIGH_P',    label: 'PTS',    sortField: 'HIGH_P',    defaultDir: -1, cls: R },
    { key: 'HIGH_R',    label: 'REB',    sortField: 'HIGH_R',    defaultDir: -1, cls: R },
    { key: 'HIGH_A',    label: 'AST',    sortField: 'HIGH_A',    defaultDir: -1, cls: R },
    { key: 'HIGH_S',    label: 'STL',    sortField: 'HIGH_S',    defaultDir: -1, cls: R },
    { key: 'HIGH_B',    label: 'BLK',    sortField: 'HIGH_B',    defaultDir: -1, cls: R },
    { key: 'HIGH_3PM',  label: '3PM',    sortField: 'HIGH_3PM',  defaultDir: -1, cls: R },
    { key: 'HIGH_GMSC', label: 'GMSC',   sortField: 'HIGH_GMSC', defaultDir: -1, cls: R,
      display: r => (+r.HIGH_GMSC).toFixed(1) },
  ];

  // ── Table builder ────────────────────────────────────────────────────────────
  // careerRow is appended after sorting and never sorted itself.
  // tiebreakerField is used as a secondary DESC sort when primary values are equal.

  function buildSection(container, title, rows, cols, defaultSortField, tiebreakerField, careerRow) {
    const h2 = document.createElement('h2');
    h2.className = 'section-heading';
    h2.textContent = title;
    container.appendChild(h2);

    const wrap = document.createElement('div');
    wrap.className = 'table-wrap';
    container.appendChild(wrap);

    let sortField = defaultSortField || cols[0].sortField;
    let sortDir = (cols.find(c => c.sortField === sortField) || cols[0]).defaultDir ?? -1;

    const table = document.createElement('table');
    const thead = table.createTHead();
    const hr = thead.insertRow();
    const thEls = [];

    cols.forEach(col => {
      const th = document.createElement('th');
      if (col.cls && col.cls.includes('right')) th.classList.add('right');
      const arrow = document.createElement('span');
      arrow.className = 'sort-arrow';
      th.appendChild(document.createTextNode(col.label ?? col.key));
      th.appendChild(arrow);
      th.addEventListener('click', () => {
        if (sortField === col.sortField) {
          sortDir *= -1;
        } else {
          sortField = col.sortField;
          sortDir = col.defaultDir ?? -1;
        }
        updateHeaders();
        rebuildBody();
      });
      thEls.push(th);
      hr.appendChild(th);
    });

    const tbody = table.createTBody();
    wrap.appendChild(table);

    function updateHeaders() {
      thEls.forEach((th, i) => {
        const active = cols[i].sortField === sortField;
        th.dataset.active = active;
        th.querySelector('.sort-arrow').textContent = active ? (sortDir === -1 ? '↓' : '↑') : '';
      });
    }

    function renderRow(tr, row) {
      cols.forEach(col => {
        const td = tr.insertCell();
        if (col.cls) td.className = col.cls;
        td.textContent = col.display ? col.display(row) : (row[col.key] ?? '');
      });
    }

    function rebuildBody() {
      const sorted = [...rows].sort((a, b) => {
        const va = sortVal(a, sortField);
        const vb = sortVal(b, sortField);
        if (va < vb) return sortDir === 1 ? -1 : 1;
        if (va > vb) return sortDir === 1 ? 1 : -1;
        if (tiebreakerField) {
          const ta = a[tiebreakerField] ?? '';
          const tb = b[tiebreakerField] ?? '';
          if (ta < tb) return 1;
          if (ta > tb) return -1;
        }
        return 0;
      });

      tbody.innerHTML = '';
      sorted.forEach(row => renderRow(tbody.insertRow(), row));

      if (careerRow) {
        const tr = tbody.insertRow();
        tr.className = 'career-row';
        renderRow(tr, careerRow);
      }
    }

    updateHeaders();
    rebuildBody();
  }

  // ── Error helper ─────────────────────────────────────────────────────────────

  function showError(msg) {
    document.getElementById('content').innerHTML = `<div id="status">${msg}</div>`;
  }

  // ── Helpers ──────────────────────────────────────────────────────────────────

  function makePlaceholder() {
    const div = document.createElement('div');
    div.className = 'player-photo-placeholder';
    return div;
  }

  // ── Render: index (player directory) ─────────────────────────────────────────

  function renderIndex(rows) {
    document.title = 'Players — NBN';
    document.getElementById('nav').innerHTML = '<a href="/">← Home</a>';
    document.getElementById('page-sub').textContent = 'Browse all players in NBN history.';

    const playerMap = new Map();
    const playerTeams = new Map();
    rows.forEach(r => {
      if (!r.SLUG) return;
      if (!playerMap.has(r.SLUG)) playerMap.set(r.SLUG, r);
      if (r.TEAM) {
        if (!playerTeams.has(r.SLUG)) playerTeams.set(r.SLUG, new Set());
        playerTeams.get(r.SLUG).add(r.TEAM);
      }
    });

    const players = [...playerMap.values()].sort((a, b) => a.PLAYER.localeCompare(b.PLAYER));
    const allTeams = [...new Set(rows.map(r => r.TEAM).filter(Boolean))].sort();

    const content = document.getElementById('content');
    content.innerHTML = '';

    const filterBar = document.createElement('div');
    filterBar.className = 'filter-bar';

    const searchInput = document.createElement('input');
    searchInput.type = 'search';
    searchInput.placeholder = 'Search players…';
    searchInput.className = 'filter-search';
    searchInput.setAttribute('autocomplete', 'off');
    filterBar.appendChild(searchInput);

    const teamSelect = document.createElement('select');
    teamSelect.className = 'filter-team';
    const defaultOpt = document.createElement('option');
    defaultOpt.value = '';
    defaultOpt.textContent = 'All teams';
    teamSelect.appendChild(defaultOpt);
    allTeams.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t;
      opt.textContent = t;
      teamSelect.appendChild(opt);
    });
    filterBar.appendChild(teamSelect);

    const resultCount = document.createElement('span');
    resultCount.className = 'filter-count';
    filterBar.appendChild(resultCount);
    content.appendChild(filterBar);

    const grid = document.createElement('div');
    grid.className = 'player-grid';
    players.forEach(p => {
      const a = document.createElement('a');
      a.className = 'player-card' + (+p.RINGS > 0 ? ' champion' : '');
      a.href = `/players/?p=${p.SLUG}`;
      a.dataset.name = p.PLAYER.toLowerCase();
      a.dataset.teams = [...(playerTeams.get(p.SLUG) || [])].join('|');

      if (p.PHOTO_URL) {
        const img = document.createElement('img');
        img.className = 'player-photo';
        img.src = p.PHOTO_URL;
        img.alt = '';
        img.onerror = function() { this.replaceWith(makePlaceholder()); };
        a.appendChild(img);
      } else {
        a.appendChild(makePlaceholder());
      }

      const name = document.createElement('span');
      name.textContent = p.PLAYER;
      a.appendChild(name);

      grid.appendChild(a);
    });
    content.appendChild(grid);

    const noResults = document.createElement('p');
    noResults.className = 'no-results';
    noResults.textContent = 'No players match your search.';
    noResults.style.display = 'none';
    content.appendChild(noResults);

    function applyFilters() {
      const q = searchInput.value.trim().toLowerCase();
      const team = teamSelect.value;
      let visible = 0;
      grid.querySelectorAll('.player-card').forEach(card => {
        const nameMatch = !q || card.dataset.name.includes(q);
        const teamMatch = !team || card.dataset.teams.split('|').includes(team);
        const show = nameMatch && teamMatch;
        card.style.display = show ? '' : 'none';
        if (show) visible++;
      });
      const total = players.length;
      resultCount.textContent = visible === total ? `${total} players` : `${visible} of ${total}`;
      noResults.style.display = visible === 0 ? '' : 'none';
    }

    applyFilters();
    searchInput.addEventListener('input', applyFilters);
    teamSelect.addEventListener('change', applyFilters);
  }

  // ── Render: player profile ────────────────────────────────────────────────────

  function renderPlayer(playerName, rows) {
    rows = [...rows].sort((a, b) => {
      const sa = parseFloat(a.SEASON) || 0;
      const sb = parseFloat(b.SEASON) || 0;
      if (sa !== sb) return sb - sa;
      const ta = a.LAST_DATE ?? '';
      const tb = b.LAST_DATE ?? '';
      return ta < tb ? 1 : ta > tb ? -1 : 0;
    });

    document.title = `${playerName} — NBN`;
    document.getElementById('nav').innerHTML =
      '<a href="/">Home</a> / <a href="/players/">Players</a> / ' + playerName;
    document.getElementById('page-title').textContent = playerName;
    const seasonCount = new Set(rows.map(r => r.SEASON)).size;
    document.getElementById('page-sub').textContent =
      `${seasonCount} season${seasonCount !== 1 ? 's' : ''} in NBN`;

    const photoUrl = rows[0].PHOTO_URL;
    const header = document.querySelector('header');
    header.querySelectorAll('.profile-photo').forEach(el => el.remove());
    if (photoUrl) {
      const img = document.createElement('img');
      img.className = 'profile-photo';
      img.src = photoUrl;
      img.alt = '';
      img.onerror = function() { this.remove(); };
      header.appendChild(img);
    }

    const content = document.getElementById('content');
    content.innerHTML = '';

    // toggle
    const toggleBar = document.createElement('div');
    toggleBar.className = 'toggle-bar';
    const btnTeam     = document.createElement('button');
    const btnSeason   = document.createElement('button');
    const btnPlayoffs = document.createElement('button');
    btnTeam.className     = 'toggle-btn active';
    btnSeason.className   = 'toggle-btn';
    btnPlayoffs.className = 'toggle-btn';
    btnTeam.textContent     = 'By Team';
    btnSeason.textContent   = 'By Season';
    btnPlayoffs.textContent = 'Playoffs';
    toggleBar.appendChild(btnTeam);
    toggleBar.appendChild(btnSeason);
    toggleBar.appendChild(btnPlayoffs);
    content.appendChild(toggleBar);

    // sections container
    const sections = document.createElement('div');
    content.appendChild(sections);

    let bySeasonMode = false;
    let showPlayoffs = false;
    let poRows = null;

    function getDisplayRows() {
      const reg = bySeasonMode ? aggregateBySeasonRows(rows) : rows;
      if (!showPlayoffs || !poRows || !poRows.length) return reg;
      const po = bySeasonMode ? aggregateBySeasonRows(poRows) : poRows;
      return [...reg, ...po];
    }

    function rebuildSections() {
      const displayRows = getDisplayRows();
      sections.innerHTML = '';
      buildSection(sections, 'Season Stats', displayRows, SEASON_COLS, 'SEASON', 'LAST_DATE', careerStatsRow(displayRows));
      buildSection(sections, 'Season Highs', displayRows, HIGHS_COLS, 'SEASON', 'LAST_DATE', careerHighsRow(displayRows));
    }

    btnTeam.addEventListener('click', () => {
      if (bySeasonMode) {
        bySeasonMode = false;
        btnTeam.classList.add('active');
        btnSeason.classList.remove('active');
        rebuildSections();
      }
    });

    btnSeason.addEventListener('click', () => {
      if (!bySeasonMode) {
        bySeasonMode = true;
        btnSeason.classList.add('active');
        btnTeam.classList.remove('active');
        rebuildSections();
      }
    });

    btnPlayoffs.addEventListener('click', () => {
      if (showPlayoffs) {
        showPlayoffs = false;
        btnPlayoffs.classList.remove('active');
        rebuildSections();
      } else if (poRows !== null) {
        showPlayoffs = true;
        btnPlayoffs.classList.add('active');
        rebuildSections();
      } else {
        fetch('/players/player_seasons_playoffs.csv')
          .then(r => { if (!r.ok) throw new Error(); return r.text(); })
          .then(text => {
            poRows = parseCSV(text).filter(r => r.SLUG === slug);
            showPlayoffs = true;
            btnPlayoffs.classList.add('active');
            rebuildSections();
          })
          .catch(() => {
            poRows = [];
          });
      }
    });

    rebuildSections();
  }

  // ── Main ─────────────────────────────────────────────────────────────────────

  fetch('/players/player_seasons.csv')
    .then(r => { if (!r.ok) throw new Error(); return r.text(); })
    .then(text => {
      const rows = parseCSV(text);

      if (!slug) {
        renderIndex(rows);
        return;
      }

      const playerRows = rows.filter(r => r.SLUG === slug);
      if (!playerRows.length) {
        showError(`Player not found: <strong>${slug}</strong>`);
        return;
      }

      renderPlayer(playerRows[0].PLAYER, playerRows);
    })
    .catch(() => showError('Failed to load data.'));
})();
</script>
</body>
</html>
