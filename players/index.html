<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/logo.png">
  <link rel="stylesheet" href="/css/shared.css">
  <title>Players — NBN</title>
  <style>

    .page { max-width: 1200px; margin: 0 auto; }

    header { margin-bottom: 0.75rem; display: flex; align-items: center; gap: 1rem; }
    .header-main { display: flex; align-items: center; gap: 1.25rem; flex: 1; }
    .header-text { display: flex; flex-direction: column; }
    .player-nav-btn {
      display: flex; align-items: center; justify-content: center;
      width: 2rem; height: 2rem; border-radius: 50%;
      background: transparent; border: 1px solid #374151;
      color: #6b7280; font-size: 1rem; cursor: pointer;
      text-decoration: none; flex-shrink: 0; line-height: 1;
    }
    .player-nav-btn:hover { border-color: #6b7280; color: #d1d5db; }
    header h1 { font-size: 1.875rem; font-weight: 700; letter-spacing: -0.02em; }
    header p { color: #9ca3af; margin-top: 0.4rem; font-size: 0.9rem; }

    .profile-photo {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      object-position: top center;
      background: #374151;
      flex-shrink: 0;
    }

    #status { color: #9ca3af; font-size: 0.9rem; padding: 2rem 0; }

    /* index grid */
    .player-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 0.75rem;
    }

    .player-card {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      text-decoration: none;
      color: #f3f4f6;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .player-card:hover { background: #263244; border-color: #4b6a9b; text-decoration: none; }
    .player-card.champion { border-color: #f59e0b; }
    .player-card.champion:hover { border-color: #fbbf24; }

    .player-photo {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      object-position: top center;
      background: #374151;
      flex-shrink: 0;
    }

    .player-photo-placeholder {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #374151;
      flex-shrink: 0;
    }

    /* bio line */
    .bio-line {
      color: #9ca3af;
      font-size: 0.82rem;
      margin-bottom: 0.9rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem 0.5rem;
      align-items: center;
    }
    .bio-sep { color: #4b5563; }

    /* accolades */
    .accolades {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 1.1rem;
    }

    .badge {
      padding: 0.18rem 0.6rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
      white-space: nowrap;
      cursor: default;
    }

    .ovr-badge {
      padding: 0.35rem 1rem;
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      border-radius: 10px;
    }

    /* toggle */
    .toggle-bar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }

    .toggle-btn {
      padding: 0.35rem 0.9rem;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 6px;
      color: #9ca3af;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .toggle-btn:hover { background: #263244; color: #d1d5db; }
    .toggle-btn.active { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }

    /* section headings */
    .section-heading {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #6b7280;
      margin: 1.75rem 0 0.6rem;
    }

    /* table wrapper */
    .table-wrap {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 12px;
      overflow-x: auto;
      margin-bottom: 0.5rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
      white-space: nowrap;
    }

    thead th {
      padding: 0.65rem 0.9rem;
      text-align: left;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #6b7280;
      border-bottom: 1px solid #374151;
      cursor: pointer;
      user-select: none;
    }

    thead th .sort-arrow { margin-left: 4px; opacity: 0; font-size: 0.65rem; }
    thead th[data-active="true"] .sort-arrow { opacity: 1; }

    tbody tr {
      border-bottom: 1px solid #283141;
      transition: background 0.1s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #263244; }

    td {
      padding: 0.6rem 0.9rem;
      color: #d1d5db;
    }

    td.right { text-align: right; font-variant-numeric: tabular-nums; }
    td.muted  { color: #9ca3af; }

    td.league-leader {
      font-weight: 700;
      color: #fcd34d;
    }

    .row-icon { font-size: 0.78em; margin-left: 4px; vertical-align: middle; }

    .career-row { border-top: 2px solid #374151 !important; }
    .career-row td { font-weight: 600; color: #f3f4f6; }

    .page-tabs {
      display: flex;
      gap: 0.35rem;
      margin-bottom: 1rem;
    }

    .page-tab {
      padding: 0.3rem 0.75rem;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 6px;
      color: #9ca3af;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .page-tab:hover { background: #263244; color: #d1d5db; }
    .page-tab.active { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }

    .missing-bar {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .missing-bar-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #4b5563;
      margin-right: 0.1rem;
    }

    .missing-btn {
      padding: 0.3rem 0.75rem;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 6px;
      color: #9ca3af;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .missing-btn:hover { background: #263244; color: #d1d5db; }
    .missing-btn.active { background: #451a03; border-color: #d97706; color: #fcd34d; }

    .rostered-btn {
      padding: 0.3rem 0.75rem;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 6px;
      color: #9ca3af;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .rostered-btn:hover { background: #263244; color: #d1d5db; }
    .rostered-btn.active { background: #052e16; border-color: #16a34a; color: #86efac; }

    .filter-bar {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .filter-search,
    .filter-team {
      padding: 0.5rem 0.75rem;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 8px;
      color: #f3f4f6;
      font-size: 0.875rem;
      font-family: inherit;
      outline: none;
    }

    .filter-search { flex: 1; min-width: 180px; }
    .filter-search::placeholder { color: #6b7280; }
    .filter-search:focus,
    .filter-team:focus { border-color: #3b82f6; }

    .filter-team { cursor: pointer; min-width: 140px; }

    .filter-count { color: #6b7280; font-size: 0.85rem; align-self: center; white-space: nowrap; }

    .no-results { color: #6b7280; font-size: 0.9rem; padding: 1.5rem 0; }

    /* player index table */
    .player-name-cell {
      display: flex;
      align-items: center;
      gap: 0.65rem;
    }

    .player-photo-sm {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      object-position: top center;
      background: #374151;
      flex-shrink: 0;
    }

    .player-placeholder-sm {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #374151;
      flex-shrink: 0;
    }

    .champion-name { color: #f59e0b; }

    tbody tr.clickable-row { cursor: pointer; }

    /* bio edit form */
    .bio-edit-form {
      background: #111827; border: 1px solid #374151; border-radius: 10px;
      padding: 0.9rem 1.1rem; margin-top: 0.5rem; margin-bottom: 0.75rem;
      display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem 1rem;
    }
    @media (max-width: 500px) { .bio-edit-form { grid-template-columns: 1fr; } }
    .bio-edit-form label {
      display: flex; flex-direction: column; gap: 0.2rem;
      font-size: 0.7rem; color: #6b7280; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .bio-edit-form input {
      background: #1f2937; border: 1px solid #374151; border-radius: 6px;
      color: #f3f4f6; font-size: 0.85rem; font-family: inherit;
      padding: 0.32rem 0.55rem; outline: none;
    }
    .bio-edit-form input:focus { border-color: #3b82f6; }
    .bio-edit-form select {
      background: #1f2937; border: 1px solid #374151; border-radius: 6px;
      color: #f3f4f6; font-size: 0.85rem; font-family: inherit;
      padding: 0.32rem 0.55rem; outline: none; cursor: pointer;
    }
    .bio-edit-form select:focus { border-color: #3b82f6; }
    .salary-rows { display: flex; flex-direction: column; gap: 0.4rem; margin-top: 0.25rem; }
    .salary-row { display: flex; flex-direction: column; gap: 0.2rem; }
    .salary-row-main { display: flex; gap: 0.4rem; align-items: center; }
    .salary-row-main input { background: #1f2937; border: 1px solid #374151; border-radius: 6px;
      color: #f3f4f6; font-size: 0.85rem; font-family: inherit; padding: 0.32rem 0.55rem; outline: none; }
    .salary-row-main input:focus { border-color: #3b82f6; }
    .salary-row-main .season-input { width: 5.5rem; flex: 0 0 auto; }
    .salary-row-main .amount-input { flex: 1; }
    .salary-row-main .hold-select {
      background: #1f2937; border: 1px solid #374151; border-radius: 6px;
      color: #9ca3af; font-size: 0.8rem; font-family: inherit;
      padding: 0.32rem 0.4rem; outline: none; cursor: pointer; flex: 0 0 auto;
    }
    .salary-row-main .hold-select:focus { border-color: #3b82f6; }
    /* Guarantee steps */
    .gtd-steps { display: none; flex-direction: column; gap: 0.3rem; margin-left: 1rem; padding: 0.4rem 0.6rem; background: rgba(0,0,0,0.2); border-left: 2px solid #374151; border-radius: 0 4px 4px 0; }
    .gtd-steps.visible { display: flex; }
    .gtd-steps-desc { font-size: 0.68rem; color: #6b7280; font-style: italic; margin-bottom: 0.15rem; }
    .gtd-step { display: flex; gap: 0.35rem; align-items: center; }
    .gtd-step-conn { font-size: 0.72rem; color: #6b7280; white-space: nowrap; flex-shrink: 0; }
    .gtd-step input { background: #1f2937; border: 1px solid #374151; border-radius: 6px; color: #f3f4f6; font-size: 0.8rem; font-family: inherit; padding: 0.28rem 0.5rem; outline: none; }
    .gtd-step input:focus { border-color: #3b82f6; }
    .gtd-step .gtd-step-amount { width: 9rem; }
    .gtd-step .gtd-step-date { width: 9.5rem; }
    .gtd-step .gtd-step-remove { background: none; border: none; color: #6b7280; cursor: pointer; font-size: 1rem; padding: 0 0.2rem; line-height: 1; }
    .gtd-step .gtd-step-remove:hover { color: #ef4444; }
    .add-step-btn { align-self: flex-start; background: none; border: 1px dashed #374151; border-radius: 3px; color: #6b7280; cursor: pointer; font-size: 0.7rem; padding: 0.1rem 0.5rem; font-family: inherit; }
    .add-step-btn:hover { color: #d1d5db; border-color: #9ca3af; }
    .bio-edit-form .full-col { grid-column: 1 / -1; }
    .field-hint { font-size: 0.68rem; color: #6b7280; margin-top: 0.2rem; line-height: 1.4; }
    .bio-edit-actions {
      grid-column: 1 / -1; display: flex; gap: 0.5rem; align-items: center; padding-top: 0.1rem;
    }
    .edit-btn {
      padding: 0.28rem 0.7rem; border-radius: 6px; font-size: 0.78rem;
      font-weight: 600; cursor: pointer; font-family: inherit; border: 1px solid;
    }
    .edit-btn-primary { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }
    .edit-btn-primary:hover { background: #223f70; }
    .edit-btn-secondary { background: transparent; border-color: #374151; color: #9ca3af; }
    .edit-btn-secondary:hover { color: #d1d5db; border-color: #6b7280; }
    .edit-status { font-size: 0.75rem; color: #ef4444; }
    .btn-edit-bio {
      display: block; padding: 0.15rem 0.45rem; border-radius: 4px; background: transparent;
      border: 1px solid #374151; color: #6b7280; font-size: 0.7rem; font-weight: 600;
      cursor: pointer; font-family: inherit; margin: 0.5rem 0 0.75rem;
    }
    .btn-edit-bio:hover { color: #d1d5db; border-color: #6b7280; }
    .salary-table { width: 100%; border-collapse: collapse; margin: 1rem 0 0.5rem; font-size: 0.85rem; }
    .salary-table th { text-align: left; color: #6b7280; font-weight: 600; font-size: 0.7rem;
      text-transform: uppercase; letter-spacing: 0.05em; padding: 0.3rem 0.6rem; border-bottom: 1px solid #374151; }
    .salary-table th.right, .salary-table td.right { text-align: right; }
    .salary-table td { padding: 0.35rem 0.6rem; border-bottom: 1px solid #1f2937; color: #d1d5db; }
    .salary-table tr.total-row td { border-top: 1px solid #374151; border-bottom: none;
      color: #f3f4f6; font-weight: 700; padding-top: 0.5rem; }
    .salary-table td.hold-label { font-size: 0.7rem; color: #9ca3af; padding-left: 0.5rem; }
    .cap-ufa        td { background: hsl(45,  35%, 14%); }
    .cap-rfa        td { background: hsl(25,  35%, 14%); }
    .cap-player-opt td { background: hsl(120, 30%, 13%); }
    .cap-team-opt   td { background: hsl(210, 35%, 14%); }
    .cap-non-gtd    td { background: #1a1f2b; }
    .dead-cap-row   td { background: hsl(0, 25%, 13%); color: #f87171; }
    .dead-cap-row td.hold-label { color: #f87171; opacity: 0.7; }
    .btn-add-player {
      padding: 0.35rem 0.75rem; background: #1e3a5f; border: 1px solid #3b82f6;
      border-radius: 6px; color: #93c5fd; font-size: 0.78rem; font-weight: 600;
      cursor: pointer; font-family: inherit; white-space: nowrap;
    }
    .btn-add-player:hover { background: #223f70; }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.65);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    .modal-card {
      background: #1f2937; border: 1px solid #374151; border-radius: 12px;
      padding: 1.5rem; width: min(540px, 92vw); max-height: 88vh; overflow-y: auto;
    }
    .modal-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; }
    .slug-field {
      display: flex; flex-direction: column; gap: 0.2rem; margin-bottom: 0.75rem;
      font-size: 0.7rem; color: #6b7280; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .slug-field input {
      background: #111827; border: 1px solid #374151; border-radius: 6px;
      color: #f3f4f6; font-size: 0.85rem; font-family: inherit;
      padding: 0.32rem 0.55rem; outline: none;
    }
    .slug-field input:focus { border-color: #3b82f6; }
    .slug-exists-warn {
      display: none; margin-top: 0.3rem; padding: 0.4rem 0.6rem;
      background: #431407; border: 1px solid #7c2d12; border-radius: 6px;
      color: #fca5a5; font-size: 0.78rem; font-weight: 400;
      text-transform: none; letter-spacing: 0;
    }
    .slug-exists-warn a { color: #fca5a5; text-decoration: underline; }
    .pos-picker { display: flex; gap: 0.35rem; flex-wrap: wrap; margin-top: 0.25rem; }
    .pos-pill {
      padding: 0.18rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 700;
      cursor: pointer; font-family: inherit; border: 1px solid #374151;
      background: transparent; color: #6b7280;
    }
    .pos-pill.selected { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }
    .pos-pill:hover:not(.selected) { border-color: #6b7280; color: #9ca3af; }
    .pos-display { display: flex; gap: 0.35rem; flex-wrap: wrap; margin-bottom: 0.5rem; align-items: center; }
    .retired-tag {
      padding: 0.15rem 0.45rem; border-radius: 4px; font-size: 0.72rem; font-weight: 700;
      border: 1px solid #4b5563; background: #1f2937; color: #9ca3af; letter-spacing: 0.04em;
    }
    .pos-tag {
      padding: 0.15rem 0.45rem; border-radius: 4px; font-size: 0.72rem; font-weight: 700;
      border: 1px solid #3b82f6; background: #1e3a5f; color: #93c5fd;
    }
    .pos-tag-dim {
      padding: 0.15rem 0.45rem; border-radius: 4px; font-size: 0.72rem; font-weight: 700;
      border: 1px solid #2d3748; background: transparent; color: #374151;
    }
    .current-team {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.22rem 0.65rem 0.22rem 0.45rem;
      background: #1f2937; border: 1px solid #374151; border-radius: 999px;
      color: #9ca3af; font-size: 0.8rem; font-weight: 600;
      text-decoration: none; margin: 0.5rem 0 0.6rem; width: fit-content;
    }
    .current-team:hover { border-color: #6b7280; color: #d1d5db; text-decoration: none; }
    .current-team img { width: 18px; height: 18px; object-fit: contain; }

    .ovr-wrap { display: flex; align-items: center; gap: 0.5rem; margin: 0.5rem 0 0.75rem; flex-wrap: wrap; }
    .ovr-chart { background: #1f2937; border: 1px solid #374151; border-radius: 8px; padding: 0.5rem 0.75rem 0.25rem; margin-bottom: 0.75rem; }
    .ovr-edit-row { display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; }
    .ovr-edit-row input { background: #1f2937; border: 1px solid #374151; border-radius: 6px;
      color: #f3f4f6; font-size: 0.8rem; font-family: inherit; padding: 0.28rem 0.45rem; outline: none; }
    .ovr-edit-row input:focus { border-color: #3b82f6; }
    .ovr-edit-row input[type=number] { width: 4.5rem; }
    .txn-badge { display: inline-block; padding: 0.15rem 0.45rem; border-radius: 4px;
      font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }
    .txn-badge-sign    { background: #064e3b; color: #34d399; }
    .txn-badge-pick    { background: #1e3a5f; color: #93c5fd; }
    .txn-badge-option  { background: #431407; color: #fb923c; }
    .txn-badge-release { background: #450a0a; color: #f87171; }
    .txn-badge-convert_twoway { background: #1c1917; color: #a8a29e; }
    .txn-badge-trade   { background: #2e1065; color: #c084fc; }
    .txn-table-details { color: #9ca3af; font-size: 0.8rem; }
    .txn-table-details a { color: #93c5fd; text-decoration: none; }
    .txn-table-details a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="page">
  <nav class="nav" id="nav"></nav>
  <header>
    <div class="header-main">
      <div class="header-text">
        <h1 id="page-title">Players</h1>
        <p id="page-sub"></p>
      </div>
    </div>
  </header>
  <div id="content"><div id="status">Loading...</div></div>
</div>

<script>
(function () {
  const slug = new URLSearchParams(location.search).get('p');

  let biosData = {};
  let teamMap = {};
  let currentOvr = {};
  let allOvrHistory = {};

  const TEAM_NAMES = {
    ATL:'Atlanta Hawks', BKN:'Brooklyn Nets', BOS:'Boston Celtics', CHA:'Charlotte Hornets',
    CHI:'Chicago Bulls', CLE:'Cleveland Cavaliers', DAL:'Dallas Mavericks', DEN:'Denver Nuggets',
    DET:'Detroit Pistons', GSW:'Golden State Warriors', HOU:'Houston Rockets', IND:'Indiana Pacers',
    LAC:'LA Clippers', LAL:'Los Angeles Lakers', MEM:'Memphis Grizzlies', MIA:'Miami Heat',
    MIL:'Milwaukee Bucks', MIN:'Minnesota Timberwolves', NOP:'New Orleans Pelicans', NYK:'New York Knicks',
    OKC:'Oklahoma City Thunder', ORL:'Orlando Magic', PHI:'Philadelphia 76ers', PHX:'Phoenix Suns',
    POR:'Portland Trail Blazers', SAC:'Sacramento Kings', SAS:'San Antonio Spurs', TOR:'Toronto Raptors',
    UTA:'Utah Jazz', WAS:'Washington Wizards',
  };

  // ── Bio name helpers ─────────────────────────────────────────────────────────

  function displayName(canonical) {
    const i = canonical.indexOf(', ');
    return i > 0 ? canonical.slice(i + 2) + ' ' + canonical.slice(0, i) : canonical;
  }

  function slugFromName(canonical) {
    return displayName(canonical).toLowerCase()
      .normalize('NFD').replace(/[̀-ͯ]/g, '')
      .replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  }

  function sortVal(row, field) {
    const v = row[field];
    if (v === undefined || v === '' || v === 'NA') return -Infinity;
    if (field === 'SEASON') {
      const n = parseFloat(v);
      if (!isNaN(n)) return v.includes(' ') ? n + 0.5 : n;
    }
    const n = parseFloat(v);
    return isNaN(n) ? v.toLowerCase() : n;
  }

  // ── Age helper ───────────────────────────────────────────────────────────────

  function ageAtSeason(dob, season) {
    if (!dob || dob === 'NA') return '';
    const m = season && season.match(/\d{2}-(\d{2})/);
    if (!m) return '';
    const ref = new Date(2000 + parseInt(m[1], 10), 0, 1); // Jan 1 of end year
    const d = new Date(dob + 'T00:00:00');
    if (isNaN(d)) return '';
    let age = ref.getFullYear() - d.getFullYear();
    const mo = ref.getMonth() - d.getMonth();
    if (mo < 0 || (mo === 0 && ref.getDate() < d.getDate())) age--;
    return String(age);
  }

  // ── Season aggregation (toggle) ──────────────────────────────────────────────

  const SUM_FIELDS  = ['G','MIN','PTS','REB','AST','STL','BLK','TOV','PF','FGM','FGA','3PM','3PA','FTM','FTA','GMSC'];
  const HIGH_FIELDS = ['HIGH_P','HIGH_R','HIGH_A','HIGH_S','HIGH_B','HIGH_3PM','HIGH_GMSC'];

  function aggregateBySeasonRows(rows) {
    const map = new Map();
    rows.forEach(r => {
      if (!map.has(r.SEASON)) {
        map.set(r.SEASON, { ...r, _teams: [r.TEAM] });
      } else {
        const s = map.get(r.SEASON);
        s._teams.push(r.TEAM);
        SUM_FIELDS.forEach(f  => { s[f] = String(+s[f] + +r[f]); });
        HIGH_FIELDS.forEach(f => { s[f] = String(Math.max(+s[f], +r[f])); });
        if (r.LAST_DATE > s.LAST_DATE) s.LAST_DATE = r.LAST_DATE;
      }
    });
    return Array.from(map.values()).map(r => ({
      ...r,
      TEAM: r._teams.length > 1 ? `${r._teams.length}TM` : r._teams[0],
    }));
  }

  function careerStatsRow(rows) {
    const r = { SEASON: 'Career', TEAM: '—', LAST_DATE: '' };

  function careerHighsRow(rows) {
    const r = { SEASON: 'Career', TEAM: '—', LAST_DATE: '', G: String(rows.reduce((a, row) => a + +row.G, 0)) };
    HIGH_FIELDS.forEach(f => { r[f] = String(rows.reduce((a, row) => Math.max(a, +row[f]), 0)); });

  // ── Season leaders ───────────────────────────────────────────────────────────

  const LEADER_STATS = ['PTS', 'REB', 'AST', 'STL', 'BLK', '3PM', 'GMSC'];

  function buildSeasonLeaders(allRows) {
    const bySlugSeason = new Map();
    allRows.forEach(r => {
      if (!r.SLUG || !r.SEASON || r.SEASON.includes('Playoffs')) return;
      const key = r.SLUG + '|' + r.SEASON;
      if (!bySlugSeason.has(key)) {
        bySlugSeason.set(key, { SLUG: r.SLUG, SEASON: r.SEASON, PTS: 0, REB: 0, AST: 0, STL: 0, BLK: 0, '3PM': 0, GMSC: 0 });
      }
      const s = bySlugSeason.get(key);
      LEADER_STATS.forEach(f => { s[f] += +r[f] || 0; });
    });
    const leaders = {};
    for (const row of bySlugSeason.values()) {
      const season = row.SEASON;
      if (!leaders[season]) leaders[season] = {};
      LEADER_STATS.forEach(f => {
        const v = row[f];
        if (!leaders[season][f] || v > leaders[season][f].val) {
          leaders[season][f] = { slug: row.SLUG, val: v };
        }
      });
    }
    return leaders;
  }

  // ── Table builder ────────────────────────────────────────────────────────────

  function buildSection(container, title, rows, cols, defaultSortField, tiebreakerField, careerRow, leaderCheck, iconFn) {
    const h2 = document.createElement('h2');
    h2.className = 'section-heading';
    h2.textContent = title;
    container.appendChild(h2);

    const wrap = document.createElement('div');
    wrap.className = 'table-wrap';
    container.appendChild(wrap);

    let sortField = defaultSortField || cols[0].sortField;
    let sortDir = (cols.find(c => c.sortField === sortField) || cols[0]).defaultDir ?? -1;

    const table = document.createElement('table');
    const thead = table.createTHead();
    const hr = thead.insertRow();
    const thEls = [];

    cols.forEach(col => {
      const th = document.createElement('th');
      if (col.cls && col.cls.includes('right')) th.classList.add('right');
      const arrow = document.createElement('span');
      arrow.className = 'sort-arrow';
      th.appendChild(document.createTextNode(col.label ?? col.key));
      th.appendChild(arrow);
      th.addEventListener('click', () => {
        if (sortField === col.sortField) {
          sortDir *= -1;
        } else {
          sortField = col.sortField;
          sortDir = col.defaultDir ?? -1;
        }
        updateHeaders();
        rebuildBody();
      });
      thEls.push(th);
      hr.appendChild(th);
    });

    const tbody = table.createTBody();
    wrap.appendChild(table);

    function updateHeaders() {
      thEls.forEach((th, i) => {
        const active = cols[i].sortField === sortField;
        th.dataset.active = active;
        th.querySelector('.sort-arrow').textContent = active ? (sortDir === -1 ? '↓' : '↑') : '';
      });
    }

    function renderRow(tr, row, isCareer) {
      cols.forEach(col => {
        const td = tr.insertCell();
        if (col.cls) td.className = col.cls;
        td.textContent = col.display ? col.display(row) : (row[col.key] ?? '');
        if (!isCareer && leaderCheck && leaderCheck(row, col)) {
          td.classList.add('league-leader');
        }
        if (!isCareer && col.iconSlot && iconFn) {
          iconFn(row).forEach(icon => {
            const span = document.createElement('span');
            span.className = 'row-icon';
            span.textContent = icon;
            td.appendChild(span);
          });
        }
      });
    }

    function rebuildBody() {
      const sorted = [...rows].sort((a, b) => {
        const va = sortVal(a, sortField);
        const vb = sortVal(b, sortField);
        if (va < vb) return sortDir === 1 ? -1 : 1;
        if (va > vb) return sortDir === 1 ? 1 : -1;
        if (tiebreakerField) {
          const ta = a[tiebreakerField] ?? '';
          const tb = b[tiebreakerField] ?? '';
          if (ta < tb) return 1;
          if (ta > tb) return -1;
        }
        return 0;
      });

      tbody.innerHTML = '';
      sorted.forEach(row => renderRow(tbody.insertRow(), row, false));

      if (careerRow) {
        const tr = tbody.insertRow();
        tr.className = 'career-row';
        renderRow(tr, careerRow, true);
      }
    }

    updateHeaders();
    rebuildBody();
  }

      main.appendChild(seasonIn); main.appendChild(amountIn); main.appendChild(holdSel); main.appendChild(removeBtn);
      row.appendChild(main);

      // Guarantee steps section
      const stepsDiv = document.createElement('div');
      stepsDiv.className = 'gtd-steps' + ((holdType || '') === 'NON_GTD' ? ' visible' : '');

      const stepsDesc = document.createElement('div');
      stepsDesc.className = 'gtd-steps-desc';
      stepsDesc.textContent = 'What\'s owed if released — separate from the cap hit above. Each step adds to the dead cap total on its date. Leave amount blank = full remaining salary becomes guaranteed.';
      stepsDiv.appendChild(stepsDesc);

      function addGuaranteeStep(amt, dt) {
        const stepRow = document.createElement('div');
        stepRow.className = 'gtd-step';

        const amtIn = document.createElement('input');
        amtIn.type = 'text'; amtIn.className = 'gtd-step-amount';
        amtIn.placeholder = '$ partial amount';
        amtIn.title = 'Dollar amount that vests on this date. Leave blank to guarantee the full remaining salary.';
        amtIn.value = amt || '';

        const connOn = document.createElement('span');
        connOn.className = 'gtd-step-conn'; connOn.textContent = 'on';

        const dateIn = document.createElement('input');
        dateIn.type = 'date'; dateIn.className = 'gtd-step-date';
        dateIn.title = 'Date this amount vests. Leave blank for "at signing".';
        dateIn.value = dt || '';

        const rmBtn = document.createElement('button');
        rmBtn.type = 'button'; rmBtn.className = 'gtd-step-remove'; rmBtn.textContent = '×';
        rmBtn.addEventListener('click', () => stepRow.remove());

        const dateHint = document.createElement('span');
        dateHint.className = 'gtd-step-conn';
        dateHint.textContent = '(blank = at signing)';

        stepRow.appendChild(amtIn);
        stepRow.appendChild(connOn);
        stepRow.appendChild(dateIn);
        stepRow.appendChild(dateHint);
        stepRow.appendChild(rmBtn);
        stepsDiv.insertBefore(stepRow, addStepBtn);
      }

      const addStepBtn = document.createElement('button');
      addStepBtn.type = 'button'; addStepBtn.className = 'add-step-btn';
      addStepBtn.textContent = '+ guarantee step';
      addStepBtn.addEventListener('click', () => addGuaranteeStep());
      stepsDiv.appendChild(addStepBtn);

      holdSel.addEventListener('change', () => {
        const on = holdSel.value === 'NON_GTD';
        stepsDiv.classList.toggle('visible', on);
        if (!on) stepsDiv.querySelectorAll('.gtd-step').forEach(s => s.remove());
      });

      // Pre-populate steps
      if (Array.isArray(steps) && steps.length) {
        steps.forEach(s => addGuaranteeStep(s.amount, s.date));
      }

      row.appendChild(stepsDiv);
      return row;
    }

    const initCapMap = initial.cap_holds || {};
    const initSalaries = (initial.salaries && typeof initial.salaries === 'object') ? initial.salaries : {};
    const initGuaranteed = (initial.guaranteed && typeof initial.guaranteed === 'object') ? initial.guaranteed : {};
    const initGuaranteeDates = (initial.guarantee_dates && typeof initial.guarantee_dates === 'object') ? initial.guarantee_dates : {};
    const initGuaranteeSchedule = (initial.guarantee_schedule && typeof initial.guarantee_schedule === 'object') ? initial.guarantee_schedule : {};
    Object.entries(initSalaries).sort(([a], [b]) => a.localeCompare(b))
      .forEach(([k, v]) => {
        // Use guarantee_schedule if present; otherwise convert legacy guaranteed/guarantee_dates to steps
        let steps = initGuaranteeSchedule[k] || null;
        if (!steps) {
          const oldAmt  = initGuaranteed[k];
          const oldDate = initGuaranteeDates[k];
          if (oldAmt || oldDate) {
            steps = [];
            if (oldAmt)  steps.push({ amount: oldAmt });
            if (oldDate) steps.push({ date: oldDate });
          }
        }
        salRows.appendChild(makeSalaryRow(k, v, initCapMap[k] || '', steps));
      });

    const addSalBtn = document.createElement('button');
    addSalBtn.type = 'button'; addSalBtn.textContent = '+ Add season';
    addSalBtn.style.cssText = 'background:none;border:1px dashed #374151;border-radius:4px;color:#6b7280;cursor:pointer;font-size:0.75rem;padding:0.2rem 0.6rem;font-family:inherit;margin-top:0.25rem;width:fit-content';
    addSalBtn.onmouseenter = () => { addSalBtn.style.color = '#d1d5db'; addSalBtn.style.borderColor = '#9ca3af'; };
    addSalBtn.onmouseleave = () => { addSalBtn.style.color = '#6b7280'; addSalBtn.style.borderColor = '#374151'; };
    addSalBtn.addEventListener('click', () => {
      const existing = salRows.querySelectorAll('.season-input');
      let next = '';
      if (existing.length) {
        const m = existing[existing.length - 1].value.match(/^(\d{2})-(\d{2})$/);
        if (m) next = `${m[2]}-${String(+m[2] + 1).padStart(2, '0')}`;
      } else {
        const yr = new Date().getMonth() >= 7 ? new Date().getFullYear() + 1 : new Date().getFullYear();
        next = `${String(yr).slice(-2)}-${String(yr + 1).slice(-2)}`;
      }
      salRows.appendChild(makeSalaryRow(next, ''));
    });
    salLbl.appendChild(salRows); salLbl.appendChild(addSalBtn);
    form.appendChild(salLbl);

    // Toggle salary rows vs two-way shorthand
    typeSelect.addEventListener('change', () => {
      const isTW = typeSelect.value === 'two-way';
      twowayDiv.style.display = isTW ? '' : 'none';
      salLbl.style.display = isTW ? 'none' : '';
    });
    if ((initial.type || '') === 'two-way') {
      twowayDiv.style.display = '';
      salLbl.style.display = 'none';
      // Pre-fill years/start from existing salary data if it matches expected pattern
      const zeroYears = Object.entries(initSalaries).filter(([, v]) => v === '$0').map(([k]) => k).sort();
      if (zeroYears.length) { twStart.value = zeroYears[0]; twYears.value = String(zeroYears.length); }
    }

    if (onNameChange) fName.addEventListener('input', () => onNameChange(fName.value));

    const actions = document.createElement('div');
    actions.className = 'bio-edit-actions';
    const saveBtn = document.createElement('button');
    saveBtn.className = 'edit-btn edit-btn-primary';
    saveBtn.textContent = 'Save';
    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'edit-btn edit-btn-secondary';
    cancelBtn.textContent = 'Cancel';
    const status = document.createElement('span');
    status.className = 'edit-status';
    actions.appendChild(saveBtn);
    actions.appendChild(cancelBtn);
    actions.appendChild(status);
    form.appendChild(actions);

    cancelBtn.addEventListener('click', onCancel);
    saveBtn.addEventListener('click', async () => {
      const token = getToken();
      if (!token) return;
      const salaries = {};
      const cap_holds = {};
      const guaranteed = {};
      const guarantee_schedule = {};
      if (typeSelect.value === 'two-way') {
        const yrs = parseInt(twYears.value) || 0;
        let s = twStart.value.trim();
        for (let i = 0; i < yrs; i++) {
          salaries[s] = '$0'; guaranteed[s] = '$0';
          const m = s.match(/^(\d{2})-(\d{2})$/);
          s = m ? `${m[2]}-${String((+m[2] + 1) % 100).padStart(2, '0')}` : '';
        }
        if (s) { salaries[s] = '$1'; cap_holds[s] = 'RFA'; }
      } else {
        salRows.querySelectorAll('.salary-row').forEach(row => {
          const season  = row.querySelector('.season-input').value.trim();
          const amount  = row.querySelector('.amount-input').value.trim();
          const hold    = row.querySelector('.hold-select').value;
          if (season && amount) salaries[season] = amount;
          if (season && hold)   cap_holds[season] = hold;
          if (season && hold === 'NON_GTD') {
            const steps = [];
            row.querySelectorAll('.gtd-step').forEach(step => {
              const sAmt  = step.querySelector('.gtd-step-amount').value.trim();
              const sDate = step.querySelector('.gtd-step-date').value.trim();
              const entry = {};
              if (sAmt)  entry.amount = sAmt;
              if (sDate) entry.date   = sDate;
              steps.push(entry);
            });
            if (steps.length) guarantee_schedule[season] = steps;
          }
        });
      }
      const payload = {
        name:        fName.value.trim(),
        pos:         [...selectedPos],
        dob:         fDob.value.trim(),
        college:     fCollege.value.trim(),
        country:     fCountry.value.trim(),
        draft_year:  fDftYr.value  ? +fDftYr.value  : null,
        draft_round: fDftR.value   ? +fDftR.value   : null,
        draft_pick:  fDftP.value   ? +fDftP.value   : null,
        height:      fHeight.value.trim(),
        weight:      fWeight.value  ? +fWeight.value  : null,
        wingspan:    fWingspan.value.trim(),
        photo_url:   fPhoto.value.trim(),
        retired:     retiredCb.checked,
        notes:       fNotes.value.trim(),
        jersey_number: initial.jersey_number ?? null,
        type:        typeSelect.value,
        cap_holds,
        salaries,
        guaranteed,
        guarantee_schedule,
      };
      if (!payload.name) { status.textContent = 'Name is required.'; return; }
      saveBtn.disabled = true;
      status.textContent = 'Saving…';
      try {
        await onSave(token, payload);
      } catch (e) {
        status.textContent = e.message || 'Save failed.';
        saveBtn.disabled = false;
      }
    });

    return form;
  }

  // ── Add player modal ──────────────────────────────────────────────────────────

  function showAddPlayerModal() {
    const token = getToken();
    if (!token) return;

    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    const card = document.createElement('div');
    card.className = 'modal-card';

    const h3 = document.createElement('h3');
    h3.textContent = 'Add Player';
    card.appendChild(h3);

    const slugLabel = document.createElement('label');
    slugLabel.className = 'slug-field';
    slugLabel.textContent = 'Slug (auto-derived, editable)';
    const slugInput = document.createElement('input');
    slugInput.type = 'text';

    const slugWarn = document.createElement('div');
    slugWarn.className = 'slug-exists-warn';

    function checkSlugExists() {
      const sl = slugInput.value.trim();
      if (sl && biosData[sl]) {
        const existing = biosData[sl];
        const displayN = existing.name ? displayName(existing.name) : sl;
        slugWarn.innerHTML = `⚠ <strong>${displayN}</strong> already exists — <a href="/players/?p=${sl}" target="_blank">view profile</a>`;
        slugWarn.style.display = '';
        slugInput.style.borderColor = '#ef4444';
      } else {
        slugWarn.style.display = 'none';
        slugInput.style.borderColor = '';
      }
    }

    slugInput.addEventListener('input', checkSlugExists);
    slugLabel.appendChild(slugInput);
    slugLabel.appendChild(slugWarn);
    card.appendChild(slugLabel);

    const form = renderBioForm(
      { name: '', pos: [], dob: '', college: '', country: '', draft_year: null, draft_round: null, draft_pick: null, photo_url: '', type: '', cap_holds: {}, salaries: {} },
      async (token, payload) => {
        const sl = slugInput.value.trim();
        if (!sl) throw new Error('Slug is required.');
        const resp = await fetch('/api/players', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ ...payload, slug: sl }),
        });
        if (resp.status === 403) { clearToken(); throw new Error('Token rejected.'); }
        if (resp.status === 409) throw new Error('A player with this slug already exists.');
        if (!resp.ok) { const d = await resp.json().catch(() => ({})); throw new Error(d.detail || 'Save failed.'); }
        location.reload();
      },
      () => overlay.remove(),
      (nameVal) => { slugInput.value = slugFromName(nameVal); checkSlugExists(); }
    );

    card.appendChild(form);
    overlay.appendChild(card);
    document.body.appendChild(overlay);
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  }

  // ── Bio section ──────────────────────────────────────────────────────────────

  function formatSalary(v) {
    if (!v && v !== 0) return '—';
    const s = String(v).trim();
    if (!s || s === '—') return '—';
    const n = parseFloat(s.replace(/[$,\s]/g, ''));
    if (isNaN(n)) return s;
    return '$' + Math.round(n).toLocaleString('en-US');
  }

  function fmtGuaranteeDate(iso) {
    if (!iso) return '';
    const [y, m, d] = iso.split('-').map(Number);
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${months[m - 1]} ${d}, ${y}`;
  }

  const CAP_HOLD_LABELS = {
    UFA:        'UFA Hold',
    RFA:        'RFA Hold',
    PLAYER_OPT: 'Player Option',
    TEAM_OPT:   'Team Option',
    NON_GTD:    'Non-Guaranteed',
  };

  const CAP_HOLD_CSS = {
    UFA:        'cap-ufa',
    RFA:        'cap-rfa',
    PLAYER_OPT: 'cap-player-opt',
    TEAM_OPT:   'cap-team-opt',
    NON_GTD:    'cap-non-gtd',
  };

  function renderSalaryTable(container, bio) {
    const salaries = bio.salaries && typeof bio.salaries === 'object' ? bio.salaries : {};
    const rawDeadCap = bio.dead_cap && typeof bio.dead_cap === 'object' ? bio.dead_cap : {};
    // Backward compat: old dead players stored dead cap in salaries with no dead_cap field
    const deadCapData = Object.keys(rawDeadCap).length
      ? rawDeadCap
      : (bio.type === 'dead' ? salaries : {});
    const salaryData = (bio.type === 'dead' && !Object.keys(rawDeadCap).length) ? {} : salaries;

    if (!Object.keys(salaryData).length && !Object.keys(deadCapData).length) return;

    const capMap = bio.cap_holds || {};
    const guaranteed = bio.guaranteed && typeof bio.guaranteed === 'object' ? bio.guaranteed : {};
    const guarantee_dates = bio.guarantee_dates && typeof bio.guarantee_dates === 'object' ? bio.guarantee_dates : {};
    const guarantee_schedule = bio.guarantee_schedule && typeof bio.guarantee_schedule === 'object' ? bio.guarantee_schedule : {};

    // Merge all seasons, tagging each entry
    const allEntries = [];
    Object.keys(salaryData).sort().forEach(season => {
      allEntries.push({ season, amount: salaryData[season], isDeadCap: false });
    });
    Object.keys(deadCapData).sort().forEach(season => {
      allEntries.push({ season, amount: deadCapData[season], isDeadCap: true });
    });
    allEntries.sort((a, b) => a.season < b.season ? -1 : a.season > b.season ? 1 : a.isDeadCap ? 1 : -1);

    if (!allEntries.length) return;

    const table = document.createElement('table');
    table.className = 'salary-table';
    const thead = table.createTHead();
    const hr = thead.insertRow();
    ['Season', 'Salary', ''].forEach((h, i) => {
      const th = document.createElement('th');
      th.textContent = h;
      if (i === 1) th.className = 'right';
      hr.appendChild(th);
    });

    const tbody = table.createTBody();
    let total = 0;

    allEntries.forEach(({ season, amount, isDeadCap }) => {
      const holdType = capMap[season];
      const tr = tbody.insertRow();

      if (isDeadCap) {
        tr.className = 'dead-cap-row';
      } else if (holdType && CAP_HOLD_CSS[holdType]) {
        tr.className = CAP_HOLD_CSS[holdType];
      }

      const tdSeason = tr.insertCell(); tdSeason.textContent = season;
      const tdAmt    = tr.insertCell(); tdAmt.className = 'right'; tdAmt.textContent = formatSalary(amount);
      const tdLabel  = tr.insertCell(); tdLabel.className = 'hold-label';

      if (isDeadCap) {
        tdLabel.textContent = 'Dead cap';
      } else if (holdType === 'NON_GTD') {
        const schedule = guarantee_schedule[season];
        let label = 'Non-Guaranteed';
        if (schedule && schedule.length) {
          // Multi-step schedule
          const parts = schedule.map(step => {
            const amt  = step.amount ? formatSalary(step.amount) : null;
            const dt   = step.date   ? fmtGuaranteeDate(step.date) : null;
            if (!amt && dt)  return `fully gtd ${dt}`;
            if (!amt && !dt) return 'fully gtd';
            if (!dt)         return `${amt} gtd`;
            return `+${amt} on ${dt}`;
          });
          label = `Non-Gtd (${parts.join(' · ')})`;
        } else {
          // Legacy single-step display
          const gtd = guaranteed[season];
          const gDate = guarantee_dates[season];
          if (gtd || gDate) {
            const parts = [];
            if (gtd) parts.push(`${formatSalary(gtd)} gtd`);
            if (gDate) parts.push(`fully gtd ${fmtGuaranteeDate(gDate)}`);
            label = `Non-Gtd (${parts.join(' · ')})`;
          }
        }
        tdLabel.textContent = label;
      } else if (holdType && CAP_HOLD_LABELS[holdType]) {
        tdLabel.textContent = CAP_HOLD_LABELS[holdType];
      }

      if (isDeadCap || !holdType) {
        const n = parseFloat(String(amount).replace(/[$,\s]/g, ''));
        if (!isNaN(n)) total += n;
      }
    });

    if (total > 0) {
      const tr = tbody.insertRow();
      tr.className = 'total-row';
      const tdL = tr.insertCell(); tdL.textContent = 'Career Earnings';
      const tdV = tr.insertCell(); tdV.className = 'right'; tdV.textContent = formatSalary(total);
      tr.insertCell();
    }

    container.appendChild(table);
  }

  function renderOvrHistory(container, playerSlug) {
    const hasToken = !!localStorage.getItem('nbn_token');
    const entries = allOvrHistory[playerSlug] || [];
    if (!entries.length && !hasToken) return;

    const h2 = document.createElement('h2');
    h2.className = 'section-heading';
    h2.textContent = 'OVR History';
    container.appendChild(h2);

    const wrap = document.createElement('div');
    container.appendChild(wrap);

    function rebuild() {
      wrap.innerHTML = '';
      const current = allOvrHistory[playerSlug] || [];
      const loggedIn = !!localStorage.getItem('nbn_token');
      const hasChange = current.length > 1;
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const inputCss = 'background:#1f2937;border:1px solid #374151;border-radius:6px;color:#f3f4f6;font-size:0.8rem;padding:0.2rem 0.35rem;font-family:inherit;outline:none;';

      if (current.length) {
        if (current.length >= 2) wrap.appendChild(buildOvrChart(current));

        const table = document.createElement('table');
        table.className = 'salary-table';
        const thead = table.createTHead();
        const hr = thead.insertRow();
        ['Date', 'OVR', ...(hasChange ? ['Change'] : []), ...(loggedIn ? [''] : [])].forEach((h, i) => {
          const th = document.createElement('th');
          th.textContent = h;
          if (i === 1) th.className = 'right';
          hr.appendChild(th);
        });
        const tbody = table.createTBody();
        current.forEach((entry, i) => {
          const tr = tbody.insertRow();
          const [y, m, d] = entry.date.split('-').map(Number);
          const dateTd = tr.insertCell();
          dateTd.textContent = `${months[m-1]} ${d}, ${y}`;
          const ovrTd = tr.insertCell();
          ovrTd.className = 'right';
          ovrTd.textContent = entry.ovr;
          Object.assign(ovrTd.style, ovrHeatStyle(entry.ovr));
          ovrTd.style.borderRadius = '4px';
          ovrTd.style.padding = '0.15rem 0.4rem';
          if (hasChange) {
            const changeTd = tr.insertCell();
            changeTd.className = 'right';
            if (i === 0) {
              changeTd.textContent = '—';
              changeTd.style.color = '#6b7280';
            } else {
              const delta = entry.ovr - current[i - 1].ovr;
              changeTd.textContent = delta > 0 ? `+${delta}` : String(delta);
              changeTd.style.color = delta > 0 ? '#4ade80' : delta < 0 ? '#f87171' : '#9ca3af';
            }
          }
          if (loggedIn) {
            const actionTd = tr.insertCell();
            actionTd.style.textAlign = 'right';
            const editRowBtn = document.createElement('button');
            editRowBtn.className = 'edit-btn edit-btn-secondary';
            editRowBtn.textContent = 'Edit';
            editRowBtn.style.cssText = 'font-size:0.7rem;padding:0.1rem 0.35rem;';
            actionTd.appendChild(editRowBtn);

            editRowBtn.addEventListener('click', () => {
              if (tr.dataset.editing) { rebuild(); return; }
              table.querySelectorAll('tr[data-editing]').forEach(r => { delete r.dataset.editing; });
              tr.dataset.editing = '1';

              dateTd.innerHTML = '';
              const dateIn = document.createElement('input');
              dateIn.type = 'date';
              dateIn.value = entry.date;
              dateIn.style.cssText = inputCss;
              dateTd.appendChild(dateIn);

              ovrTd.innerHTML = '';
              ovrTd.className = '';
              ovrTd.removeAttribute('style');
              const ovrIn = document.createElement('input');
              ovrIn.type = 'number';
              ovrIn.min = '50'; ovrIn.max = '99';
              ovrIn.value = entry.ovr;
              ovrIn.style.cssText = inputCss + 'width:4.5rem;text-align:right;';
              ovrTd.appendChild(ovrIn);

              actionTd.innerHTML = '';
              const saveRowBtn = document.createElement('button');
              saveRowBtn.className = 'edit-btn edit-btn-primary';
              saveRowBtn.textContent = 'Save';
              saveRowBtn.style.cssText = 'font-size:0.7rem;padding:0.1rem 0.35rem;';
              const cancelRowBtn = document.createElement('button');
              cancelRowBtn.className = 'edit-btn edit-btn-secondary';
              cancelRowBtn.textContent = 'Cancel';
              cancelRowBtn.style.cssText = 'font-size:0.7rem;padding:0.1rem 0.35rem;';
              const rowStatus = document.createElement('span');
              rowStatus.style.cssText = 'font-size:0.7rem;color:#ef4444;margin-left:0.25rem;';
              actionTd.appendChild(saveRowBtn);
              actionTd.appendChild(cancelRowBtn);
              actionTd.appendChild(rowStatus);

              cancelRowBtn.addEventListener('click', () => rebuild());

              saveRowBtn.addEventListener('click', async () => {
                const token = getToken();
                if (!token) return;
                const dateVal = dateIn.value.trim();
                const ovrVal = parseInt(ovrIn.value, 10);
                if (!dateVal) { rowStatus.textContent = 'Date required.'; return; }
                if (isNaN(ovrVal) || ovrVal < 50 || ovrVal > 99) { rowStatus.textContent = 'OVR must be 50–99.'; return; }
                saveRowBtn.disabled = true;
                rowStatus.textContent = 'Saving…';
                const updated = current.map((e, j) => j === i ? { date: dateVal, ovr: ovrVal } : e);
                try {
                  const resp = await fetch(`/api/ovr/${playerSlug}/history`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(updated),
                  });
                  if (resp.status === 403) { clearToken(); throw new Error('Token rejected.'); }
                  if (!resp.ok) { const d = await resp.json().catch(() => ({})); throw new Error(d.detail || 'Save failed.'); }
                  allOvrHistory[playerSlug] = updated.slice().sort((a, b) => a.date < b.date ? -1 : 1);
                  currentOvr[playerSlug] = allOvrHistory[playerSlug].at(-1).ovr;
                  rebuild();
                } catch (e) {
                  rowStatus.textContent = e.message || 'Save failed.';
                  saveRowBtn.disabled = false;
                }
              });
            });
          }
        });
        wrap.appendChild(table);
      }

      if (!loggedIn) return;

      const formRow = document.createElement('div');
      formRow.className = 'ovr-edit-row';
      formRow.style.marginTop = '0.6rem';

      const today = new Date().toISOString().slice(0, 10);
      const dateIn = document.createElement('input');
      dateIn.type = 'date';
      dateIn.value = today;

      const ovrIn = document.createElement('input');
      ovrIn.type = 'number';
      ovrIn.min = '50'; ovrIn.max = '99';
      ovrIn.placeholder = 'OVR';

      const saveBtn = document.createElement('button');
      saveBtn.className = 'edit-btn edit-btn-primary';
      saveBtn.textContent = 'Add Entry';

      const statusEl = document.createElement('span');
      statusEl.style.cssText = 'font-size:0.75rem;color:#ef4444';

      saveBtn.addEventListener('click', async () => {
        const token = getToken();
        if (!token) return;
        const dateVal = dateIn.value.trim();
        const ovrVal = parseInt(ovrIn.value, 10);
        if (!dateVal) { statusEl.textContent = 'Date required.'; return; }
        if (isNaN(ovrVal) || ovrVal < 50 || ovrVal > 99) { statusEl.textContent = 'OVR must be 50–99.'; return; }
        saveBtn.disabled = true;
        statusEl.textContent = 'Saving…';
        try {
          const resp = await fetch(`/api/ovr/${playerSlug}`, {
            method: 'PUT',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ date: dateVal, ovr: ovrVal }),
          });
          if (resp.status === 403) { clearToken(); throw new Error('Token rejected.'); }
          if (!resp.ok) { const d = await resp.json().catch(() => ({})); throw new Error(d.detail || 'Save failed.'); }
          if (!allOvrHistory[playerSlug]) allOvrHistory[playerSlug] = [];
          allOvrHistory[playerSlug].push({ date: dateVal, ovr: ovrVal });
          allOvrHistory[playerSlug].sort((a, b) => a.date < b.date ? -1 : 1);
          currentOvr[playerSlug] = allOvrHistory[playerSlug].at(-1).ovr;
          rebuild();
        } catch (e) {
          statusEl.textContent = e.message || 'Save failed.';
          saveBtn.disabled = false;
        }
      });

      formRow.appendChild(dateIn);
      formRow.appendChild(ovrIn);
      formRow.appendChild(saveBtn);
      formRow.appendChild(statusEl);
      wrap.appendChild(formRow);
    }

    rebuild();
  }

  function renderTransactionHistory(container, playerSlug) {
    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    function fmtDate(iso) {
      if (!iso) return '—';
      const [y, m, d] = iso.split('-').map(Number);
      return `${MONTHS[m - 1]} ${d}, ${y}`;
    }
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function playerLink(slug) {
      if (!slug) return '';
      const bio = biosData[slug];
      const name = bio ? displayName(bio.name) : slug;
      return `<a href="/players/?p=${esc(slug)}">${esc(name)}</a>`;
    }
    function fmtContract(c) {
      if (!c) return '';
      const yrs = Object.keys(c.salaries || {}).length;
      const total = Object.values(c.salaries || {}).reduce((s, v) => s + (parseInt(String(v).replace(/\D/g,''), 10) || 0), 0);
      if (!yrs) return c.type === 'two-way' ? 'Two-Way' : '';
      return `${yrs}yr / $${(total / 1e6).toFixed(1)}M`;
    }
    const METHOD = { bird_rights:'Bird Rights', ntmle:'NTMLE', tmle:'TMLE',
      room_exception:'Room Exc.', bae:'BAE', sign_and_trade:'S&T' };
    const TYPE_LABEL = { sign:'Signing', pick:'Draft Pick', option:'Option',
      release:'Release', trade:'Trade', convert_twoway:'Two-Way Conv.' };

    function detailsHtml(t) {
      const d = t.details || {};
      if (t.type === 'sign' || t.type === 'pick') {
        let s = fmtContract(d.contract);
        if (d.signing_method && d.signing_method !== 'cap_space')
          s += (s ? ' · ' : '') + (METHOD[d.signing_method] || d.signing_method);
        if (t.type === 'pick' && d.pick) {
          const p = d.pick;
          const ps = `${p.year} R${p.round} ${p.orig}${p.pick_number ? ' #'+p.pick_number : ''}`;
          s = esc(ps) + (s ? ' · ' + esc(s) : '');
        } else { s = esc(s); }
        return s;
      }
      if (t.type === 'option') {
        const ol = d.option_type === 'PLAYER_OPT' ? 'Player Opt' : 'Team Opt';
        return d.decision === 'accept'
          ? esc(`${d.year || ''} ${ol} — accepted`)
          : esc(`${d.year || ''} ${ol} — declined → ${d.cap_hold_type || 'UFA'} hold`);
      }
      if (t.type === 'convert_twoway') return esc(fmtContract(d.contract));
      if (t.type === 'release') {
        const dc = d.dead_cap || {};
        const entries = Object.entries(dc);
        if (!entries.length) return 'No dead cap';
        const total = entries.reduce((s, [,v]) => s + (parseInt(String(v).replace(/\D/g,''), 10) || 0), 0);
        return esc(`Dead cap: $${(total / 1e6).toFixed(1)}M (${entries.map(([yr]) => yr).join(', ')})`);
      }
      if (t.type === 'trade') {
        const transfers = d.transfers || [];
        // Find the leg this player is in
        const myLeg = transfers.find(tr =>
          (tr.assets || []).some(a => a.type === 'player' && a.slug === playerSlug));
        // Other assets in my leg (exclude this player)
        const myOtherAssets = myLeg
          ? (myLeg.assets || []).filter(a => !(a.type === 'player' && a.slug === playerSlug))
          : [];
        // Other legs
        const otherLegs = transfers.filter(tr => tr !== myLeg);

        const parts = [];
        myOtherAssets.forEach(a => {
          if (a.type === 'player') parts.push(playerLink(a.slug));
          else if (a.type === 'pick') {
            let s = `${a.year} R${a.round} ${a.orig}`;
            if (a.protection) s += ` (top-${a.protection})`;
            parts.push(esc(s));
          }
        });
        if (otherLegs.length) {
          otherLegs.forEach(tr => {
            const assetStrs = (tr.assets || []).map(a =>
              a.type === 'player' ? playerLink(a.slug) : esc(`${a.year} R${a.round} ${a.orig}`)
            ).filter(Boolean);
            parts.push(esc(`${tr.from_team}→${tr.to_team}`) + (assetStrs.length ? ': ' + assetStrs.join(', ') : ''));
          });
        }
        return parts.join(' · ') || '—';
      }
      return '';
    }

    function teamHtml(t) {
      const d = t.details || {};
      if (t.type === 'trade') {
        const transfers = d.transfers || [];
        const myLeg = transfers.find(tr =>
          (tr.assets || []).some(a => a.type === 'player' && a.slug === playerSlug));
        if (!myLeg) return (d.teams || []).map(esc).join(' · ') || '—';
        return `<a href="/teams/${esc(myLeg.from_team)}">${esc(myLeg.from_team)}</a> → <a href="/teams/${esc(myLeg.to_team)}">${esc(myLeg.to_team)}</a>`;
      }
      return d.team ? `<a href="/teams/${esc(d.team)}">${esc(d.team)}</a>` : '—';
    }

    fetch(`/api/transactions?player=${encodeURIComponent(playerSlug)}`)
      .then(r => r.ok ? r.json() : { transactions: [] })
      .then(({ transactions }) => {
        if (!transactions.length) return;

        const h2 = document.createElement('h2');
        h2.className = 'section-heading';
        h2.textContent = 'Transaction History';
        container.appendChild(h2);

        const table = document.createElement('table');
        table.className = 'salary-table';
        table.style.cssText = 'font-size:0.8rem';
        const thead = table.createTHead();
        const hr = thead.insertRow();
        ['Date', 'Type', 'Team', 'Details', 'Note'].forEach((h, i) => {
          const th = document.createElement('th');
          th.textContent = h;
          if (i >= 2) th.style.width = i === 2 ? '10%' : 'auto';
          hr.appendChild(th);
        });

        const tbody = table.createTBody();
        transactions.forEach(t => {
          const tr = tbody.insertRow();
          const label = TYPE_LABEL[t.type] || t.type;
          tr.innerHTML = `
            <td style="white-space:nowrap;color:#9ca3af">${esc(fmtDate(t.date))}</td>
            <td><span class="txn-badge txn-badge-${esc(t.type)}">${esc(label)}</span></td>
            <td style="white-space:nowrap" class="txn-table-details">${teamHtml(t)}</td>
            <td class="txn-table-details">${detailsHtml(t)}</td>
            <td style="color:#6b7280;font-size:0.75rem">${esc(t.description || '')}</td>
          `;
        });

        table.appendChild(tbody);
        container.appendChild(table);
      })
      .catch(() => {});
  }

  function renderBioLine(container, row) {
    const parts = [];

    // DOB + age
    const dob = bioVal(row.DOB);
    if (dob) {
      const d = new Date(dob + 'T00:00:00');
      if (!isNaN(d)) {
        const now = new Date();
        let age = now.getFullYear() - d.getFullYear();
        const m = now.getMonth() - d.getMonth();
        if (m < 0 || (m === 0 && now.getDate() < d.getDate())) age--;
        const mon = d.toLocaleString('en-US', { month: 'short' });
        const day = d.getDate();
        const yr  = d.getFullYear();
        parts.push(`${mon} ${day}, ${yr} (age ${age})`);
      }
    }

    // College
    const college = bioVal(row.COLLEGE);
    if (college) parts.push(college);

    // Country
    const country = bioVal(row.COUNTRY);
    if (country) {
      const flag = countryFlag(country);
      parts.push(flag || country);
    }

    // NBN Draft
    const dftYr = bioVal(row.NBN_DFT_YR);
    if (dftYr) {
      const dftR = bioVal(row.NBN_DFT_R);
      const dftP = bioVal(row.NBN_DFT_P);
      let draftStr = dftYr + ' Draft';
      if (dftR || dftP) {
        const rndPart  = dftR ? 'Round ' + dftR : '';
        const pickPart = dftP ? 'Pick ' + dftP  : '';
        draftStr += ' · ' + [rndPart, pickPart].filter(Boolean).join(', ');
      }
      parts.push(draftStr);
    }

    // Measurements
    const measParts = [];
    const height  = bioVal(row.HEIGHT);
    const weight  = bioVal(row.WEIGHT);
    const wingspan = bioVal(row.WINGSPAN);
    if (height)   measParts.push(height);
    if (weight)   measParts.push(weight + ' lbs');
    if (wingspan) measParts.push(wingspan + ' ws');
    if (measParts.length) parts.push(measParts.join(' · '));

    if (!parts.length) return;

    const p = document.createElement('p');
    p.className = 'bio-line';
    parts.forEach((item, i) => {
      if (i > 0) {
        const sep = document.createElement('span');
        sep.className = 'bio-sep';
        sep.textContent = '·';
        p.appendChild(sep);
      }
      if (item instanceof Node) {
        p.appendChild(item);
      } else {
        const span = document.createElement('span');
        span.textContent = item;
        p.appendChild(span);
      }
    });
    container.appendChild(p);
  }

  // ── Row icon helper ──────────────────────────────────────────────────────────

  const AWARD_ICONS = { 'Champion': '💍', 'Most Valuable Player': '👑', 'All-Star': '⭐' };
  const ICON_ORDER  = ['💍', '👑', '⭐'];

  function makeIconFn(regRows, poRows, playerAwards, slug, bySeasonMode) {
    const awards = playerAwards[slug] || [];

    // last team per season (rows already sorted by SEASON desc, LAST_DATE desc —
    // so first entry per season is the chronologically latest team)
    const regLastTeam = new Map();
    regRows.forEach(r => { if (!regLastTeam.has(r.SEASON)) regLastTeam.set(r.SEASON, r.TEAM); });
    const poLastTeam = new Map();
    if (poRows) poRows.forEach(r => { if (!poLastTeam.has(r.SEASON)) poLastTeam.set(r.SEASON, r.TEAM); });

    // teamIcons[season|team] and seasonIcons[season] — both keyed by SEASON string
    const teamIcons = new Map();
    const seasonIcons = new Map();

    awards.forEach(a => {
      const icon = AWARD_ICONS[a.AWARD];
      if (!icon) return;
      const isPlayoff = a.SEASON.includes('Playoffs');
      const lastTeam = isPlayoff ? poLastTeam.get(a.SEASON) : regLastTeam.get(a.SEASON);
      if (!lastTeam) return;

      const teamKey = a.SEASON + '|' + lastTeam;
      if (!teamIcons.has(teamKey)) teamIcons.set(teamKey, new Set());
      teamIcons.get(teamKey).add(icon);

      if (!seasonIcons.has(a.SEASON)) seasonIcons.set(a.SEASON, new Set());
      seasonIcons.get(a.SEASON).add(icon);
    });

    const sorted = icons => ICON_ORDER.filter(i => icons.has(i));

    return row => {
      if (bySeasonMode) return sorted(seasonIcons.get(row.SEASON) ?? new Set());
      return sorted(teamIcons.get(row.SEASON + '|' + row.TEAM) ?? new Set());
    };
  }

  function ovrHeatStyle(n) {
    const t = Math.min(1, Math.max(0, (n - 60) / 40));
    const hue = Math.round(t * 120);
    return {
      background: `hsl(${hue},55%,18%)`,
      color:      `hsl(${hue},80%,72%)`,
      border:     `1px solid hsl(${hue},55%,30%)`,
    };
  }

  function buildOvrChart(entries) {
    const W = 480, H = 72;
    const PAD = { top: 16, right: 10, bottom: 18, left: 10 };
    const iW = W - PAD.left - PAD.right;
    const iH = H - PAD.top - PAD.bottom;

    const ovrs = entries.map(e => e.ovr);
    const lo = Math.max(50, Math.min(...ovrs) - 4);
    const hi = Math.min(99, Math.max(...ovrs) + 4);

    const xOf = i => PAD.left + (entries.length < 2 ? iW / 2 : (i / (entries.length - 1)) * iW);
    const yOf = v => PAD.top + (1 - (v - lo) / (hi - lo)) * iH;

    const latest = entries.at(-1).ovr;
    const t = Math.min(1, Math.max(0, (latest - 60) / 40));
    const hue = Math.round(t * 120);
    const stroke = `hsl(${hue},70%,55%)`;
    const fill   = `hsl(${hue},80%,65%)`;

    const ns = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
    svg.style.cssText = 'width:100%;height:72px;display:block;overflow:visible;';

    // Area fill under line
    if (entries.length >= 2) {
      const areaPoints = entries.map((e, i) => `${xOf(i)},${yOf(e.ovr)}`).join(' ');
      const lastX = xOf(entries.length - 1), firstX = xOf(0), baseY = PAD.top + iH;
      const area = document.createElementNS(ns, 'polygon');
      area.setAttribute('points', `${firstX},${baseY} ${areaPoints} ${lastX},${baseY}`);
      area.setAttribute('fill', `hsl(${hue},55%,18%)`);
      area.setAttribute('opacity', '0.6');
      svg.appendChild(area);

      // Line
      const poly = document.createElementNS(ns, 'polyline');
      poly.setAttribute('points', areaPoints);
      poly.setAttribute('fill', 'none');
      poly.setAttribute('stroke', stroke);
      poly.setAttribute('stroke-width', '2');
      poly.setAttribute('stroke-linejoin', 'round');
      poly.setAttribute('stroke-linecap', 'round');
      svg.appendChild(poly);
    }

    // Dots + endpoint labels
    entries.forEach((e, i) => {
      const cx = xOf(i), cy = yOf(e.ovr);
      const isFirst = i === 0, isLast = i === entries.length - 1;
      const r = isLast ? 4 : 2.5;

      const dot = document.createElementNS(ns, 'circle');
      dot.setAttribute('cx', cx); dot.setAttribute('cy', cy); dot.setAttribute('r', r);
      dot.setAttribute('fill', isLast ? fill : stroke);
      svg.appendChild(dot);

      if (isFirst || isLast) {
        const label = document.createElementNS(ns, 'text');
        label.setAttribute('x', cx);
        label.setAttribute('y', cy - 6);
        label.setAttribute('text-anchor', isFirst ? 'start' : 'end');
        label.setAttribute('fill', fill);
        label.setAttribute('font-size', '10');
        label.setAttribute('font-weight', '600');
        label.textContent = e.ovr;
        svg.appendChild(label);

        const dateLabel = document.createElementNS(ns, 'text');
        dateLabel.setAttribute('x', cx);
        dateLabel.setAttribute('y', H - 2);
        dateLabel.setAttribute('text-anchor', isFirst ? 'start' : 'end');
        dateLabel.setAttribute('fill', '#6b7280');
        dateLabel.setAttribute('font-size', '8');
        dateLabel.textContent = e.date.slice(0, 7);
        svg.appendChild(dateLabel);
      }
    });

    const wrap = document.createElement('div');
    wrap.className = 'ovr-chart';
    wrap.appendChild(svg);
    return wrap;
  }

  function renderOvrBadge(container, playerSlug) {
