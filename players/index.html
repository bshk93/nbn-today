      bioOnlyPosDiv.appendChild(rt);
    }
    content.appendChild(bioOnlyPosDiv);
    renderCurrentTeam(content, bioSlug);
    renderOvrBadge(content, bioSlug);
    renderSalaryTable(content, bio);
    renderOvrHistory(content, bioSlug);
    renderTransactionHistory(content, bioSlug);

    const editBioBtn = document.createElement('button');
    editBioBtn.className = 'btn-edit-bio';
    editBioBtn.textContent = 'Edit Bio';
    content.appendChild(editBioBtn);
    let bioFormEl = null;
    editBioBtn.addEventListener('click', () => {
      if (bioFormEl) { bioFormEl.remove(); bioFormEl = null; editBioBtn.textContent = 'Edit Bio'; return; }
      const token = getToken(); if (!token) return;
      bioFormEl = renderBioForm(
        { ...bio },
        async (token, payload) => {
          const resp = await fetch(`/api/players/${bioSlug}`, {
            method: 'PUT',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          if (resp.status === 403) { clearToken(); throw new Error('Token rejected.'); }
          if (!resp.ok) { const d = await resp.json().catch(() => ({})); throw new Error(d.detail || 'Save failed.'); }
          location.reload();
        },
        () => { bioFormEl.remove(); bioFormEl = null; editBioBtn.textContent = 'Edit Bio'; }
      );
      content.insertBefore(bioFormEl, editBioBtn.nextSibling);
      editBioBtn.textContent = 'Close';
    });
  }

  // ── Render: index (player directory) ─────────────────────────────────────────

  function renderIndex(rows) {
    document.title = 'Players — NBN';
    document.getElementById('nav').innerHTML = '<a href="/">← Home</a>';
    document.getElementById('page-sub').textContent = 'Browse all players in NBN history.';

    // Collect teams per player in chronological order
    const playerFirstRow = new Map();
    const playerTeamsList = new Map(); // slug -> ordered unique teams
    const chronoRows = [...rows].sort((a, b) => {
      const sa = parseFloat(a.SEASON) || 0, sb = parseFloat(b.SEASON) || 0;
      if (sa !== sb) return sa - sb;
      return (a.LAST_DATE || '') < (b.LAST_DATE || '') ? -1 : 1;
    });
    chronoRows.forEach(r => {
      if (!r.SLUG) return;
      if (!playerFirstRow.has(r.SLUG)) playerFirstRow.set(r.SLUG, r);
      if (!playerTeamsList.has(r.SLUG)) playerTeamsList.set(r.SLUG, []);
      const tl = playerTeamsList.get(r.SLUG);
      if (r.TEAM && r.TEAM !== 'NA' && !tl.includes(r.TEAM)) tl.push(r.TEAM);
    });

    function fmtDOB(dob) {
      const v = bioVal(dob);
      if (!v) return null;
      const d = new Date(v + 'T00:00:00');
      return isNaN(d) ? null : d.toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function fmtDraft(yr, rnd, pick) {
      const y = bioVal(yr);
      if (!y) return null;
      let s = y;
      const rn = bioVal(rnd); if (rn) { const m = rn.match(/\d+/); if (m) s += ' · R' + m[0]; }
      const pn = bioVal(pick); if (pn) { const m = pn.match(/\d+/); if (m) s += ' · P' + m[0]; }
      return s;
    }

    // Add bio-only players not yet in the CSV
    Object.entries(biosData).forEach(([bioSlug, bio]) => {
      if (!playerFirstRow.has(bioSlug)) {
        playerFirstRow.set(bioSlug, {
          SLUG: bioSlug, PLAYER: displayName(bio.name || bioSlug),
          PHOTO_URL: bio.photo_url || '', RINGS: '0',
          DOB: bio.dob || '', COUNTRY: bio.country || '', COLLEGE: bio.college || '',
          NBN_DFT_YR: bio.draft_year  ? String(bio.draft_year)  : '',
          NBN_DFT_R:  bio.draft_round ? String(bio.draft_round) : '',
          NBN_DFT_P:  bio.draft_pick  ? String(bio.draft_pick)  : '',
        });
      }
    });

    // Build one display-object per player
    const players = [...playerFirstRow.values()].map(r => {
      const bio = biosData[r.SLUG] || {};
      const dobRaw = bio.dob || bioVal(r.DOB);
      const d = dobRaw ? new Date(dobRaw + 'T00:00:00') : null;
      const dobOk = d && !isNaN(d);
      let age = null;
      if (dobOk) {
        const now = new Date();
        age = now.getFullYear() - d.getFullYear();
        const mo = now.getMonth() - d.getMonth();
        if (mo < 0 || (mo === 0 && now.getDate() < d.getDate())) age--;
      }
      const dftYr = bio.draft_year  ? String(bio.draft_year)  : r.NBN_DFT_YR;
      const dftR  = bio.draft_round ? String(bio.draft_round) : r.NBN_DFT_R;
      const dftP  = bio.draft_pick  ? String(bio.draft_pick)  : r.NBN_DFT_P;
      return {
        SLUG:       r.SLUG,
        PLAYER:     bio.name ? displayName(bio.name) : r.PLAYER,
        POS:        Array.isArray(bio.pos) ? bio.pos : [],
        PHOTO_URL:  bio.photo_url || r.PHOTO_URL,
        RINGS:      r.RINGS,
        AGE:        age,
        DOB_FMT:    fmtDOB(dobRaw),
        DOB_SORT:   dobOk ? d.getTime() : null,
        COUNTRY:    bio.country || bioVal(r.COUNTRY),
        COLLEGE:    bio.college || bioVal(r.COLLEGE),
        DRAFT_FMT:  fmtDraft(dftYr, dftR, dftP),
        DRAFT_SORT: dftYr ? parseInt(dftYr, 10) : null,
        TEAMS:      playerTeamsList.get(r.SLUG) || [],
        HEIGHT:     bio.height  || '',
        WEIGHT:     bio.weight  != null ? bio.weight : null,
        WINGSPAN:   bio.wingspan || '',
        JERSEY:     bio.jersey_number ?? null,
        TYPE:       bio.type || '',
        OVR:        currentOvr[r.SLUG] ?? null,
        RETIRED:    bio.retired || false,
      };
    });

    const allTeams = [...new Set(rows.map(r => r.TEAM).filter(Boolean))].sort();

    const PAGES = [
      { id: 'a-d', label: 'A – D', from: 'A', to: 'D' },
      { id: 'e-k', label: 'E – K', from: 'E', to: 'K' },
      { id: 'l-p', label: 'L – P', from: 'L', to: 'P' },
      { id: 'q-z', label: 'Q – Z', from: 'Q', to: 'Z' },
      { id: 'all', label: 'All', all: true },
    ];
    const tabParam = new URLSearchParams(location.search).get('tab');
    let activePage = PAGES.find(p => p.id === tabParam) || PAGES[0];

    const content = document.getElementById('content');
    content.innerHTML = '';

    // Tab bar
    const tabBar = document.createElement('div');
    tabBar.className = 'page-tabs';
    const tabBtns = PAGES.map(pg => {
      const btn = document.createElement('button');
      btn.className = 'page-tab' + (pg === activePage ? ' active' : '');
      btn.textContent = pg.label;
      btn.addEventListener('click', () => {
        if (activePage === pg && activeFilters.size === 0 && !filterRostered) return;
        activePage = pg;
        activeFilters.clear();
        filterRostered = false;
        rosteredBtn.classList.remove('active');
        content.querySelectorAll('.missing-btn').forEach(b => b.classList.remove('active'));
        tabBtns.forEach((b, i) => b.classList.toggle('active', PAGES[i] === pg));
        history.replaceState(null, '', `?tab=${pg.id}`);
        searchInput.value = '';
        filterQ = '';
        rebuildBody();
      });
      return btn;
    });
    tabBtns.forEach(b => tabBar.appendChild(b));
    content.appendChild(tabBar);

    // Filter bar
    const filterBar = document.createElement('div');
    filterBar.className = 'filter-bar';

    const searchInput = document.createElement('input');
    searchInput.type = 'search';
    searchInput.placeholder = 'Search players…';
    searchInput.className = 'filter-search';
    searchInput.setAttribute('autocomplete', 'off');
    filterBar.appendChild(searchInput);

    const teamSelect = document.createElement('select');
    teamSelect.className = 'filter-team';
    [['', 'All teams'], ...allTeams.map(t => [t, t])].forEach(([v, l]) => {
      const opt = document.createElement('option');
      opt.value = v; opt.textContent = l;
      teamSelect.appendChild(opt);
    });
    filterBar.appendChild(teamSelect);

    const rosteredBtn = document.createElement('button');
    rosteredBtn.className = 'rostered-btn';
    rosteredBtn.textContent = 'Rostered';
    filterBar.appendChild(rosteredBtn);

    const resultCount = document.createElement('span');
    resultCount.className = 'filter-count';
    filterBar.appendChild(resultCount);

    if (localStorage.getItem('nbn_token')) {
      const addBtn = document.createElement('button');
      addBtn.className = 'btn-add-player';
      addBtn.textContent = '+ Add Player';
      addBtn.addEventListener('click', showAddPlayerModal);
      filterBar.appendChild(addBtn);
    }

    content.appendChild(filterBar);

    const MISSING_FILTERS = [
      { id: 'pos',   label: 'Missing Pos',          test: p => !p.POS.length },
      { id: 'dob',   label: 'Missing DOB',          test: p => !p.DOB_SORT },
      { id: 'image', label: 'Missing Image',        test: p => !p.PHOTO_URL },
      { id: 'meas',  label: 'Missing Measurements', test: p => !p.HEIGHT || p.WEIGHT == null || !p.WINGSPAN },
    ];
    let activeFilters = new Set();

    if (localStorage.getItem('nbn_token')) {
      const missingBar = document.createElement('div');
      missingBar.className = 'missing-bar';
      const lbl = document.createElement('span');
      lbl.className = 'missing-bar-label';
      lbl.textContent = 'Missing:';
      missingBar.appendChild(lbl);
      MISSING_FILTERS.forEach(f => {
        const btn = document.createElement('button');
        btn.className = 'missing-btn';
        btn.textContent = f.label.replace('Missing ', '');
        btn.addEventListener('click', () => {
          if (activeFilters.has(f.id)) {
            activeFilters.delete(f.id);
            btn.classList.remove('active');
          } else {
            activeFilters.add(f.id);
            btn.classList.add('active');
          }
          searchInput.value = '';
          filterQ = '';
          rebuildBody();
        });
        missingBar.appendChild(btn);
      });
      content.appendChild(missingBar);
    }

    // Table
    const IDX_COLS = [
      { label: '#',       field: 'JERSEY',     defaultDir:  1, cls: 'right muted', display: p => p.JERSEY != null ? `#${p.JERSEY}` : '—' },
      { label: 'Player',  field: 'PLAYER',     defaultDir:  1 },
      { label: 'Pos',     field: null,          display: p => p.POS.length ? p.POS.join(' · ') : '—', cls: 'muted' },
      { label: 'OVR',     field: 'OVR',         defaultDir: -1, cls: 'right', display: p => p.OVR ?? '—' },
      { label: 'Age',     field: 'AGE',         defaultDir: -1, cls: 'right' },
      { label: 'Born',    field: 'DOB_SORT',    defaultDir: -1, cls: 'right', display: p => p.DOB_FMT || '—' },
      { label: 'Country', field: 'COUNTRY',     defaultDir:  1, display: p => {
          if (!p.COUNTRY) return '—';
          const flag = countryFlag(p.COUNTRY);
          return flag || p.COUNTRY;
        }
      },
      { label: 'College', field: 'COLLEGE',     defaultDir:  1, display: p => p.COLLEGE || '—' },
      { label: 'Draft',   field: 'DRAFT_SORT',  defaultDir:  1, display: p => p.DRAFT_FMT || '—' },
      { label: 'Teams',   field: null, display: p => {
          if (!p.TEAMS.length) return '—';
          const wrap = document.createElement('div');
          wrap.style.cssText = 'display:flex;gap:3px;align-items:center;min-width:115px';
          p.TEAMS.forEach(t => {
            const img = document.createElement('img');
            img.src = `/logos/logo-${t.toLowerCase()}.png`;
            img.alt = t; img.title = t;
            img.style.cssText = 'width:20px;height:20px;object-fit:contain';
            img.onerror = function() { this.replaceWith(document.createTextNode(t)); };
            wrap.appendChild(img);
          });
          return wrap;
        }
      },
      { label: 'Ht',  field: 'HEIGHT',   defaultDir: 1, cls: 'right muted', display: p => p.HEIGHT   || '—' },
      { label: 'Wt',  field: 'WEIGHT',   defaultDir:-1, cls: 'right muted', display: p => p.WEIGHT != null ? p.WEIGHT + ' lbs' : '—' },
      { label: 'WS',  field: 'WINGSPAN', defaultDir: 1, cls: 'right muted', display: p => p.WINGSPAN  || '—' },
      { label: 'Ret', field: 'RETIRED',  defaultDir:-1, cls: 'center muted', display: p => p.RETIRED ? '✓' : '—' },
    ];

    let sortField = 'PLAYER', sortDir = 1;

    function idxSortVal(p, field) {
      const v = p[field];
      if (v == null) return Infinity;
      if (typeof v === 'number') return v;
      const n = parseFloat(v);
      return isNaN(n) ? String(v).toLowerCase() : n;
    }

    const wrap = document.createElement('div');
    wrap.className = 'table-wrap';
    content.appendChild(wrap);

    const table = document.createElement('table');
    const thead = table.createTHead();
    const headerRow = thead.insertRow();
    const thEls = [];

    IDX_COLS.forEach(col => {
      const th = document.createElement('th');
      if (col.cls) th.classList.add(...col.cls.split(' '));
      const arrow = document.createElement('span');
      arrow.className = 'sort-arrow';
      th.appendChild(document.createTextNode(col.label));
      th.appendChild(arrow);
      if (col.field) {
        th.addEventListener('click', () => {
          if (sortField === col.field) sortDir *= -1;
          else { sortField = col.field; sortDir = col.defaultDir ?? 1; }
          updateHeaders();
          rebuildBody();
        });
      } else {
        th.style.cursor = 'default';
      }
      thEls.push(th);
      headerRow.appendChild(th);
    });

    const tbody = table.createTBody();
    wrap.appendChild(table);

    const noResults = document.createElement('p');
    noResults.className = 'no-results';
    noResults.textContent = 'No players match your search.';
    noResults.style.display = 'none';
    content.appendChild(noResults);

    function updateHeaders() {
      thEls.forEach((th, i) => {
        const active = IDX_COLS[i].field === sortField;
        th.dataset.active = active;
        th.querySelector('.sort-arrow').textContent = active ? (sortDir === -1 ? '↓' : '↑') : '';
      });
    }

    function buildRow(p) {
      const tr = document.createElement('tr');
      tr.className = 'clickable-row';
      tr.dataset.name = p.PLAYER.toLowerCase();
      tr.dataset.teams = p.TEAMS.join('|');
      tr.dataset.type = p.TYPE;
      tr.addEventListener('click', () => { location.href = `/players/?p=${p.SLUG}`; });

      // Jersey cell (IDX_COLS[0])
      const tdJ = tr.insertCell();
      const jerseyCol = IDX_COLS[0];
      if (jerseyCol.cls) tdJ.className = jerseyCol.cls;
      tdJ.textContent = jerseyCol.display(p);

      // Player cell: photo + name (IDX_COLS[1])
      const tdP = tr.insertCell();
      const cell = document.createElement('div');
      cell.className = 'player-name-cell';
      if (p.PHOTO_URL) {
        const img = document.createElement('img');
        img.className = 'player-photo-sm';
        img.src = p.PHOTO_URL;
        img.alt = '';
        img.onerror = function() {
          const ph = document.createElement('div');
          ph.className = 'player-placeholder-sm';
          this.replaceWith(ph);
        };
        cell.appendChild(img);
      } else {
        const ph = document.createElement('div');
        ph.className = 'player-placeholder-sm';
        cell.appendChild(ph);
      }
      const nameSpan = document.createElement('span');
      nameSpan.textContent = p.PLAYER;
      if (+p.RINGS > 0) nameSpan.classList.add('champion-name');
      cell.appendChild(nameSpan);
      tdP.appendChild(cell);

      // Remaining cells
      IDX_COLS.slice(2).forEach(col => {
        const td = tr.insertCell();
        if (col.cls) td.className = col.cls;
        const val = col.display ? col.display(p) : (p[col.field] ?? '—');
        if (val instanceof Node) td.appendChild(val);
        else td.textContent = val == null ? '—' : val;
        if (col.field === 'OVR' && p.OVR != null) {
          Object.assign(td.style, ovrHeatStyle(p.OVR));
          td.style.borderRadius = '4px';
          td.style.padding = '0.15rem 0.4rem';
          td.style.fontWeight = '700';
          td.style.textAlign = 'center';
        }
      });

      return tr;
    }

    let filterQ = '', filterTeam = '', filterRostered = false;

    rosteredBtn.addEventListener('click', () => {
      filterRostered = !filterRostered;
      rosteredBtn.classList.toggle('active', filterRostered);
      rebuildBody();
    });

    function visible(p) {
      return (!filterQ || p.PLAYER.toLowerCase().includes(filterQ)) &&
             (!filterTeam || p.TEAMS.includes(filterTeam)) &&
             (!filterRostered || (!p.RETIRED && (p.TYPE === 'player' || p.TYPE === 'two-way')));
    }

    function rebuildBody() {
      const pagePlayers = activeFilters.size > 0
        ? players.filter(p => MISSING_FILTERS.some(f => activeFilters.has(f.id) && f.test(p)))
        : players.filter(p => {
            if (activePage.all) return true;
            const l = (p.PLAYER[0] || '').toUpperCase();
            return l >= activePage.from && l <= activePage.to;
          });
      const sorted = [...pagePlayers].sort((a, b) => {
        const va = idxSortVal(a, sortField), vb = idxSortVal(b, sortField);
        if (va === Infinity && vb === Infinity) return a.PLAYER.localeCompare(b.PLAYER);
        if (va === Infinity) return 1;
        if (vb === Infinity) return -1;
        if (va < vb) return sortDir === 1 ? -1 : 1;
        if (va > vb) return sortDir === 1 ? 1 : -1;
        return a.PLAYER.localeCompare(b.PLAYER);
      });
      tbody.innerHTML = '';
      let count = 0;
      sorted.forEach(p => {
        const show = visible(p);
        const tr = buildRow(p);
        if (!show) tr.style.display = 'none';
        else count++;
        tbody.appendChild(tr);
      });
      const total = pagePlayers.length;
      resultCount.textContent = count === total ? `${total} players` : `${count} of ${total}`;
      noResults.style.display = count === 0 ? '' : 'none';
    }

    function applyFilters() {
      filterQ = searchInput.value.trim().toLowerCase();
      filterTeam = teamSelect.value;
      let count = 0, total = 0;
      tbody.querySelectorAll('tr').forEach(tr => {
        total++;
        const nameOk = !filterQ || tr.dataset.name.includes(filterQ);
        const teamOk = !filterTeam || tr.dataset.teams.split('|').includes(filterTeam);
        const rosteredOk = !filterRostered || tr.dataset.type === 'player' || tr.dataset.type === 'two-way';
        const show = nameOk && teamOk && rosteredOk;
        tr.style.display = show ? '' : 'none';
        if (show) count++;
      });
      resultCount.textContent = count === total ? `${total} players` : `${count} of ${total}`;
      noResults.style.display = count === 0 ? '' : 'none';
    }

    searchInput.addEventListener('input', applyFilters);
    teamSelect.addEventListener('change', applyFilters);
    updateHeaders();
    rebuildBody();
  }

  // ── Render: player profile ────────────────────────────────────────────────────

  function renderPlayer(playerName, rows, playerAwards, seasonLeaders) {
    rows = [...rows].sort((a, b) => {
      const sa = parseFloat(a.SEASON) || 0;
      const sb = parseFloat(b.SEASON) || 0;
      if (sa !== sb) return sb - sa;
      const ta = a.LAST_DATE ?? '';
      const tb = b.LAST_DATE ?? '';
      return ta < tb ? 1 : ta > tb ? -1 : 0;
    });

    document.title = `${playerName} — NBN`;
    document.getElementById('nav').innerHTML =
      '<a href="/">Home</a> / <a href="/players/">Players</a> / ' + playerName;
    document.getElementById('page-title').textContent = playerName;
    const seasonCount = new Set(rows.map(r => r.SEASON)).size;
    document.getElementById('page-sub').textContent =
      `${seasonCount} season${seasonCount !== 1 ? 's' : ''} in NBN`;

    const bio = biosData[slug] || {};
    const mergedRow = {
      DOB:        bio.dob        || rows[0].DOB,
      COLLEGE:    bio.college    || rows[0].COLLEGE,
      COUNTRY:    bio.country    || rows[0].COUNTRY,
      NBN_DFT_YR: bio.draft_year  ? String(bio.draft_year)  : rows[0].NBN_DFT_YR,
      NBN_DFT_R:  bio.draft_round ? String(bio.draft_round) : rows[0].NBN_DFT_R,
      NBN_DFT_P:  bio.draft_pick  ? String(bio.draft_pick)  : rows[0].NBN_DFT_P,
      HEIGHT:     bio.height   || '',
      WEIGHT:     bio.weight   != null ? String(bio.weight) : '',
      WINGSPAN:   bio.wingspan || '',
    };
    const photoUrl = bio.photo_url || rows[0].PHOTO_URL;
    const headerMain = document.querySelector('.header-main');
    headerMain.querySelectorAll('.profile-photo').forEach(el => el.remove());
    if (photoUrl) {
      const img = document.createElement('img');
      img.className = 'profile-photo';
      img.src = photoUrl;
      img.alt = '';
      img.onerror = function() { this.remove(); };
      headerMain.appendChild(img);
    }
    renderPlayerNav(slug);

    const content = document.getElementById('content');
    content.innerHTML = '';

    // bio line
    renderBioLine(content, mergedRow);

    // position tags
    const posDiv = document.createElement('div');
    posDiv.className = 'pos-display';
    const eligiblePos = new Set(Array.isArray(bio.pos) ? bio.pos : []);
    ['PG', 'SG', 'SF', 'PF', 'C'].forEach(p => {
      const tag = document.createElement('span');
      tag.className = eligiblePos.has(p) ? 'pos-tag' : 'pos-tag-dim';
      tag.textContent = p;
      posDiv.appendChild(tag);
    });
    if (bio.retired) {
      const rt = document.createElement('span');
      rt.className = 'retired-tag';
      rt.textContent = 'Retired';
      posDiv.appendChild(rt);
    }
    content.appendChild(posDiv);
    renderCurrentTeam(content, slug);
    renderOvrBadge(content, slug);

    // edit bio button
    const editBioBtn = document.createElement('button');
    editBioBtn.className = 'btn-edit-bio';
    editBioBtn.textContent = 'Edit Bio';
    content.appendChild(editBioBtn);
    let bioFormEl = null;
    editBioBtn.addEventListener('click', () => {
      if (bioFormEl) { bioFormEl.remove(); bioFormEl = null; editBioBtn.textContent = 'Edit Bio'; return; }
      const token = getToken(); if (!token) return;
      const cur = biosData[slug] || {};
      bioFormEl = renderBioForm(
        { name: cur.name || '', pos: cur.pos || [], dob: cur.dob || rows[0].DOB || '', college: cur.college || rows[0].COLLEGE || '', country: cur.country || rows[0].COUNTRY || '', draft_year: cur.draft_year || null, draft_round: cur.draft_round || null, draft_pick: cur.draft_pick || null, height: cur.height || '', weight: cur.weight ?? null, wingspan: cur.wingspan || '', photo_url: cur.photo_url || rows[0].PHOTO_URL || '', retired: cur.retired || false, type: cur.type || '', cap_holds: cur.cap_holds || {}, salaries: cur.salaries || {}, guaranteed: cur.guaranteed || {}, guarantee_dates: cur.guarantee_dates || {}, guarantee_schedule: cur.guarantee_schedule || {} },
        async (token, payload) => {
          const resp = await fetch(`/api/players/${slug}`, {
            method: 'PUT',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          if (resp.status === 403) { clearToken(); throw new Error('Token rejected.'); }
          if (!resp.ok) { const d = await resp.json().catch(() => ({})); throw new Error(d.detail || 'Save failed.'); }
          location.reload();
        },
        () => { bioFormEl.remove(); bioFormEl = null; editBioBtn.textContent = 'Edit Bio'; }
      );
      content.insertBefore(bioFormEl, editBioBtn.nextSibling);
      editBioBtn.textContent = 'Close';
    });

    // accolades
    renderAccolades(content, slug, rows[0].RINGS, playerAwards, seasonLeaders);

    // toggle
    const toggleBar = document.createElement('div');
    toggleBar.className = 'toggle-bar';
    const btnTeam     = document.createElement('button');
    const btnSeason   = document.createElement('button');
    const btnPlayoffs = document.createElement('button');
    btnTeam.className     = 'toggle-btn active';
    btnSeason.className   = 'toggle-btn';
    btnPlayoffs.className = 'toggle-btn';
    btnTeam.textContent     = 'By Team';
    btnSeason.textContent   = 'By Season';
    btnPlayoffs.textContent = 'Playoffs';
    toggleBar.appendChild(btnTeam);
    toggleBar.appendChild(btnSeason);
    toggleBar.appendChild(btnPlayoffs);
    content.appendChild(toggleBar);

    // sections container
    const sections = document.createElement('div');
    content.appendChild(sections);
    renderSalaryTable(content, bio);
    renderOvrHistory(content, slug);
    renderTransactionHistory(content, slug);

    let bySeasonMode = false;
    let showPlayoffs = false;
    let poRows = null;

    function getDisplayRows() {
      const reg = bySeasonMode ? aggregateBySeasonRows(rows) : rows;
      const all = (!showPlayoffs || !poRows || !poRows.length)
        ? reg
        : [...reg, ...(bySeasonMode ? aggregateBySeasonRows(poRows) : poRows)];
      const dob = rows[0].DOB;
      return all.map(r => ({ ...r, AGE: ageAtSeason(dob, r.SEASON) }));
    }

    function makeLeaderCheck() {
      return (row, col) => {
        if (!col.sortField || !LEADER_STATS.includes(col.sortField)) return false;
        if (!row.SEASON || row.SEASON.includes('Playoffs')) return false;
        const leaders = seasonLeaders[row.SEASON];
        if (!leaders || !leaders[col.sortField]) return false;
        return leaders[col.sortField].slug === slug;
      };
    }

    function rebuildSections() {
      const displayRows = getDisplayRows();
      sections.innerHTML = '';
      const iconFn = makeIconFn(rows, poRows, playerAwards, slug, bySeasonMode);
      buildSection(sections, 'Season Stats', displayRows, SEASON_COLS, 'SEASON', 'LAST_DATE', careerStatsRow(displayRows), makeLeaderCheck(), iconFn);
      buildSection(sections, 'Season Highs', displayRows, HIGHS_COLS, 'SEASON', 'LAST_DATE', careerHighsRow(displayRows), null, iconFn);
    }

    btnTeam.addEventListener('click', () => {
      if (bySeasonMode) {
        bySeasonMode = false;
        btnTeam.classList.add('active');
        btnSeason.classList.remove('active');
        rebuildSections();
      }
    });

    btnSeason.addEventListener('click', () => {
      if (!bySeasonMode) {
        bySeasonMode = true;
        btnSeason.classList.add('active');
        btnTeam.classList.remove('active');
        rebuildSections();
      }
    });

    btnPlayoffs.addEventListener('click', () => {
      if (showPlayoffs) {
        showPlayoffs = false;
        btnPlayoffs.classList.remove('active');
        rebuildSections();
      } else if (poRows !== null) {
        showPlayoffs = true;
        btnPlayoffs.classList.add('active');
        rebuildSections();
      } else {
        fetch('/players/player_seasons_playoffs.csv')
          .then(r => { if (!r.ok) throw new Error(); return r.text(); })
          .then(text => {
            poRows = parseCSV(text).filter(r => r.SLUG === slug);
            showPlayoffs = true;
            btnPlayoffs.classList.add('active');
            rebuildSections();
          })
          .catch(() => {
            poRows = [];
          });
      }
    });

    rebuildSections();
  }

  // ── Main ─────────────────────────────────────────────────────────────────────

  Promise.all([
    fetch('/players/player_seasons.csv').then(r => { if (!r.ok) throw new Error(); return r.text(); }),
    fetch('/players/player_awards.csv').then(r => r.text()).catch(() => ''),
    fetch('/api/players').then(r => r.ok ? r.json() : {}).catch(() => ({})),
    fetch('/api/team-map').then(r => r.ok ? r.json() : {}).catch(() => ({})),
    fetch('/api/ovr/current').then(r => r.ok ? r.json() : {}).catch(() => ({})),
    fetch('/api/ovr').then(r => r.ok ? r.json() : {}).catch(() => ({})),
  ])
    .then(([seasonsText, awardsText, biosJson, teamMapJson, ovrJson, ovrHistoryJson]) => {
      biosData = biosJson;
      teamMap = teamMapJson;
      currentOvr = ovrJson;
      allOvrHistory = ovrHistoryJson;

      const rows = parseCSV(seasonsText);
      const awards = awardsText ? parseCSV(awardsText) : [];

      const playerAwards = {};
      awards.forEach(a => {
        if (!playerAwards[a.SLUG]) playerAwards[a.SLUG] = [];
        playerAwards[a.SLUG].push(a);
      });

      const seasonLeaders = buildSeasonLeaders(rows);

      if (!slug) {
        renderIndex(rows);
        return;
      }

      const playerRows = rows.filter(r => r.SLUG === slug);
      if (!playerRows.length) {
        // Player exists in bios but has no stats yet
        const bio = biosData[slug];
        if (bio) {
          renderBioOnlyPlayer(slug, bio);
        } else {
          showError(`Player not found: <strong>${slug}</strong>`);
        }
        return;
      }

      const bio = biosData[slug] || {};
      const playerName = bio.name ? displayName(bio.name) : playerRows[0].PLAYER;
      renderPlayer(playerName, playerRows, playerAwards, seasonLeaders);
    })
    .catch(() => showError('Failed to load data.'));
})();
</script>
  <script src="/nav.js"></script>
  <script src="/token-badge.js"></script>
</body>
</html>
