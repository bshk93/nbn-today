<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>League History — NBN</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111827;
      color: #f3f4f6;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
    }

    .nav {
      margin-bottom: 1.75rem;
      font-size: 0.875rem;
    }

    .nav a { color: #9ca3af; text-decoration: none; }
    .nav a:hover { color: #f3f4f6; }

    header { margin-bottom: 1.75rem; }

    header h1 {
      font-size: 1.875rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    header p {
      color: #9ca3af;
      margin-top: 0.4rem;
      font-size: 0.9rem;
    }

    .table-wrap {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 12px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
      white-space: nowrap;
    }

    /* Superheader row */
    thead tr:first-child th {
      padding: 0.6rem 1rem 0.45rem;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      border-bottom: 1px solid #283141;
    }

    thead tr:first-child th:first-child {
      text-align: left;
    }

    .sh-season   { color: #9ca3af; }
    .sh-post     { color: #f59e0b; border-right: 1px solid #374151; border-left: 1px solid #374151; }
    .sh-awards   { color: #60a5fa; border-right: 1px solid #374151; }
    .sh-stats    { color: #34d399; border-right: 1px solid #374151; }
    .sh-ratings  { color: #a78bfa; }

    /* Column header row */
    thead tr:last-child th {
      padding: 0.45rem 1rem 0.65rem;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #6b7280;
      border-bottom: 1px solid #374151;
    }

    /* Dividers between groups */
    .div-left  { border-left:  1px solid #374151; }
    .div-right { border-right: 1px solid #374151; }

    tbody tr {
      border-bottom: 1px solid #283141;
      transition: background 0.1s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #263244; }

    td {
      padding: 0.6rem 1rem;
      color: #d1d5db;
      vertical-align: middle;
    }

    td.season   { font-weight: 700; color: #f3f4f6; }
    td.champion { font-weight: 600; color: #fbbf24; }
    td.muted    { color: #6b7280; }

    .status {
      text-align: center;
      padding: 3rem;
      color: #6b7280;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="page">
    <nav class="nav"><a href="/">← Nothing But Net</a></nav>

    <header>
      <h1>League History</h1>
      <p>Season-by-season champions, award winners, statistical leaders, and top-rated teams.</p>
    </header>

    <div class="table-wrap" id="table-wrap">
      <div class="status">Loading…</div>
    </div>
  </div>

  <script>
    function parseCSV(text) {
      const lines = text.trim().split('\n');
      const headers = parseLine(lines[0]);
      return lines.slice(1).map(line => {
        const vals = parseLine(line);
        const obj = {};
        headers.forEach((h, i) => { obj[h] = vals[i] ?? ''; });
        return obj;
      });
    }

    function parseLine(line) {
      const out = [];
      let cur = '', quoted = false;
      for (const ch of line) {
        if (ch === '"') { quoted = !quoted; }
        else if (ch === ',' && !quoted) { out.push(cur); cur = ''; }
        else { cur += ch; }
      }
      out.push(cur);
      return out;
    }

    function fmtPlayer(s) {
      if (!s) return '—';
      const [last, first] = s.split(', ');
      if (!first) return s;
      const cap = w => w.split('-').map(p => p[0].toUpperCase() + p.slice(1).toLowerCase()).join('-');
      return cap(first) + ' ' + cap(last);
    }

    function fmtLeader(s) {
      if (!s) return '—';
      const m = s.match(/^(.+) \((\d+)\)$/);
      if (!m) return s;
      return fmtPlayer(m[1]) + ' (' + Number(m[2]).toLocaleString() + ')';
    }

    function val(s) { return s || '—'; }

    function th(text, cls = '') {
      const el = document.createElement('th');
      el.textContent = text;
      if (cls) cls.split(' ').forEach(c => c && el.classList.add(c));
      return el;
    }

    function buildTable(rows) {
      const table = document.createElement('table');
      const thead = table.createTHead();

      // ── Superheader row ──────────────────────────────────────────────
      const sup = thead.insertRow();

      const shSeason = th('Season', 'sh-season');
      shSeason.rowSpan = 2;
      sup.appendChild(shSeason);

      const shPost = th('Postseason Results', 'sh-post');
      shPost.colSpan = 4;
      sup.appendChild(shPost);

      const shAwards = th('Season Awards', 'sh-awards');
      shAwards.colSpan = 6;
      sup.appendChild(shAwards);

      const shStats = th('Statistical Leaders', 'sh-stats');
      shStats.colSpan = 6;
      sup.appendChild(shStats);

      const shRatings = th('Team Ratings', 'sh-ratings');
      shRatings.colSpan = 3;
      sup.appendChild(shRatings);

      // ── Column header row ─────────────────────────────────────────────
      const sub = thead.insertRow();
      [
        ['Champion',    'div-left'],
        ['Runner-Up',   ''],
        ['East RU',     ''],
        ['West RU',     'div-right'],
        ['MVP',         ''],
        ['DPOY',        ''],
        ['ROTY',        ''],
        ['MIP',         ''],
        ['FOTY',        ''],
        ['COTY',        'div-right'],
        ['PTS',         ''],
        ['REB',         ''],
        ['AST',         ''],
        ['STL',         ''],
        ['BLK',         ''],
        ['3PM',         'div-right'],
        ['Best Offense',''],
        ['Best Defense',''],
        ['Best Overall',''],
      ].forEach(([label, cls]) => sub.appendChild(th(label, cls)));

      // ── Body ──────────────────────────────────────────────────────────
      const tbody = table.createTBody();
      [...rows].reverse().forEach(row => {
        const tr = tbody.insertRow();

        function cell(text, ...cls) {
          const td = tr.insertCell();
          td.textContent = text;
          cls.forEach(c => c && td.classList.add(c));
          return td;
        }

        cell(row.SEASON, 'season');
        cell(val(row.CHAMPION),      'champion', 'div-left');
        cell(val(row.RUNNER_UP));
        cell(val(row.EAST_RUNNER_UP));
        cell(val(row.WEST_RUNNER_UP), 'div-right');
        cell(fmtPlayer(row.MVP));
        cell(fmtPlayer(row.DPOY));
        cell(fmtPlayer(row.ROTY));
        cell(fmtPlayer(row.MIP));
        cell(val(row.FOTY),          'muted');
        cell(val(row.COTY),          'muted', 'div-right');
        cell(fmtLeader(row.PTS_LEADER));
        cell(fmtLeader(row.REB_LEADER));
        cell(fmtLeader(row.AST_LEADER));
        cell(fmtLeader(row.STL_LEADER));
        cell(fmtLeader(row.BLK_LEADER));
        cell(fmtLeader(row.TPM_LEADER), 'div-right');
        cell(val(row.BEST_OFF));
        cell(val(row.BEST_DEF));
        cell(val(row.BEST_OVERALL));
      });

      return table;
    }

    (async () => {
      const wrap = document.getElementById('table-wrap');
      try {
        const res = await fetch('/league-history.csv');
        if (!res.ok) throw new Error(res.statusText);
        wrap.innerHTML = '';
        wrap.appendChild(buildTable(parseCSV(await res.text())));
      } catch (e) {
        wrap.innerHTML = '<div class="status">Failed to load league history.</div>';
      }
    })();
  </script>
</body>
</html>
