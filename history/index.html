<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>League History — NBN</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111827;
      color: #f3f4f6;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
    }

    .nav {
      margin-bottom: 1.75rem;
      font-size: 0.875rem;
    }

    .nav a { color: #9ca3af; text-decoration: none; }
    .nav a:hover { color: #f3f4f6; }

    header { margin-bottom: 1.75rem; }

    header h1 {
      font-size: 1.875rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    header p {
      color: #9ca3af;
      margin-top: 0.4rem;
      font-size: 0.9rem;
    }

    .table-wrap {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 12px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
      white-space: nowrap;
    }

    thead tr:first-child th {
      padding: 0.6rem 1rem 0.5rem;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6b7280;
      text-align: center;
      border-bottom: 1px solid #1f2937;
    }

    thead tr:first-child th:first-child {
      text-align: left;
      border-right: 1px solid #374151;
    }

    th.superheader-post {
      border-right: 1px solid #374151;
      color: #f59e0b;
    }

    th.superheader-awards {
      color: #60a5fa;
    }

    thead tr:last-child th {
      padding: 0.5rem 1rem 0.7rem;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #6b7280;
      border-bottom: 1px solid #374151;
      text-align: left;
    }

    thead tr:last-child th.right { text-align: right; }

    th.col-season { border-right: 1px solid #374151; }
    th.col-west-ru { border-right: 1px solid #374151; }
    td.col-season { border-right: 1px solid #374151; }
    td.col-west-ru { border-right: 1px solid #374151; }

    tbody tr {
      border-bottom: 1px solid #283141;
      transition: background 0.1s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #263244; }

    td {
      padding: 0.65rem 1rem;
      color: #d1d5db;
    }

    td.season { font-weight: 700; color: #f3f4f6; }
    td.champion { font-weight: 600; color: #fbbf24; }
    td.muted { color: #6b7280; }

    .status {
      text-align: center;
      padding: 3rem;
      color: #6b7280;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="page">
    <nav class="nav"><a href="/">← Nothing But Net</a></nav>

    <header>
      <h1>League History</h1>
      <p>Season-by-season champions and award winners.</p>
    </header>

    <div class="table-wrap" id="table-wrap">
      <div class="status">Loading…</div>
    </div>
  </div>

  <script>
    function parseCSV(text) {
      const lines = text.trim().split('\n');
      const headers = parseLine(lines[0]);
      return lines.slice(1).map(line => {
        const vals = parseLine(line);
        const obj = {};
        headers.forEach((h, i) => { obj[h] = vals[i] ?? ''; });
        return obj;
      });
    }

    function parseLine(line) {
      const out = [];
      let cur = '', quoted = false;
      for (const ch of line) {
        if (ch === '"') { quoted = !quoted; }
        else if (ch === ',' && !quoted) { out.push(cur); cur = ''; }
        else { cur += ch; }
      }
      out.push(cur);
      return out;
    }

    function fmtPlayer(s) {
      if (!s) return '—';
      const [last, first] = s.split(', ');
      if (!first) return s;
      const cap = w => w.split('-').map(p => p[0].toUpperCase() + p.slice(1).toLowerCase()).join('-');
      return cap(first) + ' ' + cap(last);
    }

    function val(s) { return s || '—'; }

    function buildTable(rows) {
      const table = document.createElement('table');
      const thead = table.createTHead();

      // Superheader row
      const sup = thead.insertRow();
      const thSeason = document.createElement('th');
      thSeason.textContent = 'Season';
      thSeason.rowSpan = 2;
      thSeason.classList.add('col-season');
      sup.appendChild(thSeason);

      const thPost = document.createElement('th');
      thPost.textContent = 'Postseason Results';
      thPost.colSpan = 4;
      thPost.classList.add('superheader-post');
      sup.appendChild(thPost);

      const thAwards = document.createElement('th');
      thAwards.textContent = 'Season Awards';
      thAwards.colSpan = 6;
      thAwards.classList.add('superheader-awards');
      sup.appendChild(thAwards);

      // Column header row
      const sub = thead.insertRow();
      [
        ['Champion',    ''],
        ['Runner-Up',   ''],
        ['East RU',     ''],
        ['West RU',     'col-west-ru'],
        ['MVP',         ''],
        ['DPOY',        ''],
        ['ROTY',        ''],
        ['MIP',         ''],
        ['FOTY',        ''],
        ['COTY',        ''],
      ].forEach(([label, cls]) => {
        const th = document.createElement('th');
        th.textContent = label;
        if (cls) th.classList.add(cls);
        sub.appendChild(th);
      });

      const tbody = table.createTBody();
      [...rows].reverse().forEach(row => {
        const tr = tbody.insertRow();

        const tdSeason = tr.insertCell();
        tdSeason.textContent = row.SEASON;
        tdSeason.classList.add('season', 'col-season');

        const tdChamp = tr.insertCell();
        tdChamp.textContent = val(row.CHAMPION);
        tdChamp.classList.add('champion');

        [row.RUNNER_UP, row.EAST_RUNNER_UP].forEach(v => {
          const td = tr.insertCell();
          td.textContent = val(v);
        });

        const tdWestRU = tr.insertCell();
        tdWestRU.textContent = val(row.WEST_RUNNER_UP);
        tdWestRU.classList.add('col-west-ru');

        [row.MVP, row.DPOY, row.ROTY, row.MIP].forEach(v => {
          const td = tr.insertCell();
          td.textContent = fmtPlayer(v);
        });

        [row.FOTY, row.COTY].forEach(v => {
          const td = tr.insertCell();
          td.textContent = val(v);
          td.classList.add('muted');
        });
      });

      return table;
    }

    (async () => {
      const wrap = document.getElementById('table-wrap');
      try {
        const res = await fetch('/league-history.csv');
        if (!res.ok) throw new Error(res.statusText);
        const rows = parseCSV(await res.text());
        wrap.innerHTML = '';
        wrap.appendChild(buildTable(rows));
      } catch (e) {
        wrap.innerHTML = '<div class="status">Failed to load league history.</div>';
      }
    })();
  </script>
</body>
</html>
