<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/logo.png">
  <title>League History — NBN</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111827;
      color: #f3f4f6;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
    }

    .nav {
      margin-bottom: 1.75rem;
      font-size: 0.875rem;
    }

    .nav a { color: #9ca3af; text-decoration: none; }
    .nav a:hover { color: #f3f4f6; }

    header { margin-bottom: 1.75rem; }

    header h1 {
      font-size: 1.875rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    header p {
      color: #9ca3af;
      margin-top: 0.4rem;
      font-size: 0.9rem;
    }

    .table-wrap {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 12px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
      white-space: nowrap;
    }

    /* Superheader row */
    thead tr:first-child th {
      padding: 0.6rem 1rem 0.45rem;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      border-bottom: 1px solid #283141;
    }

    thead tr:first-child th:first-child {
      text-align: left;
    }

    .sh-season   { color: #9ca3af; }
    .sh-post     { color: #f59e0b; border-right: 1px solid #374151; border-left: 1px solid #374151; }
    .sh-awards   { color: #60a5fa; border-right: 1px solid #374151; }
    .sh-stats    { color: #34d399; border-right: 1px solid #374151; }
    .sh-ratings  { color: #a78bfa; }

    /* Column header row */
    thead tr:last-child th {
      padding: 0.45rem 1rem 0.65rem;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #6b7280;
      border-bottom: 1px solid #374151;
    }

    /* Dividers between groups */
    .div-left  { border-left:  1px solid #374151; }
    .div-right { border-right: 1px solid #374151; }

    tbody tr {
      border-bottom: 1px solid #283141;
      transition: background 0.1s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #263244; }

    td {
      padding: 0.6rem 1rem;
      color: #d1d5db;
      vertical-align: middle;
    }

    td.season   { font-weight: 700; color: #f3f4f6; }
    td.champion { font-weight: 600; color: #fbbf24; }
    td.muted    { color: #6b7280; }

    .status {
      text-align: center;
      padding: 3rem;
      color: #6b7280;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="page">
    <nav class="nav"><a href="/">← Home</a></nav>

    <header>
      <h1>League History</h1>
      <p>Season-by-season champions, award winners, statistical leaders, and top-rated teams.</p>
    </header>

    <div class="table-wrap" id="table-wrap">
      <div class="status">Loading…</div>
    </div>
  </div>

  <script>
    function parseCSV(text) {
      const lines = text.trim().split('\n');
      const headers = parseLine(lines[0]);
      return lines.slice(1).map(line => {
        const vals = parseLine(line);
        const obj = {};
        headers.forEach((h, i) => { obj[h] = vals[i] ?? ''; });
        return obj;
      });
    }

    function parseLine(line) {
      const out = [];
      let cur = '', quoted = false;
      for (const ch of line) {
        if (ch === '"') { quoted = !quoted; }
        else if (ch === ',' && !quoted) { out.push(cur); cur = ''; }
        else { cur += ch; }
      }
      out.push(cur);
      return out;
    }

    function fmtPlayer(s) {
      if (!s || s === 'NA') return '—';
      const [last, first] = s.split(', ');
      if (!first) return s;
      const cap = w => w.split('-').map(p => p[0].toUpperCase() + p.slice(1).toLowerCase()).join('-');
      return cap(first) + ' ' + cap(last);
    }

    function fmtLeader(s) {
      if (!s) return '—';
      const m = s.match(/^(.+) \((\d+)\)$/);
      if (!m) return s;
      return fmtPlayer(m[1]) + ' (' + Number(m[2]).toLocaleString() + ')';
    }

    function val(s) { return (!s || s === 'NA') ? '—' : s; }

    function th(text, cls = '') {
      const el = document.createElement('th');
      el.textContent = text;
      if (cls) cls.split(' ').forEach(c => c && el.classList.add(c));
      return el;
    }

    function buildTable(rows) {
      const table = document.createElement('table');
      const thead = table.createTHead();

      // ── Superheader row ──────────────────────────────────────────────
      const sup = thead.insertRow();

      const shSeason = th('Season', 'sh-season');
      shSeason.rowSpan = 2;
      sup.appendChild(shSeason);

      const shPost = th('Postseason Results', 'sh-post');
      shPost.colSpan = 4;
      sup.appendChild(shPost);

      const shAwards = th('Season Awards', 'sh-awards');
      shAwards.colSpan = 6;
      sup.appendChild(shAwards);

      const shStats = th('Statistical Leaders', 'sh-stats');
      shStats.colSpan = 6;
      sup.appendChild(shStats);

      const shRatings = th('Team Ratings', 'sh-ratings');
      shRatings.colSpan = 3;
      sup.appendChild(shRatings);

      // ── Column header row ─────────────────────────────────────────────
      const sub = thead.insertRow();
      [
        ['Champion',    'div-left'],
        ['Runner-Up',   ''],
        ['East RU',     ''],
        ['West RU',     'div-right'],
        ['MVP',         ''],
        ['DPOY',        ''],
        ['ROTY',        ''],
        ['MIP',         ''],
        ['FOTY',        ''],
        ['COTY',        'div-right'],
        ['PTS',         ''],
        ['REB',         ''],
        ['AST',         ''],
        ['STL',         ''],
        ['BLK',         ''],
        ['3PM',         'div-right'],
        ['Best Offense',''],
        ['Best Defense',''],
        ['Best Overall',''],
      ].forEach(([label, cls]) => sub.appendChild(th(label, cls)));

      // ── Body ──────────────────────────────────────────────────────────
      const tbody = table.createTBody();
      [...rows].reverse().forEach(row => {
        const tr = tbody.insertRow();

        function cell(text, ...cls) {
          const td = tr.insertCell();
          td.textContent = text;
          cls.forEach(c => c && td.classList.add(c));
          return td;
        }

        cell(row.SEASON, 'season');
        cell(val(row.CHAMPION),      'champion', 'div-left');
        cell(val(row.RUNNER_UP));
        cell(val(row.EAST_RUNNER_UP));
        cell(val(row.WEST_RUNNER_UP), 'div-right');
        cell(fmtPlayer(row.MVP));
        cell(fmtPlayer(row.DPOY));
        cell(fmtPlayer(row.ROTY));
        cell(fmtPlayer(row.MIP));
        cell(val(row.FOTY),          'muted');
        cell(val(row.COTY),          'muted', 'div-right');
        cell(fmtLeader(row.PTS_LEADER));
        cell(fmtLeader(row.REB_LEADER));
        cell(fmtLeader(row.AST_LEADER));
        cell(fmtLeader(row.STL_LEADER));
        cell(fmtLeader(row.BLK_LEADER));
        cell(fmtLeader(row.TPM_LEADER), 'div-right');
        cell(val(row.BEST_OFF));
        cell(val(row.BEST_DEF));
        cell(val(row.BEST_OVERALL));
      });

      return table;
    }

    // Seasons up to and including this are sourced from the metadata.R pipeline (league-history.csv).
    // Seasons strictly after this are built live from bracket + award ballot data.
    const LEGACY_CUTOFF = '24-25';

    // Tally a single award category from ballot data using the [5,3,1] point system.
    // Returns the winning candidate (slug or team abbr) or null.
    function tallyAward(ballots, key) {
      const pts = {};
      Object.values(ballots).forEach(ballot => {
        (ballot[key] || []).forEach((candidate, i) => {
          if (candidate != null) {
            const w = [5, 3, 1][i] ?? 0;
            if (w) pts[candidate] = (pts[candidate] || 0) + w;
          }
        });
      });
      const sorted = Object.entries(pts).sort((a, b) => b[1] - a[1]);
      return sorted.length ? sorted[0][0] : null;
    }

    // Convert a player slug to "LAST, FIRST" format using the bios dict.
    function slugToName(slug, bios) {
      if (!slug) return '';
      return (bios && bios[slug]) ? bios[slug].name || '' : '';
    }

    // Derive the loser of a bracket matchup row.
    function loser(g) {
      if (!g) return '';
      return g.T1 === g.WINNER ? g.T2 : g.T1;
    }

    // Build one live history row from bracket + ballot data for the given season.
    function buildLiveRow(season, brackets, ballots, bios) {
      const s = brackets.filter(r => r.SEASON === season);
      const done = r => parseInt(r.T1_W) === 4 || parseInt(r.T2_W) === 4;
      const finals = s.find(r => r.ROUND === '4' && done(r));
      const confFinals = s.filter(r => r.ROUND === '3' && done(r));
      const eastCF = confFinals.find(r => r.T1_SEED && r.T1_SEED.startsWith('East-'));
      const westCF = confFinals.find(r => r.T1_SEED && r.T1_SEED.startsWith('West-'));

      const row = {
        SEASON:         season,
        CHAMPION:       finals ? finals.WINNER : '',
        RUNNER_UP:      loser(finals),
        EAST_RUNNER_UP: loser(eastCF),
        WEST_RUNNER_UP: loser(westCF),
        MVP: '', DPOY: '', ROTY: '', MIP: '', FOTY: '', COTY: '',
        PTS_LEADER: '', REB_LEADER: '', AST_LEADER: '',
        STL_LEADER: '', BLK_LEADER: '', TPM_LEADER: '',
        BEST_OFF: '', BEST_DEF: '', BEST_OVERALL: '',
      };

      if (ballots) {
        row.MVP  = slugToName(tallyAward(ballots, 'MVP'),  bios);
        row.DPOY = slugToName(tallyAward(ballots, 'DPOY'), bios);
        row.ROTY = slugToName(tallyAward(ballots, 'ROTY'), bios);
        row.MIP  = slugToName(tallyAward(ballots, 'MIP'),  bios);
        row.FOTY = tallyAward(ballots, 'FOTY') || '';
        row.COTY = tallyAward(ballots, 'COTY') || '';
      }

      return row;
    }

    (async () => {
      const wrap = document.getElementById('table-wrap');
      const token = localStorage.getItem('nbn_token') || '';
      try {
        // Fetch all data sources in parallel.
        const [historyRes, bracketsRes, configRes] = await Promise.all([
          fetch('/data/league-history.csv'),
          fetch('/standings/playoff-brackets.csv'),
          fetch('/api/awards-config'),
        ]);

        if (!historyRes.ok) throw new Error('Failed to load league-history.csv');

        // Legacy rows: from CSV, only up to and including LEGACY_CUTOFF.
        const legacyRows = parseCSV(await historyRes.text())
          .filter(r => r.SEASON <= LEGACY_CUTOFF);

        // Playoff bracket data for live seasons.
        const allBrackets = bracketsRes.ok ? parseCSV(await bracketsRes.text()) : [];

        // Awards reveal config.
        const awardsConfig = configRes.ok ? await configRes.json() : {};

        // Build live rows for any season beyond the cutoff that has bracket data.
        const liveSeasons = [...new Set(
          allBrackets.filter(r => r.SEASON > LEGACY_CUTOFF).map(r => r.SEASON)
        )].sort();

        const liveRows = [];
        for (const season of liveSeasons) {
          const isRevealed = !!(awardsConfig[season]?.revealed);
          let ballots = null;
          let bios = null;

          if (isRevealed) {
            const authHeader = token ? { 'Authorization': `Bearer ${token}` } : {};
            const [ballotsRes, biosRes] = await Promise.all([
              fetch(`/api/awards-ballots/${season}`, { headers: authHeader }),
              fetch('/api/players'),
            ]);
            if (ballotsRes.ok) ballots = await ballotsRes.json();
            if (biosRes.ok)    bios    = await biosRes.json();
          }

          liveRows.push(buildLiveRow(season, allBrackets, ballots, bios));
        }

        const allRows = [...legacyRows, ...liveRows];
        wrap.innerHTML = '';
        wrap.appendChild(buildTable(allRows));
      } catch (e) {
        wrap.innerHTML = `<div class="status">Failed to load league history: ${e.message}</div>`;
      }
    })();
  </script>
  <script src="/nav.js"></script>
  <script src="/token-badge.js"></script>
</body>
</html>
