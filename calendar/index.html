<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar — NBN</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #111827; color: #f3f4f6; min-height: 100vh; padding: 2rem 1rem 4rem; }
    .page { max-width: 700px; margin: 0 auto; }
    .nav { margin-bottom: 1.75rem; font-size: 0.875rem; color: #9ca3af; }
    .nav a { color: #9ca3af; text-decoration: none; }
    .nav a:hover { color: #f3f4f6; }

    /* ── Header ────────────────────────────────────────────────── */
    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.75rem; gap: 1rem; flex-wrap: wrap; }
    header h1 { font-size: 1.875rem; font-weight: 700; letter-spacing: -0.02em; }
    .controls { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }

    .add-event-btn { background: none; border: 1px solid #4b5563; color: #a78bfa; border-radius: 6px; padding: 0.3rem 0.75rem; cursor: pointer; font-size: 0.8rem; font-weight: 500; }
    .add-event-btn:hover { border-color: #a78bfa; background: #1e1b2e; }
    .add-game-btn { background: none; border: 1px solid #4b5563; color: #60a5fa; border-radius: 6px; padding: 0.3rem 0.75rem; cursor: pointer; font-size: 0.8rem; font-weight: 500; }
    .add-game-btn:hover { border-color: #60a5fa; background: #0c1929; }

    /* View toggle */
    .view-toggle { display: flex; background: #1f2937; border-radius: 6px; padding: 2px; gap: 2px; }
    .view-btn { background: none; border: none; color: #9ca3af; padding: 0.3rem 0.8rem; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: 500; }
    .view-btn.active { background: #374151; color: #f3f4f6; }
    .view-btn:hover:not(.active) { color: #d1d5db; }

    /* Month nav (shown only in month view) */
    .month-nav { display: flex; align-items: center; gap: 0.5rem; }
    .month-btn { background: #374151; border: 1px solid #4b5563; color: #d1d5db; border-radius: 6px; padding: 0.3rem 0.65rem; cursor: pointer; font-size: 0.85rem; line-height: 1.4; }
    .month-btn:hover { background: #4b5563; }
    .month-label { font-size: 1rem; font-weight: 600; min-width: 140px; text-align: center; }

    /* ── Add event form ─────────────────────────────────────────── */
    .add-event-form { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; background: #1e1b2e; border: 1px solid #4c1d95; border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 1.25rem; }
    .add-event-form label { font-size: 0.78rem; color: #c4b5fd; font-weight: 600; white-space: nowrap; }
    .add-event-form input[type="date"], .add-event-form input[type="text"] {
      background: #111827; border: 1px solid #374151; color: #f3f4f6; border-radius: 5px;
      padding: 0.3rem 0.6rem; font-size: 0.82rem; outline: none;
    }
    .add-event-form input[type="date"] { width: 140px; }
    .add-event-form input[type="text"] { flex: 1; min-width: 140px; }
    .add-event-form input:focus { border-color: #7c3aed; }
    .add-event-form .form-save { background: #7c3aed; border: none; color: #fff; border-radius: 5px; padding: 0.3rem 0.75rem; cursor: pointer; font-size: 0.82rem; font-weight: 600; }
    .add-event-form .form-save:hover { background: #6d28d9; }
    .add-event-form .form-save:disabled { opacity: 0.5; cursor: default; }
    .add-event-form .form-cancel { background: none; border: none; color: #6b7280; cursor: pointer; font-size: 0.82rem; padding: 0.3rem 0.5rem; }
    .add-event-form .form-cancel:hover { color: #9ca3af; }
    .add-event-form .form-err { font-size: 0.75rem; color: #f87171; width: 100%; }

    /* ── Add game(s) form ───────────────────────────────────────── */
    .add-game-form { background: #0c1929; border: 1px solid #1d4ed8; border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 1.25rem; display: flex; flex-direction: column; gap: 0.45rem; }
    .game-rows { display: flex; flex-direction: column; gap: 0.35rem; }
    .game-row { display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; }
    .game-row input[type="date"], .game-row select, .game-row input[type="text"] {
      background: #111827; border: 1px solid #374151; color: #f3f4f6; border-radius: 5px;
      padding: 0.3rem 0.6rem; font-size: 0.82rem; outline: none;
    }
    .game-row input[type="date"] { width: 138px; }
    .game-row select { width: 76px; }
    .game-row input[type="text"] { flex: 1; min-width: 100px; }
    .game-row input:focus, .game-row select:focus { border-color: #3b82f6; }
    .game-row-at { color: #4b5563; font-size: 0.82rem; font-weight: 700; }
    .game-row-del { background: none; border: none; color: #374151; cursor: pointer; font-size: 1.1rem; line-height: 1; padding: 0 0.1rem; transition: color 0.1s; }
    .game-row-del:hover { color: #f87171; }
    .add-game-actions { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .add-game-form .add-another { background: none; border: 1px dashed #1e3a5f; color: #4b6fa8; border-radius: 5px; padding: 0.25rem 0.65rem; cursor: pointer; font-size: 0.78rem; }
    .add-game-form .add-another:hover { border-color: #3b82f6; color: #60a5fa; }
    .add-game-form .form-save { background: #1d4ed8; border: none; color: #fff; border-radius: 5px; padding: 0.3rem 0.75rem; cursor: pointer; font-size: 0.82rem; font-weight: 600; }
    .add-game-form .form-save:hover { background: #1e40af; }
    .add-game-form .form-save:disabled { opacity: 0.5; cursor: default; }
    .add-game-form .form-cancel { background: none; border: none; color: #6b7280; cursor: pointer; font-size: 0.82rem; padding: 0.3rem 0.5rem; }
    .add-game-form .form-cancel:hover { color: #9ca3af; }
    .add-game-form .form-err { font-size: 0.75rem; color: #f87171; }

    /* ── Scheduled (unplayed) games ─────────────────────────────── */
    .sched-schd-game { font-size: 0.82rem; color: #93c5fd; padding: 0.18rem 0.5rem; border-radius: 4px; display: flex; align-items: center; gap: 0.5rem; }
    .sched-schd-game:hover { background: #1f2937; }
    .sched-schd-teams { flex: 1; }
    .sched-schd-note { font-size: 0.7rem; color: #6b7280; white-space: nowrap; background: #1a2535; border-radius: 3px; padding: 0.1rem 0.35rem; }
    .sched-schd-del { background: none; border: none; color: #6b7280; cursor: pointer; font-size: 0.8rem; padding: 0 0.2rem; line-height: 1; opacity: 0; transition: opacity 0.1s; }
    .sched-schd-game:hover .sched-schd-del { opacity: 1; }
    .sched-schd-del:hover { color: #f87171; }
    .schd-pip { font-size: 0.68rem; color: #60a5fa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }

    .cal td.has-scheduled:not(.has-games) .day-num { color: #d1d5db; }
    .cal td.has-scheduled:not(.has-games):not(.has-vesting):not(.has-custom) { background: #0d1929; }
    .cal td.has-scheduled:not(.has-games):not(.has-vesting):not(.has-custom):hover { background: #111e33; }

    /* ── Schedule view ──────────────────────────────────────────── */
    .schedule { display: flex; flex-direction: column; }

    .load-more-btn { align-self: flex-start; background: none; border: 1px solid #374151; color: #6b7280; border-radius: 6px; padding: 0.35rem 0.8rem; cursor: pointer; font-size: 0.8rem; margin-bottom: 1.25rem; }
    .load-more-btn:hover { border-color: #6b7280; color: #9ca3af; }

    .sched-month-hdr { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #4b5563; padding: 1rem 0 0.5rem; display: flex; align-items: center; gap: 0.75rem; }
    .sched-month-hdr::after { content: ''; flex: 1; height: 1px; background: #1f2937; }

    .today-divider { display: flex; align-items: center; gap: 0.75rem; margin: 0.5rem 0 1rem; color: #60a5fa; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; }
    .today-divider::before, .today-divider::after { content: ''; flex: 1; height: 1px; background: #2563eb; }

    .sched-day { padding: 0.6rem 0; border-bottom: 1px solid #1f2937; }
    .sched-day:last-child { border-bottom: none; }
    .sched-date-hdr { font-size: 0.8rem; font-weight: 600; color: #9ca3af; margin-bottom: 0.35rem; }
    .sched-events { display: flex; flex-direction: column; gap: 0.15rem; padding-left: 0.75rem; }

    .sched-game { font-size: 0.82rem; color: #d1d5db; cursor: pointer; padding: 0.18rem 0.5rem; border-radius: 4px; display: flex; align-items: center; gap: 0.5rem; }
    .sched-game:hover { background: #1f2937; }
    .sched-game-teams { flex: 1; }
    .sched-game-score { color: #6b7280; font-size: 0.75rem; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .sched-game-type { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #d97706; background: #292008; padding: 0.1rem 0.3rem; border-radius: 3px; white-space: nowrap; }

    .sched-vest { font-size: 0.82rem; color: #f59e0b; cursor: pointer; padding: 0.18rem 0.5rem; border-radius: 4px; display: flex; align-items: baseline; gap: 0.5rem; }
    .sched-vest:hover { background: #1f2937; color: #fbbf24; }
    .sched-vest-name { flex: 1; }
    .sched-vest-amt { font-size: 0.75rem; color: #d97706; white-space: nowrap; }

    .sched-custom { font-size: 0.82rem; color: #c4b5fd; padding: 0.18rem 0.5rem; border-radius: 4px; display: flex; align-items: center; gap: 0.5rem; }
    .sched-custom-label { flex: 1; }
    .sched-custom-del { background: none; border: none; color: #6b7280; cursor: pointer; font-size: 0.8rem; padding: 0 0.2rem; line-height: 1; opacity: 0; transition: opacity 0.1s; }
    .sched-custom:hover { background: #1f2937; }
    .sched-custom:hover .sched-custom-del { opacity: 1; }
    .sched-custom-del:hover { color: #f87171; }

    /* ── Month / grid view ──────────────────────────────────────── */
    .cal { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .cal th { text-align: center; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #6b7280; padding: 0.5rem 0; border-bottom: 1px solid #374151; }
    .cal td { vertical-align: top; padding: 0; height: 90px; border: 1px solid #1f2937; }

    .day-cell { height: 100%; padding: 0.4rem 0.5rem; display: flex; flex-direction: column; gap: 0.25rem; }
    .day-num { font-size: 0.78rem; font-weight: 600; color: #6b7280; }

    .cal td.has-games .day-num    { color: #d1d5db; }
    .cal td.is-today .day-num     { color: #60a5fa; font-weight: 700; }
    .cal td.other-month           { background: #0d1117; }
    .cal td.other-month .day-num  { color: #374151; }
    .cal td.future .day-num       { color: #374151; }

    .cal td.has-vesting .day-num  { color: #d1d5db; }
    .cal td.has-vesting:not(.has-games) { background: #1c1710; }
    .cal td.has-vesting:not(.has-games):hover { background: #25200f; }

    .cal td.has-custom .day-num   { color: #d1d5db; }
    .cal td.has-custom:not(.has-games):not(.has-vesting) { background: #13111e; }

    .cal td.has-games { background: #1a2535; cursor: pointer; }
    .cal td.has-games:hover { background: #1e3a5f; }
    .cal td.is-today { outline: 2px solid #3b82f6; outline-offset: -2px; }

    .today-label  { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #60a5fa; }
    .game-pip     { font-size: 0.68rem; color: #9ca3af; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
    .vest-pip     { font-size: 0.68rem; color: #f59e0b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; cursor: pointer; }
    .vest-pip:hover  { color: #fbbf24; text-decoration: underline; }
    .vest-count   { font-size: 0.68rem; color: #f59e0b; line-height: 1.3; }
    .custom-pip   { font-size: 0.68rem; color: #a78bfa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }

    .loading { color: #6b7280; font-size: 0.875rem; }
  </style>
</head>
<body>
  <div class="page">
    <nav class="nav"><a href="/">← Home</a></nav>
    <header>
      <h1>Calendar</h1>
      <div class="controls">
        <button class="add-event-btn" id="add-event-btn" style="display:none">+ Add event</button>
        <button class="add-game-btn"  id="add-game-btn"  style="display:none">+ Add game(s)</button>
        <div class="view-toggle">
          <button class="view-btn active" id="btn-sched">Schedule</button>
          <button class="view-btn"        id="btn-month">Month</button>
        </div>
        <div class="month-nav" id="month-nav" style="display:none">
          <button class="month-btn" id="btn-prev">&#8592;</button>
          <div class="month-label" id="month-label"></div>
          <button class="month-btn" id="btn-next">&#8594;</button>
        </div>
      </div>
    </header>
    <div id="content"><span class="loading">Loading…</span></div>
  </div>

  <script>
    const CAL_DAYS    = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    const CAL_MONTHS  = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    const MONTHS_SHORT = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const TEAMS       = ["atl","bkn","bos","cha","chi","cle","dal","den","det","gsw","hou","ind","lac","lal","mem","mia","mil","min","nop","nyk","okc","orl","phi","phx","por","sac","sas","tor","uta","was"];
    const SCHED_PAGE  = 30;   // event days per "load more"

    let gamesByDate          = {};   // "YYYY-MM-DD" → [{home_team, away_team, home_score, away_score, gametype}]
    let vestingByDate        = {};   // "YYYY-MM-DD" → [{slug, name, team, season, amount}]
    let customEventsByDate   = {};   // "YYYY-MM-DD" → [{id, date, label}]
    let scheduledGamesByDate = {};   // "YYYY-MM-DD" → [{id, date, home_team, away_team, note}]
    let leagueToday          = null; // "YYYY-MM-DD"
    let isBoD                = false;
    let showAddForm          = false;
    let showAddGameForm      = false;

    let viewMode   = 'schedule';
    let viewYear, viewMonth;
    let shownPastIdx = 0;  // index into getPastEventDates()

    const storedToken = () => localStorage.getItem('nbn_token');

    // ── Helpers ────────────────────────────────────────────────────

    function fmtVestAmt(amount) {
      if (!amount) return 'fully gtd';
      const n = parseFloat(String(amount).replace(/[^0-9.]/g, ''));
      if (isNaN(n) || n === 0) return 'fully gtd';
      if (n >= 1_000_000) return `$${(n / 1_000_000).toFixed(1)}M`;
      if (n >= 1_000)     return `$${Math.round(n / 1_000)}K`;
      return `$${n}`;
    }

    function fmtPlayerName(raw) {
      const comma = raw.indexOf(',');
      const titleCase = s => s.split(' ').map(w => w ? w[0].toUpperCase() + w.slice(1).toLowerCase() : '').join(' ');
      if (comma === -1) return titleCase(raw);
      const last  = titleCase(raw.slice(0, comma).trim());
      const first = raw.slice(comma + 1).trim();
      return first ? `${first[0]}. ${last}` : last;
    }

    function parseCsvSlugs(text) {
      const lines = text.trim().split('\n');
      if (lines.length < 2) return [];
      const headers = lines[0].split(',').map(h => h.trim());
      const si = headers.indexOf('SLUG');
      if (si === -1) return [];
      return lines.slice(1).map(l => l.split(',')[si]?.trim()).filter(Boolean);
    }

    function fmtDateHdr(dateStr) {
      const dt = new Date(dateStr + 'T00:00:00');
      return `${CAL_DAYS[dt.getDay()]}, ${MONTHS_SHORT[dt.getMonth()]} ${dt.getDate()}`;
    }

    function monthKey(dateStr)  { return dateStr.slice(0, 7); }
    function fmtMonthLabel(ym)  {
      const [y, m] = ym.split('-');
      return `${CAL_MONTHS[+m - 1]} ${y}`;
    }

    function getPastEventDates() {
      const gameDates   = Object.keys(gamesByDate).filter(d => d < leagueToday);
      const customDates = Object.keys(customEventsByDate).filter(d => d < leagueToday);
      const schedDates  = Object.keys(scheduledGamesByDate).filter(d => d < leagueToday);
      return [...new Set([...gameDates, ...customDates, ...schedDates])].sort();
    }

    function getFutureEventDates() {
      const vestDates   = Object.keys(vestingByDate).filter(d => d >= leagueToday);
      const customDates = Object.keys(customEventsByDate).filter(d => d >= leagueToday);
      const schedDates  = Object.keys(scheduledGamesByDate).filter(d => d >= leagueToday);
      return [...new Set([...vestDates, ...customDates, ...schedDates])].sort();
    }

    // ── Data loading ──────────────────────────────────────────────

    async function loadVestingEvents() {
      const [biosRaw, ...rosterResults] = await Promise.allSettled([
        fetch('/api/players').then(r => r.json()),
        ...TEAMS.map(t =>
          fetch(`/data/${t}-roster.csv`).then(r => r.text())
            .then(txt => ({ team: t.toUpperCase(), slugs: parseCsvSlugs(txt) }))
        ),
      ]);
      if (biosRaw.status !== 'fulfilled') return {};
      const bios = biosRaw.value;
      const slugTeam = {};
      rosterResults.forEach(res => {
        if (res.status !== 'fulfilled') return;
        const { team, slugs } = res.value;
        slugs.forEach(slug => { slugTeam[slug] = team; });
      });
      const byDate = {};
      Object.entries(bios).forEach(([slug, bio]) => {
        const name = fmtPlayerName(bio.name || slug);
        const team = slugTeam[slug] || null;
        const sched = bio.guarantee_schedule || {};
        Object.entries(sched).forEach(([season, steps]) => {
          if (!Array.isArray(steps)) return;
          steps.forEach(step => {
            if (!step.date) return;
            if (!byDate[step.date]) byDate[step.date] = [];
            byDate[step.date].push({ slug, name, team, season, amount: step.amount || null });
          });
        });
        const legacyDates = bio.guarantee_dates || {};
        Object.entries(legacyDates).forEach(([season, date]) => {
          if (!date) return;
          const schedSteps = sched[season] || [];
          if (schedSteps.some(s => s.date === date)) return;
          const amount = (bio.guaranteed || {})[season] || null;
          if (!byDate[date]) byDate[date] = [];
          byDate[date].push({ slug, name, team, season, amount });
        });
      });
      return byDate;
    }

    function loadCustomEvents() {
      return fetch('/api/calendar/events').then(r => r.json()).then(events => {
        const byDate = {};
        events.forEach(ev => {
          if (!byDate[ev.date]) byDate[ev.date] = [];
          byDate[ev.date].push(ev);
        });
        return byDate;
      });
    }

    async function checkAuth() {
      const token = storedToken();
      if (!token) return false;
      try {
        const me = await fetch('/api/auth/me', {
          headers: { Authorization: `Bearer ${token}` }
        }).then(r => r.json());
        return me.roles.includes('bod') || me.roles.includes('admin');
      } catch { return false; }
    }

    // ── Init ──────────────────────────────────────────────────────

    async function init() {
      try {
        const [gamesResult, vestResult, customResult, bodResult, schedResult] = await Promise.allSettled([
          fetch('/api/boxscores/games').then(r => r.json()),
          loadVestingEvents(),
          loadCustomEvents(),
          checkAuth(),
          fetch('/api/calendar/games').then(r => r.json()),
        ]);

        if (gamesResult.status === 'fulfilled') {
          gamesResult.value.forEach(g => {
            if (!gamesByDate[g.date]) gamesByDate[g.date] = [];
            gamesByDate[g.date].push(g);
          });
          const dates = Object.keys(gamesByDate).sort();
          if (dates.length) {
            const lastDt = new Date(dates[dates.length - 1] + 'T00:00:00');
            lastDt.setDate(lastDt.getDate() + 1);
            leagueToday = lastDt.toISOString().slice(0, 10);
            viewYear    = lastDt.getFullYear();
            viewMonth   = lastDt.getMonth();
          }
        }
        if (vestResult.status === 'fulfilled')   vestingByDate      = vestResult.value;
        if (customResult.status === 'fulfilled') customEventsByDate = customResult.value;
        if (bodResult.status === 'fulfilled')    isBoD              = bodResult.value;
        if (schedResult.status === 'fulfilled') {
          schedResult.value.forEach(g => {
            if (!scheduledGamesByDate[g.date]) scheduledGamesByDate[g.date] = [];
            scheduledGamesByDate[g.date].push(g);
          });
        }

        if (!leagueToday) {
          const now = new Date();
          leagueToday = now.toISOString().slice(0, 10);
          viewYear    = now.getFullYear();
          viewMonth   = now.getMonth();
        }

        shownPastIdx = getPastEventDates().length; // default: no past shown

        if (isBoD) {
          const evtBtn = document.getElementById('add-event-btn');
          evtBtn.style.display = '';
          evtBtn.onclick = () => { showAddForm = !showAddForm; showAddGameForm = false; renderView(); };

          const gameBtn = document.getElementById('add-game-btn');
          gameBtn.style.display = '';
          gameBtn.onclick = () => { showAddGameForm = !showAddGameForm; showAddForm = false; renderView(); };
        }

        document.getElementById('btn-sched').onclick = () => switchView('schedule');
        document.getElementById('btn-month').onclick = () => switchView('month');

        renderView();
      } catch(e) {
        document.getElementById('content').innerHTML =
          `<span class="loading" style="color:#f87171">${e.message}</span>`;
      }
    }

    function switchView(mode) {
      viewMode = mode;
      showAddForm = false;
      showAddGameForm = false;
      document.getElementById('btn-sched').classList.toggle('active', mode === 'schedule');
      document.getElementById('btn-month').classList.toggle('active', mode === 'month');
      document.getElementById('month-nav').style.display = mode === 'month' ? '' : 'none';
      renderView();
    }

    function renderView() {
      if (viewMode === 'schedule') renderSchedule();
      else                         renderMonth();
    }

    // ── Add event form ────────────────────────────────────────────

    function makeAddEventForm() {
      const form = document.createElement('div');
      form.className = 'add-event-form';

      const dateLbl = document.createElement('label');
      dateLbl.textContent = 'Date';
      const dateIn = document.createElement('input');
      dateIn.type = 'date';
      dateIn.required = true;

      const labelLbl = document.createElement('label');
      labelLbl.textContent = 'Label';
      const labelIn = document.createElement('input');
      labelIn.type = 'text';
      labelIn.placeholder = 'e.g. Free Agency Opens';
      labelIn.required = true;

      const saveBtn = document.createElement('button');
      saveBtn.className = 'form-save';
      saveBtn.textContent = 'Save';

      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'form-cancel';
      cancelBtn.textContent = 'Cancel';
      cancelBtn.onclick = () => { showAddForm = false; renderView(); };

      const errEl = document.createElement('div');
      errEl.className = 'form-err';

      saveBtn.onclick = async () => {
        const date  = dateIn.value.trim();
        const label = labelIn.value.trim();
        if (!date || !label) { errEl.textContent = 'Date and label are required.'; return; }
        saveBtn.disabled = true;
        saveBtn.textContent = 'Saving…';
        errEl.textContent = '';
        try {
          const res = await fetch('/api/calendar/events', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${storedToken()}`,
            },
            body: JSON.stringify({ date, label }),
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.detail || `HTTP ${res.status}`);
          }
          const ev = await res.json();
          if (!customEventsByDate[ev.date]) customEventsByDate[ev.date] = [];
          customEventsByDate[ev.date].push(ev);
          showAddForm = false;
          renderView();
        } catch(e) {
          errEl.textContent = e.message;
          saveBtn.disabled = false;
          saveBtn.textContent = 'Save';
        }
      };

      form.append(dateLbl, dateIn, labelLbl, labelIn, saveBtn, cancelBtn, errEl);
      return form;
    }

    async function deleteCustomEvent(id, date) {
      try {
        const res = await fetch(`/api/calendar/events/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${storedToken()}` },
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        customEventsByDate[date] = (customEventsByDate[date] || []).filter(e => e.id !== id);
        if (!customEventsByDate[date].length) delete customEventsByDate[date];
        renderView();
      } catch(e) {
        alert(`Could not delete event: ${e.message}`);
      }
    }

    async function deleteScheduledGame(id, date) {
      try {
        const res = await fetch(`/api/calendar/games/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${storedToken()}` },
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        scheduledGamesByDate[date] = (scheduledGamesByDate[date] || []).filter(g => g.id !== id);
        if (!scheduledGamesByDate[date].length) delete scheduledGamesByDate[date];
        renderView();
      } catch(e) {
        alert(`Could not delete scheduled game: ${e.message}`);
      }
    }

    function makeAddGameForm() {
      const teamOpts = TEAMS.map(t => `<option value="${t.toUpperCase()}">${t.toUpperCase()}</option>`).join('');
      const rows = []; // [{el, dateIn, awayIn, homeIn, noteIn}]

      const form = document.createElement('div');
      form.className = 'add-game-form';

      const rowsWrap = document.createElement('div');
      rowsWrap.className = 'game-rows';

      function addRow(defaultDate) {
        const rowEl = document.createElement('div');
        rowEl.className = 'game-row';

        const dateIn = document.createElement('input');
        dateIn.type = 'date';
        dateIn.value = defaultDate || '';

        const awayIn = document.createElement('select');
        awayIn.innerHTML = '<option value="" disabled selected>Away</option>' + teamOpts;

        const atLbl = document.createElement('span');
        atLbl.className = 'game-row-at';
        atLbl.textContent = '@';

        const homeIn = document.createElement('select');
        homeIn.innerHTML = '<option value="" disabled selected>Home</option>' + teamOpts;

        const noteIn = document.createElement('input');
        noteIn.type = 'text';
        noteIn.placeholder = 'Note (optional)';

        const delBtn = document.createElement('button');
        delBtn.className = 'game-row-del';
        delBtn.textContent = '×';
        delBtn.title = 'Remove this game';
        delBtn.onclick = () => {
          if (rows.length === 1) return;
          const idx = rows.findIndex(r => r.el === rowEl);
          if (idx !== -1) rows.splice(idx, 1);
          rowEl.remove();
        };

        rowEl.append(dateIn, awayIn, atLbl, homeIn, noteIn, delBtn);
        rowsWrap.appendChild(rowEl);
        rows.push({ el: rowEl, dateIn, awayIn, homeIn, noteIn });
      }

      addRow('');

      const actions = document.createElement('div');
      actions.className = 'add-game-actions';

      const addAnotherBtn = document.createElement('button');
      addAnotherBtn.className = 'add-another';
      addAnotherBtn.textContent = '＋ Add another game';
      addAnotherBtn.onclick = () => addRow(rows[0]?.dateIn.value || '');

      const saveBtn = document.createElement('button');
      saveBtn.className = 'form-save';
      saveBtn.textContent = 'Save';

      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'form-cancel';
      cancelBtn.textContent = 'Cancel';
      cancelBtn.onclick = () => { showAddGameForm = false; renderView(); };

      const errEl = document.createElement('div');
      errEl.className = 'form-err';

      saveBtn.onclick = async () => {
        errEl.textContent = '';
        for (const row of rows) {
          if (!row.dateIn.value)  { errEl.textContent = 'All games need a date.'; return; }
          if (!row.awayIn.value)  { errEl.textContent = 'All games need an away team.'; return; }
          if (!row.homeIn.value)  { errEl.textContent = 'All games need a home team.'; return; }
          if (row.awayIn.value === row.homeIn.value) { errEl.textContent = 'Home and away teams must differ.'; return; }
        }
        saveBtn.disabled = true;
        saveBtn.textContent = 'Saving…';
        try {
          for (const row of rows) {
            const res = await fetch('/api/calendar/games', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${storedToken()}`,
              },
              body: JSON.stringify({
                date:      row.dateIn.value,
                away_team: row.awayIn.value,
                home_team: row.homeIn.value,
                note:      row.noteIn.value.trim(),
              }),
            });
            if (!res.ok) {
              const err = await res.json().catch(() => ({}));
              throw new Error(err.detail || `HTTP ${res.status}`);
            }
            const game = await res.json();
            if (!scheduledGamesByDate[game.date]) scheduledGamesByDate[game.date] = [];
            scheduledGamesByDate[game.date].push(game);
          }
          showAddGameForm = false;
          renderView();
        } catch(e) {
          errEl.textContent = e.message;
          saveBtn.disabled = false;
          saveBtn.textContent = 'Save';
        }
      };

      actions.append(addAnotherBtn, saveBtn, cancelBtn, errEl);
      form.append(rowsWrap, actions);
      return form;
    }

    // ── Schedule view ─────────────────────────────────────────────

    function renderSchedule() {
      const content = document.getElementById('content');
      const wrap = document.createElement('div');
      wrap.className = 'schedule';

      // Add forms (if open)
      if (showAddForm)     wrap.appendChild(makeAddEventForm());
      if (showAddGameForm) wrap.appendChild(makeAddGameForm());

      const allPast    = getPastEventDates();
      const shownPast  = allPast.slice(shownPastIdx);
      const olderCount = shownPastIdx;

      // "Show past events" button
      if (olderCount > 0) {
        const btn = document.createElement('button');
        btn.className = 'load-more-btn';
        btn.textContent = shownPast.length === 0
          ? 'Show past events'
          : `↑ Load ${Math.min(olderCount, SCHED_PAGE)} more`;
        btn.onclick = () => {
          shownPastIdx = Math.max(0, shownPastIdx - SCHED_PAGE);
          renderSchedule();
        };
        wrap.appendChild(btn);
      }

      // Past dates
      let lastMK = null;
      shownPast.forEach(date => {
        const mk = monthKey(date);
        if (mk !== lastMK) { wrap.appendChild(makeMonthHdr(mk)); lastMK = mk; }
        wrap.appendChild(makeSchedDay(date,
          gamesByDate[date]          || null,
          null,
          customEventsByDate[date]   || null,
          scheduledGamesByDate[date] || null,
        ));
      });

      // Today divider
      const todayDiv = document.createElement('div');
      todayDiv.className = 'today-divider';
      const todayLbl = document.createElement('span');
      todayLbl.textContent = 'Today';
      todayDiv.appendChild(todayLbl);
      wrap.appendChild(todayDiv);

      // Future dates
      getFutureEventDates().forEach(date => {
        const mk = monthKey(date);
        if (mk !== lastMK) { wrap.appendChild(makeMonthHdr(mk)); lastMK = mk; }
        wrap.appendChild(makeSchedDay(date,
          gamesByDate[date]          || null,
          vestingByDate[date]        || null,
          customEventsByDate[date]   || null,
          scheduledGamesByDate[date] || null,
        ));
      });

      content.innerHTML = '';
      content.appendChild(wrap);
    }

    function makeMonthHdr(ym) {
      const hdr = document.createElement('div');
      hdr.className = 'sched-month-hdr';
      hdr.textContent = fmtMonthLabel(ym);
      return hdr;
    }

    function makeSchedDay(dateStr, games, vesting, custom, scheduled) {
      const day = document.createElement('div');
      day.className = 'sched-day';

      const hdr = document.createElement('div');
      hdr.className = 'sched-date-hdr';
      hdr.textContent = fmtDateHdr(dateStr);
      day.appendChild(hdr);

      const evts = document.createElement('div');
      evts.className = 'sched-events';

      // Custom events first (most prominent)
      if (custom) {
        custom.forEach(ev => {
          const row = document.createElement('div');
          row.className = 'sched-custom';

          const lbl = document.createElement('span');
          lbl.className = 'sched-custom-label';
          lbl.textContent = `📅 ${ev.label}`;
          row.appendChild(lbl);

          if (isBoD) {
            const del = document.createElement('button');
            del.className = 'sched-custom-del';
            del.textContent = '×';
            del.title = 'Delete event';
            del.onclick = e => { e.stopPropagation(); deleteCustomEvent(ev.id, ev.date); };
            row.appendChild(del);
          }

          evts.appendChild(row);
        });
      }

      // Scheduled (unplayed) games
      if (scheduled) {
        scheduled.forEach(g => {
          const row = document.createElement('div');
          row.className = 'sched-schd-game';

          const teams = document.createElement('span');
          teams.className = 'sched-schd-teams';
          teams.textContent = `🏀 ${g.away_team} @ ${g.home_team}`;
          row.appendChild(teams);

          if (g.note) {
            const note = document.createElement('span');
            note.className = 'sched-schd-note';
            note.textContent = g.note;
            row.appendChild(note);
          }

          if (isBoD) {
            const del = document.createElement('button');
            del.className = 'sched-schd-del';
            del.textContent = '×';
            del.title = 'Remove scheduled game';
            del.onclick = e => { e.stopPropagation(); deleteScheduledGame(g.id, g.date); };
            row.appendChild(del);
          }

          evts.appendChild(row);
        });
      }

      // Played games (from box scores)
      if (games) {
        games.forEach(g => {
          const row = document.createElement('div');
          row.className = 'sched-game';
          row.onclick = () => location.href = `/boxscores/?date=${dateStr}`;

          const teams = document.createElement('span');
          teams.className = 'sched-game-teams';
          teams.textContent = `${g.away_team} @ ${g.home_team}`;
          row.appendChild(teams);

          if (g.away_score != null && g.home_score != null) {
            const score = document.createElement('span');
            score.className = 'sched-game-score';
            score.textContent = `${g.away_score}–${g.home_score}`;
            row.appendChild(score);
          }
          if (g.gametype === 'PLAYOFF') {
            const badge = document.createElement('span');
            badge.className = 'sched-game-type';
            badge.textContent = 'PO';
            row.appendChild(badge);
          }
          evts.appendChild(row);
        });
      }

      // Vesting events
      if (vesting) {
        vesting.forEach(ev => {
          const row = document.createElement('div');
          row.className = 'sched-vest';
          row.onclick = () => location.href = `/players/?p=${ev.slug}`;

          const nameEl = document.createElement('span');
          nameEl.className = 'sched-vest-name';
          nameEl.textContent = `🔒 ${ev.name}${ev.team ? ' · ' + ev.team : ''}`;
          row.appendChild(nameEl);

          const amt = document.createElement('span');
          amt.className = 'sched-vest-amt';
          amt.textContent = fmtVestAmt(ev.amount);
          row.appendChild(amt);

          evts.appendChild(row);
        });
      }

      day.appendChild(evts);
      return day;
    }

    // ── Month / grid view ─────────────────────────────────────────

    function renderMonth() {
      document.getElementById('month-label').textContent =
        `${CAL_MONTHS[viewMonth]} ${viewYear}`;
      document.getElementById('btn-prev').onclick = () => shiftMonth(-1);
      document.getElementById('btn-next').onclick = () => shiftMonth(1);

      const firstDay    = new Date(viewYear, viewMonth, 1);
      const lastDay     = new Date(viewYear, viewMonth + 1, 0);
      const startOffset = firstDay.getDay();

      const table = document.createElement('table');
      table.className = 'cal';
      const hrow = table.createTHead().insertRow();
      CAL_DAYS.forEach(d => {
        const th = document.createElement('th');
        th.textContent = d;
        hrow.appendChild(th);
      });

      const tbody = table.createTBody();
      let row = tbody.insertRow(), cellCount = 0;

      const prevLast = new Date(viewYear, viewMonth, 0).getDate();
      for (let i = 0; i < startOffset; i++) {
        addMonthCell(row, null, prevLast - startOffset + 1 + i, ['other-month'], false, null, null, null);
        cellCount++;
      }

      for (let d = 1; d <= lastDay.getDate(); d++) {
        if (cellCount && cellCount % 7 === 0) row = tbody.insertRow();
        const dateStr   = `${viewYear}-${String(viewMonth + 1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const classes   = [];
        const games     = gamesByDate[dateStr]          || null;
        const vesting   = vestingByDate[dateStr]        || null;
        const custom    = customEventsByDate[dateStr]   || null;
        const scheduled = scheduledGamesByDate[dateStr] || null;
        if (games)     classes.push('has-games');
        if (vesting)   classes.push('has-vesting');
        if (custom)    classes.push('has-custom');
        if (scheduled) classes.push('has-scheduled');
        if (dateStr === leagueToday) classes.push('is-today');
        else if (!games && !vesting && !custom && !scheduled && dateStr > leagueToday) classes.push('future');
        addMonthCell(row, dateStr, d, classes, dateStr === leagueToday, games, vesting, custom, scheduled);
        cellCount++;
      }

      const trailing = (7 - (cellCount % 7)) % 7;
      for (let i = 1; i <= trailing; i++) {
        if (cellCount % 7 === 0) row = tbody.insertRow();
        addMonthCell(row, null, i, ['other-month'], false, null, null, null);
        cellCount++;
      }

      const content = document.getElementById('content');
      content.innerHTML = '';
      content.appendChild(table);
    }

    function addMonthCell(row, dateStr, dayNum, classes, isToday, games, vesting, custom, scheduled) {
      const td = row.insertCell();
      td.className = classes.join(' ');

      const cell = document.createElement('div');
      cell.className = 'day-cell';

      const num = document.createElement('div');
      num.className = 'day-num';
      num.textContent = dayNum;
      cell.appendChild(num);

      if (isToday) {
        const lbl = document.createElement('div');
        lbl.className = 'today-label';
        lbl.textContent = 'Today';
        cell.appendChild(lbl);
      }

      if (custom) {
        custom.forEach(ev => {
          const pip = document.createElement('div');
          pip.className = 'custom-pip';
          pip.textContent = `📅 ${ev.label}`;
          pip.title = ev.label;
          cell.appendChild(pip);
        });
      }

      if (scheduled) {
        scheduled.forEach(g => {
          const pip = document.createElement('div');
          pip.className = 'schd-pip';
          pip.textContent = `${g.away_team} @ ${g.home_team}`;
          pip.title = g.note ? `${g.away_team} @ ${g.home_team} — ${g.note}` : `${g.away_team} @ ${g.home_team}`;
          cell.appendChild(pip);
        });
      }

      if (games) {
        games.forEach(g => {
          const pip = document.createElement('div');
          pip.className = 'game-pip';
          pip.textContent = `${g.away_team} @ ${g.home_team}`;
          cell.appendChild(pip);
        });
        if (dateStr) td.onclick = () => location.href = `/boxscores/?date=${dateStr}`;
      }

      if (vesting && vesting.length) {
        if (vesting.length === 1) {
          const ev  = vesting[0];
          const pip = document.createElement('div');
          pip.className = 'vest-pip';
          pip.textContent = `🔒 ${ev.name}${ev.team ? ' · ' + ev.team : ''} — ${fmtVestAmt(ev.amount)}`;
          pip.title = `${ev.name} (${ev.season}) — ${fmtVestAmt(ev.amount)} vests`;
          if (dateStr) pip.onclick = e => { e.stopPropagation(); location.href = `/players/?p=${ev.slug}`; };
          cell.appendChild(pip);
        } else {
          const count = document.createElement('div');
          count.className = 'vest-count';
          count.textContent = `🔒 ${vesting.length} contracts vest`;
          cell.appendChild(count);
          vesting.slice(0, 2).forEach(ev => {
            const pip = document.createElement('div');
            pip.className = 'vest-pip';
            pip.style.paddingLeft = '1rem';
            pip.textContent = `${ev.name}${ev.team ? ' · ' + ev.team : ''} — ${fmtVestAmt(ev.amount)}`;
            if (dateStr) pip.onclick = e => { e.stopPropagation(); location.href = `/players/?p=${ev.slug}`; };
            cell.appendChild(pip);
          });
          if (vesting.length > 2) {
            const more = document.createElement('div');
            more.className = 'vest-count';
            more.style.paddingLeft = '1rem';
            more.textContent = `+${vesting.length - 2} more`;
            cell.appendChild(more);
          }
        }
      }

      td.appendChild(cell);
    }

    function shiftMonth(delta) {
      viewMonth += delta;
      if (viewMonth > 11) { viewMonth = 0; viewYear++; }
      if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
      renderMonth();
    }

    init();
  </script>
  <script src="/nav.js"></script>
</body>
</html>
