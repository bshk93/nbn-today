<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Single-Game Assists Highs — NBN Stats</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #111827; color: #f3f4f6; min-height: 100vh; padding: 2rem 1rem 4rem; }
    a { color: #60a5fa; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .page { max-width: 960px; margin: 0 auto; }
    .nav { margin-bottom: 1.75rem; font-size: 0.875rem; color: #9ca3af; }
    .nav a { color: #9ca3af; }
    .nav a:hover { color: #f3f4f6; }
    header { margin-bottom: 1.75rem; }
    header h1 { font-size: 1.875rem; font-weight: 700; letter-spacing: -0.02em; }
    header p { color: #9ca3af; margin-top: 0.4rem; font-size: 0.9rem; }
    .table-wrap { background: #1f2937; border: 1px solid #374151; border-radius: 12px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; white-space: nowrap; }
    thead th { padding: 0.7rem 1rem; text-align: left; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #6b7280; border-bottom: 1px solid #374151; cursor: pointer; user-select: none; }
    thead th:hover { color: #d1d5db; }
    thead th[data-active="true"] { color: #93c5fd; }
    thead th .sort-arrow { margin-left: 4px; font-size: 0.65rem; }
    thead th.right { text-align: right; }
    thead th.center { text-align: center; }
    thead th.stat-primary { color: #9ca3af; }
    thead th.stat-sec { color: #4b5563; }
    tbody tr { border-bottom: 1px solid #283141; transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #263244; }
    td { padding: 0.65rem 1rem; color: #d1d5db; }
    td.player-name { font-weight: 600; color: #f3f4f6; }
    td.right { text-align: right; font-variant-numeric: tabular-nums; }
    td.center { text-align: center; }
    td.muted { color: #6b7280; }
    td.stat-primary { color: #f3f4f6; font-weight: 600; }
    td.stat-sec { color: #6b7280; }
    #status { text-align: center; padding: 3rem; color: #6b7280; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="page">
    <nav class="nav"><a href="/stats/highs">← Game Highs</a></nav>
    <header>
      <h1>Single-Game Assists Highs</h1>
      <p>Top 20 single-game assist performances in NBN history. Click any column to sort.</p>
    </header>
    <div class="table-wrap" id="table-wrap">
      <div id="status">Loading…</div>
    </div>
  </div>
  <script>window.PAGE_CONFIG = { statKey: 'A', statLabel: 'AST', csvPath: '/game-highs-a.csv' };</script>
  <script src="/stats/highs/table.js"></script>
</body>
</html>
