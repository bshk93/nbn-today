<style>

  /* Group sections */
  .archetype-groups { display: flex; flex-direction: column; gap: 2.75rem; }

  .history-detail.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }

  .hd-bars { display: flex; flex-direction: column; gap: 0.22rem; }

<div class="page">
  <h1>Team Archetypes</h1>
  <p class="subtitle">Two-stage clustering of <b id="n-seasons">—</b> team-seasons. Stage 1 groups by shot diet &amp; pace (3PA rate, FT rate, FGA/game). Stage 2 refines by efficiency, defense, and rotation depth.</p>

  <div class="page-nav">
    <a href="/clusters/players/" class="page-nav-link">Players</a>
    <a href="/clusters/teams/" class="page-nav-link active">Teams</a>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="archetypes">Archetypes</button>
    <button class="tab-btn" data-tab="history">Team History</button>
  </div>

  <div id="tab-archetypes" class="tab-content">
    <div id="root"><p class="loading">Loading…</p></div>
  </div>

  <div id="tab-history" class="tab-content" style="display:none">
    <div class="history-select-wrap">
      <select id="team-select">
        <option value="">Select a team…</option>
      </select>
    </div>
    <div id="history-result"><p class="history-empty">Select a team to see their archetype history across seasons.</p></div>
  </div>
</div>
<script>
const DIMS = ['PPG','DEF','TS%','3PA_RATE','FTA_RATE','PACE','ROT_DEPTH','STAR_SHARE'];

const DIM_COLOR = {
  PPG:        '#3b82f6',
  DEF:        '#22c55e',
  'TS%':      '#06b6d4',
  '3PA_RATE': '#8b5cf6',
  'FTA_RATE': '#f97316',
  PACE:       '#f59e0b',
  ROT_DEPTH:  '#ec4899',
  STAR_SHARE: '#ef4444',
};

const DIM_LABEL = {
  PPG:        'PPG',
  DEF:        'DEF',
  'TS%':      'TS%',
  '3PA_RATE': '3P%',
  'FTA_RATE': 'FT%',
  PACE:       'PACE',
  ROT_DEPTH:  'DEPTH',
  STAR_SHARE: 'STARS',
};

const NAMES = {
  '1A': 'Efficient Interior Offenses',
  '1B': 'Deep Inside-Oriented Units',
  '1C': 'Star-Driven Pace Teams',
  '2A': 'Foul-Drawing Halfcourt Grinders',
  '2B': 'Star-Powered Deliberate Systems',
  '2C': 'Slow Mediocre Foul-Drawers',
  '3A': 'High-Volume Balanced Attacks',
  '3B': 'Star-Led Frenetic Teams',
  '3C': 'Egalitarian 3PT Rotations',
  '4A': 'Perimeter-First Balanced Rosters',
  '4B': '3PT-Heavy Defensive Tanks',
  '4C': 'Full-Rebuild Depth Teams',
};

const DESCRIPTIONS = {
  '1A': 'High-scoring, interior-focused offenses that convert efficiently without leaning on the 3-ball. They run a moderate pace and channel most production through their top players.',
  '1B': 'Inside-oriented teams built for depth over star power. The whole rotation contributes meaningful minutes without relying heavily on the perimeter.',
  '1C': 'Fast-paced teams shaped around one or two dominant stars who absorb most of the team\'s minutes. Their supporting cast plays a limited role.',
  '2A': 'Methodical halfcourt teams that live at the free throw line. They play some of the slowest pace in the league, and are extremely efficient when they do score.',
  '2B': 'A franchise superstar runs the show in a deliberate, patient system. The highest star concentration of any cluster — the offense lives and dies with one player.',
  '2C': 'Below-average teams with no defining identity. They play slow, draw some fouls, and produce mediocre results across the board.',
  '3A': 'The most complete offenses in the league — high scoring, efficient, and willing to attack from anywhere: paint, midrange, and the 3-ball.',
  '3B': 'Star-centric teams that push pace and draw fouls but can\'t convert at a high rate. Their fortunes are tied directly to their top player\'s production.',
  '3C': 'The most democratically distributed minutes in the league. Everyone shoots threes, nobody dominates, and the whole roster sees real time.',
  '4A': 'Modern three-point offenses with even minute distribution and above-average efficiency. They pass on paint touches for perimeter looks and make it work.',
  '4B': 'Perimeter-heavy teams that play decent defense but can\'t generate consistent offense. Typically young or rebuilding rosters firing from deep.',
  '4C': 'Full rebuilds spreading time across the roster while hoisting the most threes. Strong defense by rating but almost no offensive output — lottery-bound.',
};

const CLUSTER_ORDER = ['1A','1B','1C','2A','2B','2C','3A','3B','3C','4A','4B','4C'];

const GROUP_COLOR = { '1': '#3b82f6', '2': '#8b5cf6', '3': '#f59e0b', '4': '#22c55e' };

// PCA-derived 2D positions for each archetype (normalized 0–1)
const CLUSTER_POS = {
  '1A': { x: 0.264, y: 0.454 },
  '1B': { x: 0.591, y: 0.604 },
  '1C': { x: 0.536, y: 0.050 },
  '2A': { x: 0.124, y: 0.945 },
  '2B': { x: 0.050, y: 0.392 },
  '2C': { x: 0.483, y: 0.686 },
  '3A': { x: 0.332, y: 0.699 },
  '3B': { x: 0.442, y: 0.194 },
  '3C': { x: 0.757, y: 0.950 },
  '4A': { x: 0.640, y: 0.655 },
  '4B': { x: 0.816, y: 0.106 },
  '4C': { x: 0.950, y: 0.767 },
};

const GROUP_META = {
  '1': { name: 'Inside-Out Offenses',   desc: 'Interior-focused systems, from efficient star-driven units to deep rotation teams with low reliance on the 3-ball.' },
  '2': { name: 'Halfcourt Grinders',    desc: 'The slowest pace in the league. Patient, deliberate systems that live at the free throw line.' },
  '3': { name: 'High-Octane Attacks',   desc: 'High-volume offenses that push pace, draw fouls, and score from everywhere. The most prolific teams in the league.' },
  '4': { name: '3PT-First Systems',     desc: 'Perimeter-oriented teams built around the three-ball — from balanced floor-spacers to full rebuilds hoisting volume threes.' },
};

function clusterColor(hierName) {
  return GROUP_COLOR[hierName[0]] || '#6b7280';
}

function poColor(result) {
  if (result === 'Champion')    return '#f59e0b';
  if (result === 'Runner-Up')   return '#9ca3af';
  if (result === 'Conf Finals') return '#3b82f6';
  if (result === 'Second Round') return '#22c55e';
  if (result === 'First Round') return '#f97316';
  return '#4b5563';
}

// ── Radar ────────────────────────────────────────────────────────────────────

function buildRadar(centroid, size = 110) {
  const NS = 'http://www.w3.org/2000/svg';
  const cx = size / 2, cy = size / 2, maxR = size * 0.38;
  const n = DIMS.length;

  const pt = (angle_deg, r) => {
    const rad = (angle_deg * Math.PI) / 180;
    return [cx + r * Math.cos(rad), cy - r * Math.sin(rad)];
  };
  const angles = DIMS.map((_, i) => 90 - (360 / n) * i);

  const svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('width', size); svg.setAttribute('height', size);
  svg.setAttribute('viewBox', `0 0 ${size} ${size}`);

  [0.33, 0.66, 1].forEach(frac => {
    const pts = angles.map(a => pt(a, maxR * frac).join(',')).join(' ');
    const poly = document.createElementNS(NS, 'polygon');
    poly.setAttribute('points', pts);
    poly.setAttribute('fill', 'none');
    poly.setAttribute('stroke', '#1f2937');
    poly.setAttribute('stroke-width', '1');
    svg.appendChild(poly);
  });

  angles.forEach(a => {
    const [x, y] = pt(a, maxR);
    const line = document.createElementNS(NS, 'line');
    line.setAttribute('x1', cx); line.setAttribute('y1', cy);
    line.setAttribute('x2', x); line.setAttribute('y2', y);
    line.setAttribute('stroke', '#1f2937'); line.setAttribute('stroke-width', '1');
    svg.appendChild(line);
  });

  const polyPts = DIMS.map((d, i) => pt(angles[i], maxR * (centroid[d] || 0)).join(',')).join(' ');
  const poly = document.createElementNS(NS, 'polygon');
  poly.setAttribute('points', polyPts);
  poly.setAttribute('fill', 'rgba(59,130,246,0.2)');
  poly.setAttribute('stroke', '#3b82f6');
  poly.setAttribute('stroke-width', '1.5');
  svg.appendChild(poly);

  DIMS.forEach((d, i) => {
    const [x, y] = pt(angles[i], maxR * (centroid[d] || 0));
    const dot = document.createElementNS(NS, 'circle');
    dot.setAttribute('cx', x); dot.setAttribute('cy', y); dot.setAttribute('r', '2.5');
    dot.setAttribute('fill', DIM_COLOR[d]); dot.setAttribute('stroke', '#0f1117');
    dot.setAttribute('stroke-width', '1');
    dot.appendChild(Object.assign(document.createElementNS(NS, 'title'), {
      textContent: `${DIM_LABEL[d] || d}: ${((centroid[d] || 0) * 100).toFixed(0)}th pct`
    }));
    svg.appendChild(dot);
  });

  const LABEL_R = maxR + 12;
  DIMS.forEach((d, i) => {
    const [x, y] = pt(angles[i], LABEL_R);
    const txt = document.createElementNS(NS, 'text');
    txt.setAttribute('x', x); txt.setAttribute('y', y);
    txt.setAttribute('font-size', '7.5'); txt.setAttribute('fill', '#6b7280');
    txt.setAttribute('font-family', 'Inter, system-ui, sans-serif');
    txt.setAttribute('font-weight', '600');
    const anchor = x < cx - 4 ? 'end' : x > cx + 4 ? 'start' : 'middle';
    txt.setAttribute('text-anchor', anchor);
    txt.setAttribute('dominant-baseline', 'middle');
    txt.textContent = DIM_LABEL[d] || d;
    svg.appendChild(txt);
  });

  return svg;
}

// ── Bubble chart ──────────────────────────────────────────────────────────────

function buildBubbleChart(clusters, onDotClick) {
  const NS = 'http://www.w3.org/2000/svg';
  const W = 500, H = 500;

  const svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.classList.add('bubble-chart');

  const bg = document.createElementNS(NS, 'rect');
  bg.setAttribute('width', W); bg.setAttribute('height', H);
  bg.setAttribute('rx', '10'); bg.setAttribute('fill', '#161b27');
  svg.appendChild(bg);

  // Per-cluster dot layers — all hidden until their bubble is clicked
  const dotLayers = {};
  clusters.forEach(c => {
    const color = GROUP_COLOR[c.hier_name[0]] || '#6b7280';
    const layer = document.createElementNS(NS, 'g');
    layer.setAttribute('display', 'none');
    c.top.forEach(e => {
      if (e.x == null || e.y == null) return;
      const dot = document.createElementNS(NS, 'circle');
      dot.setAttribute('cx', e.x * W); dot.setAttribute('cy', e.y * H); dot.setAttribute('r', '5');
      dot.setAttribute('fill', color + '70'); dot.setAttribute('stroke', color);
      dot.setAttribute('stroke-width', '1');
      if (onDotClick) {
        dot.style.cursor = 'pointer';
        dot.addEventListener('click', ev => { ev.stopPropagation(); onDotClick(e, c.hier_name, color); });
      }
      const t = document.createElementNS(NS, 'title');
      t.textContent = `${e.team} ${e.season} · ${e.record} · ${e.playoff_result}`;
      dot.appendChild(t);
      layer.appendChild(dot);
    });
    dotLayers[c.hier_name] = layer;
    // layer appended after bubbles so dots sit on top and receive clicks
  });

  // Lines connecting same-group clusters
  const byGroup = {};
  clusters.forEach(c => {
    const grp = c.hier_name[0];
    (byGroup[grp] = byGroup[grp] || []).push(c);
  });
  Object.entries(byGroup).forEach(([grp, cs]) => {
    const color = GROUP_COLOR[grp];
    for (let i = 0; i < cs.length; i++) {
      for (let j = i + 1; j < cs.length; j++) {
        const pi = CLUSTER_POS[cs[i].hier_name], pj = CLUSTER_POS[cs[j].hier_name];
        if (!pi || !pj) return;
        const ln = document.createElementNS(NS, 'line');
        ln.setAttribute('x1', pi.x * W); ln.setAttribute('y1', pi.y * H);
        ln.setAttribute('x2', pj.x * W); ln.setAttribute('y2', pj.y * H);
        ln.setAttribute('stroke', color); ln.setAttribute('stroke-width', '1.5');
        ln.setAttribute('stroke-opacity', '0.22');
        svg.appendChild(ln);
      }
    }
  });

  // Bubbles + labels
  let selected = null;
  const circleEls = {};

  clusters.forEach(c => {
    const pos = CLUSTER_POS[c.hier_name];
    if (!pos) return;
    const color = GROUP_COLOR[c.hier_name[0]] || '#6b7280';
    const cx = pos.x * W, cy = pos.y * H;
    const r = Math.max(18, Math.sqrt(c.size) * 5);

    const g = document.createElementNS(NS, 'g');
    g.style.cursor = 'pointer';

    const circle = document.createElementNS(NS, 'circle');
    circle.setAttribute('cx', cx); circle.setAttribute('cy', cy); circle.setAttribute('r', r);
    circle.setAttribute('fill', color + '28'); circle.setAttribute('stroke', color);
    circle.setAttribute('stroke-width', '2');
    const t = document.createElementNS(NS, 'title');
    t.textContent = NAMES[c.hier_name] || c.hier_name;
    circle.appendChild(t);
    g.appendChild(circle);
    circleEls[c.hier_name] = circle;

    const lbl = document.createElementNS(NS, 'text');
    lbl.setAttribute('x', cx); lbl.setAttribute('y', cy);
    lbl.setAttribute('text-anchor', 'middle'); lbl.setAttribute('dominant-baseline', 'middle');
    lbl.setAttribute('font-size', '10'); lbl.setAttribute('font-weight', '800');
    lbl.setAttribute('fill', color); lbl.setAttribute('font-family', 'Inter, system-ui, sans-serif');
    lbl.setAttribute('pointer-events', 'none');
    lbl.textContent = c.hier_name;
    g.appendChild(lbl);

    g.addEventListener('click', () => {
      const deselecting = selected === c.hier_name;

      // Clear previous selection
      if (selected) {
        dotLayers[selected].setAttribute('display', 'none');
        const prev = circleEls[selected];
        if (prev) { prev.setAttribute('stroke-width', '2'); prev.setAttribute('fill', GROUP_COLOR[selected[0]] + '28'); }
      }

      if (deselecting) {
        selected = null;
        return;
      }

      // Select this cluster
      selected = c.hier_name;
      dotLayers[c.hier_name].removeAttribute('display');
      circle.setAttribute('stroke-width', '3.5');
      circle.setAttribute('fill', color + '50');

      // Open the card (no scroll — stay on chart to see dots)
      const card = document.getElementById('archetype-' + c.hier_name);
      if (card) card.classList.add('open');
    });

    g.addEventListener('mouseenter', () => {
      if (selected !== c.hier_name) circle.setAttribute('fill', color + '50');
    });
    g.addEventListener('mouseleave', () => {
      if (selected !== c.hier_name) circle.setAttribute('fill', color + '28');
    });

    svg.appendChild(g);
  });

  // Append dot layers last so they sit above bubbles and receive pointer events
  Object.values(dotLayers).forEach(layer => svg.appendChild(layer));

  return svg;
}

// ── Archetypes tab ────────────────────────────────────────────────────────────

function buildCard(cluster, gameWins) {
  const color = clusterColor(cluster.hier_name);
  const card = document.createElement('div');
  card.className = 'cluster-card';
  card.style.setProperty('--cc', color);

  const summary = document.createElement('div');
  summary.className = 'card-summary';
  summary.addEventListener('click', () => {
    const opening = !card.classList.contains('open');
    document.querySelectorAll('.cluster-card.open').forEach(c => c.classList.remove('open'));
    if (opening) card.classList.add('open');
  });

  const hdr = document.createElement('div');
  hdr.className = 'cluster-header';
  hdr.innerHTML = `
    <span class="cluster-num">${cluster.hier_name}</span>
    <span class="cluster-name">${NAMES[cluster.hier_name] || cluster.hier_name}</span>
    <span class="cluster-size">${cluster.size} seasons</span>
    <span class="card-chevron">▶</span>
  `;
  summary.appendChild(hdr);

  const n = cluster.top.length;
  const avgRegW = cluster.top.reduce((s, e) => s + parseInt(e.record), 0) / n;
  const avgPoW  = cluster.top.reduce((s, e) => s + (gameWins[e.team + '|' + e.season] || 0), 0) / n;

  const statsRow = document.createElement('div');
  statsRow.className = 'cluster-avg-stats';
  statsRow.innerHTML =
    `<span>avg reg W <span class="cluster-avg-stat-val">${avgRegW.toFixed(1)}</span></span>` +
    `<span>avg PO W <span class="cluster-avg-stat-val">${avgPoW.toFixed(1)}</span></span>`;
  summary.appendChild(statsRow);

  const desc = DESCRIPTIONS[cluster.hier_name];
  if (desc) {
    const descEl = document.createElement('p');
    descEl.className = 'cluster-desc';
    descEl.textContent = desc;
    summary.appendChild(descEl);
  }

  card.appendChild(summary);

  const expand = document.createElement('div');
  expand.className = 'card-expand';

  const body = document.createElement('div');
  body.className = 'cluster-body';

  const radarWrap = document.createElement('div');
  radarWrap.className = 'radar-wrap';
  radarWrap.appendChild(buildRadar(cluster.centroid, 120));
  body.appendChild(radarWrap);

  const teamsList = document.createElement('div');
  teamsList.className = 'teams-list';
  const title = document.createElement('div');
  title.className = 'teams-list-title';
  title.textContent = 'Closest to centroid';
  teamsList.appendChild(title);

  const PAGE = 10;
  let shown = PAGE;

  function makeRow(e) {
    const row = document.createElement('div');
    row.className = 'team-row';

    const idEl = document.createElement('div');
    idEl.className = 'team-id';
    const link = document.createElement('a');
    link.href = `/teams/${e.team}/`;
    link.textContent = `${e.season} ${e.team}`;
    idEl.appendChild(link);

    const recordEl = document.createElement('div');
    recordEl.className = 'team-record';
    recordEl.textContent = e.record;

    const resultEl = document.createElement('div');
    resultEl.className = 'team-result';
    resultEl.style.color = poColor(e.playoff_result);
    resultEl.textContent = e.playoff_result === 'Missed' ? '—' : e.playoff_result;

    row.appendChild(idEl);
    row.appendChild(recordEl);
    row.appendChild(resultEl);
    return row;
  }

  const rowContainer = document.createElement('div');
  cluster.top.slice(0, PAGE).forEach(e => rowContainer.appendChild(makeRow(e)));
  teamsList.appendChild(rowContainer);

  const total = cluster.top.length;
  const btn = document.createElement('button');
  btn.className = 'show-more';

  function updateBtn() {
    if (shown >= total) { btn.style.display = 'none'; return; }
    btn.style.display = '';
    btn.textContent = `Show more (${shown}/${total})`;
  }

  btn.addEventListener('click', e => {
    e.stopPropagation();
    const next = Math.min(shown + PAGE, total);
    cluster.top.slice(shown, next).forEach(e => rowContainer.appendChild(makeRow(e)));
    shown = next;
    updateBtn();
  });

  teamsList.appendChild(btn);
  updateBtn();

  body.appendChild(teamsList);
  expand.appendChild(body);

  const bars = document.createElement('div');
  bars.className = 'dim-bars';
  DIMS.forEach(d => {
    const v = cluster.centroid[d] || 0;
    const row = document.createElement('div');
    row.className = 'dim-row';
    row.innerHTML = `
      <div class="dim-label">${DIM_LABEL[d] || d}</div>
      <div class="dim-track"><div class="dim-fill" style="width:${(v*100).toFixed(1)}%;background:${DIM_COLOR[d]}"></div></div>
      <div class="dim-val">${(v*100).toFixed(0)}th</div>
    `;
    bars.appendChild(row);
  });
  expand.appendChild(bars);

  card.appendChild(expand);
  return card;
}

// ── Team History tab ──────────────────────────────────────────────────────────

let teamIndex = {};    // abbr -> [{season, cluster, clusterName, pct, dist, record, seed, playoff_result}]
let allTeams  = [];    // sorted abbrs

function buildTeamIndex(data) {
  data.clusters.forEach(c => {
    c.top.forEach(e => {
      if (!teamIndex[e.team]) teamIndex[e.team] = [];
      teamIndex[e.team].push({
        season:         e.season,
        cluster:        c.hier_name,
        clusterName:    NAMES[c.hier_name] || c.hier_name,
        pct:            e.pct || {},
        dist:           e.dist,
        record:         e.record,
        seed:           e.seed,
        playoff_result: e.playoff_result,
      });
    });
  });
  Object.values(teamIndex).forEach(arr =>
    arr.sort((a, b) => a.season.localeCompare(b.season))
  );
  allTeams = Object.keys(teamIndex).sort();
}

function setupTeamSelect() {
  const sel = document.getElementById('team-select');
  allTeams.forEach(abbr => {
    const opt = document.createElement('option');
    opt.value = abbr;
    opt.textContent = abbr;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', () => {
    if (sel.value) renderHistory(sel.value);
  });
}

function renderHistoryDetail(panel, s) {
  const color = clusterColor(s.cluster);
  panel.innerHTML = '';
  panel.classList.add('visible');

  const card = document.createElement('div');
  card.className = 'history-detail-card';

  const left = document.createElement('div');
  left.className = 'hd-left';
  left.appendChild(buildRadar(s.pct, 150));
  card.appendChild(left);

  const right = document.createElement('div');
  right.className = 'hd-right';

  const seasonRow = document.createElement('div');
  seasonRow.className = 'hd-season-row';
  seasonRow.innerHTML = `<span class="hd-season">${s.season}</span>`
    + `<span class="hd-record">${s.record}</span>`
    + (s.seed ? `<span class="hd-seed">${s.seed}</span>` : '');
  right.appendChild(seasonRow);

  if (s.playoff_result && s.playoff_result !== 'Missed') {
    const resultEl = document.createElement('div');
    resultEl.className = 'hd-result';
    resultEl.textContent = s.playoff_result;
    const rc = poColor(s.playoff_result);
    resultEl.style.background = rc + '22';
    resultEl.style.color = rc;
    right.appendChild(resultEl);
  }

  const badge = document.createElement('div');
  badge.className = 'hd-badge';
  badge.style.background = color + '22';
  badge.style.color = color;
  badge.style.borderColor = color + '55';
  badge.textContent = s.cluster;
  right.appendChild(badge);

  const cname = document.createElement('div');
  cname.className = 'hd-cluster-name';
  cname.textContent = s.clusterName;
  right.appendChild(cname);

  const bars = document.createElement('div');
  bars.className = 'hd-bars';
  DIMS.forEach(d => {
    const v = s.pct[d] || 0;
    const row = document.createElement('div');
    row.className = 'hd-bar-row';
    const lbl = document.createElement('div');
    lbl.className = 'hd-bar-label';
    lbl.textContent = DIM_LABEL[d] || d;
    const track = document.createElement('div');
    track.className = 'hd-bar-track';
    const fill = document.createElement('div');
    fill.className = 'hd-bar-fill';
    fill.style.width = (v * 100).toFixed(1) + '%';
    fill.style.background = DIM_COLOR[d];
    track.appendChild(fill);
    const val = document.createElement('div');
    val.className = 'hd-bar-val';
    val.textContent = (v * 100).toFixed(0) + 'th';
    row.appendChild(lbl);
    row.appendChild(track);
    row.appendChild(val);
    bars.appendChild(row);
  });
  right.appendChild(bars);

  card.appendChild(right);
  panel.appendChild(card);
}

function renderHistory(abbr) {
  const seasons = teamIndex[abbr];
  if (!seasons || !seasons.length) return;

  const container = document.getElementById('history-result');
  container.innerHTML = '';

  const hdr = document.createElement('div');
  hdr.className = 'history-header';
  const nameEl = document.createElement('span');
  nameEl.className = 'history-team-name';
  nameEl.textContent = abbr;
  const countEl = document.createElement('span');
  countEl.className = 'history-seasons-count';
  countEl.textContent = `${seasons.length} season${seasons.length !== 1 ? 's' : ''} tracked`;
  hdr.appendChild(nameEl);
  hdr.appendChild(countEl);
  container.appendChild(hdr);

  const graph = document.createElement('div');
  graph.className = 'history-graph';
  const scroll = document.createElement('div');
  scroll.className = 'history-track-scroll';
  const track = document.createElement('div');
  track.className = 'history-track';
  scroll.appendChild(track);
  graph.appendChild(scroll);

  const nodeWraps = [];

  seasons.forEach((s, i) => {
    if (i > 0) {
      const conn = document.createElement('div');
      conn.className = 'history-connector' + (seasons[i-1].cluster !== s.cluster ? ' changed' : '');
      track.appendChild(conn);
    }

    const color = clusterColor(s.cluster);
    const wrap = document.createElement('div');
    wrap.className = 'history-node-wrap';
    wrap.style.setProperty('--node-color', color);

    const node = document.createElement('div');
    node.className = 'history-node';
    node.style.background = color + '1a';
    node.style.borderColor = color;
    node.style.color = color;
    node.textContent = s.cluster;
    wrap.appendChild(node);

    const seasonLbl = document.createElement('div');
    seasonLbl.className = 'history-node-season';
    seasonLbl.textContent = s.season;
    wrap.appendChild(seasonLbl);

    const recordLbl = document.createElement('div');
    recordLbl.className = 'history-node-record';
    recordLbl.textContent = s.record;
    wrap.appendChild(recordLbl);

    wrap.addEventListener('click', () => {
      nodeWraps.forEach(w => w.classList.remove('active'));
      wrap.classList.add('active');
      renderHistoryDetail(detail, s);
    });

    track.appendChild(wrap);
    nodeWraps.push(wrap);
  });

  container.appendChild(graph);

  const detail = document.createElement('div');
  detail.className = 'history-detail';
  container.appendChild(detail);

  nodeWraps[0]?.click();
}

// ── Tab switching ─────────────────────────────────────────────────────────────

function showTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === name)
  );
  document.querySelectorAll('.tab-content').forEach(t =>
    t.style.display = t.id === 'tab-' + name ? '' : 'none'
  );
  history.replaceState(null, '', '#' + name);
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => showTab(btn.dataset.tab));
});

const initTab = ['archetypes', 'history'].includes(location.hash.slice(1))
  ? location.hash.slice(1) : 'archetypes';
showTab(initTab);

// ── Data load ─────────────────────────────────────────────────────────────────

function parseCSVRows(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',');
  return lines.slice(1).map(line => {
    const vals = line.split(',');
    const obj = {};
    headers.forEach((h, i) => { obj[h.trim()] = (vals[i] || '').trim(); });
    return obj;
  });
}

Promise.all([
  fetch('/clusters/team_clusters.json').then(r => r.json()),
  fetch('/standings/playoff-brackets.csv').then(r => r.text()),
])
  .then(([data, bracketText]) => {
    const gameWins = {};
    parseCSVRows(bracketText).forEach(row => {
      const key1 = row.T1 + '|' + row.SEASON;
      const key2 = row.T2 + '|' + row.SEASON;
      gameWins[key1] = (gameWins[key1] || 0) + parseInt(row.T1_W || 0);
      gameWins[key2] = (gameWins[key2] || 0) + parseInt(row.T2_W || 0);
    });

    document.getElementById('n-seasons').textContent = data.n.toLocaleString();

    const clusterMap = {};
    data.clusters.forEach(c => { clusterMap[c.hier_name] = c; });

    const root = document.getElementById('root');
    root.innerHTML = '';

    // Bubble chart
    const bubbleWrap = document.createElement('div');
    bubbleWrap.className = 'bubble-wrap';

    const dotInfo = document.createElement('div');
    dotInfo.className = 'dot-info';

    bubbleWrap.appendChild(buildBubbleChart(data.clusters, (e, hierName, color) => {
      const rc = poColor(e.playoff_result);
      dotInfo.style.display = '';
      dotInfo.innerHTML = `<div class="dot-info-row">
        <span class="dot-info-team"><a href="/teams/${e.team}/">${e.season} ${e.team}</a></span>
        <span class="dot-info-record">${e.record}</span>
        ${e.playoff_result && e.playoff_result !== 'Missed'
          ? `<span class="dot-info-badge" style="background:${rc}22;color:${rc}">${e.playoff_result}</span>`
          : ''}
        <span class="dot-info-cluster" style="color:${color};border-color:${color}55;background:${color}22">${hierName} · ${NAMES[hierName] || hierName}</span>
      </div>`;
    }));

    const legend = document.createElement('div');
    legend.className = 'bubble-legend';
    ['1','2','3','4'].forEach(g => {
      const item = document.createElement('div');
      item.className = 'bubble-legend-item';
      item.innerHTML = `<div class="bubble-legend-dot" style="background:${GROUP_COLOR[g]}"></div><span>${GROUP_META[g].name}</span>`;
      legend.appendChild(item);
    });
    bubbleWrap.appendChild(legend);
    bubbleWrap.appendChild(dotInfo);
    root.appendChild(bubbleWrap);

    // Grouped cards
    const groupsEl = document.createElement('div');
    groupsEl.className = 'archetype-groups';

    ['1','2','3','4'].forEach(g => {
      const color = GROUP_COLOR[g];
      const meta  = GROUP_META[g];
      const section = document.createElement('section');
      section.className = 'archetype-group';
      section.id = 'group-' + g;
      section.style.setProperty('--gc', color);

      const hdr = document.createElement('div');
      hdr.className = 'group-header';
      hdr.innerHTML = `
        <div class="group-badge">${g}</div>
        <div class="group-title-wrap">
          <div class="group-title">${meta.name}</div>
          <div class="group-subtitle">${meta.desc}</div>
        </div>`;
      section.appendChild(hdr);

      const grid = document.createElement('div');
      grid.className = 'group-cards';
      CLUSTER_ORDER.filter(n => n[0] === g).forEach(name => {
        const c = clusterMap[name];
        if (!c) return;
        const card = buildCard(c, gameWins);
        card.id = 'archetype-' + name;
        grid.appendChild(card);
      });
      section.appendChild(grid);
      groupsEl.appendChild(section);
    });

    root.appendChild(groupsEl);

    buildTeamIndex(data);
    setupTeamSelect();
  })
  .catch(err => {
    document.getElementById('root').innerHTML =
      `<p class="error">Failed to load data: ${err.message}</p>`;
  });
</script>
