<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Archetypes — NBN</title>
<script src="/nav.js" defer></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f1117; color: #e5e7eb; font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; }
  .page { max-width: 1200px; margin: 0 auto; padding: 2rem 1rem 4rem; }
  h1 { font-size: 1.5rem; font-weight: 700; color: #f9fafb; margin-bottom: 0.25rem; }
  .subtitle { color: #6b7280; font-size: 0.85rem; margin-bottom: 2rem; }
  .subtitle b { color: #9ca3af; }

  .clusters-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1.25rem;
  }

  .cluster-card {
    background: #161b27;
    border: 1px solid #1f2937;
    border-radius: 10px;
    padding: 1rem 1.25rem 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .cluster-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .cluster-num {
    background: #1f2937;
    color: #6b7280;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 0.2rem 0.5rem;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .cluster-name {
    font-size: 1rem;
    font-weight: 700;
    color: #f9fafb;
    flex: 1;
  }
  .cluster-size {
    font-size: 0.75rem;
    color: #6b7280;
    flex-shrink: 0;
  }

  .cluster-body {
    display: flex;
    gap: 1rem;
    align-items: flex-start;
  }

  .radar-wrap { flex-shrink: 0; }

  .players-list { flex: 1; min-width: 0; }
  .players-list-title {
    font-size: 0.68rem;
    font-weight: 600;
    color: #4b5563;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.4rem;
  }
  .player-row {
    display: flex;
    align-items: baseline;
    gap: 0.4rem;
    padding: 0.18rem 0;
    border-bottom: 1px solid #1f2937;
    font-size: 0.78rem;
    white-space: nowrap;
    overflow: hidden;
  }
  .player-row:last-child { border-bottom: none; }
  .player-name {
    color: #d1d5db;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    min-width: 0;
  }
  .player-name a { color: inherit; text-decoration: none; }
  .player-name a:hover { color: #93c5fd; }
  .player-season { color: #6b7280; font-size: 0.72rem; flex-shrink: 0; }

  .dim-bars {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
    margin-top: 0.25rem;
  }
  .dim-row {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.68rem;
  }
  .dim-label { color: #6b7280; width: 2.8rem; flex-shrink: 0; text-align: right; font-weight: 600; }
  .dim-track { flex: 1; background: #1f2937; border-radius: 2px; height: 5px; }
  .dim-fill { height: 5px; border-radius: 2px; }
  .dim-val { color: #9ca3af; width: 2.2rem; text-align: right; flex-shrink: 0; }

  .show-more {
    margin-top: 0.4rem;
    background: none;
    border: none;
    color: #3b82f6;
    font-size: 0.72rem;
    font-weight: 600;
    cursor: pointer;
    padding: 0.1rem 0;
    font-family: inherit;
  }
  .show-more:hover { color: #60a5fa; }

  .loading { color: #6b7280; padding: 3rem; text-align: center; }
  .error   { color: #f87171; padding: 3rem; text-align: center; }

  .dendrogram-section {
    background: #161b27;
    border: 1px solid #1f2937;
    border-radius: 10px;
    padding: 1.25rem;
    margin-bottom: 1.5rem;
  }
  .dendrogram-title {
    font-size: 0.75rem;
    font-weight: 600;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.75rem;
  }
  .dendrogram-wrap { overflow-x: auto; }
</style>
</head>
<body>
<div class="page">
  <h1>Player Archetypes</h1>
  <p class="subtitle">Two-stage hierarchical clustering across <b id="n-seasons">—</b> player-seasons (≥20G). Stage 1 groups by shot diet (3pt rate, FT rate, volume) → top-level number. Stage 2 refines by efficiency, playmaking &amp; defense → letter suffix.</p>
  <div id="dendrogram-section" style="display:none" class="dendrogram-section">
    <div class="dendrogram-title">Cluster hierarchy — height = Ward distance at merge</div>
    <div class="dendrogram-wrap" id="dendrogram-wrap"></div>
  </div>
  <div id="root" class="clusters-grid"><p class="loading">Loading…</p></div>
</div>
<script>
const DIMS = ['PPG','APG','TOV','TS%','3PA','RPG','BLK','STL','FTA'];
const DIM_COLOR = {
  PPG: '#3b82f6', APG: '#8b5cf6', TOV: '#ef4444',
  'TS%': '#22c55e', '3PA': '#06b6d4', RPG: '#f59e0b',
  BLK: '#6366f1',  STL: '#ec4899',   FTA: '#f97316',
};

// Optional display names — fill in after exploring the clusters
const NAMES = {};

function buildRadar(centroid, size = 110) {
  const NS = 'http://www.w3.org/2000/svg';
  const cx = size / 2, cy = size / 2, maxR = size * 0.38;
  const n = DIMS.length;

  const pt = (angle_deg, r) => {
    const rad = (angle_deg * Math.PI) / 180;
    return [cx + r * Math.cos(rad), cy - r * Math.sin(rad)];
  };
  const angles = DIMS.map((_, i) => 90 - (360 / n) * i);

  const svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('width', size); svg.setAttribute('height', size);
  svg.setAttribute('viewBox', `0 0 ${size} ${size}`);

  // guide rings
  [0.33, 0.66, 1].forEach(frac => {
    const pts = angles.map(a => pt(a, maxR * frac).join(',')).join(' ');
    const poly = document.createElementNS(NS, 'polygon');
    poly.setAttribute('points', pts);
    poly.setAttribute('fill', 'none');
    poly.setAttribute('stroke', '#1f2937');
    poly.setAttribute('stroke-width', '1');
    svg.appendChild(poly);
  });

  // axes
  angles.forEach(a => {
    const [x, y] = pt(a, maxR);
    const line = document.createElementNS(NS, 'line');
    line.setAttribute('x1', cx); line.setAttribute('y1', cy);
    line.setAttribute('x2', x); line.setAttribute('y2', y);
    line.setAttribute('stroke', '#1f2937'); line.setAttribute('stroke-width', '1');
    svg.appendChild(line);
  });

  // filled polygon
  const polyPts = DIMS.map((d, i) => pt(angles[i], maxR * centroid[d]).join(',')).join(' ');
  const poly = document.createElementNS(NS, 'polygon');
  poly.setAttribute('points', polyPts);
  poly.setAttribute('fill', 'rgba(59,130,246,0.2)');
  poly.setAttribute('stroke', '#3b82f6');
  poly.setAttribute('stroke-width', '1.5');
  svg.appendChild(poly);

  // dots
  DIMS.forEach((d, i) => {
    const [x, y] = pt(angles[i], maxR * centroid[d]);
    const dot = document.createElementNS(NS, 'circle');
    dot.setAttribute('cx', x); dot.setAttribute('cy', y); dot.setAttribute('r', '2.5');
    dot.setAttribute('fill', DIM_COLOR[d]); dot.setAttribute('stroke', '#0f1117');
    dot.setAttribute('stroke-width', '1');
    dot.appendChild(Object.assign(document.createElementNS(NS, 'title'), {
      textContent: `${d}: ${(centroid[d] * 100).toFixed(0)}th pct`
    }));
    svg.appendChild(dot);
  });

  // labels
  const LABEL_R = maxR + 11;
  DIMS.forEach((d, i) => {
    const [x, y] = pt(angles[i], LABEL_R);
    const txt = document.createElementNS(NS, 'text');
    txt.setAttribute('x', x); txt.setAttribute('y', y);
    txt.setAttribute('font-size', '7.5'); txt.setAttribute('fill', '#6b7280');
    txt.setAttribute('font-family', 'Inter, system-ui, sans-serif');
    txt.setAttribute('font-weight', '600');
    const anchor = x < cx - 4 ? 'end' : x > cx + 4 ? 'start' : 'middle';
    txt.setAttribute('text-anchor', anchor);
    txt.setAttribute('dominant-baseline', 'middle');
    txt.textContent = d;
    svg.appendChild(txt);
  });

  return svg;
}

function buildCard(cluster) {
  const card = document.createElement('div');
  card.className = 'cluster-card';

  // header
  const hdr = document.createElement('div');
  hdr.className = 'cluster-header';
  const displayName = NAMES[cluster.id] || cluster.hier_name;
  hdr.innerHTML = `
    <span class="cluster-num">${cluster.hier_name}</span>
    <span class="cluster-name">${displayName}</span>
    <span class="cluster-size">${cluster.size} seasons</span>
  `;
  card.appendChild(hdr);

  // body: radar + players
  const body = document.createElement('div');
  body.className = 'cluster-body';

  const radarWrap = document.createElement('div');
  radarWrap.className = 'radar-wrap';
  radarWrap.appendChild(buildRadar(cluster.centroid, 120));
  body.appendChild(radarWrap);

  const playersList = document.createElement('div');
  playersList.className = 'players-list';
  const title = document.createElement('div');
  title.className = 'players-list-title';
  title.textContent = 'Closest to centroid';
  playersList.appendChild(title);

  const PAGE = 10;
  let shown = PAGE;

  function makeRow(p) {
    const row = document.createElement('div');
    row.className = 'player-row';
    const parts = p.player.split(', ');
    const displayName = parts.length === 2 ? `${parts[1]} ${parts[0]}` : p.player;
    row.innerHTML = `<div class="player-name"><a href="/players/?p=${p.slug}">${displayName}</a></div>`
                  + `<div class="player-season">${p.season}</div>`;
    return row;
  }

  const rowContainer = document.createElement('div');
  cluster.top.slice(0, PAGE).forEach(p => rowContainer.appendChild(makeRow(p)));
  playersList.appendChild(rowContainer);

  const total = cluster.top.length;
  const btn = document.createElement('button');
  btn.className = 'show-more';

  function updateBtn() {
    if (shown >= total) { btn.style.display = 'none'; return; }
    btn.style.display = '';
    btn.textContent = `Show more (${shown}/${total})`;
  }

  btn.addEventListener('click', () => {
    const next = Math.min(shown + PAGE, total);
    cluster.top.slice(shown, next).forEach(p => rowContainer.appendChild(makeRow(p)));
    shown = next;
    updateBtn();
  });

  playersList.appendChild(btn);
  updateBtn();

  body.appendChild(playersList);
  card.appendChild(body);

  // dim bars
  const bars = document.createElement('div');
  bars.className = 'dim-bars';
  DIMS.forEach(d => {
    const v = cluster.centroid[d];
    const row = document.createElement('div');
    row.className = 'dim-row';
    row.innerHTML = `
      <div class="dim-label">${d}</div>
      <div class="dim-track"><div class="dim-fill" style="width:${(v*100).toFixed(1)}%;background:${DIM_COLOR[d]}"></div></div>
      <div class="dim-val">${(v*100).toFixed(0)}th</div>
    `;
    bars.appendChild(row);
  });
  card.appendChild(bars);

  return card;
}

function buildDendrogram(clusters, linkage) {
  const NS  = 'http://www.w3.org/2000/svg';
  const k   = clusters.length;
  const W   = Math.max(700, k * 80);
  const H   = 220;
  const pad = { top: 16, bottom: 56, left: 28, right: 28 };
  const plotW = W - pad.left - pad.right;
  const plotH = H - pad.top  - pad.bottom;

  // Build node map: leaves 0..k-1, internals k..2k-2
  const nodes = {};
  clusters.forEach(c => {
    nodes[c.id] = { id: c.id, isLeaf: true, label: c.hier_name, size: c.size };
  });
  linkage.forEach((m, i) => {
    nodes[k + i] = { id: k + i, isLeaf: false, left: m.a, right: m.b, dist: m.dist };
  });
  const rootId = k + linkage.length - 1;

  // Leaf order via in-order traversal
  const leafOrder = [];
  function traverse(id) {
    const nd = nodes[id];
    if (nd.isLeaf) { leafOrder.push(id); return; }
    traverse(nd.left);
    traverse(nd.right);
  }
  traverse(rootId);

  // X position: leaves evenly spaced, internals = midpoint of children
  const leafX = {};
  leafOrder.forEach((id, i) => { leafX[id] = i; });
  function getX(id) {
    if (id in leafX) return leafX[id];
    const nd = nodes[id];
    return (getX(nd.left) + getX(nd.right)) / 2;
  }

  const maxDist = Math.max(...linkage.map(m => m.dist));

  function svgX(xIdx) { return pad.left + (xIdx / (k - 1)) * plotW; }
  function svgY(dist)  { return pad.top  + plotH * (1 - dist / maxDist); }
  function leafSvgY()  { return pad.top  + plotH; }

  // Cache node Y (leaves at bottom, internals at their merge height)
  function nodeY(id) {
    return nodes[id].isLeaf ? leafSvgY() : svgY(nodes[id].dist);
  }

  const svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('width', W); svg.setAttribute('height', H);
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  // Y-axis tick lines (subtle)
  [0.25, 0.5, 0.75, 1].forEach(frac => {
    const y = pad.top + plotH * (1 - frac);
    const tick = document.createElementNS(NS, 'line');
    tick.setAttribute('x1', pad.left - 4); tick.setAttribute('y1', y);
    tick.setAttribute('x2', W - pad.right); tick.setAttribute('y2', y);
    tick.setAttribute('stroke', '#1f2937'); tick.setAttribute('stroke-width', '1');
    tick.setAttribute('stroke-dasharray', '3 4');
    svg.appendChild(tick);
    const lbl = document.createElementNS(NS, 'text');
    lbl.setAttribute('x', pad.left - 6); lbl.setAttribute('y', y);
    lbl.setAttribute('text-anchor', 'end'); lbl.setAttribute('dominant-baseline', 'middle');
    lbl.setAttribute('font-size', '8'); lbl.setAttribute('fill', '#4b5563');
    lbl.textContent = (maxDist * frac).toFixed(3);
    svg.appendChild(lbl);
  });

  // Draw tree recursively
  function drawNode(id) {
    const nd = nodes[id];
    if (nd.isLeaf) return;
    const x  = svgX(getX(id));
    const y  = svgY(nd.dist);
    const xL = svgX(getX(nd.left));
    const xR = svgX(getX(nd.right));
    const yL = nodeY(nd.left);
    const yR = nodeY(nd.right);

    // Horizontal bar connecting children at this node's height
    const hbar = document.createElementNS(NS, 'line');
    hbar.setAttribute('x1', xL); hbar.setAttribute('y1', y);
    hbar.setAttribute('x2', xR); hbar.setAttribute('y2', y);
    hbar.setAttribute('stroke', '#374151'); hbar.setAttribute('stroke-width', '1.5');
    svg.appendChild(hbar);

    // Vertical drops to each child
    [[xL, yL], [xR, yR]].forEach(([cx, cy]) => {
      const vl = document.createElementNS(NS, 'line');
      vl.setAttribute('x1', cx); vl.setAttribute('y1', y);
      vl.setAttribute('x2', cx); vl.setAttribute('y2', cy);
      vl.setAttribute('stroke', '#374151'); vl.setAttribute('stroke-width', '1.5');
      svg.appendChild(vl);
    });

    drawNode(nd.left);
    drawNode(nd.right);
  }
  drawNode(rootId);

  // Leaf labels (cluster name + size)
  leafOrder.forEach(id => {
    const nd = nodes[id];
    const x  = svgX(getX(id));
    const y  = leafSvgY() + 5;

    const nameTxt = document.createElementNS(NS, 'text');
    nameTxt.setAttribute('x', x); nameTxt.setAttribute('y', y);
    nameTxt.setAttribute('text-anchor', 'middle');
    nameTxt.setAttribute('dominant-baseline', 'hanging');
    nameTxt.setAttribute('font-size', '9');
    nameTxt.setAttribute('font-weight', '600');
    nameTxt.setAttribute('fill', '#d1d5db');
    nameTxt.textContent = nd.label;
    svg.appendChild(nameTxt);

    const sizeTxt = document.createElementNS(NS, 'text');
    sizeTxt.setAttribute('x', x); sizeTxt.setAttribute('y', y + 13);
    sizeTxt.setAttribute('text-anchor', 'middle');
    sizeTxt.setAttribute('dominant-baseline', 'hanging');
    sizeTxt.setAttribute('font-size', '8');
    sizeTxt.setAttribute('fill', '#4b5563');
    sizeTxt.textContent = `n=${nd.size}`;
    svg.appendChild(sizeTxt);
  });

  return svg;
}

fetch('/players/player_clusters.json')
  .then(r => r.json())
  .then(data => {
    document.getElementById('n-seasons').textContent = data.n.toLocaleString();

    // Dendrogram
    if (data.linkage && data.linkage.length) {
      const sec = document.getElementById('dendrogram-section');
      sec.style.display = '';
      document.getElementById('dendrogram-wrap').appendChild(
        buildDendrogram(data.clusters, data.linkage)
      );
    }

    const root = document.getElementById('root');
    root.innerHTML = '';
    data.clusters.forEach(c => root.appendChild(buildCard(c)));
  })
  .catch(err => {
    document.getElementById('root').innerHTML = `<p class="error">Failed to load cluster data: ${err.message}</p>`;
  });
</script>
</body>
</html>
