<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Box Score Import — NBN</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111827;
      color: #f3f4f6;
      min-height: 100vh;
    }

    main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

    .nav { margin-bottom: 1.75rem; font-size: 0.875rem; color: #9ca3af; }
    .nav a { color: #9ca3af; text-decoration: none; }
    .nav a:hover { color: #f3f4f6; }

    h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.35rem; }
    .subtitle { color: #9ca3af; font-size: 0.9rem; margin-bottom: 1.75rem; }

    /* Auth bar */
    .auth-bar {
      display: flex; align-items: center; gap: 0.75rem;
      margin-bottom: 1.5rem; font-size: 0.85rem; color: #9ca3af;
    }
    .auth-bar button {
      background: #374151; border: 1px solid #4b5563; color: #f3f4f6;
      border-radius: 6px; padding: 0.3rem 0.75rem; cursor: pointer; font-size: 0.8rem;
    }
    .auth-bar button:hover { background: #4b5563; }

    /* Cards */
    .card {
      background: #1f2937; border: 1px solid #374151; border-radius: 12px;
      padding: 1.5rem; margin-bottom: 1.5rem;
    }
    .card h2 {
      font-size: 1rem; font-weight: 600; margin-bottom: 1.25rem; color: #e5e7eb;
    }

    /* Form grid */
    .form-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0.875rem 1.25rem;
    }
    .form-field { display: flex; flex-direction: column; gap: 0.35rem; }
    .form-field.full { grid-column: 1 / -1; }
    .form-field label {
      font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; color: #9ca3af;
    }
    .form-field input, .form-field select {
      background: #111827; border: 1px solid #374151; color: #f3f4f6;
      border-radius: 6px; padding: 0.5rem 0.625rem; font-size: 0.875rem;
      font-family: inherit; width: 100%;
    }
    .form-field input:focus, .form-field select:focus {
      outline: none; border-color: #3b82f6;
    }
    .radio-group { display: flex; gap: 1rem; align-items: center; padding: 0.5rem 0; }
    .radio-group label {
      display: flex; align-items: center; gap: 0.4rem; font-size: 0.875rem;
      font-weight: normal; text-transform: none; letter-spacing: 0;
      color: #f3f4f6; cursor: pointer;
    }

    /* Playoff extra fields */
    #playoff-fields { display: none; }
    #playoff-fields.visible { display: contents; }

    /* Upload zones */
    .uploads { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
    .upload-zone {
      border: 2px dashed #374151; border-radius: 10px; padding: 1.5rem;
      text-align: center; cursor: pointer; transition: border-color 0.15s, background 0.15s;
      position: relative;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: #3b82f6; background: rgba(59,130,246,0.05);
    }
    .upload-zone.has-file { border-color: #34d399; background: rgba(52,211,153,0.05); }
    .upload-zone input[type=file] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .upload-label { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #9ca3af; margin-bottom: 0.5rem; }
    .upload-icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .upload-hint { font-size: 0.78rem; color: #6b7280; }
    .upload-filename { font-size: 0.82rem; color: #34d399; margin-top: 0.35rem; font-weight: 500; }

    /* Preview image */
    .preview-img { max-width: 100%; max-height: 200px; border-radius: 6px; margin-top: 0.75rem; display: none; }

    /* Actions */
    .form-actions { display: flex; align-items: center; gap: 1rem; margin-top: 1.5rem; }
    .btn-primary {
      background: #2563eb; border: none; color: #fff; border-radius: 8px;
      padding: 0.55rem 1.5rem; font-size: 0.875rem; font-weight: 600; cursor: pointer;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }
    .btn-success {
      background: #065f46; border: 1px solid #059669; color: #6ee7b7; border-radius: 8px;
      padding: 0.55rem 1.5rem; font-size: 0.875rem; font-weight: 600; cursor: pointer;
    }
    .btn-success:hover { background: #047857; }
    .btn-success:disabled { background: #374151; color: #6b7280; cursor: not-allowed; border-color: #374151; }
    .form-status { font-size: 0.85rem; }
    .form-status.ok { color: #34d399; }
    .form-status.err { color: #f87171; }

    /* Review section */
    #review { display: none; }
    #review.visible { display: block; }

    .team-section { margin-bottom: 1.5rem; }
    .team-header {
      display: flex; align-items: baseline; gap: 1rem;
      margin-bottom: 0.875rem; padding-bottom: 0.625rem;
      border-bottom: 1px solid #374151;
    }
    .team-header h3 { font-size: 1rem; font-weight: 700; }
    .score-badge {
      font-size: 1.25rem; font-weight: 700; color: #f3f4f6;
    }
    .score-badge.winner { color: #34d399; }
    .score-badge.loser { color: #9ca3af; }

    /* Stats table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    th {
      text-align: center; padding: 0.4rem 0.35rem; font-size: 0.7rem;
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em;
      color: #9ca3af; border-bottom: 1px solid #374151; white-space: nowrap;
    }
    th.player-col { text-align: left; min-width: 160px; }
    td {
      padding: 0.3rem 0.25rem; border-bottom: 1px solid #1f2937; text-align: center;
    }
    td.player-col { text-align: left; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    /* Editable cells */
    .cell-input {
      background: transparent; border: none; color: #f3f4f6;
      font-size: 0.8rem; font-family: inherit; text-align: center;
      width: 100%; min-width: 2.5rem; padding: 0;
    }
    .cell-input:focus { outline: 1px solid #3b82f6; border-radius: 3px; background: #111827; }
    .player-input {
      background: transparent; border: none; color: #f3f4f6;
      font-size: 0.8rem; font-family: inherit; text-align: left;
      width: 100%; padding: 0;
    }
    .player-input:focus { outline: 1px solid #3b82f6; border-radius: 3px; background: #111827; padding: 0 3px; }

    /* Confidence badges */
    .conf {
      display: inline-block; font-size: 0.65rem; font-weight: 700;
      padding: 0.1rem 0.35rem; border-radius: 3px; margin-left: 0.35rem;
      vertical-align: middle; text-transform: uppercase;
    }
    .conf.high { background: #064e3b; color: #6ee7b7; }
    .conf.medium { background: #78350f; color: #fde68a; }
    .conf.low { background: #7f1d1d; color: #fca5a5; }

    /* Concerns */
    .concerns {
      background: #292524; border: 1px solid #57534e; border-radius: 8px;
      padding: 0.875rem 1rem; margin-bottom: 1.5rem;
    }
    .concerns h4 {
      font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: #a8a29e; margin-bottom: 0.5rem;
    }
    .concerns ul { list-style: none; }
    .concerns li { font-size: 0.83rem; color: #fde68a; padding: 0.2rem 0; }
    .concerns li::before { content: "⚠ "; }

    /* Token modal */
    .modal-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: #1f2937; border: 1px solid #374151; border-radius: 12px;
      padding: 1.5rem; width: 360px; max-width: 90vw;
      display: flex; flex-direction: column; gap: 0.875rem;
    }
    .modal h3 { font-size: 1rem; font-weight: 600; }
    .modal input {
      background: #111827; border: 1px solid #374151; color: #f3f4f6;
      border-radius: 6px; padding: 0.5rem 0.75rem; font-size: 0.875rem;
      font-family: monospace; width: 100%;
    }
    .modal input:focus { outline: none; border-color: #3b82f6; }
    .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }
    .btn-modal-save {
      background: #2563eb; border: none; color: #fff; border-radius: 6px;
      padding: 0.4rem 1rem; font-size: 0.85rem; font-weight: 600; cursor: pointer;
    }
    .btn-modal-cancel {
      background: #374151; border: none; color: #9ca3af; border-radius: 6px;
      padding: 0.4rem 1rem; font-size: 0.85rem; cursor: pointer;
    }

    @media (max-width: 640px) {
      .form-grid { grid-template-columns: 1fr; }
      .uploads { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <div class="nav"><a href="/">&#8592; Home</a></div>
    <h1>Box Score Import</h1>
    <p class="subtitle">Upload two 2K screenshots (one per team). They'll be queued for parsing.</p>

    <div class="auth-bar">
      <span id="auth-name">Not authenticated</span>
      <button id="auth-btn">Set Token</button>
    </div>

    <!-- Upload form -->
    <div class="card" id="upload-card">
      <h2>Game Details</h2>
      <div class="form-grid">
        <div class="form-field">
          <label>Date</label>
          <input type="date" id="date" required>
        </div>
        <div class="form-field">
          <label>Season</label>
          <input type="text" id="season" placeholder="25-26" maxlength="5">
        </div>
        <div class="form-field">
          <label>Home Team</label>
          <select id="home-team">
            <option value="" disabled selected>Select team</option>
          </select>
        </div>
        <div class="form-field">
          <label>Away Team</label>
          <select id="away-team">
            <option value="" disabled selected>Select team</option>
          </select>
        </div>
        <div class="form-field full">
          <label>Game Type</label>
          <div class="radio-group">
            <label><input type="radio" name="game-type" value="REG" checked> Regular Season</label>
            <label><input type="radio" name="game-type" value="PLAYOFF"> Playoff</label>
          </div>
        </div>
        <div id="playoff-fields">
          <div class="form-field">
            <label>Game #</label>
            <input type="number" id="game-num" min="1" max="7" placeholder="1">
          </div>
          <div class="form-field">
            <label>Round #</label>
            <input type="number" id="round-num" min="1" max="4" placeholder="1">
          </div>
        </div>
      </div>

      <div class="uploads">
        <div class="upload-zone" id="home-zone">
          <input type="file" id="home-file" accept="image/*">
          <div class="upload-label" id="home-team-label">Home Team</div>
          <div class="upload-icon">🏠</div>
          <div class="upload-hint">Click or drag screenshot here</div>
          <div class="upload-filename" id="home-filename"></div>
          <img class="preview-img" id="home-preview">
        </div>
        <div class="upload-zone" id="away-zone">
          <input type="file" id="away-file" accept="image/*">
          <div class="upload-label" id="away-team-label">Away Team</div>
          <div class="upload-icon">✈️</div>
          <div class="upload-hint">Click or drag screenshot here</div>
          <div class="upload-filename" id="away-filename"></div>
          <img class="preview-img" id="away-preview">
        </div>
      </div>

      <div class="form-actions">
        <button class="btn-primary" id="upload-btn" disabled>Upload for Parsing</button>
        <span class="form-status" id="upload-status"></span>
      </div>
    </div>

    <!-- Build status -->
    <div id="build-banner" style="display:none;background:#1f2937;border:1px solid #374151;border-radius:12px;padding:1rem 1.5rem;margin-bottom:1.5rem;font-size:0.85rem;display:flex;align-items:center;gap:0.75rem;">
      <span id="build-icon">⏳</span>
      <span id="build-msg">Rebuilding site stats…</span>
    </div>

    <!-- Pending games -->
    <div class="card" id="pending-card">
      <h2>Pending Games</h2>
      <div id="pending-list"><span style="color:#6b7280;font-size:0.85rem;">Loading…</span></div>
    </div>
  </main>

  <!-- Token modal -->
  <div class="modal-backdrop" id="token-modal">
    <div class="modal">
      <h3>Enter API Token</h3>
      <input type="password" id="token-input" placeholder="Paste your token">
      <div class="modal-actions">
        <button class="btn-modal-cancel" id="modal-cancel">Cancel</button>
        <button class="btn-modal-save" id="modal-save">Save</button>
      </div>
    </div>
  </div>

  <script>
    const TEAMS = [
      "ATL","BKN","BOS","CHA","CHI","CLE","DAL","DEN","DET","GSW",
      "HOU","IND","LAC","LAL","MEM","MIA","MIL","MIN","NOP","NYK",
      "OKC","ORL","PHI","PHX","POR","SAC","SAS","TOR","UTA","WAS",
    ];
    const STAT_COLS = ["MIN","PTS","REB","OR","DR","AST","STL","BLK","TO","PF","FGM","FGA","3PM","3PA","FTM","FTA"];
    const STAT_KEYS = ["min","pts","reb","oreb","dreb","ast","stl","blk","tov","pf","fgm","fga","tpm","tpa","ftm","fta"];

    // Populate team dropdowns
    const homeSelect = document.getElementById("home-team");
    const awaySelect = document.getElementById("away-team");
    TEAMS.forEach(t => {
      homeSelect.insertAdjacentHTML("beforeend", `<option value="${t}">${t}</option>`);
      awaySelect.insertAdjacentHTML("beforeend", `<option value="${t}">${t}</option>`);
    });

    // Auth
    let token = localStorage.getItem("nbn_token") || "";
    function updateAuthBar() {
      const name = localStorage.getItem("nbn_token_name") || "";
      document.getElementById("auth-name").textContent = token
        ? (name ? `Signed in as ${name}` : "Token set")
        : "Not authenticated";
    }
    updateAuthBar();
    document.getElementById("auth-btn").onclick = () => {
      document.getElementById("token-input").value = token;
      document.getElementById("token-modal").classList.add("open");
    };
    document.getElementById("modal-cancel").onclick = () => {
      document.getElementById("token-modal").classList.remove("open");
    };
    document.getElementById("modal-save").onclick = () => {
      token = document.getElementById("token-input").value.trim();
      localStorage.setItem("nbn_token", token);
      localStorage.removeItem("nbn_token_name");
      document.getElementById("token-modal").classList.remove("open");
      updateAuthBar();
    };

    // Default date to today
    const today = new Date().toISOString().slice(0,10);
    document.getElementById("date").value = today;
    document.getElementById("season").value = "25-26";

    // Playoff fields toggle
    document.querySelectorAll('input[name="game-type"]').forEach(r => {
      r.addEventListener("change", () => {
        const pf = document.getElementById("playoff-fields");
        pf.classList.toggle("visible", r.value === "PLAYOFF" && r.checked);
      });
    });

    // Team label updates
    function updateUploadLabels() {
      const ht = homeSelect.value || "Home Team";
      const at = awaySelect.value || "Away Team";
      document.getElementById("home-team-label").textContent = ht;
      document.getElementById("away-team-label").textContent = at;
    }
    homeSelect.addEventListener("change", updateUploadLabels);
    awaySelect.addEventListener("change", updateUploadLabels);

    // File upload zones
    function setupZone(zoneId, fileId, filenameId, previewId) {
      const zone = document.getElementById(zoneId);
      const input = document.getElementById(fileId);
      const fname = document.getElementById(filenameId);
      const preview = document.getElementById(previewId);

      zone.addEventListener("dragover", e => { e.preventDefault(); zone.classList.add("drag-over"); });
      zone.addEventListener("dragleave", () => zone.classList.remove("drag-over"));
      zone.addEventListener("drop", e => {
        e.preventDefault();
        zone.classList.remove("drag-over");
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith("image/")) {
          const dt = new DataTransfer();
          dt.items.add(file);
          input.files = dt.files;
          onFileSelected(file, zone, fname, preview);
        }
      });
      input.addEventListener("change", () => {
        if (input.files[0]) onFileSelected(input.files[0], zone, fname, preview);
      });
    }

    function onFileSelected(file, zone, fname, preview) {
      zone.classList.add("has-file");
      fname.textContent = file.name;
      const url = URL.createObjectURL(file);
      preview.src = url;
      preview.style.display = "block";
      checkUploadReady();
    }

    setupZone("home-zone", "home-file", "home-filename", "home-preview");
    setupZone("away-zone", "away-file", "away-filename", "away-preview");

    function checkUploadReady() {
      const ready = document.getElementById("home-file").files[0]
        && document.getElementById("away-file").files[0]
        && homeSelect.value && awaySelect.value && token;
      document.getElementById("upload-btn").disabled = !ready;
    }
    homeSelect.addEventListener("change", checkUploadReady);
    awaySelect.addEventListener("change", checkUploadReady);
    document.getElementById("auth-btn").addEventListener("click", checkUploadReady);

    // Upload
    document.getElementById("upload-btn").onclick = async () => {
      const btn = document.getElementById("upload-btn");
      const status = document.getElementById("upload-status");
      btn.disabled = true;
      status.className = "form-status";
      status.textContent = "Uploading…";

      const fd = new FormData();
      fd.append("home_image", document.getElementById("home-file").files[0]);
      fd.append("away_image", document.getElementById("away-file").files[0]);
      fd.append("date", document.getElementById("date").value);
      fd.append("home_team", homeSelect.value);
      fd.append("away_team", awaySelect.value);
      fd.append("season", document.getElementById("season").value);
      fd.append("game_type", document.querySelector('input[name="game-type"]:checked').value);
      const gameNum = document.getElementById("game-num").value;
      const roundNum = document.getElementById("round-num").value;
      if (gameNum) fd.append("game_num", gameNum);
      if (roundNum) fd.append("round_num", roundNum);

      try {
        const res = await fetch("/api/boxscore/upload", {
          method: "POST",
          headers: { "Authorization": `Bearer ${token}` },
          body: fd,
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || `HTTP ${res.status}`);
        }
        const data = await res.json();
        status.className = "form-status ok";
        status.textContent = `Queued (id: ${data.id}) — screenshots saved for parsing.`;
        btn.disabled = false;
        loadPending();
      } catch (e) {
        status.className = "form-status err";
        status.textContent = e.message;
        btn.disabled = false;
      }
    };

    function relTime(iso) {
      if (!iso) return '';
      const m = Math.floor((Date.now() - new Date(iso).getTime()) / 60000);
      if (m < 1) return 'just now';
      if (m < 60) return `${m}m ago`;
      const h = Math.floor(m / 60);
      if (h < 24) return `${h}h ago`;
      return `${Math.floor(h / 24)}d ago`;
    }

    async function removeGame(id, rowEl) {
      try {
        const res = await fetch(`/api/boxscore/pending/${id}`, {
          method: "DELETE",
          headers: { "Authorization": `Bearer ${token}` },
        });
        if (res.ok) {
          rowEl.remove();
          const el = document.getElementById("pending-list");
          if (!el.querySelector("div")) {
            el.innerHTML = `<span style="color:#6b7280;font-size:0.85rem;">No pending games.</span>`;
          }
        } else {
          const err = await res.json().catch(() => ({}));
          alert(err.detail || "Failed to remove.");
        }
      } catch (e) { alert(e.message); }
    }

    // Pending list
    async function loadPending() {
      const el = document.getElementById("pending-list");
      if (!token) {
        el.innerHTML = `<span style="color:#6b7280;font-size:0.85rem;">Set a token to see pending games.</span>`;
        return;
      }
      try {
        const res = await fetch("/api/boxscore/pending", {
          headers: { "Authorization": `Bearer ${token}` },
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const items = await res.json();
        if (items.length === 0) {
          el.innerHTML = `<span style="color:#6b7280;font-size:0.85rem;">No pending games.</span>`;
          return;
        }
        el.innerHTML = "";
        items.forEach(m => {
          const row = document.createElement("div");
          row.style.cssText = "display:flex;align-items:center;gap:0.75rem;padding:0.5rem 0;border-bottom:1px solid #374151;font-size:0.85rem;";
          const ts = m.uploaded_at ? ` · ${relTime(m.uploaded_at)}` : "";
          row.innerHTML = `
            <span style="font-weight:600;color:#e5e7eb;flex:1;min-width:0;">${m.home_team} vs ${m.away_team}</span>
            <span style="color:#9ca3af;">${m.date} · ${m.season} ${m.game_type}</span>
            <span style="color:#6b7280;font-size:0.75rem;">by ${m.uploaded_by || "?"}${ts}</span>`;
          const btn = document.createElement("button");
          btn.title = "Remove from queue";
          btn.textContent = "×";
          btn.style.cssText = "background:none;border:1px solid #374151;color:#6b7280;border-radius:4px;width:1.5rem;height:1.5rem;cursor:pointer;font-size:0.85rem;flex-shrink:0;line-height:1;";
          btn.onmouseenter = () => { btn.style.borderColor="#ef4444"; btn.style.color="#ef4444"; btn.style.background="rgba(239,68,68,0.08)"; };
          btn.onmouseleave = () => { btn.style.borderColor="#374151"; btn.style.color="#6b7280"; btn.style.background="none"; };
          btn.onclick = () => removeGame(m.id, row);
          row.appendChild(btn);
          el.appendChild(row);
        });
      } catch (e) {
        el.innerHTML = `<span style="color:#f87171;font-size:0.85rem;">${e.message}</span>`;
      }
    }

    loadPending();

    // Build status banner
    let buildPollInterval = null;

    async function checkBuildStatus() {
      if (!token) return;
      try {
        const res = await fetch("/api/build/status", {
          headers: { "Authorization": `Bearer ${token}` },
        });
        if (!res.ok) return;
        const data = await res.json();
        const banner = document.getElementById("build-banner");
        const icon = document.getElementById("build-icon");
        const msg = document.getElementById("build-msg");

        if (data.status === "running") {
          banner.style.display = "flex";
          icon.textContent = "⏳";
          msg.style.color = "#9ca3af";
          msg.textContent = "Rebuilding site stats…";
          if (!buildPollInterval) buildPollInterval = setInterval(checkBuildStatus, 4000);
        } else if (data.status === "done") {
          banner.style.display = "flex";
          icon.textContent = "✓";
          msg.style.color = "#34d399";
          msg.textContent = `Site stats updated (finished ${new Date(data.finished_at).toLocaleTimeString()})`;
          stopBuildPoll();
        } else if (data.status === "error") {
          banner.style.display = "flex";
          icon.textContent = "✗";
          msg.style.color = "#f87171";
          msg.textContent = `Build failed: ${data.error || "unknown error"}`;
          stopBuildPoll();
        } else {
          banner.style.display = "none";
        }
      } catch (e) { /* ignore */ }
    }

    function startBuildPoll() {
      checkBuildStatus();
      buildPollInterval = setInterval(checkBuildStatus, 4000);
    }

    function stopBuildPoll() {
      if (buildPollInterval) { clearInterval(buildPollInterval); buildPollInterval = null; }
    }

    checkBuildStatus();
  </script>
</body>
</html>
