<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/logo.png">
  <link rel="stylesheet" href="/css/shared.css">
  <title>Draft History — NBN</title>
  <style>

    .page { max-width: 900px; margin: 0 auto; }

    header { margin-bottom: 1.5rem; }
    header h1 { font-size: 1.875rem; font-weight: 700; letter-spacing: -0.02em; }
    header p { color: #9ca3af; margin-top: 0.4rem; font-size: 0.9rem; }

    .controls {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .controls label { font-size: 0.85rem; color: #9ca3af; }

    select {
      background: #1f2937;
      border: 1px solid #374151;
      color: #f3f4f6;
      padding: 0.4rem 0.75rem;
      border-radius: 6px;
      font-size: 0.875rem;
      cursor: pointer;
    }

    select:focus { outline: none; border-color: #60a5fa; }

    .round-block { margin-bottom: 1.25rem; }

    .round-block h2 {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 0.6rem;
    }

    .table-wrap {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 12px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      white-space: nowrap;
    }

    thead th {
      padding: 0.6rem 0.75rem;
      text-align: left;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #6b7280;
      border-bottom: 1px solid #374151;
    }

    tbody tr { border-bottom: 1px solid #283141; transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #263244; }
    tbody tr[data-clickable] { cursor: pointer; }

    td { padding: 0.55rem 0.75rem; color: #d1d5db; }
    td.pick { color: #6b7280; font-size: 0.78rem; width: 2.5rem; font-variant-numeric: tabular-nums; }
    td.right { text-align: right; font-variant-numeric: tabular-nums; }
    td.muted { color: #9ca3af; }
    td.from  { color: #9ca3af; font-size: 0.8rem; }

    .player-cell {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .player-photo-sm {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      object-position: top center;
      background: #374151;
      flex-shrink: 0;
    }

    .player-placeholder-sm {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #374151;
      flex-shrink: 0;
    }

    .player-name { font-weight: 600; color: #f3f4f6; }

    #status { text-align: center; padding: 3rem; color: #6b7280; font-size: 0.9rem; }

    .upcoming-badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: #1e3a5f;
      color: #60a5fa;
      border-radius: 4px;
      padding: 0.1rem 0.4rem;
      vertical-align: middle;
      margin-left: 0.5rem;
    }

    .pick-row-traded td { color: #60a5fa; }
    .pick-row-traded td.orig-cell,
    .pick-row-traded td.owner-cell { font-weight: 600; }
    td.owner-cell { font-weight: 500; }
    td.notes-cell { color: #6b7280; font-size: 0.8rem; font-style: italic; }
    td.picknum-cell { color: #6b7280; font-size: 0.78rem; width: 2.5rem; font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <div class="page">
    <nav class="nav"></nav>

    <header>
      <h1>Draft</h1>
      <p>Past draft classes and upcoming pick ownership.</p>
    </header>

    <div class="controls">
      <label for="year-select">Draft Class</label>
      <select id="year-select"></select>
      <button id="edit-btn" style="display:none;margin-left:auto;padding:0.3rem 0.7rem;border:1px solid #374151;border-radius:6px;font-size:0.8rem;font-weight:600;cursor:pointer;background:transparent;color:#6b7280;font-family:inherit">Edit</button>
    </div>

    <div id="content"><div id="status">Loading…</div></div>
  </div>

  <script>
    const COUNTRY_ISO = {
      'Antigua and Barbuda': 'AG', 'Argentina': 'AR', 'Australia': 'AU', 'Austria': 'AT',
      'Bahamas': 'BS', 'Belgium': 'BE', 'Bosnia and Herzegovina': 'BA', 'Brazil': 'BR',
      'Cameroon': 'CM', 'Canada': 'CA', 'China': 'CN', 'Croatia': 'HR',
      'Czech Republic': 'CZ', 'Democratic Republic of the Congo': 'CD', 'Denmark': 'DK',
      'Dominican Republic': 'DO', 'Egypt': 'EG', 'Finland': 'FI', 'France': 'FR',
      'Gabon': 'GA', 'Georgia': 'GE', 'Germany': 'DE', 'Greece': 'GR', 'Guinea': 'GN',
      'Haiti': 'HT', 'Israel': 'IL', 'Italy': 'IT', 'Jamaica': 'JM', 'Japan': 'JP',
      'Latvia': 'LV', 'Lithuania': 'LT', 'Montenegro': 'ME', 'New Zealand': 'NZ',
      'Nigeria': 'NG', 'Poland': 'PL', 'Portugal': 'PT', 'Puerto Rico': 'PR',
      'Russia': 'RU', 'Senegal': 'SN', 'Serbia': 'RS', 'Slovenia': 'SI',
      'South Sudan': 'SS', 'Spain': 'ES', 'Sudan': 'SD', 'Sweden': 'SE',
      'Switzerland': 'CH', 'Turkey': 'TR', 'USA': 'US', 'Ukraine': 'UA',
      'United Kingdom': 'GB',
    };

    function flagImg(country) {
      const iso = COUNTRY_ISO[country];
      if (!iso) return null;
      const img = document.createElement('img');
      img.src = `https://flagcdn.com/16x12/${iso.toLowerCase()}.png`;
      img.alt = country;
      img.title = country;
      img.style.cssText = 'vertical-align:middle;border-radius:1px';
      return img;
    }


    function pg(val, g) {
      const n = +val, games = +g;
      if (!games || isNaN(n)) return '—';
      return (n / games).toFixed(1);
    }

    function renderRound(picks, roundLabel) {
      const block = document.createElement('div');
      block.className = 'round-block';
      const h2 = document.createElement('h2');
      h2.textContent = roundLabel;
      block.appendChild(h2);
      const wrap = document.createElement('div');
      wrap.className = 'table-wrap';
      const tbl = document.createElement('table');
      tbl.innerHTML = `<thead><tr>
        <th>Pick</th>
        <th>Player</th>
        <th class="muted">From</th>
        <th>College</th>
        <th>Country</th>
        <th class="right">G</th>
        <th class="right">PPG</th>
        <th class="right">RPG</th>
        <th class="right">APG</th>
      </tr></thead>`;
      const tbody = document.createElement('tbody');
      picks.forEach(({ pick, player }) => {
        const tr = document.createElement('tr');
        tr.dataset.clickable = '1';
        tr.addEventListener('click', () => { location.href = `/players/?p=${player.SLUG}`; });

        // Photo
        const cell = document.createElement('div');
        cell.className = 'player-cell';
        if (player.PHOTO_URL) {
          const img = document.createElement('img');
          img.className = 'player-photo-sm';
          img.src = player.PHOTO_URL;
          img.alt = '';
          img.onerror = function() {
            const ph = document.createElement('div');
            ph.className = 'player-placeholder-sm';
            this.replaceWith(ph);
          };
          cell.appendChild(img);
        } else {
          const ph = document.createElement('div');
          ph.className = 'player-placeholder-sm';
          cell.appendChild(ph);
        }
        const nameSpan = document.createElement('span');
        nameSpan.className = 'player-name';
        nameSpan.textContent = player.PLAYER;
        cell.appendChild(nameSpan);

        // Country flag
        const flagTd = document.createElement('td');
        const flag = player.COUNTRY && player.COUNTRY !== 'NA' ? flagImg(player.COUNTRY) : null;
        if (flag) flagTd.appendChild(flag);
        else flagTd.textContent = player.COUNTRY && player.COUNTRY !== 'NA' ? player.COUNTRY : '—';

        const college = player.COLLEGE && player.COLLEGE !== 'NA' ? player.COLLEGE : '—';
        const G = player._career_G;

        const tdPick = document.createElement('td');
        tdPick.className = 'pick';
        tdPick.textContent = pick.num;
        tr.appendChild(tdPick);

        const tdPlayer = document.createElement('td');
        tdPlayer.appendChild(cell);
        tr.appendChild(tdPlayer);

        const tdFrom = document.createElement('td');
        tdFrom.className = 'from';
        tdFrom.textContent = pick.from || '—';
        tr.appendChild(tdFrom);

        const tdCollege = document.createElement('td');
        tdCollege.className = 'muted';
        tdCollege.textContent = college;
        tr.appendChild(tdCollege);

        tr.appendChild(flagTd);

        [G, pg(player._career_PTS, G), pg(player._career_REB, G), pg(player._career_AST, G)].forEach(v => {
          const td = document.createElement('td');
          td.className = 'right';
          td.textContent = typeof v === 'number' ? v : v;
          tr.appendChild(td);
        });

        tbody.appendChild(tr);
      });
      tbl.appendChild(tbody);
      wrap.appendChild(tbl);
      block.appendChild(wrap);
      return block;
    }

    function render(players, year) {
      const content = document.getElementById('content');
      content.innerHTML = '';

      const classPlayers = Object.values(players).filter(p => p.NBN_DFT_YR === year);

      const byRound = {};
      classPlayers.forEach(p => {
        const round = p._draft_round ? `Round ${p._draft_round}` : 'Unknown';
        if (!byRound[round]) byRound[round] = [];
        const pick = { num: p._draft_pick ?? 999, from: p._draft_team || '' };
        byRound[round].push({ pick, player: p });
      });

      const roundOrder = ['Round 1', 'Round 2'];
      const allRounds = [...new Set([...roundOrder, ...Object.keys(byRound)])].filter(r => byRound[r]);

      if (!allRounds.length) {
        content.innerHTML = '<div id="status">No draft data for this year.</div>';
        return;
      }

      allRounds.forEach(round => {
        const picks = byRound[round].sort((a, b) => a.pick.num - b.pick.num);
        content.appendChild(renderRound(picks, round));
      });
    }

    const TOKEN_KEY = 'nbn_token';
    const getToken = () => localStorage.getItem(TOKEN_KEY);
    const setToken = t => localStorage.setItem(TOKEN_KEY, t);

    function withToken(fn) {
      const t = getToken();
      if (t) { fn(t); return; }
      const tok = prompt('Enter your NBN access token:');
      if (!tok) return;
      setToken(tok);
      fn(tok);
    }

    // Only the `rosters` role (and bod/admin, which subsume it) can persist pick
    // edits via PUT /api/picks. Team roles cannot — so don't show them the Edit
    // button just to have the save 403. Mirrors the isBod() gating on /draft/live.
    const EDIT_ROLES = ['rosters', 'bod', 'admin'];
    async function loadCanEditPicks() {
      const t = getToken();
      if (!t) return false;
      try {
        const res = await fetch('/api/auth/me', { headers: { 'Authorization': `Bearer ${t}` } });
        if (!res.ok) return false;
        const roles = (await res.json()).roles || [];
        return roles.some(r => EDIT_ROLES.includes(r));
      } catch { return false; }
    }

    const TEAM_ABBRS = [
      'ATL','BKN','BOS','CHA','CHI','CLE','DAL','DEN','DET','GSW',
      'HOU','IND','LAC','LAL','MEM','MIA','MIL','MIN','NOP','NYK',
      'OKC','ORL','PHI','PHX','POR','SAC','SAS','TOR','UTA','WAS',
    ];

    const INP = 'background:#111827;border:1px solid #374151;border-radius:4px;color:#d1d5db;font-size:0.8rem;padding:0.2rem 0.4rem;font-family:inherit;width:100%';

    function renderFutureEditable(allPicks, year, bios, onSaved) {
      const content = document.getElementById('content');
      content.innerHTML = '';

      const yearPicks = allPicks.filter(p => p.year === +year)
        .sort((a, b) => a.round - b.round || (a.pick ?? 999) - (b.pick ?? 999) || a.orig.localeCompare(b.orig));

      const toolbar = document.createElement('div');
      toolbar.style.cssText = 'display:flex;gap:0.5rem;align-items:center;margin-bottom:0.75rem';

      const saveBtn = document.createElement('button');
      saveBtn.textContent = 'Save';
      saveBtn.style.cssText = 'padding:0.35rem 0.8rem;border:1px solid #3b82f6;border-radius:6px;font-size:0.8rem;font-weight:600;cursor:pointer;background:transparent;color:#60a5fa;font-family:inherit';

      const cancelBtn = document.createElement('button');
      cancelBtn.textContent = 'Cancel';
      cancelBtn.style.cssText = 'padding:0.35rem 0.8rem;border:1px solid #374151;border-radius:6px;font-size:0.8rem;font-weight:600;cursor:pointer;background:transparent;color:#d1d5db;font-family:inherit';

      const statusEl = document.createElement('span');
      statusEl.style.cssText = 'font-size:0.75rem;color:#6b7280;margin-left:auto';

      toolbar.appendChild(saveBtn);
      toolbar.appendChild(cancelBtn);
      toolbar.appendChild(statusEl);
      content.appendChild(toolbar);

      [1, 2].forEach(rnd => {
        const rndPicks = yearPicks.filter(p => p.round === rnd);
        if (!rndPicks.length) return;

        const block = document.createElement('div');
        block.className = 'round-block';
        const h2 = document.createElement('h2');
        h2.textContent = `Round ${rnd}`;
        block.appendChild(h2);

        const wrap = document.createElement('div');
        wrap.className = 'table-wrap';
        wrap.style.overflowX = 'auto';

        const tbl = document.createElement('table');
        tbl.innerHTML = `<thead><tr>
          <th>Owner</th><th>Orig</th><th>Pick #</th><th>Selection</th><th>Top-N Prot.</th><th>Swap Owner</th><th>Notes</th>
        </tr></thead>`;
        const tbody = document.createElement('tbody');

        // Build sorted player list for select: [{slug, label}]
        const playerOpts = [{ slug: '', label: '—' },
          ...Object.entries(bios)
            .map(([slug, bio]) => {
              const parts = bio.name.split(',');
              const label = parts.length === 2 ? `${parts[1].trim()} ${parts[0].trim()}` : bio.name;
              return { slug, label };
            })
            .sort((a, b) => a.label.localeCompare(b.label))
        ];

        rndPicks.forEach(p => {
          const tr = document.createElement('tr');

          const selOwner = document.createElement('select');
          selOwner.style.cssText = INP;
          TEAM_ABBRS.forEach(t => {
            const o = document.createElement('option');
            o.value = t; o.textContent = t;
            if (t === p.owner) o.selected = true;
            selOwner.appendChild(o);
          });
          const tdOwner = document.createElement('td');
          tdOwner.appendChild(selOwner);
          tr.appendChild(tdOwner);

          const tdOrig = document.createElement('td');
          tdOrig.textContent = p.orig;
          tdOrig.style.color = '#6b7280';
          tr.appendChild(tdOrig);

          const inpPick = document.createElement('input');
          inpPick.type = 'number'; inpPick.min = '1'; inpPick.max = '60';
          inpPick.style.cssText = INP;
          if (p.pick != null) inpPick.value = p.pick;
          const tdPick = document.createElement('td');
          tdPick.appendChild(inpPick);
          tr.appendChild(tdPick);

          const selPlayer = document.createElement('select');
          selPlayer.style.cssText = INP;
          playerOpts.forEach(({ slug, label }) => {
            const o = document.createElement('option');
            o.value = slug; o.textContent = label;
            if (slug === (p.player || '')) o.selected = true;
            selPlayer.appendChild(o);
          });
          const tdPlayer = document.createElement('td');
          tdPlayer.appendChild(selPlayer);
          tr.appendChild(tdPlayer);

          const inpProt = document.createElement('input');
          inpProt.type = 'number'; inpProt.min = '1'; inpProt.max = '30';
          inpProt.style.cssText = INP;
          if (p.protected != null) inpProt.value = p.protected;
          const tdProt = document.createElement('td');
          tdProt.appendChild(inpProt);
          tr.appendChild(tdProt);

          const selSwap = document.createElement('select');
          selSwap.style.cssText = INP;
          [{ value: '', label: '—' }, ...TEAM_ABBRS.map(t => ({ value: t, label: t }))].forEach(({ value, label }) => {
            const o = document.createElement('option');
            o.value = value; o.textContent = label;
            if (value === (p.swap_owner || '')) o.selected = true;
            selSwap.appendChild(o);
          });
          const tdSwap = document.createElement('td');
          tdSwap.appendChild(selSwap);
          tr.appendChild(tdSwap);

          const inpNotes = document.createElement('input');
          inpNotes.type = 'text'; inpNotes.style.cssText = INP;
          inpNotes.value = p.notes || '';
          const tdNotes = document.createElement('td');
          tdNotes.appendChild(inpNotes);
          tr.appendChild(tdNotes);

          p._inputs = { selOwner, inpPick, selPlayer, inpProt, selSwap, inpNotes };
          tbody.appendChild(tr);
        });

        tbl.appendChild(tbody);
        wrap.appendChild(tbl);
        block.appendChild(wrap);
        content.appendChild(block);
      });

      cancelBtn.addEventListener('click', () => onSaved(allPicks));

      saveBtn.addEventListener('click', () => withToken(async token => {
        saveBtn.disabled = true; cancelBtn.disabled = true;
        statusEl.textContent = 'Saving…';
        try {
          let failed = null;
          for (const p of yearPicks) {
            const { selOwner, inpPick, selPlayer, inpProt, selSwap, inpNotes } = p._inputs;
            const r = await fetch(`/api/picks/${p.year}/${p.round}/${p.orig}`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
              body: JSON.stringify({
                owner:      selOwner.value,
                pick:       inpPick.value  ? parseInt(inpPick.value)  : null,
                player:     selPlayer.value || null,
                protected:  inpProt.value  ? parseInt(inpProt.value)  : null,
                swap_owner: selSwap.value  || null,
                notes:      inpNotes.value.trim(),
              }),
            });
            if (!r.ok) { failed = r; break; }
          }
          if (failed) {
            if (failed.status === 403) { localStorage.removeItem(TOKEN_KEY); statusEl.textContent = 'Invalid token — cleared.'; }
            else statusEl.textContent = `Error ${failed.status}`;
            saveBtn.disabled = false; cancelBtn.disabled = false;
            return;
          }
          const fresh = await fetch('/api/picks').then(r => r.json());
          statusEl.textContent = 'Saved!';
          setTimeout(() => onSaved(fresh), 700);
        } catch {
          statusEl.textContent = 'Network error';
          saveBtn.disabled = false; cancelBtn.disabled = false;
        }
      }));
    }

    function playerName(slug, bios) {
      if (!slug) return null;
      const bio = bios[slug];
      if (!bio) return slug;
      const parts = bio.name.split(',');
      return parts.length === 2 ? `${parts[1].trim()} ${parts[0].trim()}` : bio.name;
    }

    function calcAge(dob) {
      if (!dob) return '—';
      const birth = new Date(dob);
      if (isNaN(birth)) return '—';
      const now = new Date();
      let age = now.getFullYear() - birth.getFullYear();
      if (now.getMonth() < birth.getMonth() ||
          (now.getMonth() === birth.getMonth() && now.getDate() < birth.getDate())) age--;
      return age;
    }

    function renderUndraftedTable(allPicks, year, bios) {
      const assignedSlugs = new Set(
        allPicks.filter(p => p.year === +year && p.player).map(p => p.player)
      );

      const draftClass = Object.entries(bios)
        .filter(([slug, bio]) => bio.draft_year === +year && !assignedSlugs.has(slug))
        .map(([slug, bio]) => ({ slug, bio }))
        .sort((a, b) => a.bio.name.localeCompare(b.bio.name));

      if (!draftClass.length) return null;

      const block = document.createElement('div');
      block.className = 'round-block';
      const h2 = document.createElement('h2');
      h2.textContent = `Undrafted Players (${draftClass.length})`;
      block.appendChild(h2);

      const wrap = document.createElement('div');
      wrap.className = 'table-wrap';

      const tbl = document.createElement('table');
      tbl.innerHTML = `<thead><tr>
        <th>Player</th><th>Pos</th><th class="right">Age</th><th>College / Country</th>
      </tr></thead>`;
      const tbody = document.createElement('tbody');

      draftClass.forEach(({ slug, bio }) => {
        const tr = document.createElement('tr');

        const tdName = document.createElement('td');
        tdName.className = 'player-cell';
        const a = document.createElement('a');
        a.href = `/players/?p=${slug}`;
        const parts = (bio.name || slug).split(', ');
        a.textContent = parts.length === 2 ? `${parts[1].trim()} ${parts[0].trim()}` : (bio.name || slug);
        tdName.appendChild(a);
        tr.appendChild(tdName);

        const tdPos = document.createElement('td');
        tdPos.textContent = Array.isArray(bio.pos) ? bio.pos.join('/') : (bio.pos || '—');
        tr.appendChild(tdPos);

        const tdAge = document.createElement('td');
        tdAge.className = 'right';
        tdAge.textContent = bio.dob ? calcAge(bio.dob) : '—';
        tr.appendChild(tdAge);

        const tdSchool = document.createElement('td');
        tdSchool.className = 'muted';
        const college = bio.college && bio.college !== 'NA' ? bio.college : null;
        const country = bio.country && bio.country !== 'NA' ? bio.country : null;
        tdSchool.textContent = college || country || '—';
        tr.appendChild(tdSchool);

        tbody.appendChild(tr);
      });

      tbl.appendChild(tbody);
      wrap.appendChild(tbl);
      block.appendChild(wrap);
      return block;
    }

    function renderFuture(allPicks, year, bios) {
      const content = document.getElementById('content');
      content.innerHTML = '';

      const yearPicks = allPicks.filter(p => p.year === +year);
      if (!yearPicks.length) {
        content.innerHTML = '<div id="status">No pick data for this year.</div>';
        return;
      }

      [1, 2].forEach(rnd => {
        const picks = yearPicks
          .filter(p => p.round === rnd)
          .sort((a, b) => {
            if (a.pick != null && b.pick != null) return a.pick - b.pick;
            if (a.pick != null) return -1;
            if (b.pick != null) return 1;
            return a.orig.localeCompare(b.orig);
          });
        if (!picks.length) return;

        // When a swap conveys, the swap_owner's own pick goes to the swap holder.
        // Build a reverse map: orig team → who actually gets their pick.
        const swapTakesFrom = {};
        picks.forEach(p => {
          if (p.swap_conveys === true && p.swap_owner) {
            swapTakesFrom[p.swap_owner] = p.owner;
          }
        });

        const block = document.createElement('div');
        block.className = 'round-block';
        const h2 = document.createElement('h2');
        h2.textContent = `Round ${rnd}`;
        block.appendChild(h2);

        const wrap = document.createElement('div');
        wrap.className = 'table-wrap';
        const tbl = document.createElement('table');
        tbl.innerHTML = `<thead><tr>
          <th class="right">Pick</th>
          <th>Selection</th>
          <th>Owner</th>
          <th>Orig</th>
          <th>Protection</th>
          <th>Swap</th>
          <th>Status</th>
          <th>Notes</th>
        </tr></thead>`;
        const tbody = document.createElement('tbody');

        picks.forEach(p => {
          const effectiveOwner = p.swap_conveys === true ? p.swap_owner
                               : (swapTakesFrom[p.orig] ?? p.owner);
          const traded = p.orig !== effectiveOwner;
          const tr = document.createElement('tr');
          if (traded) tr.className = 'pick-row-traded';

          const tdPick = document.createElement('td');
          tdPick.className = 'picknum-cell right';
          tdPick.textContent = p.pick != null ? `#${p.pick}` : '—';
          tr.appendChild(tdPick);

          const tdPlayer = document.createElement('td');
          tdPlayer.className = 'player-cell';
          const pName = playerName(p.player, bios);
          if (pName) {
            tdPlayer.textContent = pName;
          } else {
            tdPlayer.textContent = '—';
            tdPlayer.classList.add('muted');
          }
          tr.appendChild(tdPlayer);

          const tdOwner = document.createElement('td');
          tdOwner.className = 'owner-cell';
          tdOwner.textContent = effectiveOwner;
          tr.appendChild(tdOwner);

          const tdOrig = document.createElement('td');
          tdOrig.className = 'orig-cell muted';
          tdOrig.textContent = p.orig;
          tr.appendChild(tdOrig);

          const tdProt = document.createElement('td');
          tdProt.className = 'muted';
          tdProt.textContent = p.protected != null ? `Top-${p.protected}` : '—';
          tr.appendChild(tdProt);

          const tdSwap = document.createElement('td');
          tdSwap.className = 'muted';
          tdSwap.textContent = p.swap_owner || '—';
          tr.appendChild(tdSwap);

          const tdStatus = document.createElement('td');
          if (p.conveys === true) {
            tdStatus.textContent = 'Conveys';
            tdStatus.style.color = '#4ade80';
          } else if (p.conveys === false) {
            tdStatus.textContent = 'Does not convey';
            tdStatus.style.color = '#f87171';
          } else if (p.swap_conveys === true) {
            tdStatus.textContent = 'Swap conveys';
            tdStatus.style.color = '#4ade80';
          } else if (p.swap_conveys === false) {
            tdStatus.textContent = 'Swap does not convey';
            tdStatus.style.color = '#f87171';
          } else {
            tdStatus.textContent = '—';
            tdStatus.className = 'muted';
          }
          tr.appendChild(tdStatus);

          const tdNotes = document.createElement('td');
          tdNotes.className = 'notes-cell';
          tdNotes.textContent = p.notes || '';
          tr.appendChild(tdNotes);

          tbody.appendChild(tr);
        });

        tbl.appendChild(tbody);
        wrap.appendChild(tbl);
        block.appendChild(wrap);
        content.appendChild(block);
      });

      const undraftedBlock = renderUndraftedTable(allPicks, year, bios);
      if (undraftedBlock) content.appendChild(undraftedBlock);
    }

    async function init() {
      const [seasonsRes, picksRes, biosRes, canEditPicks] = await Promise.all([
        fetch('/players/player_seasons.csv'),
        fetch('/api/picks'),
        fetch('/api/players'),
        loadCanEditPicks(),
      ]);

      if (!seasonsRes.ok) { document.getElementById('status').textContent = 'Failed to load data.'; return; }
      const rows = parseCSV(await seasonsRes.text());
      const allPicks = picksRes.ok ? await picksRes.json() : [];
      const bios = biosRes.ok ? await biosRes.json() : {};

      // Aggregate career totals and deduplicate by slug
      const players = {};
      rows.forEach(r => {
        if (!r.SLUG) return;
        if (!players[r.SLUG]) {
          players[r.SLUG] = { ...r, _career_G: 0, _career_PTS: 0, _career_REB: 0, _career_AST: 0 };
        }
        players[r.SLUG]._career_G   += +r.G   || 0;
        players[r.SLUG]._career_PTS += +r.PTS  || 0;
        players[r.SLUG]._career_REB += +r.REB  || 0;
        players[r.SLUG]._career_AST += +r.AST  || 0;
        if (r.PHOTO_URL) players[r.SLUG].PHOTO_URL = r.PHOTO_URL;
        if (r.COUNTRY && r.COUNTRY !== 'NA') players[r.SLUG].COUNTRY = r.COUNTRY;
        if (r.COLLEGE && r.COLLEGE !== 'NA') players[r.SLUG].COLLEGE = r.COLLEGE;
      });

      // Merge the canonical draft record from bios. The build's NBN_DFT_* columns
      // lost the drafting team (NBN_DFT_P is now a bare pick number), so round/
      // pick/team come from player-bios.json (draft_round / draft_pick /
      // draft_team), which is the all-years source of truth.
      Object.entries(players).forEach(([slug, p]) => {
        const bio = bios[slug] || {};
        p._draft_round = parseInt(bio.draft_round) || null;
        p._draft_pick  = (bio.draft_pick != null && bio.draft_pick !== '') ? parseInt(bio.draft_pick) : null;
        p._draft_team  = bio.draft_team || '';
        if (bio.draft_year != null && bio.draft_year !== '') p.NBN_DFT_YR = String(bio.draft_year);
      });

      const drafted = Object.fromEntries(
        Object.entries(players).filter(([, p]) => p.NBN_DFT_YR && p.NBN_DFT_YR !== 'NA')
      );

      // A year tracked in the picks system stays "future" (unfinished) until every
      // pick has a player assigned — NBN_DFT_YR alone isn't enough, since the build
      // seeds placeholder season rows for the whole draft class before picks happen.
      const picksByYear = {};
      allPicks.forEach(p => {
        const y = String(p.year);
        (picksByYear[y] ||= []).push(p);
      });
      const futureYears = Object.keys(picksByYear)
        .filter(y => picksByYear[y].some(p => !p.player))
        .sort();

      const pastYears = new Set(
        [...new Set(Object.values(drafted).map(p => p.NBN_DFT_YR))]
          .filter(y => !futureYears.includes(y))
      );

      const sel = document.getElementById('year-select');

      futureYears.forEach(y => {
        const opt = document.createElement('option');
        opt.value = y;
        opt.dataset.future = '1';
        opt.textContent = `${y} Draft`;
        sel.appendChild(opt);
      });

      [...pastYears].sort().reverse().forEach(y => {
        const opt = document.createElement('option');
        opt.value = y;
        opt.textContent = `${y} Draft`;
        sel.appendChild(opt);
      });

      const allYears = [...futureYears, ...[...pastYears].sort().reverse()];

      const editBtn = document.getElementById('edit-btn');
      let currentAllPicks = allPicks;

      function renderYear(y, picksData) {
        const picks = picksData ?? currentAllPicks;
        const isFuture = !pastYears.has(y);

        const badge = document.querySelector('.upcoming-badge');
        if (badge) badge.remove();
        if (isFuture) {
          const b = document.createElement('span');
          b.className = 'upcoming-badge';
          b.textContent = 'Upcoming';
          document.querySelector('header h1').appendChild(b);
        }

        // Show Edit for future drafts when the user either can already edit
        // (token carries rosters/bod/admin) or has no token yet (cold start —
        // the click prompts for one, matching the rest of the site). A token
        // that lacks edit roles hides the button outright.
        editBtn.style.display = (isFuture && (canEditPicks || !getToken())) ? '' : 'none';
        editBtn.onclick = () => withToken(async () => {
          // Re-verify after a freshly entered token so a team-only token can't
          // open the (non-persistable) editor and look like real access.
          if (!await loadCanEditPicks()) {
            alert('Your token does not have permission to edit draft picks.');
            return;
          }
          renderFutureEditable(picks, y, bios, fresh => {
            currentAllPicks = fresh;
            renderYear(y, fresh);
          });
        });

        if (isFuture) renderFuture(picks, y, bios);
        else render(drafted, y);
      }

      renderYear(allYears[0]);
      sel.addEventListener('change', () => renderYear(sel.value));
    }

    init();
  </script>
  <script src="/nav.js"></script>
  <script src="/token-badge.js"></script>
</body>
</html>
