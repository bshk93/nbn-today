<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/logo.png">
  <link rel="stylesheet" href="/css/shared.css">
  <title>Draft Live — NBN</title>
  <style>
    .page { max-width: 960px; margin: 0 auto; }

    /* ── Admin panel ──────────────────────────────────── */
    #admin-panel {
      background: #111;
      border: 1px solid #374151;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
    }
    #admin-panel summary {
      padding: 0.5rem 0.75rem;
      cursor: pointer;
      color: #6b7280;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      user-select: none;
    }
    #admin-panel summary:hover { color: #9ca3af; }
    .admin-form {
      padding: 0.75rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: flex-end;
      border-top: 1px solid #1f2937;
    }
    .admin-field { display: flex; flex-direction: column; gap: 0.3rem; }
    .admin-field label { font-size: 0.7rem; color: #6b7280; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .admin-field input[type="text"],
    .admin-field input[type="date"],
    .admin-field input[type="number"] {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 5px;
      color: #f3f4f6;
      font-size: 0.8rem;
      padding: 0.3rem 0.5rem;
      font-family: inherit;
    }
    .admin-field input[type="text"] { width: 320px; }
    .admin-toggle { display: flex; align-items: center; gap: 0.5rem; margin-top: 1.1rem; }
    .admin-toggle label { font-size: 0.85rem; color: #d1d5db; cursor: pointer; }
    .btn { padding: 0.35rem 0.9rem; border-radius: 6px; font-size: 0.8rem; font-weight: 600; cursor: pointer; font-family: inherit; border: none; }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-primary:disabled { background: #374151; color: #6b7280; cursor: default; }
    .btn-ghost { background: transparent; border: 1px solid #374151; color: #9ca3af; }
    .btn-ghost:hover { border-color: #6b7280; color: #d1d5db; }
    .btn-danger { background: transparent; border: 1px solid #ef4444; color: #ef4444; }
    .btn-danger:hover { background: #ef444420; }
    .btn-sm { padding: 0.2rem 0.55rem; font-size: 0.75rem; }
    #admin-status { font-size: 0.75rem; color: #6b7280; align-self: center; }

    /* ── YouTube embed ────────────────────────────────── */
    .embed-section { margin-bottom: 1.5rem; }
    .embed-wrap {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background: #0f0f0f;
      border-radius: 10px;
      overflow: hidden;
    }
    .embed-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    .embed-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: #4b5563;
    }
    .embed-placeholder svg { opacity: 0.4; }
    .embed-placeholder p { font-size: 0.85rem; }
    .embed-placeholder a { color: #60a5fa; }

    /* ── Status bar ───────────────────────────────────── */
    .status-bar {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      background: #dc2626;
      color: #fff;
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .live-dot {
      width: 6px; height: 6px;
      background: #fff;
      border-radius: 50%;
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .status-text { font-size: 0.95rem; font-weight: 600; color: #f3f4f6; flex: 1; }
    .status-sub { font-size: 0.8rem; color: #9ca3af; }
    .countdown {
      font-size: 2rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      color: #f3f4f6;
      letter-spacing: -0.02em;
      flex-shrink: 0;
    }
    .countdown.urgent { color: #f87171; }

    /* ── My Picks panel ───────────────────────────────── */
    .my-picks-card {
      background: #1f2937;
      border: 1px solid #3b82f6;
      border-radius: 10px;
      margin-bottom: 1.5rem;
    }
    .my-picks-header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #374151;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .my-picks-header h2 { font-size: 0.85rem; font-weight: 700; color: #93c5fd; }
    .my-picks-body { padding: 0.75rem 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .pick-slot {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      padding: 0.6rem 0.75rem;
      background: #111827;
      border-radius: 8px;
      border: 1px solid #374151;
    }
    .pick-slot.on-clock {
      border-color: #3b82f6;
      background: #0d1f3c;
    }
    .pick-slot-num {
      font-size: 0.7rem;
      font-weight: 700;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      min-width: 60px;
    }
    .pick-slot-time { font-size: 0.78rem; color: #9ca3af; flex-shrink: 0; }
    .pick-slot-queue { font-size: 0.82rem; color: #93c5fd; font-weight: 600; }
    .pick-slot-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-left: auto; }
    .sign-in-prompt {
      padding: 1rem;
      text-align: center;
      color: #6b7280;
      font-size: 0.85rem;
    }
    .sign-in-prompt button { margin-top: 0.5rem; }

    /* ── Draft board ──────────────────────────────────── */
    .section { margin-bottom: 2rem; }
    .section-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 0.6rem;
    }
    .table-wrap {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 10px;
      overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; white-space: nowrap; }
    thead th {
      padding: 0.55rem 0.75rem;
      text-align: left;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #6b7280;
      border-bottom: 1px solid #374151;
    }
    tbody tr { border-bottom: 1px solid #283141; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #263244; }
    td { padding: 0.5rem 0.75rem; color: #d1d5db; }
    td.num { color: #6b7280; font-size: 0.75rem; width: 3rem; font-variant-numeric: tabular-nums; }
    td.muted { color: #9ca3af; }
    td.team { font-weight: 600; }
    .player-cell { display: flex; align-items: center; gap: 0.55rem; }
    .player-photo {
      width: 30px; height: 30px; border-radius: 50%;
      object-fit: cover; object-position: top center;
      background: #374151; flex-shrink: 0;
    }
    .player-ph { width: 30px; height: 30px; border-radius: 50%; background: #374151; flex-shrink: 0; }
    .player-name { font-weight: 600; color: #f3f4f6; }

    .pick-in-cell {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #facc15;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .pick-in-dot {
      width: 7px; height: 7px;
      background: #facc15;
      border-radius: 50%;
      animation: pulse 1s infinite;
    }

    .empty-state { padding: 2.5rem; text-align: center; color: #6b7280; font-size: 0.88rem; }

    .round-separator {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #374151;
      background: #1a2336;
      padding: 0.35rem 0.75rem;
      border-bottom: 1px solid #374151;
    }

    select.player-select {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 5px;
      color: #f3f4f6;
      font-size: 0.8rem;
      padding: 0.25rem 0.5rem;
      font-family: inherit;
      max-width: 200px;
    }
    select.player-select:focus { outline: none; border-color: #60a5fa; }
  </style>
</head>
<body>
  <div class="page">
    <nav class="nav"></nav>

    <!-- Admin panel (hidden until admin role confirmed) -->
    <details id="admin-panel" style="display:none">
      <summary>Admin Controls</summary>
      <div class="admin-form">
        <div class="admin-toggle">
          <input type="checkbox" id="admin-live" />
          <label for="admin-live">Draft Live</label>
        </div>
        <div class="admin-field">
          <label>Year</label>
          <input type="number" id="admin-year" style="width:80px" min="2020" max="2040" />
        </div>
        <div class="admin-field">
          <label>Round 1 Date</label>
          <input type="date" id="admin-date" />
        </div>
        <div class="admin-field" style="flex:1">
          <label>YouTube Embed URL</label>
          <input type="text" id="admin-youtube" placeholder="https://www.youtube.com/embed/VIDEO_ID" />
        </div>
        <button class="btn btn-primary btn-sm" id="admin-save" style="margin-bottom:1px">Save</button>
        <span id="admin-status"></span>
      </div>
    </details>

    <!-- YouTube embed -->
    <div class="embed-section" id="embed-section">
      <div class="embed-wrap" id="embed-wrap">
        <div class="embed-placeholder">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor">
            <path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/>
          </svg>
          <p>Stream not configured. <a href="https://www.youtube.com/@nothingbutnetnbn" target="_blank" rel="noopener">Watch on YouTube</a></p>
        </div>
      </div>
    </div>

    <!-- Status bar -->
    <div class="status-bar" id="status-bar">
      <div>
        <div class="status-text" id="status-text">Loading…</div>
        <div class="status-sub" id="status-sub"></div>
      </div>
      <div class="countdown" id="countdown" style="display:none"></div>
    </div>

    <!-- My Picks panel -->
    <div id="my-picks-section" style="display:none">
      <div class="my-picks-card">
        <div class="my-picks-header">
          <h2 id="my-picks-title">My Picks</h2>
        </div>
        <div class="my-picks-body" id="my-picks-body"></div>
      </div>
    </div>

    <!-- Sign-in prompt (shown when not logged in and draft is live) -->
    <div id="signin-section" style="display:none">
      <div class="my-picks-card" style="border-color:#374151">
        <div class="sign-in-prompt">
          <div>Sign in to see your picks and queue a player.</div>
          <button class="btn btn-ghost btn-sm" onclick="promptSignIn()" style="margin-top:0.5rem">Sign In</button>
        </div>
      </div>
    </div>

    <!-- Draft board -->
    <div class="section" id="board-section" style="display:none">
      <div class="section-title">Draft Board</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Pick</th>
              <th>Team</th>
              <th>Player</th>
              <th>Pos</th>
              <th class="muted">College / Country</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="board-body"></tbody>
        </table>
      </div>
    </div>

    <!-- Available players -->
    <div class="section" id="available-section">
      <div class="section-title" id="available-title">2026 Draft Class</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Player</th>
              <th>Pos</th>
              <th class="muted">Age</th>
              <th class="muted">College / Country</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="available-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const TOKEN_KEY = 'nbn_token';
    const TEAM_ABBRS = new Set([
      'ATL','BKN','BOS','CHA','CHI','CLE','DAL','DEN','DET','GSW',
      'HOU','IND','LAC','LAL','MEM','MIA','MIL','MIN','NOP','NYK',
      'OKC','ORL','PHI','PHX','POR','SAC','SAS','TOR','UTA','WAS',
    ]);

    let draftState = null;
    let allPicks = [];
    let bios = {};
    let myRoles = [];
    let myTeams = [];
    let myName = null;
    let countdownTimer = null;

    // ── Helpers ────────────────────────────────────────────────────────────────

    function getToken() { return localStorage.getItem(TOKEN_KEY); }

    function bioName(slug) {
      const bio = bios[slug];
      if (!bio) return slug;
      const parts = bio.name.split(',');
      return parts.length === 2 ? `${parts[1].trim()} ${parts[0].trim()}` : bio.name;
    }

    function calcAge(dob) {
      if (!dob) return '—';
      const birth = new Date(dob + 'T00:00:00');
      const now = new Date();
      let age = now.getFullYear() - birth.getFullYear();
      if (now.getMonth() < birth.getMonth() ||
          (now.getMonth() === birth.getMonth() && now.getDate() < birth.getDate())) age--;
      return age;
    }

    function pickWindowStart(round1Date, roundNum, pickNum) {
      // round1Date: "YYYY-MM-DD"; noon Eastern (EDT = UTC-4 in June)
      const [yr, mo, da] = round1Date.split('-').map(Number);
      const day = da + (roundNum - 1);
      return new Date(`${yr}-${String(mo).padStart(2,'0')}-${String(day).padStart(2,'0')}T12:00:00-04:00`)
        .getTime() + (pickNum - 1) * 10 * 60 * 1000;
    }

    function pickWindowEnd(round1Date, roundNum, pickNum) {
      return pickWindowStart(round1Date, roundNum, pickNum) + 10 * 60 * 1000;
    }

    function formatET(ms) {
      return new Date(ms).toLocaleTimeString('en-US', {
        timeZone: 'America/New_York',
        hour: 'numeric', minute: '2-digit', hour12: true,
      });
    }

    function formatDateET(ms) {
      return new Date(ms).toLocaleDateString('en-US', {
        timeZone: 'America/New_York',
        weekday: 'long', month: 'long', day: 'numeric',
      });
    }

    function yearPicks(year) {
      return allPicks.filter(p => p.year === year && p.pick != null)
        .sort((a, b) => a.round - b.round || a.pick - b.pick);
    }

    function pickedSlugs(year) {
      return new Set(allPicks.filter(p => p.year === year && p.player).map(p => p.player));
    }

    function pickOwners(p) {
      const o = p.owner || '';
      if (!o || o === '?') return [p.orig];
      return o.split('|').map(x => x.trim().toUpperCase()).filter(Boolean);
    }

    // The pick whose time window contains `now`
    function currentSlot(state) {
      if (!state.round1_date) return null;
      const now = Date.now();
      for (const p of yearPicks(state.year)) {
        const start = pickWindowStart(state.round1_date, p.round, p.pick);
        const end = start + 10 * 60 * 1000;
        if (now >= start && now < end) return { pick: p, start, end };
      }
      return null;
    }

    // First unsubmitted pick (by schedule order)
    function nextUnsubmitted(state) {
      return yearPicks(state.year).find(p => !p.player) || null;
    }

    // ── Auth ───────────────────────────────────────────────────────────────────

    async function loadAuth() {
      const token = getToken();
      if (!token) return;
      try {
        const res = await fetch('/api/auth/me', { headers: { 'Authorization': `Bearer ${token}` } });
        if (!res.ok) return;
        const data = await res.json();
        myName = data.name;
        myRoles = data.roles || [];
        myTeams = myRoles.map(r => r.toUpperCase()).filter(r => TEAM_ABBRS.has(r));
      } catch {}
    }

    function isAdmin() { return myRoles.includes('admin'); }
    function isBod() { return myRoles.includes('bod') || isAdmin(); }

    function promptSignIn() {
      const tok = prompt('Enter your NBN access token:');
      if (!tok) return;
      localStorage.setItem(TOKEN_KEY, tok);
      loadAuth().then(render);
    }

    // ── API calls ──────────────────────────────────────────────────────────────

    async function apiPatch(path, body) {
      const token = getToken();
      return fetch(path, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify(body),
      });
    }

    async function apiPut(path, body) {
      const token = getToken();
      return fetch(path, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify(body),
      });
    }

    async function apiPost(path, body) {
      const token = getToken();
      return fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify(body),
      });
    }

    // ── Admin panel ────────────────────────────────────────────────────────────

    function initAdminPanel(state) {
      document.getElementById('admin-live').checked = !!state.live;
      document.getElementById('admin-year').value = state.year || 2026;
      document.getElementById('admin-date').value = state.round1_date || '';
      document.getElementById('admin-youtube').value = state.youtube_embed_url || '';
    }

    document.getElementById('admin-save').addEventListener('click', async () => {
      const btn = document.getElementById('admin-save');
      const statusEl = document.getElementById('admin-status');
      btn.disabled = true;
      statusEl.textContent = 'Saving…';
      const res = await apiPatch('/api/draft/live', {
        live: document.getElementById('admin-live').checked,
        year: parseInt(document.getElementById('admin-year').value) || 2026,
        round1_date: document.getElementById('admin-date').value || null,
        youtube_embed_url: document.getElementById('admin-youtube').value.trim(),
      });
      if (res.ok) {
        draftState = await res.json();
        statusEl.textContent = 'Saved!';
        render();
      } else {
        statusEl.textContent = `Error ${res.status}`;
      }
      btn.disabled = false;
      setTimeout(() => { statusEl.textContent = ''; }, 3000);
    });

    // ── Render functions ───────────────────────────────────────────────────────

    function renderEmbed(state) {
      const wrap = document.getElementById('embed-wrap');
      const url = state && state.youtube_embed_url;
      if (url) {
        wrap.innerHTML = `<iframe src="${url}?autoplay=1&rel=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
      } else {
        wrap.innerHTML = `<div class="embed-placeholder">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor">
            <path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/>
          </svg>
          <p>Stream not configured. <a href="https://www.youtube.com/@nothingbutnetnbn" target="_blank" rel="noopener">Watch on YouTube ↗</a></p>
        </div>`;
      }
    }

    function renderStatus(state) {
      const textEl = document.getElementById('status-text');
      const subEl = document.getElementById('status-sub');
      const cdEl = document.getElementById('countdown');
      if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
      cdEl.style.display = 'none';

      if (!state) { textEl.textContent = 'Loading…'; subEl.textContent = ''; return; }

      const picks = yearPicks(state.year);
      const allDone = picks.length > 0 && picks.every(p => p.player);

      if (allDone) {
        textEl.innerHTML = `${state.year} Draft concluded`;
        subEl.textContent = 'All picks have been submitted.';
        return;
      }

      if (!state.live) {
        if (state.round1_date) {
          const r1Start = pickWindowStart(state.round1_date, 1, 1);
          textEl.textContent = `Draft begins ${formatDateET(r1Start)}`;
          subEl.textContent = 'Round 1 starts at 12:00 PM ET · Round 2 next day';
        } else {
          textEl.textContent = 'Draft date TBD';
          subEl.textContent = '';
        }
        return;
      }

      // Live — determine current slot
      const slot = currentSlot(state);
      const liveBadge = `<span class="live-badge"><span class="live-dot"></span>Live</span>`;

      if (!slot) {
        const now = Date.now();
        const firstR1 = picks.find(p => p.round === 1 && !p.player);
        const firstR2 = picks.find(p => p.round === 2 && !p.player);

        if (firstR1 && state.round1_date) {
          const r1Start = pickWindowStart(state.round1_date, 1, firstR1.pick);
          if (now < r1Start) {
            textEl.innerHTML = `${liveBadge} Round 1 begins ${formatDateET(r1Start)}`;
            subEl.textContent = `Picks start at ${formatET(r1Start)} ET · 10 minutes per pick`;
            return;
          }
        }

        if (firstR2 && state.round1_date) {
          const r2Start = pickWindowStart(state.round1_date, 2, firstR2.pick);
          if (now < r2Start) {
            textEl.innerHTML = `${liveBadge} Round 1 complete · Round 2 begins ${formatDateET(r2Start)}`;
            subEl.textContent = `Picks resume at ${formatET(r2Start)} ET`;
          } else {
            textEl.innerHTML = `${liveBadge} Round 2 · Underway`;
            subEl.textContent = '';
          }
        } else {
          textEl.innerHTML = `${liveBadge} Draft underway`;
          subEl.textContent = '';
        }
        return;
      }

      const p = slot.pick;
      const owners = pickOwners(p);
      const teamDisplay = owners.join(' / ');
      const isSubmitted = !!p.player;
      const isRevealed = state.revealed.includes(`${p.round}-${p.pick}`);

      if (isSubmitted && isRevealed) {
        textEl.innerHTML = `${liveBadge} Round ${p.round}, Pick ${p.pick} · ${teamDisplay} · ${bioName(p.player)}`;
        subEl.textContent = 'Pick revealed';
      } else if (isSubmitted) {
        textEl.innerHTML = `${liveBadge} Round ${p.round}, Pick ${p.pick} · ${teamDisplay} · Pick is in`;
        subEl.textContent = 'Awaiting reveal…';
      } else {
        textEl.innerHTML = `${liveBadge} Round ${p.round}, Pick ${p.pick} · <strong style="color:#fff">${teamDisplay}</strong> on the clock`;
        subEl.textContent = `Window: ${formatET(slot.start)} – ${formatET(slot.end)} ET`;
        cdEl.style.display = '';
        function tick() {
          const rem = slot.end - Date.now();
          if (rem <= 0) { cdEl.textContent = '0:00'; cdEl.className = 'countdown urgent'; return; }
          const m = Math.floor(rem / 60000);
          const s = Math.floor((rem % 60000) / 1000);
          cdEl.textContent = `${m}:${String(s).padStart(2,'0')}`;
          cdEl.className = rem < 60000 ? 'countdown urgent' : 'countdown';
        }
        tick();
        countdownTimer = setInterval(tick, 1000);
      }
    }

    function renderMyPicks(state) {
      const section = document.getElementById('my-picks-section');
      const signinSection = document.getElementById('signin-section');
      const body = document.getElementById('my-picks-body');
      const title = document.getElementById('my-picks-title');

      signinSection.style.display = 'none';
      section.style.display = 'none';

      if (!state) return;

      const token = getToken();
      if (!token) {
        signinSection.style.display = '';
        return;
      }
      // Logged in but no team role — nothing to show in My Picks
      if (myTeams.length === 0) return;

      const year = state.year;
      const picks = yearPicks(year);
      const myPicks = picks.filter(p => {
        const owners = pickOwners(p);
        return owners.some(o => myTeams.includes(o));
      });

      if (!myPicks.length) return;

      title.textContent = `My Picks (${myTeams.join(', ')})`;
      section.style.display = '';
      body.innerHTML = '';

      const isLive = !!state.live;
      const slot = currentSlot(state);
      const drafted = pickedSlugs(year);
      const available = Object.entries(bios)
        .filter(([slug, bio]) => bio.draft_year === year && !drafted.has(slug))
        .map(([slug, bio]) => ({ slug, name: bioName(slug) }))
        .sort((a, b) => a.name.localeCompare(b.name));

      myPicks.forEach(p => {
        const owners = pickOwners(p);
        const myOwner = owners.find(o => myTeams.includes(o)) || owners[0];
        const isOnClock = isLive && slot && slot.pick.round === p.round && slot.pick.pick === p.pick;
        const isSubmitted = !!p.player;
        const queued = state.queue[myOwner] || null;
        const queuedName = queued ? bioName(queued) : null;

        const div = document.createElement('div');
        div.className = `pick-slot${isOnClock ? ' on-clock' : ''}`;

        const startMs = state.round1_date ? pickWindowStart(state.round1_date, p.round, p.pick) : null;
        const endMs = startMs ? startMs + 10 * 60 * 1000 : null;
        const timeStr = startMs ? `${formatET(startMs)} – ${formatET(endMs)}` : 'Time TBD';

        let statusHtml;
        if (isSubmitted) {
          statusHtml = `<div style="color:#4ade80;font-size:0.8rem">✓ Submitted</div>`;
        } else if (queuedName) {
          statusHtml = `<div class="pick-slot-queue">Queued: ${queuedName}</div>`;
        } else {
          statusHtml = `<div style="color:#4b5563;font-size:0.8rem">No player queued</div>`;
        }

        div.innerHTML = `
          <div>
            <div class="pick-slot-num">R${p.round} · Pick ${p.pick}</div>
            <div class="pick-slot-time">${timeStr}</div>
          </div>
          <div style="flex:1">${statusHtml}</div>
          <div class="pick-slot-actions"></div>
        `;

        const actions = div.querySelector('.pick-slot-actions');

        if (!isSubmitted && isLive) {
          if (isOnClock) {
            const confirmBtn = document.createElement('button');
            confirmBtn.className = 'btn btn-primary btn-sm';
            confirmBtn.textContent = queued ? `Submit Pick →` : 'Queue a player first';
            confirmBtn.disabled = !queued;
            confirmBtn.addEventListener('click', async () => {
              confirmBtn.disabled = true;
              confirmBtn.textContent = 'Submitting…';
              const res = await apiPost('/api/draft/pick', {
                year, round: p.round, orig: p.orig, player: queued,
              });
              if (res.ok) {
                await refreshState();
                render();
              } else {
                const err = await res.json().catch(() => ({}));
                alert(err.detail || `Error ${res.status}`);
                confirmBtn.disabled = false;
                confirmBtn.textContent = `Submit Pick →`;
              }
            });
            actions.appendChild(confirmBtn);
          }

          // Player select + Queue button
          const sel = document.createElement('select');
          sel.className = 'player-select';
          sel.innerHTML = `<option value="">Select player…</option>` +
            available.map(({ slug, name }) =>
              `<option value="${slug}"${slug === queued ? ' selected' : ''}>${name}</option>`
            ).join('');

          const queueBtn = document.createElement('button');
          queueBtn.className = 'btn btn-ghost btn-sm';
          queueBtn.textContent = 'Queue';
          queueBtn.addEventListener('click', async () => {
            if (!sel.value) return;
            queueBtn.disabled = true;
            const res = await apiPut(`/api/draft/queue/${myOwner}`, { player: sel.value });
            if (res.ok) { await refreshState(); render(); }
            else { queueBtn.disabled = false; const e = await res.json().catch(()=>({})); alert(e.detail || `Error ${res.status}`); }
          });

          if (queued) {
            const clearBtn = document.createElement('button');
            clearBtn.className = 'btn btn-danger btn-sm';
            clearBtn.textContent = '✕';
            clearBtn.title = 'Clear queue';
            clearBtn.addEventListener('click', async () => {
              clearBtn.disabled = true;
              const res = await apiPut(`/api/draft/queue/${myOwner}`, { player: null });
              if (res.ok) { await refreshState(); render(); }
              else { clearBtn.disabled = false; }
            });
            actions.appendChild(clearBtn);
          }

          actions.appendChild(sel);
          actions.appendChild(queueBtn);
        } // end !isSubmitted && isLive

        body.appendChild(div);
      });
    }

    function renderBoard(state) {
      const section = document.getElementById('board-section');
      const tbody = document.getElementById('board-body');
      if (!state) { section.style.display = 'none'; return; }

      const year = state.year;
      const picks = yearPicks(year);
      const submitted = picks.filter(p => p.player);

      section.style.display = '';
      tbody.innerHTML = '';

      if (!submitted.length) {
        tbody.innerHTML = `<tr><td colspan="6" class="empty-state">No picks made yet.</td></tr>`;
        return;
      }

      let lastRound = null;
      submitted.forEach(p => {
        if (p.round !== lastRound) {
          const sep = document.createElement('tr');
          sep.innerHTML = `<td colspan="6" class="round-separator">Round ${p.round}</td>`;
          tbody.appendChild(sep);
          lastRound = p.round;
        }

        const revealed = state.revealed.includes(`${p.round}-${p.pick}`);
        const owners = pickOwners(p);
        const teamDisplay = owners.join('/');
        const bio = bios[p.player] || {};
        const name = bioName(p.player);
        const pos = Array.isArray(bio.pos) ? bio.pos.join('/') : (bio.pos || '—');
        const school = (bio.college && bio.college !== 'NA') ? bio.college
                     : (bio.country && bio.country !== 'NA') ? bio.country : '—';

        const tr = document.createElement('tr');

        const tdNum = document.createElement('td');
        tdNum.className = 'num';
        tdNum.textContent = p.pick;
        tr.appendChild(tdNum);

        const tdTeam = document.createElement('td');
        tdTeam.className = 'team';
        tdTeam.textContent = teamDisplay;
        tr.appendChild(tdTeam);

        const tdPlayer = document.createElement('td');
        if (revealed) {
          const cell = document.createElement('div');
          cell.className = 'player-cell';
          if (bio.photo_url) {
            const img = document.createElement('img');
            img.className = 'player-photo';
            img.src = bio.photo_url;
            img.alt = '';
            img.onerror = function() {
              const ph = document.createElement('div');
              ph.className = 'player-ph';
              this.replaceWith(ph);
            };
            cell.appendChild(img);
          } else {
            const ph = document.createElement('div');
            ph.className = 'player-ph';
            cell.appendChild(ph);
          }
          const nameSpan = document.createElement('span');
          nameSpan.className = 'player-name';
          nameSpan.textContent = name;
          cell.appendChild(nameSpan);
          tdPlayer.appendChild(cell);
        } else {
          const cell = document.createElement('div');
          cell.className = 'pick-in-cell';
          cell.innerHTML = `<span class="pick-in-dot"></span> The pick is in`;
          tdPlayer.appendChild(cell);
        }
        tr.appendChild(tdPlayer);

        const tdPos = document.createElement('td');
        tdPos.className = 'muted';
        tdPos.textContent = revealed ? pos : '';
        tr.appendChild(tdPos);

        const tdSchool = document.createElement('td');
        tdSchool.className = 'muted';
        tdSchool.textContent = revealed ? school : '';
        tr.appendChild(tdSchool);

        const tdAction = document.createElement('td');
        if (!revealed && isBod()) {
          const revealBtn = document.createElement('button');
          revealBtn.className = 'btn btn-ghost btn-sm';
          revealBtn.textContent = 'Reveal';
          revealBtn.addEventListener('click', async () => {
            revealBtn.disabled = true;
            const res = await apiPost('/api/draft/reveal', { round: p.round, pick: p.pick });
            if (res.ok) { await refreshState(); render(); }
            else { revealBtn.disabled = false; }
          });
          tdAction.appendChild(revealBtn);
        }
        tr.appendChild(tdAction);

        tbody.appendChild(tr);
      });
    }

    function renderAvailable(state) {
      const section = document.getElementById('available-section');
      const title = document.getElementById('available-title');
      const tbody = document.getElementById('available-body');

      if (!state) { section.style.display = 'none'; return; }
      section.style.display = '';

      const year = state.year;
      const drafted = pickedSlugs(year);
      const available = Object.entries(bios)
        .filter(([slug, bio]) => bio.draft_year === year && !drafted.has(slug))
        .map(([slug, bio]) => ({ slug, bio }))
        .sort((a, b) => a.bio.name.localeCompare(b.bio.name));

      title.textContent = `${year} Draft Class (${available.length} available)`;
      tbody.innerHTML = '';

      if (!available.length) {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td colspan="5" class="empty-state">All players drafted.</td>`;
        tbody.appendChild(tr);
        return;
      }

      const showQueueBtn = state.live && myTeams.length > 0;
      const drafted2 = pickedSlugs(year); // same set
      const queue = state.queue || {};

      available.forEach(({ slug, bio }) => {
        const name = bioName(slug);
        const pos = Array.isArray(bio.pos) ? bio.pos.join('/') : (bio.pos || '—');
        const school = (bio.college && bio.college !== 'NA') ? bio.college
                     : (bio.country && bio.country !== 'NA') ? bio.country : '—';
        const age = calcAge(bio.dob);

        const tr = document.createElement('tr');

        const tdName = document.createElement('td');
        const a = document.createElement('a');
        a.href = `/players/?p=${slug}`;
        a.textContent = name;
        tdName.appendChild(a);
        tr.appendChild(tdName);

        ['pos', 'age', 'school'].forEach((key, i) => {
          const td = document.createElement('td');
          td.className = 'muted';
          td.textContent = [pos, age, school][i];
          tr.appendChild(td);
        });

        const tdAction = document.createElement('td');
        if (showQueueBtn) {
          const isQueued = myTeams.some(t => queue[t] === slug);
          const btn = document.createElement('button');
          btn.className = `btn btn-ghost btn-sm`;
          btn.textContent = isQueued ? 'Queued ✓' : 'Queue';
          btn.style.opacity = isQueued ? '0.5' : '1';
          if (!isQueued) {
            btn.addEventListener('click', async () => {
              const team = myTeams[0];
              btn.disabled = true;
              const res = await apiPut(`/api/draft/queue/${team}`, { player: slug });
              if (res.ok) { await refreshState(); render(); }
              else {
                btn.disabled = false;
                const e = await res.json().catch(() => ({}));
                alert(e.detail || `Error ${res.status}`);
              }
            });
          }
          tdAction.appendChild(btn);
        }
        tr.appendChild(tdAction);

        tbody.appendChild(tr);
      });
    }

    // ── Main render ────────────────────────────────────────────────────────────

    function render() {
      const state = draftState;

      if (isAdmin()) {
        const panel = document.getElementById('admin-panel');
        panel.style.display = '';
        initAdminPanel(state || {});
      }

      renderEmbed(state);
      renderStatus(state);
      renderMyPicks(state);
      renderBoard(state);
      renderAvailable(state);
    }

    // ── Data fetching ──────────────────────────────────────────────────────────

    async function refreshState() {
      const [stateRes, picksRes] = await Promise.all([
        fetch('/api/draft/live'),
        fetch('/api/picks'),
      ]);
      if (stateRes.ok) draftState = await stateRes.json();
      if (picksRes.ok) allPicks = await picksRes.json();
    }

    async function init() {
      // Load bios and auth in parallel
      const [biosRes] = await Promise.all([
        fetch('/api/players'),
        loadAuth(),
      ]);
      if (biosRes.ok) bios = await biosRes.json();

      await refreshState();
      render();

      setInterval(async () => {
        await refreshState();
        render();
      }, 10_000);
    }

    init();
  </script>
  <script src="/nav.js"></script>
  <script src="/token-badge.js"></script>
</body>
</html>
