<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/logo.png">
  <link rel="stylesheet" href="/css/shared.css">
  <title>Draft Live — NBN</title>
  <style>
    html { zoom: 1.25; }
    .page { max-width: 960px; margin: 0 auto; }

    /* ── Admin panel ──────────────────────────────────── */
    #admin-panel {
      background: #111;
      border: 1px solid #374151;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
    }
    #admin-panel summary {
      padding: 0.5rem 0.75rem;
      cursor: pointer;
      color: #6b7280;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      user-select: none;
    }
    #admin-panel summary:hover { color: #9ca3af; }
    .admin-form {
      padding: 0.75rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: flex-end;
      border-top: 1px solid #1f2937;
    }
    .admin-field { display: flex; flex-direction: column; gap: 0.3rem; }
    .admin-field label { font-size: 0.7rem; color: #6b7280; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .admin-field input[type="text"],
    .admin-field input[type="date"],
    .admin-field input[type="number"] {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 5px;
      color: #f3f4f6;
      font-size: 0.8rem;
      padding: 0.3rem 0.5rem;
      font-family: inherit;
    }
    .admin-field input[type="text"] { width: 320px; }
    .admin-toggle { display: flex; align-items: center; gap: 0.5rem; margin-top: 1.1rem; }
    .admin-toggle label { font-size: 0.85rem; color: #d1d5db; cursor: pointer; }
    .btn { padding: 0.35rem 0.9rem; border-radius: 6px; font-size: 0.8rem; font-weight: 600; cursor: pointer; font-family: inherit; border: none; }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-primary:disabled { background: #374151; color: #6b7280; cursor: default; }
    .btn-ghost { background: transparent; border: 1px solid #374151; color: #9ca3af; }
    .btn-ghost:hover { border-color: #6b7280; color: #d1d5db; }
    .btn-danger { background: transparent; border: 1px solid #ef4444; color: #ef4444; }
    .btn-danger:hover { background: #ef444420; }
    .btn-sm { padding: 0.2rem 0.55rem; font-size: 0.75rem; }
    #admin-status { font-size: 0.75rem; color: #6b7280; align-self: center; }


    /* ── Status bar ───────────────────────────────────── */
    .status-bar {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      background: #dc2626;
      color: #fff;
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .live-dot {
      width: 6px; height: 6px;
      background: #fff;
      border-radius: 50%;
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .status-text { font-size: 0.95rem; font-weight: 600; color: #f3f4f6; flex: 1; }
    .status-sub { font-size: 0.8rem; color: #9ca3af; }
    .countdown {
      font-size: 2rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      color: #f3f4f6;
      letter-spacing: -0.02em;
      flex-shrink: 0;
    }
    .countdown.urgent { color: #f87171; }

    /* ── Draft board ──────────────────────────────────── */
    .section { margin-bottom: 2rem; }
    /* 80vh = 100vh / zoom(1.25) — gives the actual visible height in CSS px;
       subtract ~140px for nav + status bar + view tabs above the table */
    body.pool-view #pool-section .table-wrap { overflow-y: auto; max-height: calc(64vh - 80px); }
    .pool-draggable { cursor: grab; }
    .pool-draggable:active { cursor: grabbing; }
    .pool-dragging { opacity: 0.35; }
    .pool-drag-over { background: #1e3a5f !important; outline: 1px solid #3b82f6; }
    body.pool-view #pool-section thead th { position: sticky; top: 0; background: #1f2937; z-index: 1; }
    .section-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 0.6rem;
    }
    .table-wrap {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 10px;
      overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; white-space: nowrap; }
    thead th {
      padding: 0.55rem 0.75rem;
      text-align: left;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #6b7280;
      border-bottom: 1px solid #374151;
    }
    tbody tr { border-bottom: 1px solid #283141; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #263244; }
    td { padding: 0.5rem 0.75rem; color: #d1d5db; }
    td.num { color: #6b7280; font-size: 0.75rem; width: 3rem; font-variant-numeric: tabular-nums; }
    td.muted { color: #9ca3af; }
    td.team { font-weight: 600; }
    .player-cell { display: flex; align-items: center; gap: 0.55rem; }
    .player-photo {
      width: 30px; height: 30px; border-radius: 50%;
      object-fit: cover; object-position: top center;
      background: #374151; flex-shrink: 0;
    }
    .player-ph { width: 30px; height: 30px; border-radius: 50%; background: #374151; flex-shrink: 0; }
    .player-name { font-weight: 600; color: #f3f4f6; }

    .pick-in-cell {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #facc15;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .pick-in-dot {
      width: 7px; height: 7px;
      background: #facc15;
      border-radius: 50%;
      animation: pulse 1s infinite;
    }

    .empty-state { padding: 2.5rem; text-align: center; color: #6b7280; font-size: 0.88rem; }

    .round-separator {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #374151;
      background: #1a2336;
      padding: 0.35rem 0.75rem;
      border-bottom: 1px solid #374151;
    }

    select.player-select {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 5px;
      color: #f3f4f6;
      font-size: 0.8rem;
      padding: 0.25rem 0.5rem;
      font-family: inherit;
      max-width: 200px;
    }
    select.player-select:focus { outline: none; border-color: #60a5fa; }

    /* ── View tabs ────────────────────────────────────── */
    .view-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .view-tab-btn {
      padding: 0.45rem 1.1rem;
      border-radius: 7px;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      border: 1px solid #374151;
      background: transparent;
      color: #9ca3af;
    }
    .view-tab-btn:hover { color: #f3f4f6; border-color: #6b7280; }
    .view-tab-btn.active { background: #1f2937; color: #f3f4f6; border-color: #6b7280; }

    /* ── Round sub-tabs ───────────────────────────────── */
    .round-tabs {
      display: flex;
      gap: 0.35rem;
      margin-bottom: 0.6rem;
      align-items: center;
    }
    .round-tab-btn {
      padding: 0.28rem 0.85rem;
      border-radius: 5px;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      border: 1px solid #374151;
      background: transparent;
      color: #6b7280;
    }
    .round-tab-btn:hover { color: #d1d5db; border-color: #4b5563; }
    .round-tab-btn.active { background: #1f2937; color: #f3f4f6; border-color: #6b7280; }
    .round-tab-hint { font-size: 0.65rem; color: #374151; margin-left: 0.4rem; }
    .pick-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      padding: 6px;
    }
    @media (max-width: 600px) {
      .pick-grid { grid-template-columns: 1fr; }
    }
    .pick-card {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      background: #111827;
      border: 1px solid #374151;
      border-radius: 6px;
      padding: 0.45rem 0.75rem;
      min-width: 0;
      overflow: hidden;
    }
    .pick-card.on-clock { background: #0d1f3c; border-color: #3b82f6; }
    .pc-num { font-size: 0.7rem; color: #4b5563; font-variant-numeric: tabular-nums; flex-shrink: 0; width: 1.6rem; }
    .pc-team-wrap { display: flex; align-items: center; gap: 0.3rem; flex-shrink: 0; width: 4.2rem; }
    .pc-team-logo { width: 18px; height: 18px; object-fit: contain; flex-shrink: 0; }
    .pc-team { font-size: 0.8rem; font-weight: 700; }
    .pc-player-wrap { flex: 1; display: flex; align-items: center; gap: 0.45rem; min-width: 0; overflow: hidden; }
    .pc-name { font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pc-clock { color: #facc15; font-weight: 700; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.03em; white-space: nowrap; }
    .pc-meta { font-size: 0.72rem; color: #6b7280; flex-shrink: 0; white-space: nowrap; margin-left: auto; }

    /* ── Show modal overlay ───────────────────────────── */
    #show-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .show-modal {
      background: #111827;
      border: 1px solid #374151;
      border-radius: 14px;
      width: 100%;
      max-width: 1100px;
      overflow: hidden;
    }
    .show-modal-header {
      padding: 1.25rem 1.5rem 1rem;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
    }
    .show-modal-player-photo {
      width: 60px; height: 60px;
      border-radius: 50%;
      object-fit: cover; object-position: top center;
      flex-shrink: 0;
    }
    .show-modal-player-ph {
      width: 60px; height: 60px;
      border-radius: 50%;
      background: #374151;
      flex-shrink: 0;
    }
    .show-modal-pick-badge {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.07em;
      text-transform: uppercase; color: #facc15;
      background: #292308; border: 1px solid #713f12;
      border-radius: 4px; padding: 0.15rem 0.45rem;
      display: inline-block; margin-bottom: 0.35rem;
    }
    .show-modal-title { font-size: 1.6rem; font-weight: 800; color: #f3f4f6; letter-spacing: -0.02em; }
    .show-modal-sub { font-size: 0.9rem; color: #9ca3af; margin-top: 0.15rem; }
    .show-embed-wrap { position: relative; width: 100%; padding-top: 56.25%; background: #0f0f0f; }
    .show-embed-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
    .show-no-video {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0.5rem; color: #4b5563; font-size: 0.85rem;
    }
    .show-modal-footer {
      padding: 0.75rem 1.5rem;
      display: flex; align-items: center; gap: 0.75rem;
      border-top: 1px solid #1f2937;
    }
    .show-modal-hint { font-size: 0.75rem; color: #4b5563; flex: 1; }
    .show-modal-hint kbd {
      display: inline-block;
      background: #1f2937; border: 1px solid #374151; border-radius: 4px;
      padding: 0.1rem 0.4rem; font-family: inherit; font-size: 0.72rem; color: #9ca3af;
    }
    .highlight-url-form {
      display: flex; gap: 0.5rem;
      padding: 0.6rem 1.5rem;
      border-top: 1px solid #1f2937;
      background: #0d1117;
    }
    .highlight-url-form input {
      flex: 1;
      background: #1f2937; border: 1px solid #374151; border-radius: 5px;
      color: #f3f4f6; font-size: 0.8rem; padding: 0.3rem 0.5rem; font-family: inherit;
    }
    .highlight-url-label {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; color: #4b5563; align-self: center; white-space: nowrap;
    }

    /* ── Depth chart modal ────────────────────────────── */
    .depth-modal-header {
      padding: 1.25rem 1.5rem 1rem;
      display: flex; align-items: center; gap: 0.85rem;
      border-bottom: 1px solid #1f2937;
    }
    .depth-team-logo { width: 44px; height: 44px; object-fit: contain; }
    .depth-team-name { font-size: 1.2rem; font-weight: 800; color: #f3f4f6; }
    .depth-court-wrap {
      position: relative; padding: 0.6rem; background: #090f1c; overflow: hidden;
    }
    .depth-court-svg {
      position: absolute; inset: 0; width: 100%; height: 100%;
      opacity: 0.15; pointer-events: none;
    }
    .depth-pos-grid {
      position: relative;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 1rem 0.45rem;
    }
    .depth-pos-group {
      background: rgba(13, 20, 38, 0.72); border: 1px solid #1f2937; border-radius: 6px; overflow: hidden;
    }
    .depth-pos-group-hdr {
      font-size: 0.58rem; font-weight: 700; letter-spacing: 0.09em;
      text-transform: uppercase; color: #6b7280;
      background: rgba(0,0,0,0.3); padding: 0.2rem 0.55rem;
      border-bottom: 1px solid #1a2336;
    }
    .depth-player-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.2rem 0.55rem; border-bottom: 1px solid #0f1a28; font-size: 0.78rem;
    }
    .depth-player-row:last-child { border-bottom: none; }
    .depth-player-name { color: #f3f4f6; font-weight: 600; }
    .depth-player-ovr { color: #9ca3af; font-variant-numeric: tabular-nums; font-size: 0.74rem; margin-left: 0.5rem; flex-shrink: 0; }
    .cap-hold-tag {
      display: inline-block; font-size: 0.6rem; font-weight: 700;
      letter-spacing: 0.05em; padding: 0.1rem 0.35rem;
      border-radius: 3px; vertical-align: middle; margin-left: 0.4rem;
    }
    .ch-ufa   { background: #3d3200; color: #facc15; }
    .ch-rfa   { background: #431407; color: #fb923c; }
    .ch-popt  { background: #14352a; color: #6ee7b7; }
    .ch-topt  { background: #1e3a5f; color: #93c5fd; }
    .ch-ngtd  { background: #3b1919; color: #f87171; }

    /* ── Clickable name buttons ───────────────────────── */
    .name-btn {
      background: none; border: none; padding: 0;
      font-family: inherit; font-size: inherit; font-weight: inherit;
      color: inherit; cursor: pointer; text-align: left;
    }
    .name-btn:hover { text-decoration: underline; }
    .name-btn-player.has-video { color: #93c5fd; }
    .name-btn-player.has-video:hover { color: #60a5fa; }
    .name-btn-team { color: #d1d5db; }
    .name-btn-team:hover { color: #f3f4f6; }

    /* ── Control drawer ───────────────────────────────── */
    #control-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 600;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(17, 24, 39, 0.85);
      border: 1px solid #374151;
      color: #4b5563;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
      transition: color 0.15s, border-color 0.15s;
    }
    #control-toggle:hover { color: #9ca3af; border-color: #6b7280; }
    #control-toggle.has-pending { border-color: #facc15; color: #facc15; }

    #drawer-backdrop {
      position: fixed;
      inset: 0;
      z-index: 610;
      background: rgba(0,0,0,0.45);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    #drawer-backdrop.open { opacity: 1; pointer-events: all; }

    #control-drawer {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 360px;
      max-width: 95vw;
      background: #0d1117;
      border-left: 1px solid #374151;
      z-index: 620;
      transform: translateX(100%);
      transition: transform 0.22s cubic-bezier(0.4,0,0.2,1);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    #control-drawer.open { transform: translateX(0); }

    .drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #1f2937;
      flex-shrink: 0;
    }
    .drawer-header h2 {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #4b5563;
    }
    .drawer-close {
      background: none;
      border: none;
      color: #4b5563;
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      padding: 0.1rem 0.3rem;
    }
    .drawer-close:hover { color: #9ca3af; }
    .drawer-body { padding: 1rem; flex: 1; display: flex; flex-direction: column; gap: 1.25rem; }

    /* Restyle admin panel inside drawer */
    #control-drawer #admin-panel {
      background: transparent;
      border: none;
      border-radius: 0;
      margin-bottom: 0;
    }
    #control-drawer #admin-panel summary { padding: 0; margin-bottom: 0.5rem; }
    #control-drawer .admin-form {
      border-top: none;
      padding: 0;
      flex-direction: column;
      gap: 0.6rem;
    }
    #control-drawer .admin-field input[type="text"],
    #control-drawer .admin-field input[type="date"],
    #control-drawer .admin-field input[type="number"] { width: 100%; box-sizing: border-box; }
    #control-drawer .admin-toggle { margin-top: 0; }
  </style>
</head>
<body>
  <!-- Gear toggle (fixed top-right) -->
  <button id="control-toggle" title="Controls" onclick="toggleDrawer()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>

  <!-- Backdrop -->
  <div id="drawer-backdrop" onclick="closeDrawer()"></div>

  <!-- Control drawer -->
  <div id="control-drawer">
    <div class="drawer-header">
      <h2>Controls</h2>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-body">

      <!-- BOD admin panel (inside drawer) -->
      <details id="admin-panel" style="display:none">
        <summary>BOD Controls</summary>
        <div class="admin-form" style="margin-top:0.5rem">
          <div class="admin-field">
            <label>Year</label>
            <input type="number" id="admin-year" style="width:80px" min="2020" max="2040" />
          </div>
          <div class="admin-field">
            <label>Round 1 Date</label>
            <input type="date" id="admin-date" />
          </div>
          <button class="btn btn-primary btn-sm" id="admin-save">Save</button>
          <span id="admin-status"></span>
        </div>
      </details>

    </div>
  </div>

  <!-- Invisible focus anchor: focused on init so keyboard events always reach the page -->
  <span id="focus-anchor" tabindex="-1" style="opacity:0;position:absolute;width:0;height:0;pointer-events:none" aria-hidden="true"></span>

  <div class="page">
    <!-- Status bar -->
    <div class="status-bar" id="status-bar">
      <div>
        <div class="status-text" id="status-text">Loading…</div>
        <div class="status-sub" id="status-sub"></div>
      </div>
      <div class="countdown" id="countdown" style="display:none"></div>
    </div>

    <!-- View tab bar -->
    <div class="view-tabs" id="view-tab-bar" style="display:none">
      <button class="view-tab-btn active" id="tab-fullboard-btn" onclick="switchTab('fullboard')">Draft Board</button>
      <button class="view-tab-btn" id="tab-pool-btn" onclick="switchTab('pool')">Best Available</button>
    </div>

    <!-- Full draft board (Draft Board tab) -->
    <div class="section" id="fullboard-section">
      <div class="round-tabs">
        <button class="round-tab-btn active" id="round-tab-1" onclick="switchRound(1)">Round 1</button>
        <button class="round-tab-btn" id="round-tab-2" onclick="switchRound(2)">Round 2</button>
        <span class="round-tab-hint">← → to switch</span>
      </div>
      <div id="fullboard-grid" class="pick-grid"></div>
    </div>

    <!-- Player pool (Pool tab) -->
    <div class="section" id="pool-section" style="display:none">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="num">#</th>
              <th>Player</th>
              <th>Pos</th>
              <th class="muted">Age</th>
              <th class="muted">College / Country</th>
            </tr>
          </thead>
          <tbody id="pool-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Reveal / depth chart modal overlay -->
  <div id="show-overlay" style="display:none" tabindex="-1"></div>

  <script>
    const TOKEN_KEY = 'nbn_token';
    const TEAM_ABBRS = new Set([
      'ATL','BKN','BOS','CHA','CHI','CLE','DAL','DEN','DET','GSW',
      'HOU','IND','LAC','LAL','MEM','MIA','MIL','MIN','NOP','NYK',
      'OKC','ORL','PHI','PHX','POR','SAC','SAS','TOR','UTA','WAS',
    ]);

    let draftState = null;
    let allPicks = [];
    let bios = {};
    let myRoles = [];
    let myName = null;
    let countdownTimer = null;
    let activeTab = 'fullboard';
    let activeRound = 1;
    let revealState = 0;
    let poolOrder = [];
    let roundAutoJumped = false;

    // ── Helpers ────────────────────────────────────────────────────────────────

    function getToken() { return localStorage.getItem(TOKEN_KEY); }

    function bioName(slug) {
      const bio = bios[slug];
      if (!bio) return slug;
      const parts = bio.name.split(',');
      return parts.length === 2 ? `${parts[1].trim()} ${parts[0].trim()}` : bio.name;
    }

    function calcAge(dob) {
      if (!dob) return '—';
      const birth = new Date(dob + 'T00:00:00');
      const now = new Date();
      let age = now.getFullYear() - birth.getFullYear();
      if (now.getMonth() < birth.getMonth() ||
          (now.getMonth() === birth.getMonth() && now.getDate() < birth.getDate())) age--;
      return age;
    }

    function pickWindowStart(round1Date, roundNum, pickNum) {
      // round1Date: "YYYY-MM-DD"; noon Eastern (EDT = UTC-4 in June)
      // pickNum may be globally numbered (31-60 for round 2); normalize to within-round offset
      const [yr, mo, da] = round1Date.split('-').map(Number);
      const day = da + (roundNum - 1);
      const withinRound = (pickNum - 1) % 30;
      return new Date(`${yr}-${String(mo).padStart(2,'0')}-${String(day).padStart(2,'0')}T12:00:00-04:00`)
        .getTime() + withinRound * 10 * 60 * 1000;
    }

    function pickWindowEnd(round1Date, roundNum, pickNum) {
      return pickWindowStart(round1Date, roundNum, pickNum) + 10 * 60 * 1000;
    }

    function formatET(ms) {
      return new Date(ms).toLocaleTimeString('en-US', {
        timeZone: 'America/New_York',
        hour: 'numeric', minute: '2-digit', hour12: true,
      });
    }

    function formatDateET(ms) {
      return new Date(ms).toLocaleDateString('en-US', {
        timeZone: 'America/New_York',
        weekday: 'long', month: 'long', day: 'numeric',
      });
    }

    function yearPicks(year) {
      return allPicks.filter(p => p.year === year && p.pick != null)
        .sort((a, b) => a.round - b.round || a.pick - b.pick);
    }

    function pickedSlugs(year) {
      return new Set(allPicks.filter(p => p.year === year && p.player).map(p => p.player));
    }

    // Exact same effectiveOwner logic as draft/index.html — rebuilt each render.
    let _swapTakesFrom = {};

    function buildSwapTakesFrom(picks2026) {
      const map = {};
      picks2026.forEach(p => {
        if (p.swap_conveys === true && p.swap_owner) {
          map[p.swap_owner] = p.owner;
        }
      });
      return map;
    }

    function pickOwners(p) {
      let raw;
      if (p.swap_conveys === true) {
        raw = p.swap_owner;
      } else {
        raw = _swapTakesFrom[p.orig] ?? p.owner;
      }
      if (!raw || raw === '?') return [(p.orig || '').toUpperCase()];
      return raw.split('|').map(x => x.trim().toUpperCase()).filter(Boolean);
    }

    function pickTeamHtml(p) {
      const owners = pickOwners(p);
      const owner = owners.join('/');
      const orig = (p.orig || '').toUpperCase();
      if (orig && !owners.includes(orig)) {
        return `${owner} <span style="color:#4b5563;font-size:0.78rem;font-weight:400">(via ${orig})</span>`;
      }
      return owner;
    }

    // First unsubmitted pick whose window hasn't ended yet — includes pre-draft period
    function currentSlot(state) {
      if (!state.round1_date) return null;
      const now = Date.now();
      for (const p of yearPicks(state.year)) {
        if (p.player) continue;
        const start = pickWindowStart(state.round1_date, p.round, p.pick);
        const end = start + 10 * 60 * 1000;
        if (now < end) return { pick: p, start, end };
      }
      return null;
    }

    // First unsubmitted pick (by schedule order)
    function nextUnsubmitted(state) {
      return yearPicks(state.year).find(p => !p.player) || null;
    }

    // ── Auth ───────────────────────────────────────────────────────────────────

    async function loadAuth() {
      const token = getToken();
      if (!token) return;
      try {
        const res = await fetch('/api/auth/me', { headers: { 'Authorization': `Bearer ${token}` } });
        if (!res.ok) return;
        const data = await res.json();
        myName = data.name;
        myRoles = data.roles || [];
      } catch {}
    }

    function isAdmin() { return myRoles.includes('admin'); }
    function isBod() { return myRoles.includes('bod') || isAdmin(); }

    // ── Drawer ─────────────────────────────────────────────────────────────────────

    function toggleDrawer() {
      const open = document.getElementById('control-drawer').classList.contains('open');
      open ? closeDrawer() : openDrawer();
    }
    function openDrawer() {
      document.getElementById('control-drawer').classList.add('open');
      document.getElementById('drawer-backdrop').classList.add('open');
    }
    function closeDrawer() {
      document.getElementById('control-drawer').classList.remove('open');
      document.getElementById('drawer-backdrop').classList.remove('open');
    }

    function promptSignIn() {
      const tok = prompt('Enter your NBN access token:');
      if (!tok) return;
      localStorage.setItem(TOKEN_KEY, tok);
      loadAuth().then(render);
    }

    // ── API calls ──────────────────────────────────────────────────────────────

    async function apiPatch(path, body) {
      const token = getToken();
      return fetch(path, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify(body),
      });
    }

    async function apiPut(path, body) {
      const token = getToken();
      return fetch(path, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify(body),
      });
    }

    async function apiPost(path, body) {
      const token = getToken();
      return fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify(body),
      });
    }

    async function savePoolOrder(slugs) {
      poolOrder = slugs;
      if (draftState) draftState.pool_order = slugs; // optimistic — prevents interval render from reverting
      const res = await apiPatch('/api/draft/live', { pool_order: slugs });
      if (res && res.ok) {
        const newState = await res.json();
        if (newState) { draftState = newState; poolOrder = newState.pool_order || slugs; }
      }
    }

    // ── Admin panel ────────────────────────────────────────────────────────────

    function initAdminPanel(state) {
      document.getElementById('admin-year').value = state.year || 2026;
      document.getElementById('admin-date').value = state.round1_date || '';
    }

    document.getElementById('admin-save').addEventListener('click', async () => {
      const btn = document.getElementById('admin-save');
      const statusEl = document.getElementById('admin-status');
      btn.disabled = true;
      statusEl.textContent = 'Saving…';
      const res = await apiPatch('/api/draft/live', {
        year: parseInt(document.getElementById('admin-year').value) || 2026,
        round1_date: document.getElementById('admin-date').value || null,
      });
      if (res.ok) {
        draftState = await res.json();
        statusEl.textContent = 'Saved!';
        render();
      } else {
        statusEl.textContent = `Error ${res.status}`;
      }
      btn.disabled = false;
      setTimeout(() => { statusEl.textContent = ''; }, 3000);
    });

    // ── Render functions ───────────────────────────────────────────────────────

    function renderStatus(state) {
      const textEl = document.getElementById('status-text');
      const subEl = document.getElementById('status-sub');
      const cdEl = document.getElementById('countdown');
      if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
      cdEl.style.display = 'none';

      if (!state) { textEl.textContent = 'Loading…'; subEl.textContent = ''; return; }

      const picks = yearPicks(state.year);
      const allDone = picks.length > 0 && picks.every(p => p.player);

      if (allDone) {
        textEl.innerHTML = `${state.year} Draft concluded`;
        subEl.textContent = 'All picks have been submitted.';
        return;
      }

      if (!state.round1_date) {
        textEl.textContent = 'Draft date TBD';
        subEl.textContent = '';
        return;
      }

      const slot = currentSlot(state);
      const liveBadge = `<span class="live-badge"><span class="live-dot"></span>Live</span>`;

      if (!slot) {
        // All picks submitted or no date set
        textEl.innerHTML = `${liveBadge} Draft underway`;
        subEl.textContent = '';
        return;
      }

      const p = slot.pick;
      const owners = pickOwners(p);
      const teamDisplay = owners.join(' / ');
      const isSubmitted = !!p.player;
      const isRevealed = state.revealed.includes(`${p.round}-${p.pick}`);

      if (isSubmitted && isRevealed) {
        textEl.innerHTML = `${liveBadge} Round ${p.round}, Pick ${p.pick} · ${teamDisplay} · ${bioName(p.player)}`;
        subEl.textContent = 'Pick revealed';
      } else if (isSubmitted) {
        textEl.innerHTML = `${liveBadge} Round ${p.round}, Pick ${p.pick} · ${teamDisplay} · Pick is in`;
        subEl.textContent = 'Awaiting reveal…';
      } else {
        textEl.innerHTML = `${liveBadge} Round ${p.round}, Pick ${p.pick} · <strong style="color:#fff">${teamDisplay}</strong> on the clock`;
        const beforeWindow = Date.now() < slot.start;
        if (beforeWindow) {
          subEl.textContent = `Pick window opens ${formatDateET(slot.start)} at ${formatET(slot.start)} ET`;
        } else {
          subEl.textContent = `Window: ${formatET(slot.start)} – ${formatET(slot.end)} ET`;
        }
        cdEl.style.display = '';
        function tick() {
          const rem = slot.end - Date.now();
          if (rem <= 0) { cdEl.textContent = '0:00'; cdEl.className = 'countdown urgent'; return; }
          const d = Math.floor(rem / 86400000);
          const h = Math.floor((rem % 86400000) / 3600000);
          const m = Math.floor((rem % 3600000) / 60000);
          const s = Math.floor((rem % 60000) / 1000);
          let display;
          if (d > 0) display = `${d}d ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
          else if (h > 0) display = `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
          else display = `${m}:${String(s).padStart(2,'0')}`;
          cdEl.textContent = display;
          cdEl.className = rem < 60000 ? 'countdown urgent' : 'countdown';
        }
        tick();
        countdownTimer = setInterval(tick, 1000);
      }
    }

    const TEAM_NAMES = {
      ATL:'Atlanta',BKN:'Brooklyn',BOS:'Boston',CHA:'Charlotte',CHI:'Chicago',
      CLE:'Cleveland',DAL:'Dallas',DEN:'Denver',DET:'Detroit',GSW:'Golden State',
      HOU:'Houston',IND:'Indiana',LAC:'LA Clippers',LAL:'LA Lakers',MEM:'Memphis',
      MIA:'Miami',MIL:'Milwaukee',MIN:'Minnesota',NOP:'New Orleans',NYK:'New York',
      OKC:'Oklahoma City',ORL:'Orlando',PHI:'Philadelphia',PHX:'Phoenix',POR:'Portland',
      SAC:'Sacramento',SAS:'San Antonio',TOR:'Toronto',UTA:'Utah',WAS:'Washington',
    };
    const POS_ORDER = ['PG','SG','SF','PF','C'];

    // ── Tab switching ──────────────────────────────────────────────────────────────

    function switchTab(tab) {
      activeTab = tab;
      document.body.classList.toggle('pool-view', tab === 'pool');
      document.getElementById('tab-fullboard-btn').classList.toggle('active', tab === 'fullboard');
      document.getElementById('tab-pool-btn').classList.toggle('active', tab === 'pool');
      document.getElementById('fullboard-section').style.display = tab === 'fullboard' ? 'block' : 'none';
      document.getElementById('pool-section').style.display = tab === 'pool' ? 'block' : 'none';
      if (tab === 'fullboard') renderFullBoard(draftState);
      if (tab === 'pool') renderPool(draftState);
    }

    function switchRound(round) {
      activeRound = round;
      document.getElementById('round-tab-1').classList.toggle('active', round === 1);
      document.getElementById('round-tab-2').classList.toggle('active', round === 2);
      renderFullBoard(draftState);
    }

    // ── Enter key reveal sequence ──────────────────────────────────────────────────

    // Capture phase on window — fires before any element processes the event,
    // ensuring arrow keys and Enter work regardless of what element has focus.
    window.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
        if (revealState === 0 && activeTab === 'fullboard') {
          const tag = (e.target.tagName || '').toUpperCase();
          if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
          const next = e.key === 'ArrowRight' ? Math.min(2, activeRound + 1) : Math.max(1, activeRound - 1);
          if (next !== activeRound) switchRound(next);
          e.preventDefault();
          e.stopPropagation();
        }
        return;
      }

      if (e.key === 'Escape') {
        if (revealState === 1 || revealState === 2) { closeModal(); e.stopPropagation(); }
        return;
      }

      if (e.key !== 'Enter') return;

      if (revealState === 1) { advanceToDepth(); e.stopPropagation(); return; }
      if (revealState === 2) { closeModal(); e.stopPropagation(); return; }

      const tag = (e.target.tagName || '').toUpperCase();
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || tag === 'BUTTON') return;

      // State 0 — look for next unrevealed submitted pick (BOD only)
      if (!isBod() || !draftState) return;
      const picks = yearPicks(draftState.year);
      const pending = picks.find(p => p.player && !draftState.revealed.includes(`${p.round}-${p.pick}`));
      if (pending) doReveal(pending);
    }, { capture: true });

    async function doReveal(p) {
      const res = await apiPost('/api/draft/reveal', { round: p.round, pick: p.pick });
      if (!res.ok) return;
      await refreshState();
      render();
      revealSlug = p.player;
      revealTeam = pickOwners(p)[0];
      revealPick = p;
      revealState = 1;
      renderPlayerModal();
    }

    function renderPlayerModal() {
      const bio = bios[revealSlug] || {};
      const name = bioName(revealSlug);
      const pos = Array.isArray(bio.pos) ? bio.pos.join(' / ') : (bio.pos || '—');
      const school = (bio.college && bio.college !== 'NA') ? bio.college
                   : (bio.country && bio.country !== 'NA') ? bio.country : '';
      const embedUrl = highlights[revealSlug];
      const p = revealPick;

      const pickBadge = p
        ? `<div class="show-modal-pick-badge">Round ${p.round} · Pick ${p.pick} · ${pickOwners(p).join(' / ')}</div>`
        : '';

      const photoHtml = bio.photo_url
        ? `<img class="show-modal-player-photo" src="${bio.photo_url}" alt=""
             onerror="this.outerHTML='<div class=\\'show-modal-player-ph\\'></div>'">`
        : `<div class="show-modal-player-ph"></div>`;

      const embedHtml = embedUrl
        ? `<div class="show-embed-wrap"><iframe src="${embedUrl}?autoplay=1&rel=0" allow="autoplay; encrypted-media" allowfullscreen></iframe></div>`
        : `<div class="show-embed-wrap"><div class="show-no-video">
             <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor" opacity="0.3">
               <path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/>
             </svg>
             <span>No highlights configured</span>
           </div></div>`;

      const urlFormHtml = isBod() ? `
        <div class="highlight-url-form">
          <span class="highlight-url-label">Highlights URL</span>
          <input type="text" id="hl-url-input" placeholder="https://www.youtube.com/embed/…" value="${embedUrl || ''}" />
          <button class="btn btn-ghost btn-sm" id="hl-url-save">Save</button>
        </div>` : '';

      const hintText = revealTeam
        ? `<kbd>Enter</kbd> &rarr; ${revealTeam} depth chart`
        : `<kbd>Enter</kbd> to close`;

      const overlay = document.getElementById('show-overlay');
      overlay.innerHTML = `
        <div class="show-modal">
          <div class="show-modal-header">
            ${photoHtml}
            <div>
              ${pickBadge}
              <div class="show-modal-title">${name}</div>
              <div class="show-modal-sub">${pos}${school ? ' · ' + school : ''}</div>
            </div>
          </div>
          ${embedHtml}
          ${urlFormHtml}
          <div class="show-modal-footer">
            <div class="show-modal-hint">${hintText}</div>
            <button class="btn btn-ghost btn-sm" onclick="closeModal()">Close</button>
          </div>
        </div>`;
      overlay.style.display = 'flex';
      overlay.focus();

      if (isBod()) {
        document.getElementById('hl-url-save').addEventListener('click', async () => {
          const url = document.getElementById('hl-url-input').value.trim();
          const btn = document.getElementById('hl-url-save');
          btn.disabled = true; btn.textContent = 'Saving…';
          const res = await apiPatch('/api/draft/live', { highlights: { [revealSlug]: url } });
          if (res.ok) {
            const newState = await res.json();
            draftState = newState;
            highlights = newState.highlights || {};
            btn.textContent = 'Saved!';
            setTimeout(renderPlayerModal, 500);
          } else {
            btn.textContent = 'Error'; btn.disabled = false;
          }
        });
      }
    }

    async function advanceToDepth() {
      if (!revealTeam) { closeModal(); return; }
      revealState = 2;
      await renderDepthModal(revealTeam);
    }

    async function renderDepthModal(abbr) {
      abbr = abbr.toUpperCase();
      let roster = rosterCache[abbr];
      if (!roster) {
        const res = await fetch(`/data/${abbr.toLowerCase()}-roster.csv`);
        roster = res.ok ? parseRosterCSV(await res.text()) : [];
        rosterCache[abbr] = roster;
      }

      const teamName = TEAM_NAMES[abbr] || abbr;
      const byPos = {};
      roster.forEach(r => {
        const p = r.pos[0] || '?';
        if (!byPos[p]) byPos[p] = [];
        byPos[p].push(r);
      });

      function holdBadge(r) {
        if (!r.capHold) return '';
        const map = { UFA: ['ch-ufa','UFA'], RFA: ['ch-rfa','RFA'],
                      PLAYER_OPT: ['ch-popt','P.OPT'], TEAM_OPT: ['ch-topt','T.OPT'],
                      NON_GTD: ['ch-ngtd','NGD'] };
        const [cls, label] = map[r.capHold] || ['ch-ufa', r.capHold];
        return `<span class="cap-hold-tag ${cls}">${label}</span>`;
      }

      function ovrStyle(n) {
        if (!n) return '';
        const t = Math.min(1, Math.max(0, (n - 60) / (99 - 60)));
        const hue = Math.round(t * 120);
        return `background:hsl(${hue},55%,18%);color:hsl(${hue},80%,72%);border-radius:3px;padding:0.1rem 0.35rem;`;
      }

      // 6-col grid: PG/SG each span 2 cols centered (cols 2-3, 4-5); SF/C/PF span 2 cols each (cols 1-2, 3-4, 5-6)
      function buildGroup(pos, colStart, row) {
        const players = (byPos[pos] || []).sort((a, b) => b.ovr - a.ovr);
        const rows = players.length
          ? players.map(r => {
              const ovr = r.ovr || '—';
              const ovrSpan = r.ovr
                ? `<span style="${ovrStyle(r.ovr)}">${ovr}</span>`
                : `<span class="depth-player-ovr">—</span>`;
              return `<div class="depth-player-row">
              <span class="depth-player-name">${r.name}${holdBadge(r)}</span>
              ${ovrSpan}
            </div>`;
            }).join('')
          : `<div class="depth-player-row" style="color:#374151;font-style:italic">—</div>`;
        const style = `grid-column:${colStart}/${colStart+2};grid-row:${row}`;
        return `<div class="depth-pos-group" style="${style}"><div class="depth-pos-group-hdr">${pos}</div>${rows}</div>`;
      }

      const knownPos = new Set(['PG','SG','SF','C','PF']);
      const extraPos = Object.keys(byPos).filter(p => !knownPos.has(p));

      // Half-court SVG (bird's-eye, basket at bottom; 50ft×47ft at 10px/ft)
      const courtSvg = `<svg class="depth-court-svg" viewBox="0 0 500 470" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="498" height="468" fill="none" stroke="#fff" stroke-width="2"/>
        <rect x="170" y="280" width="160" height="190" fill="none" stroke="#fff" stroke-width="2"/>
        <path d="M 190,280 A 60,60 0 0,0 310,280" fill="none" stroke="#fff" stroke-width="2"/>
        <path d="M 190,280 A 60,60 0 0,1 310,280" fill="none" stroke="#fff" stroke-width="1.5" stroke-dasharray="6,5"/>
        <line x1="30" y1="330" x2="30" y2="469" stroke="#fff" stroke-width="2"/>
        <line x1="470" y1="330" x2="470" y2="469" stroke="#fff" stroke-width="2"/>
        <path d="M 30,330 A 237,237 0 0,0 470,330" fill="none" stroke="#fff" stroke-width="2"/>
        <circle cx="250" cy="418" r="10" fill="none" stroke="#fff" stroke-width="2"/>
        <path d="M 210,418 A 40,40 0 0,0 290,418" fill="none" stroke="#fff" stroke-width="1.5" stroke-dasharray="4,4"/>
        <line x1="218" y1="453" x2="282" y2="453" stroke="#fff" stroke-width="3"/>
      </svg>`;

      const overlay = document.getElementById('show-overlay');
      overlay.innerHTML = `
        <div class="show-modal">
          <div class="depth-modal-header">
            <img class="depth-team-logo" src="/logos/logo-${abbr.toLowerCase()}.png" alt="${abbr}"
                 onerror="this.style.display='none'">
            <div class="depth-team-name">${teamName} Depth Chart</div>
          </div>
          <div class="depth-court-wrap">
            ${courtSvg}
            <div class="depth-pos-grid">
              ${buildGroup('PG', 2, 1)}
              ${buildGroup('SG', 4, 1)}
              ${buildGroup('SF', 1, 2)}
              ${buildGroup('C',  3, 2)}
              ${buildGroup('PF', 5, 2)}
              ${extraPos.map((p,i) => buildGroup(p, 1 + (i%3)*2, 3)).join('')}
            </div>
          </div>
          <div class="show-modal-footer">
            <div class="show-modal-hint"><kbd>Enter</kbd> to close</div>
            <button class="btn btn-ghost btn-sm" onclick="closeModal()">Close</button>
          </div>
        </div>`;
      overlay.style.display = 'flex';
      overlay.focus();
    }

    function closeModal() {
      revealState = 0;
      revealSlug = null; revealTeam = null; revealPick = null;
      document.getElementById('show-overlay').style.display = 'none';
      document.getElementById('focus-anchor').focus();
    }

    function parseRosterCSV(text) {
      const lines = text.trim().split('\n');
      if (lines.length < 2) return [];
      const headers = lines[0].split(',').map(h => h.trim());
      const slugIdx = headers.indexOf('SLUG');
      const ovrIdx = headers.indexOf('OVR');
      if (slugIdx === -1) return [];
      const result = [];
      for (let i = 1; i < lines.length; i++) {
        const cols = lines[i].split(',').map(c => c.trim());
        const slug = cols[slugIdx];
        if (!slug) continue;
        const bio = bios[slug];
        if (!bio) continue;
        const parts = bio.name.split(',');
        const name = parts.length === 2 ? `${parts[1].trim()} ${parts[0].trim()}` : bio.name;
        const csvOvr = ovrIdx !== -1 ? parseInt(cols[ovrIdx]) : NaN;
        const ovr = isNaN(csvOvr) ? (ovrCurrent[slug] || 0) : csvOvr;
        const capHold = (bio.cap_holds && bio.cap_holds['26-27']) || null;
        result.push({
          slug, name,
          pos: Array.isArray(bio.pos) ? bio.pos : [bio.pos || '?'],
          ovr, capHold,
        });
      }
      return result;
    }

    // ── Full draft board render ────────────────────────────────────────────────────

    function renderFullBoard(state) {
      const grid = document.getElementById('fullboard-grid');
      if (!state || activeTab !== 'fullboard') return;
      grid.innerHTML = '';

      const year = state.year;
      const allPicks = yearPicks(year);
      if (!allPicks.length) return;

      const slot = currentSlot(state);
      const picks = allPicks.filter(p => p.round === activeRound);
      if (!picks.length) return;

      picks.forEach(p => {
        const revealed = p.player && state.revealed.includes(`${p.round}-${p.pick}`);
        const isOnClock = slot && slot.pick.round === p.round && slot.pick.pick === p.pick;
        const bio = revealed ? (bios[p.player] || {}) : {};
        const name = revealed ? bioName(p.player) : '';
        const pos = revealed ? (Array.isArray(bio.pos) ? bio.pos.join('/') : (bio.pos || '')) : '';
        const owners = pickOwners(p);
        const primaryTeam = owners[0];

        const card = document.createElement('div');
        card.className = `pick-card${isOnClock ? ' on-clock' : ''}`;

        // Pick number
        const numEl = document.createElement('span');
        numEl.className = 'pc-num';
        numEl.textContent = `#${p.pick}`;
        card.appendChild(numEl);

        // Team (logo + abbr)
        const teamWrap = document.createElement('div');
        teamWrap.className = 'pc-team-wrap';
        if (primaryTeam) {
          const logo = document.createElement('img');
          logo.className = 'pc-team-logo';
          logo.src = `/logos/logo-${primaryTeam.toLowerCase()}.png`;
          logo.alt = '';
          logo.onerror = function() { this.style.display = 'none'; };
          teamWrap.appendChild(logo);
        }
        const teamBtn = document.createElement('button');
        teamBtn.className = 'name-btn name-btn-team pc-team';
        if (isOnClock) teamBtn.style.color = '#93c5fd';
        teamBtn.textContent = owners.join('/');
        teamBtn.addEventListener('click', () => {
          revealState = 2; revealTeam = primaryTeam;
          renderDepthModal(primaryTeam);
        });
        teamWrap.appendChild(teamBtn);
        card.appendChild(teamWrap);

        // Player (photo + name, or status)
        const playerWrap = document.createElement('div');
        playerWrap.className = 'pc-player-wrap';
        if (revealed) {
          if (bio.photo_url) {
            const img = document.createElement('img');
            img.className = 'player-photo'; img.src = bio.photo_url; img.alt = '';
            img.onerror = function() { this.replaceWith(Object.assign(document.createElement('div'), {className:'player-ph'})); };
            playerWrap.appendChild(img);
          } else {
            playerWrap.appendChild(Object.assign(document.createElement('div'), {className:'player-ph'}));
          }
          const hasVideo = !!highlights[p.player];
          const nameBtn = document.createElement('button');
          nameBtn.className = `name-btn name-btn-player pc-name${hasVideo ? ' has-video' : ''}`;
          nameBtn.textContent = name;
          nameBtn.addEventListener('click', () => {
            revealSlug = p.player; revealTeam = primaryTeam; revealPick = p; revealState = 1;
            renderPlayerModal();
          });
          playerWrap.appendChild(nameBtn);
        } else if (p.player) {
          playerWrap.innerHTML = `<span class="pick-in-cell"><span class="pick-in-dot"></span> The pick is in</span>`;
        } else if (isOnClock) {
          playerWrap.innerHTML = `<span class="pc-clock">⏱ On the Clock</span>`;
        } else {
          playerWrap.innerHTML = `<span style="color:#374151">—</span>`;
        }
        card.appendChild(playerWrap);

        // Meta: pos (revealed) or pick window time
        const metaEl = document.createElement('div');
        metaEl.className = 'pc-meta';
        if (revealed) {
          metaEl.textContent = pos;
        } else if (state.round1_date) {
          const sMs = pickWindowStart(state.round1_date, p.round, p.pick);
          metaEl.textContent = `${formatET(sMs)} ET`;
        }
        card.appendChild(metaEl);

        grid.appendChild(card);
      });
    }

    // ── Player pool render ─────────────────────────────────────────────────────────

    function renderPool(state) {
      if (!state || activeTab !== 'pool') return;

      const year = state.year;
      const drafted = pickedSlugs(year);

      // Sort available players by poolOrder, unknowns appended alphabetically
      const orderMap = new Map(poolOrder.map((slug, i) => [slug, i]));
      const available = Object.entries(bios)
        .filter(([slug, bio]) => bio.draft_year === year && !drafted.has(slug))
        .map(([slug, bio]) => ({ slug, bio }))
        .sort((a, b) => {
          const ia = orderMap.has(a.slug) ? orderMap.get(a.slug) : Infinity;
          const ib = orderMap.has(b.slug) ? orderMap.get(b.slug) : Infinity;
          if (ia !== ib) return ia - ib;
          return a.bio.name.localeCompare(b.bio.name);
        });

      const tbody = document.getElementById('pool-body');
      tbody.innerHTML = '';

      if (!available.length) {
        tbody.innerHTML = `<tr><td colspan="5" class="empty-state">All players drafted.</td></tr>`;
        return;
      }

      const bod = isBod();
      let dragSrc = null;

      available.forEach(({ slug, bio }, idx) => {
        const nameParts = bio.name.split(',');
        const name = nameParts.length === 2 ? `${nameParts[1].trim()} ${nameParts[0].trim()}` : bio.name;
        const pos = Array.isArray(bio.pos) ? bio.pos.join('/') : (bio.pos || '—');
        const school = (bio.college && bio.college !== 'NA') ? bio.college
                     : (bio.country && bio.country !== 'NA') ? bio.country : '—';
        const age = calcAge(bio.dob);
        const hasVideo = !!highlights[slug];

        const tr = document.createElement('tr');
        tr.dataset.slug = slug;

        if (bod) {
          tr.draggable = true;
          tr.classList.add('pool-draggable');
          tr.addEventListener('dragstart', e => {
            dragSrc = tr;
            e.dataTransfer.effectAllowed = 'move';
            requestAnimationFrame(() => tr.classList.add('pool-dragging'));
          });
          tr.addEventListener('dragend', () => {
            tr.classList.remove('pool-dragging');
            tbody.querySelectorAll('tr').forEach(r => r.classList.remove('pool-drag-over'));
            dragSrc = null;
          });
          tr.addEventListener('dragover', e => {
            e.preventDefault();
            if (tr !== dragSrc) {
              tbody.querySelectorAll('tr').forEach(r => r.classList.remove('pool-drag-over'));
              tr.classList.add('pool-drag-over');
            }
          });
          tr.addEventListener('dragleave', e => {
            if (!tr.contains(e.relatedTarget)) tr.classList.remove('pool-drag-over');
          });
          tr.addEventListener('drop', e => {
            e.preventDefault();
            tr.classList.remove('pool-drag-over');
            if (!dragSrc || dragSrc === tr) return;
            tbody.insertBefore(dragSrc, tr);
            // Renumber
            [...tbody.querySelectorAll('tr[data-slug]')].forEach((r, i) => {
              const cell = r.querySelector('.pc-rank');
              if (cell) cell.textContent = i + 1;
            });
            // Save
            savePoolOrder([...tbody.querySelectorAll('tr[data-slug]')].map(r => r.dataset.slug));
          });
        }

        // Rank
        const tdRank = document.createElement('td');
        tdRank.className = 'num pc-rank';
        tdRank.textContent = idx + 1;
        tr.appendChild(tdRank);

        // Player name
        const tdName = document.createElement('td');
        const btn = document.createElement('button');
        btn.className = `name-btn name-btn-player${hasVideo ? ' has-video' : ''}`;
        btn.textContent = name;
        btn.addEventListener('click', () => {
          revealSlug = slug; revealTeam = null; revealPick = null; revealState = 1;
          renderPlayerModal();
        });
        tdName.appendChild(btn);
        tr.appendChild(tdName);

        ['pos', 'age', 'school'].forEach((key, i) => {
          const td = document.createElement('td');
          td.className = 'muted';
          td.textContent = [pos, age, school][i];
          tr.appendChild(td);
        });

        tbody.appendChild(tr);
      });
    }

    // ── Main render ────────────────────────────────────────────────────────────

    function render() {
      const state = draftState;
      _swapTakesFrom = buildSwapTakesFrom(state ? yearPicks(state.year) : []);

      // Sync highlights from state; pool order only on initial load (not on interval ticks)
      highlights = (state && state.highlights) || {};
      if (!poolOrder.length) poolOrder = (state && state.pool_order) || [];

      // Auto-jump to the active pick's round — only once on initial load, never again
      if (state && !roundAutoJumped) {
        roundAutoJumped = true;
        const slot = currentSlot(state);
        if (slot && slot.pick.round !== activeRound) {
          activeRound = slot.pick.round;
          document.getElementById('round-tab-1').classList.toggle('active', activeRound === 1);
          document.getElementById('round-tab-2').classList.toggle('active', activeRound === 2);
        }
      }

      // Show/hide tab bar
      document.getElementById('view-tab-bar').style.display = state ? '' : 'none';

      // Gear icon: visible for BOD only (live page is presentation-only for everyone else)
      const toggle = document.getElementById('control-toggle');
      toggle.style.display = isBod() ? 'flex' : 'none';

      if (isBod()) {
        const panel = document.getElementById('admin-panel');
        panel.style.display = '';
        initAdminPanel(state || {});
      }

      // Pulse gear icon amber when a pick is submitted but not yet revealed
      const hasPending = state && isBod() && yearPicks(state.year)
        .some(p => p.player && !state.revealed.includes(`${p.round}-${p.pick}`));
      toggle.classList.toggle('has-pending', !!hasPending);

      renderStatus(state);
      renderFullBoard(state);
      renderPool(state);
      // Invalidate roster cache whenever state updates (picks may have changed depth charts)
      rosterCache = {};
    }

    // ── Data fetching ──────────────────────────────────────────────────────────

    async function refreshState() {
      const [stateRes, picksRes] = await Promise.all([
        fetch('/api/draft/live'),
        fetch('/api/picks'),
      ]);
      if (stateRes.ok) draftState = await stateRes.json();
      if (picksRes.ok) allPicks = await picksRes.json();
    }

    async function init() {
      await refreshState();
      render();
      switchTab(activeTab);

      const [biosRes, ovrRes] = await Promise.all([
        fetch('/api/players'),
        fetch('/api/ovr/current'),
        loadAuth(),
      ]);
      if (biosRes.ok) bios = await biosRes.json();
      if (ovrRes.ok) ovrCurrent = await ovrRes.json();
      render();

      // Pull keyboard focus into the page so arrow/enter keys work without a click first
      document.getElementById('focus-anchor').focus();

      setInterval(async () => {
        await refreshState();
        render();
      }, 10_000);
    }

    init();
  </script>
  <script src="/nav.js"></script>
  <script src="/token-badge.js"></script>
</body>
