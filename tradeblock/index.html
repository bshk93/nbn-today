<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tradeblock — NBN</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111827;
      color: #f3f4f6;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    a { color: #60a5fa; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .page { max-width: 1100px; margin: 0 auto; }

    .nav { margin-bottom: 1.75rem; font-size: 0.875rem; color: #9ca3af; }
    .nav a { color: #9ca3af; }
    .nav a:hover { color: #f3f4f6; }

    header { margin-bottom: 1.75rem; }
    header h1 { font-size: 1.875rem; font-weight: 700; letter-spacing: -0.02em; }
    header p { color: #9ca3af; margin-top: 0.4rem; font-size: 0.9rem; }

    /* Position filter chips */
    .pos-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }
    .pos-chip {
      background: transparent;
      border: 1px solid #374151;
      border-radius: 20px;
      color: #9ca3af;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.2rem 0.7rem;
      letter-spacing: 0.04em;
      transition: none;
    }
    .pos-chip:hover { border-color: #6b7280; color: #d1d5db; }
    .pos-chip.active { background: #1d4ed8; border-color: #3b82f6; color: #fff; }

    .table-wrap {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 12px;
      overflow-x: auto;
    }

    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; white-space: nowrap; }

    thead th {
      padding: 0.7rem 1rem;
      text-align: left;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #6b7280;
      border-bottom: 1px solid #374151;
      cursor: pointer;
      user-select: none;
    }
    thead th:hover { color: #d1d5db; }
    thead th[data-active="true"] { color: #f3f4f6; }

    .sort-arrow { margin-left: 4px; opacity: 0.4; font-size: 0.65rem; }
    th[data-active="true"] .sort-arrow { opacity: 1; }

    tbody tr:nth-child(odd)  { background: #111827; }
    tbody tr:nth-child(even) { background: #1a2234; }
    tbody tr:hover { background: #263044; }

    td { padding: 0.55rem 1rem; color: #d1d5db; border-top: 1px solid #1f2937; }
    td.right  { text-align: right; }
    td.center { text-align: center; }
    td.muted  { color: #6b7280; }
    td.bold   { font-weight: 600; color: #f3f4f6; }
    td.ovr-cell { font-weight: 700; text-align: right; }
    td.notes-cell { color: #9ca3af; font-size: 0.8rem; white-space: normal; min-width: 140px; max-width: 260px; }

    /* Pick badge + notes tooltip */
    .pick-badge-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }
    .pick-badge-wrap::after {
      content: attr(data-tip);
      position: absolute;
      left: 0;
      top: calc(100% + 6px);
      background: #1f2937;
      border: 1px solid #374151;
      color: #d1d5db;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
      padding: 0.3rem 0.6rem;
      border-radius: 6px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s;
      z-index: 20;
    }
    .pick-badge-wrap:hover::after { opacity: 1; }
    .pick-note-dot { font-size: 0.55rem; color: #818cf8; line-height: 1; cursor: help; }

    td.cap-ufa        { background: hsl(45,  60%, 20%); color: hsl(45,  90%, 72%); }
    td.cap-rfa        { background: hsl(25,  60%, 20%); color: hsl(25,  90%, 72%); }
    td.cap-player-opt { background: hsl(120, 50%, 17%); color: hsl(120, 75%, 68%); }
    td.cap-team-opt   { background: hsl(210, 55%, 20%); color: hsl(210, 75%, 70%); }
    td.cap-non-gtd    { color: #4b5563; text-decoration: line-through; }

    .cap-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem 1.25rem;
      padding: 0.6rem 1rem 0.75rem;
      font-size: 0.75rem;
      color: #9ca3af;
      border-top: 1px solid #283141;
    }
    .cap-legend-item { display: flex; align-items: center; gap: 0.35rem; }
    .cap-swatch { display: inline-block; width: 10px; height: 10px; border-radius: 2px; }

    #status { text-align: center; padding: 3rem; color: #6b7280; font-size: 0.9rem; }

    /* Edit panel */
    .edit-panel {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
    }
    .edit-panel-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      user-select: none;
      margin-bottom: 0;
    }
    .edit-panel-header h2 {
      font-size: 0.9rem;
      font-weight: 700;
      color: #f3f4f6;
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .panel-toggle {
      color: #6b7280;
      font-size: 0.75rem;
      transition: transform 0.15s;
    }
    .edit-panel-body { margin-top: 1rem; }
    .edit-panel-body.collapsed { display: none; }
    .team-badge {
      background: #3b82f6;
      color: #fff;
      font-size: 0.68rem;
      padding: 0.1rem 0.45rem;
      border-radius: 4px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .entry-list { margin-bottom: 0.75rem; }
    .entry-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.4rem 0;
      border-bottom: 1px solid #374151;
    }
    .entry-row:last-child { border-bottom: none; }
    .entry-player { font-weight: 600; color: #f3f4f6; flex: 1; font-size: 0.875rem; }
    .entry-notes  { color: #9ca3af; font-size: 0.8rem; flex: 2; }
    .btn-remove {
      background: transparent;
      border: 1px solid #374151;
      border-radius: 4px;
      color: #6b7280;
      cursor: pointer;
      font-size: 0.75rem;
      padding: 0.15rem 0.45rem;
      font-family: inherit;
      white-space: nowrap;
    }
    .btn-remove:hover { border-color: #ef4444; color: #ef4444; }

    .add-row { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; margin-bottom: 0.75rem; }
    .add-row select, .add-row input[type="text"] {
      background: #111827;
      border: 1px solid #374151;
      border-radius: 6px;
      color: #d1d5db;
      font-size: 0.8rem;
      padding: 0.35rem 0.6rem;
      font-family: inherit;
      outline: none;
    }
    .add-row select:focus, .add-row input[type="text"]:focus { border-color: #3b82f6; }
    .add-row select { min-width: 200px; }
    .add-row input[type="text"] { flex: 1; min-width: 160px; }

    .panel-actions { display: flex; gap: 0.5rem; align-items: center; }
    .btn-action {
      background: transparent;
      border: 1px solid #3b82f6;
      border-radius: 6px;
      color: #60a5fa;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.35rem 0.9rem;
      font-family: inherit;
    }
    .btn-action:hover { background: rgba(59,130,246,0.15); }
    .btn-action:disabled { opacity: 0.5; cursor: default; }
    .save-status { font-size: 0.78rem; color: #9ca3af; }

    /* Sign-in prompt */
    .signin-prompt { font-size: 0.8rem; color: #6b7280; margin-bottom: 1.5rem; }
    .signin-prompt button {
      background: transparent;
      border: none;
      color: #60a5fa;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: inherit;
      padding: 0;
      text-decoration: underline;
    }

    /* Token modal */
    .token-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .token-modal {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 1.5rem;
      width: 360px;
      max-width: 90vw;
    }
    .token-modal h3 { font-size: 1rem; font-weight: 700; margin-bottom: 0.4rem; }
    .token-modal p  { font-size: 0.8rem; color: #9ca3af; margin-bottom: 1rem; }
    .token-modal input {
      width: 100%;
      background: #111827;
      border: 1px solid #374151;
      border-radius: 6px;
      color: #f3f4f6;
      font-size: 0.875rem;
      font-family: monospace;
      padding: 0.5rem 0.75rem;
      margin-bottom: 1rem;
    }
    .token-modal input:focus { outline: none; border-color: #3b82f6; }
    .token-modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }
    .btn-tok-cancel {
      padding: 0.35rem 0.8rem; border: 1px solid #374151; border-radius: 6px;
      font-size: 0.8rem; font-weight: 600; cursor: pointer;
      background: transparent; color: #d1d5db; font-family: inherit;
    }
    .btn-tok-submit {
      padding: 0.35rem 0.8rem; border: 1px solid #3b82f6; border-radius: 6px;
      font-size: 0.8rem; font-weight: 600; cursor: pointer;
      background: transparent; color: #60a5fa; font-family: inherit;
    }
  </style>
</head>
<body>
  <div class="page">
    <nav class="nav"><a href="/">← Home</a></nav>
    <header>
      <h1>Tradeblock</h1>
      <p>Players available for trade. Click any column header to sort.</p>
    </header>

    <div id="edit-panel" style="display:none"></div>
    <div id="signin-prompt" class="signin-prompt" style="display:none">
      Team member? <button id="signin-btn">Enter your token</button> to manage your tradeblock.
    </div>

    <div id="pos-filter" class="pos-filter" style="display:none"></div>

    <div class="table-wrap" id="table-wrap">
      <div id="status">Loading…</div>
    </div>
  </div>

  <script>
    const VALID_TEAMS_LC = new Set([
      'atl','bkn','bos','cha','chi','cle','dal','den','det','gsw',
      'hou','ind','lac','lal','mem','mia','mil','min','nop','nyk',
      'okc','orl','phi','phx','por','sac','sas','tor','uta','was',
    ]);
    const TOKEN_KEY = 'nbn_token';
    const CUR_YR = '25-26';

    const getToken = () => localStorage.getItem(TOKEN_KEY);
    const setToken = t => localStorage.setItem(TOKEN_KEY, t);

    // ── Cap hold styling ──────────────────────────────────────────────────────

    const CAP_HOLD_CSS = {
      UFA: 'cap-ufa', RFA: 'cap-rfa',
      PLAYER_OPT: 'cap-player-opt', TEAM_OPT: 'cap-team-opt', NON_GTD: 'cap-non-gtd',
    };
    const CAP_HOLD_LABELS = {
      UFA: 'UFA Hold', RFA: 'RFA Hold',
      PLAYER_OPT: 'Player Option', TEAM_OPT: 'Team Option', NON_GTD: 'Non-Guaranteed',
    };
    const CAP_SWATCH_COLORS = {
      UFA: 'hsl(45,60%,35%)', RFA: 'hsl(25,60%,35%)',
      PLAYER_OPT: 'hsl(120,50%,30%)', TEAM_OPT: 'hsl(210,55%,35%)', NON_GTD: '#374151',
    };


    // ── Player bio lookup ─────────────────────────────────────────────────────

    let biosData = {};
    const nameToSlugMap = new Map(); // display name (lowercase) → slug

    function buildNameMap(bios) {
      biosData = bios;
      Object.entries(bios).forEach(([slug, bio]) => {
        const dn = displayNameFromBio(bio.name || '');
        if (dn) nameToSlugMap.set(dn.toLowerCase(), slug);
      });
    }

    function displayNameFromBio(canonical) {
      if (!canonical) return '';
      const toTitle = s => s.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
      if (canonical.includes(',')) {
        const [last, first] = canonical.split(',', 2);
        return toTitle(`${first.trim()} ${last.trim()}`);
      }
      return toTitle(canonical);
    }

    function calcAgeFromDob(dob) {
      if (!dob) return '';
      return String(Math.floor((Date.now() - new Date(dob).getTime()) / (365.25 * 24 * 3600 * 1000)));
    }

    function nameToSlug(name) {
      return nameToSlugMap.get(name.toLowerCase()) || null;
    }

    // Legacy: slug lookup via player_seasons.csv (kept as fallback)
    const slugMap = new Map();

    function buildSlugMap(rows) {
      rows.forEach(r => {
        if (!r.SLUG || !r.PLAYER) return;
        const key = r.PLAYER
          .replace(/,?\s+(jr\.|sr\.|ii|iii|iv)\.?\s*$/i, '')
          .replace(',', '')
          .toLowerCase()
          .trim();
        slugMap.set(key, r.SLUG);
      });
    }

    function rosterNameToSlug(name) {
      // Try biosData map first, then legacy slugMap
      const fromBio = nameToSlug(name);
      if (fromBio) return fromBio;
      const stripped = name.replace(/\s+(jr\.|sr\.|ii|iii|iv)\.?\s*$/i, '').trim();
      const lastSpace = stripped.lastIndexOf(' ');
      if (lastSpace === -1) return slugMap.get(stripped.toLowerCase()) || null;
      const first = stripped.slice(0, lastSpace);
      const last  = stripped.slice(lastSpace + 1);
      return slugMap.get(`${last.toLowerCase()} ${first.toLowerCase()}`) || null;
    }

    // ── Position filter ───────────────────────────────────────────────────────

    const FILTER_DEFS = [
      { id: 'PG', label: 'PG', pos: ['PG'] },
      { id: 'SG', label: 'SG', pos: ['SG'] },
      { id: 'SF', label: 'SF', pos: ['SF'] },
      { id: 'PF', label: 'PF', pos: ['PF'] },
      { id: 'C',  label: 'C',  pos: ['C']  },
      { id: 'G',  label: 'G',  pos: ['PG', 'SG'] },
      { id: 'W',  label: 'W',  pos: ['SG', 'SF'] },
      { id: 'F',  label: 'F',  pos: ['SF', 'PF'] },
    ];

    const activeFilters = new Set();

    function rowMatchesFilter(row) {
      if (activeFilters.size === 0) return true;
      if (row.isPick) return true;  // picks always shown regardless of position filter
      const playerPos = new Set(
        (row.pos === '—' ? [] : row.pos.split('/').map(p => p.trim()))
      );
      for (const id of activeFilters) {
        const def = FILTER_DEFS.find(d => d.id === id);
        if (def && def.pos.some(p => playerPos.has(p))) return true;
      }
      return false;
    }

    function buildFilterChips() {
      const container = document.getElementById('pos-filter');
      container.innerHTML = '';
      FILTER_DEFS.forEach(def => {
        const btn = document.createElement('button');
        btn.className = 'pos-chip' + (activeFilters.has(def.id) ? ' active' : '');
        btn.textContent = def.label;
        btn.addEventListener('click', () => {
          if (activeFilters.has(def.id)) activeFilters.delete(def.id);
          else activeFilters.add(def.id);
          btn.classList.toggle('active');
          if (currentTbody) rebuildBody(currentTbody);
        });
        container.appendChild(btn);
      });
      container.style.display = '';
    }

    // ── Table state ───────────────────────────────────────────────────────────

    let sortField = 'ovr';
    let sortDir = -1;
    let COLS = [];
    let tableRows = [];
    let salaryYears = [];
    let myTeam = null;
    let myRoster = [];
    let pendingEntries = [];
    let pendingPicks = [];
    let panelCollapsed = true;
    // OVR color scale is fixed 60–99 (see renderCell)
    let tbData = {};

    function parseLine(line) {
      const out = []; let cur = '', quoted = false;
      for (const ch of line) {
        if (ch === '"') { quoted = !quoted; }
        else if (ch === ',' && !quoted) { out.push(cur); cur = ''; }
        else { cur += ch; }
      }
      out.push(cur);
      return out;
    }

    function parseCSV(text) {
      const lines = text.trim().split('\n');
      const headers = parseLine(lines[0]);
      return lines.slice(1).map(line => {
        const vals = parseLine(line);
        const obj = {};
        headers.forEach((h, i) => { obj[h] = vals[i] ?? ''; });
        return obj;
      });
    }

    function buildCols() {
      COLS = [
        { key: 'team',   label: 'Team',   sortField: 'team',   cls: '',             defaultDir:  1, numeric: false },
        { key: 'player', label: 'Player', sortField: 'player', cls: 'bold',         defaultDir:  1, numeric: false },
        { key: 'pos',    label: 'POS',    sortField: 'pos',    cls: 'muted center', defaultDir:  1, numeric: false },
        { key: 'ovr',    label: 'OVR',    sortField: 'ovr',    cls: 'ovr-cell',     defaultDir: -1, numeric: true  },
        { key: 'age',    label: 'AGE',    sortField: 'age',    cls: 'right',        defaultDir:  1, numeric: true  },
      ];
      salaryYears.forEach(yr => {
        COLS.push({ key: yr, label: yr, sortField: yr, cls: 'right', defaultDir: -1, numeric: false });
      });
      COLS.push({ key: 'notes', label: 'Notes', sortField: 'notes', cls: 'notes-cell', defaultDir: 1, numeric: false });
    }

    function sortRows(rows) {
      return [...rows].sort((a, b) => {
        let av = a[sortField], bv = b[sortField];
        const col = COLS.find(c => c.sortField === sortField);
        if (col && col.numeric) {
          av = parseFloat(av) || 0;
          bv = parseFloat(bv) || 0;
        } else {
          av = (av || '').toLowerCase();
          bv = (bv || '').toLowerCase();
        }
        return av < bv ? -sortDir : av > bv ? sortDir : 0;
      });
    }

    let currentTbody = null;

    function buildTable() {
      const table = document.createElement('table');
      const thead = table.createTHead();
      const hr = thead.insertRow();

      COLS.forEach(col => {
        const th = document.createElement('th');
        const isActive = col.sortField === sortField;
        th.appendChild(document.createTextNode(col.label));
        const arrow = document.createElement('span');
        arrow.className = 'sort-arrow';
        arrow.textContent = isActive ? (sortDir === -1 ? '↓' : '↑') : '↓';
        th.appendChild(arrow);
        th.dataset.active = isActive;
        if (col.cls.includes('right') || col.cls.includes('ovr-cell')) th.style.textAlign = 'right';
        if (col.cls.includes('center')) th.style.textAlign = 'center';

        th.addEventListener('click', () => {
          if (sortField === col.sortField) { sortDir *= -1; }
          else { sortField = col.sortField; sortDir = col.defaultDir; }
          thead.querySelectorAll('th').forEach(t => {
            t.dataset.active = false;
            t.querySelector('.sort-arrow').textContent = '↓';
          });
          th.dataset.active = true;
          th.querySelector('.sort-arrow').textContent = sortDir === -1 ? '↓' : '↑';
          rebuildBody(currentTbody);
        });

        hr.appendChild(th);
      });

      currentTbody = table.createTBody();
      rebuildBody(currentTbody);
      return table;
    }

    function rebuildBody(tbody) {
      tbody.innerHTML = '';
      const visible = sortRows(tableRows.filter(rowMatchesFilter));

      if (visible.length === 0) {
        const tr = tbody.insertRow();
        const td = tr.insertCell();
        td.colSpan = COLS.length;
        td.style.cssText = 'text-align:center;padding:3rem;color:#6b7280;font-size:0.9rem;';
        td.textContent = tableRows.length === 0
          ? 'Nothing on the tradeblock yet.'
          : 'No players match the selected position filter.';
        return;
      }

      visible.forEach(row => {
        const tr = tbody.insertRow();
        COLS.forEach(col => {
          const td = tr.insertCell();
          col.cls.split(' ').forEach(c => c && td.classList.add(c));

          if (col.key === 'team') {
            const a = document.createElement('a');
            a.href = `/teams/${row.team}/`;
            a.textContent = row.team;
            td.appendChild(a);
          } else if (col.key === 'player') {
            if (row.isPick) {
              const badge = document.createElement('span');
              badge.style.cssText = 'font-size:0.72rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:0.15rem 0.5rem;border-radius:4px;background:#1e1b4b;color:#a5b4fc;';
              badge.textContent = row.player;
              if (row.pickApiNotes) {
                const wrap = document.createElement('span');
                wrap.className = 'pick-badge-wrap';
                wrap.dataset.tip = row.pickApiNotes;
                wrap.appendChild(badge);
                const dot = document.createElement('span');
                dot.className = 'pick-note-dot';
                dot.textContent = '●';
                wrap.appendChild(dot);
                td.appendChild(wrap);
              } else {
                td.appendChild(badge);
              }
            } else {
              const slug = rosterNameToSlug(row.player);
              if (slug) {
                const a = document.createElement('a');
                a.href = `/players/?p=${slug}`;
                a.textContent = row.player;
                td.appendChild(a);
              } else {
                td.textContent = row.player;
              }
            }
          } else if (col.key === 'ovr') {
            td.textContent = row.ovr || '—';
            if (row.ovr) {
              const n = parseFloat(row.ovr);
              if (!isNaN(n)) {
                const t = Math.min(1, Math.max(0, (n - 60) / (99 - 60)));
                td.style.background = `hsl(${Math.round(t * 120)}, 55%, 18%)`;
                td.style.color     = `hsl(${Math.round(t * 120)}, 80%, 72%)`;
              }
            }
          } else if (/^\d{2}-\d{2}$/.test(col.key)) {
            td.textContent = row[col.key] || '—';
            const capType = (row.cap_holds || {})[col.key];
            if (capType && CAP_HOLD_CSS[capType]) td.classList.add(CAP_HOLD_CSS[capType]);
          } else {
            td.textContent = row[col.key] || '—';
          }
        });
      });
    }

    // ── Edit panel ────────────────────────────────────────────────────────────

    function renderEditPanel() {
      const panel = document.getElementById('edit-panel');
      panel.innerHTML = '';
      panel.style.display = '';
      panel.className = 'edit-panel';

      // Collapsible header
      const header = document.createElement('div');
      header.className = 'edit-panel-header';

      const h2 = document.createElement('h2');
      h2.innerHTML = `Manage Tradeblock <span class="team-badge">${myTeam}</span>`;

      const toggle = document.createElement('span');
      toggle.className = 'panel-toggle';
      toggle.textContent = panelCollapsed ? '▶' : '▼';

      header.appendChild(h2);
      header.appendChild(toggle);
      header.addEventListener('click', () => {
        panelCollapsed = !panelCollapsed;
        toggle.textContent = panelCollapsed ? '▶' : '▼';
        body.classList.toggle('collapsed', panelCollapsed);
      });
      panel.appendChild(header);

      // Collapsible body
      const body = document.createElement('div');
      body.className = 'edit-panel-body' + (panelCollapsed ? ' collapsed' : '');

      // ── Players section ───────────────────────────────────────────────────
      const playersLabel = document.createElement('div');
      playersLabel.style.cssText = 'font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#6b7280;margin-bottom:0.4rem;';
      playersLabel.textContent = 'Players';
      body.appendChild(playersLabel);

      const entryList = document.createElement('div');
      entryList.className = 'entry-list';

      if (pendingEntries.length === 0) {
        const empty = document.createElement('p');
        empty.style.cssText = 'color:#6b7280;font-size:0.8rem;padding:0.2rem 0 0.6rem;';
        empty.textContent = 'No players on the block yet.';
        entryList.appendChild(empty);
      } else {
        pendingEntries.forEach((entry, i) => {
          const row = document.createElement('div');
          row.className = 'entry-row';
          const playerSpan = document.createElement('span');
          playerSpan.className = 'entry-player';
          playerSpan.textContent = entry.player;
          const notesSpan = document.createElement('span');
          notesSpan.className = 'entry-notes';
          if (entry.notes) { notesSpan.textContent = entry.notes; }
          else { notesSpan.innerHTML = '<em style="opacity:0.45">no notes</em>'; }
          const removeBtn = document.createElement('button');
          removeBtn.className = 'btn-remove';
          removeBtn.textContent = '✕ Remove';
          removeBtn.addEventListener('click', () => { pendingEntries.splice(i, 1); renderEditPanel(); });
          row.appendChild(playerSpan); row.appendChild(notesSpan); row.appendChild(removeBtn);
          entryList.appendChild(row);
        });
      }
      body.appendChild(entryList);

      // Player add row
      const addRow = document.createElement('div');
      addRow.className = 'add-row';
      const onBlock = new Set(pendingEntries.map(e => e.player));
      const isNewFormat = myRoster.length > 0 && 'SLUG' in myRoster[0] && !('PLAYER' in myRoster[0]);
      const available = isNewFormat
        ? myRoster
            .filter(r => { const bio = biosData[r.SLUG]; return (!bio || bio.type !== 'dead') && !onBlock.has(displayNameFromBio((bio && bio.name) || '')); })
            .map(r => { const bio = biosData[r.SLUG] || {}; return { player: displayNameFromBio(bio.name || '') || r.SLUG }; })
        : myRoster.filter(r => r.TYPE !== 'dead' && !onBlock.has(r.PLAYER)).map(r => ({ player: r.PLAYER }));
      const sel = document.createElement('select');
      const defaultOpt = document.createElement('option');
      defaultOpt.value = '';
      defaultOpt.textContent = available.length ? 'Select player…' : 'All players added';
      sel.appendChild(defaultOpt);
      available.forEach(({ player }) => { const opt = document.createElement('option'); opt.value = player; opt.textContent = player; sel.appendChild(opt); });
      const notesInput = document.createElement('input');
      notesInput.type = 'text'; notesInput.placeholder = 'Notes (optional)…'; notesInput.maxLength = 120;
      const addBtn = document.createElement('button');
      addBtn.className = 'btn-action'; addBtn.textContent = 'Add'; addBtn.disabled = available.length === 0;
      addBtn.addEventListener('click', () => {
        const player = sel.value; if (!player) return;
        pendingEntries.push({ player, notes: notesInput.value.trim() });
        renderEditPanel();
      });
      addRow.appendChild(sel); addRow.appendChild(notesInput); addRow.appendChild(addBtn);
      body.appendChild(addRow);

      // ── Picks section ─────────────────────────────────────────────────────
      const picksLabel = document.createElement('div');
      picksLabel.style.cssText = 'font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#6b7280;margin:1rem 0 0.4rem;';
      picksLabel.textContent = 'Picks';
      body.appendChild(picksLabel);

      const pickList = document.createElement('div');
      pickList.className = 'entry-list';

      if (pendingPicks.length === 0) {
        const empty = document.createElement('p');
        empty.style.cssText = 'color:#6b7280;font-size:0.8rem;padding:0.2rem 0 0.6rem;';
        empty.textContent = 'No picks on the block yet.';
        pickList.appendChild(empty);
      } else {
        pendingPicks.forEach((pick, i) => {
          const row = document.createElement('div');
          row.className = 'entry-row';
          const pickSpan = document.createElement('span');
          pickSpan.className = 'entry-player';
          pickSpan.textContent = (pick.team && pick.team !== 'Own' && pick.team.toUpperCase() !== myTeam) ? `${pick.year} ${pick.round} (${pick.team})` : `${pick.year} ${pick.round}`;
          const notesSpan = document.createElement('span');
          notesSpan.className = 'entry-notes';
          if (pick.notes) { notesSpan.textContent = pick.notes; }
          else { notesSpan.innerHTML = '<em style="opacity:0.45">no notes</em>'; }
          const removeBtn = document.createElement('button');
          removeBtn.className = 'btn-remove'; removeBtn.textContent = '✕ Remove';
          removeBtn.addEventListener('click', () => { pendingPicks.splice(i, 1); renderEditPanel(); });
          row.appendChild(pickSpan); row.appendChild(notesSpan); row.appendChild(removeBtn);
          pickList.appendChild(row);
        });
      }
      body.appendChild(pickList);

      // Pick add row — dropdown of owned picks not already on the block
      const pickAddRow = document.createElement('div');
      pickAddRow.className = 'add-row';

      const roundStr = r => r === 1 ? '1st' : '2nd';
      const onPickBlock = new Set(pendingPicks.map(p => `${p.year}|${p.round}|${p.team}`));
      const availablePicks = myPicks.filter(p => !onPickBlock.has(`${p.year}|${roundStr(p.round)}|${p.orig}`));

      const pickSel = document.createElement('select');
      const pickDefaultOpt = document.createElement('option');
      pickDefaultOpt.value = '';
      pickDefaultOpt.textContent = availablePicks.length ? 'Select pick…' : 'All picks added';
      pickSel.appendChild(pickDefaultOpt);
      availablePicks.forEach(p => {
        const rs = roundStr(p.round);
        const label = p.orig === myTeam ? `${p.year} ${rs}` : `${p.year} ${rs} (${p.orig})`;
        const opt = document.createElement('option');
        opt.value = JSON.stringify({ year: p.year, round: rs, team: p.orig });
        opt.textContent = label;
        pickSel.appendChild(opt);
      });

      const pickNotesInput = document.createElement('input');
      pickNotesInput.type = 'text'; pickNotesInput.placeholder = 'Notes (optional)…'; pickNotesInput.maxLength = 120;

      const pickAddBtn = document.createElement('button');
      pickAddBtn.className = 'btn-action'; pickAddBtn.textContent = 'Add';
      pickAddBtn.disabled = availablePicks.length === 0;
      pickAddBtn.addEventListener('click', () => {
        if (!pickSel.value) return;
        const { year, round, team } = JSON.parse(pickSel.value);
        pendingPicks.push({ year, round, team, notes: pickNotesInput.value.trim() });
        renderEditPanel();
      });

      pickAddRow.appendChild(pickSel);
      pickAddRow.appendChild(pickNotesInput);
      pickAddRow.appendChild(pickAddBtn);
      body.appendChild(pickAddRow);

      // ── Save ──────────────────────────────────────────────────────────────
      const actions = document.createElement('div');
      actions.className = 'panel-actions';
      const saveBtn = document.createElement('button');
      saveBtn.className = 'btn-action'; saveBtn.textContent = 'Save';
      const saveStatus = document.createElement('span');
      saveStatus.className = 'save-status';

      saveBtn.addEventListener('click', async () => {
        saveBtn.disabled = true; saveStatus.textContent = 'Saving…';
        try {
          const res = await fetch(`/api/trading-block/${myTeam}`, {
            method: 'PUT',
            headers: { Authorization: `Bearer ${getToken()}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ players: pendingEntries, picks: pendingPicks }),
          });
          if (res.status === 403) {
            localStorage.removeItem(TOKEN_KEY);
            saveStatus.textContent = 'Token invalid — please refresh and re-enter.';
            return;
          }
          if (!res.ok) throw new Error(res.statusText);
          saveStatus.textContent = 'Saved!';
          setTimeout(() => location.reload(), 600);
        } catch {
          saveStatus.textContent = 'Save failed.';
          saveBtn.disabled = false;
        }
      });

      actions.appendChild(saveBtn); actions.appendChild(saveStatus);
      body.appendChild(actions);
      panel.appendChild(body);
    }

    // ── Token modal ───────────────────────────────────────────────────────────

    function promptToken(onSuccess) {
      const overlay = document.createElement('div');
      overlay.className = 'token-overlay';
      overlay.innerHTML = `
        <div class="token-modal">
          <h3>Team token required</h3>
          <p>Enter your team token to manage your tradeblock. It will be saved in this browser.</p>
          <input type="password" placeholder="Paste token…" autocomplete="off" />
          <div class="token-modal-actions">
            <button class="btn-tok-cancel">Cancel</button>
            <button class="btn-tok-submit">Continue</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);
      const input = overlay.querySelector('input');
      input.focus();
      overlay.querySelector('.btn-tok-cancel').addEventListener('click', () => overlay.remove());
      overlay.querySelector('.btn-tok-submit').addEventListener('click', () => {
        const val = input.value.trim();
        if (!val) return;
        setToken(val);
        overlay.remove();
        onSuccess(val);
      });
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') overlay.querySelector('.btn-tok-submit').click();
        if (e.key === 'Escape') overlay.remove();
      });
    }

    // ── Auth ──────────────────────────────────────────────────────────────────

    async function checkAuth() {
      const token = getToken();
      if (!token) return null;
      try {
        const res = await fetch('/api/me', { headers: { Authorization: `Bearer ${token}` } });
        return res.ok ? res.json() : null;
      } catch { return null; }
    }

    let myPicks = [];   // picks owned by myTeam from /api/picks/{team}

    async function activateEditPanel(rosterData) {
      if (!myRoster.length && myTeam) {
        const r = await fetch(`/data/${myTeam.toLowerCase()}-roster.csv`);
        if (r.ok) { myRoster = parseCSV(await r.text()); rosterData[myTeam] = myRoster; }
      }
      if (!myPicks.length && myTeam) {
        const r = await fetch(`/api/picks/${myTeam}`);
        if (r.ok) {
          const all = await r.json();
          myPicks = all.filter(p => (p.owner || '').toUpperCase() === myTeam);
        }
      }
      const teamBlock = tbData[myTeam] || {};
      pendingEntries = [...(teamBlock.players || [])];
      pendingPicks   = [...(teamBlock.picks   || [])];
      renderEditPanel();
    }

    // ── Main ──────────────────────────────────────────────────────────────────

    (async () => {
      const statusEl = document.getElementById('status');
      const wrap = document.getElementById('table-wrap');
      const signinPrompt = document.getElementById('signin-prompt');

      try {
        const [tb, userInfo, biosJson, playerSeasonsTxt, ovrCurrent] = await Promise.all([
          fetch('/api/trading-block').then(r => { if (!r.ok) throw r; return r.json(); }),
          checkAuth(),
          fetch('/api/players').then(r => r.ok ? r.json() : {}),
          fetch('/players/player_seasons.csv').then(r => r.ok ? r.text() : null),
          fetch('/api/ovr/current').then(r => r.ok ? r.json() : {}),
        ]);
        tbData = tb;

        buildNameMap(biosJson);
        if (playerSeasonsTxt) buildSlugMap(parseCSV(playerSeasonsTxt));

        const teamRole = userInfo && userInfo.roles.find(r => VALID_TEAMS_LC.has(r));
        if (teamRole) myTeam = teamRole.toUpperCase();

        // Which roster CSVs to fetch
        const teamsWithEntries = Object.keys(tb).filter(t => tb[t].players?.length || tb[t].picks?.length);
        const teamsWithPicks   = Object.keys(tb).filter(t => tb[t].picks?.length);
        const teamsToFetch = [...new Set([...teamsWithEntries, ...(myTeam ? [myTeam] : [])])];

        const rosterData = {};
        if (teamsToFetch.length > 0) {
          const results = await Promise.allSettled(
            teamsToFetch.map(t =>
              fetch(`/data/${t.toLowerCase()}-roster.csv`).then(r => r.ok ? r.text() : null)
            )
          );
          teamsToFetch.forEach((t, i) => {
            const res = results[i];
            if (res.status === 'fulfilled' && res.value) rosterData[t] = parseCSV(res.value);
          });
        }

        // Fetch picks API for teams that have picks on the block, to get pick notes (protection etc.)
        // Map: team → Map of "year|round|orig" → notes string
        const picksApiMap = {};
        if (teamsWithPicks.length > 0) {
          const results = await Promise.allSettled(
            teamsWithPicks.map(t => fetch(`/api/picks/${t}`).then(r => r.ok ? r.json() : []))
          );
          teamsWithPicks.forEach((t, i) => {
            const res = results[i];
            const picks = res.status === 'fulfilled' ? res.value : [];
            const m = {};
            picks.forEach(p => {
              const rs = p.round === 1 ? '1st' : '2nd';
              m[`${p.year}|${rs}|${p.orig}`] = p.notes || '';
            });
            picksApiMap[t] = m;
          });
        }

        // Detect salary year columns from old-format rosters and biosData
        const salaryYearSet = new Set();
        Object.values(rosterData).forEach(rows => {
          if (rows.length > 0 && 'PLAYER' in rows[0]) {
            Object.keys(rows[0])
              .filter(k => /^\d{2}-\d{2}$/.test(k) && k >= CUR_YR)
              .forEach(k => salaryYearSet.add(k));
          }
        });
        // Also collect from biosData salaries for players on the block
        Object.values(tb).forEach(block => {
          (block.players || []).forEach(({ player }) => {
            const slug = rosterNameToSlug(player);
            const bio = slug ? biosData[slug] : null;
            if (bio && bio.salaries) {
              Object.keys(bio.salaries).filter(k => k >= CUR_YR).forEach(k => salaryYearSet.add(k));
            }
          });
        });
        salaryYears = [...salaryYearSet].sort();

        // Build flat table rows
        tableRows = [];
        Object.entries(tb).forEach(([team, block]) => {
          const rosterRows = rosterData[team] || [];
          const isNewFormat = rosterRows.length > 0 && 'SLUG' in rosterRows[0] && !('PLAYER' in rosterRows[0]);

          // Player rows
          (block.players || []).forEach(({ player, notes }) => {
            let row;
            if (isNewFormat) {
              const slug = rosterNameToSlug(player);
              const bio = slug ? biosData[slug] : null;
              row = {
                team, player, isPick: false,
                pos: bio ? ((bio.pos || []).join('/') || '—') : '—',
                ovr: slug ? (ovrCurrent[slug] || '') : '',
                age: bio ? calcAgeFromDob(bio.dob) : '',
                notes: notes || '',
                cap_holds: bio ? (bio.cap_holds || {}) : {},
              };
              salaryYears.forEach(yr => { row[yr] = (bio && bio.salaries && bio.salaries[yr]) || '—'; });
            } else {
              const pr = rosterRows.find(r => r.PLAYER === player) || {};
              const legacyHolds = {};
              (pr.CAP_HOLDS || '').split(',').forEach(p => { const [y, t] = p.split(':'); if (y && t) legacyHolds[y.trim()] = t.trim(); });
              row = { team, player, isPick: false, pos: pr.POS || '—', ovr: pr.OVR || '', age: pr.AGE || '', notes: notes || '', cap_holds: legacyHolds };
              salaryYears.forEach(yr => { row[yr] = pr[yr] || '—'; });
            }
            tableRows.push(row);
          });

          // Pick rows
          (block.picks || []).forEach(({ year, round, team: origin = 'Own', notes }) => {
            const isOwnPick = !origin || origin === 'Own' || origin.toUpperCase() === team.toUpperCase();
            const pickLabel = isOwnPick ? `${year} ${round}` : `${year} ${round} (${origin})`;
            const originKey = isOwnPick ? team : (origin || team);
            const pickApiNotes = (picksApiMap[team] || {})[`${year}|${round}|${originKey}`] || '';
            const row = {
              team, isPick: true,
              player: pickLabel,
              pos: 'Pick', ovr: '', age: '',
              notes: notes || '', pickApiNotes,
              cap_holds: {},
            };
            salaryYears.forEach(yr => { row[yr] = '—'; });
            tableRows.push(row);
          });
        });

        buildCols();
        buildFilterChips();

        // Set up edit panel or sign-in prompt
        if (myTeam) {
          myRoster = rosterData[myTeam] || [];
          await activateEditPanel(rosterData);
        } else if (!userInfo) {
          signinPrompt.style.display = '';
          document.getElementById('signin-btn').addEventListener('click', () => {
            promptToken(async () => {
              const info = await checkAuth();
              const role = info && info.roles.find(r => VALID_TEAMS_LC.has(r));
              if (role) {
                signinPrompt.style.display = 'none';
                myTeam = role.toUpperCase();
                myRoster = rosterData[myTeam] || [];
                await activateEditPanel(rosterData);
              } else {
                signinPrompt.innerHTML = 'No team role found for this token.';
              }
            });
          });
        }

        statusEl.remove();
        wrap.appendChild(buildTable());

        // Cap hold legend
        const allCapTypes = new Set();
        tableRows.forEach(r => Object.values(r.cap_holds || {}).forEach(t => allCapTypes.add(t)));
        if (allCapTypes.size > 0) {
          const legend = document.createElement('div');
          legend.className = 'cap-legend';
          ['PLAYER_OPT', 'TEAM_OPT', 'UFA', 'RFA', 'NON_GTD'].forEach(type => {
            if (!allCapTypes.has(type)) return;
            const item = document.createElement('span');
            item.className = 'cap-legend-item';
            const swatch = document.createElement('span');
            swatch.className = 'cap-swatch';
            swatch.style.background = CAP_SWATCH_COLORS[type];
            item.appendChild(swatch);
            item.appendChild(document.createTextNode(CAP_HOLD_LABELS[type]));
            legend.appendChild(item);
          });
          wrap.appendChild(legend);
        }
      } catch {
        statusEl.textContent = 'Failed to load tradeblock.';
      }
    })();
  </script>
  <script src="/nav.js"></script>
  <script src="/token-badge.js"></script>
</body>
</html>
