<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Awards — NBN</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111827; color: #f3f4f6;
      min-height: 100vh; padding: 2rem 1rem 4rem;
    }
    a { color: #60a5fa; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .page { max-width: 640px; margin: 0 auto; }
    .nav { margin-bottom: 1.75rem; font-size: 0.875rem; color: #9ca3af; }
    header { margin-bottom: 2rem; }
    header h1 { font-size: 1.875rem; font-weight: 700; letter-spacing: -0.02em; }
    header p { color: #9ca3af; margin-top: 0.4rem; font-size: 0.9rem; }
    .season-list { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 1.5rem; }
    .season-card {
      display: flex; align-items: center; justify-content: space-between;
      background: #1f2937; border: 1px solid #374151; border-radius: 10px;
      padding: 1rem 1.25rem; text-decoration: none; color: inherit;
      transition: border-color 0.15s;
    }
    .season-card:hover { border-color: #6b7280; text-decoration: none; }
    .season-label { font-size: 1.05rem; font-weight: 600; }
    .season-sub { font-size: 0.78rem; color: #6b7280; margin-top: 0.2rem; }
    .season-arrow { color: #4b5563; font-size: 1.1rem; }
    .pending-card {
      background: #111827; border: 1px dashed #374151; border-radius: 10px;
      padding: 1rem 1.25rem; color: #4b5563;
    }
    .pending-label { font-size: 1.05rem; font-weight: 600; }
    .pending-sub { font-size: 0.78rem; margin-top: 0.2rem; }
  </style>
</head>
<body>
  <div class="page">
    <nav class="nav"><a href="/">← Home</a></nav>
    <header>
      <h1>Season Awards</h1>
      <p>End-of-season awards voted on by NBN members.</p>
    </header>
    <div class="season-list" id="season-list">
      <div style="color:#6b7280;font-size:0.9rem">Loading…</div>
    </div>
  </div>

  <script>
    const SEASONS = ['25-26', '24-25'];
    const SEASON_LABELS = {
      '25-26': '2025–26 Season',
      '24-25': '2024–25 Season',
    };

    const TEAM_ROLES = new Set([
      'atl','bkn','bos','cha','chi','cle','dal','den','det','gsw',
      'hou','ind','lac','lal','mem','mia','mil','min','nop','nyk',
      'okc','orl','phi','phx','por','sac','sas','tor','uta','was',
    ]);

    async function getMe() {
      const token = localStorage.getItem('nbn_token');
      if (!token) return { roles: [] };
      try {
        const r = await fetch('/api/me', { headers: { 'Authorization': `Bearer ${token}` } });
        return r.ok ? r.json() : { roles: [] };
      } catch { return { roles: [] }; }
    }

    Promise.all([
      fetch('/api/awards-config').then(r => r.ok ? r.json() : {}).catch(() => ({})),
      getMe(),
    ]).then(([config, me]) => {
      const roles = me.roles || [];
      const isBod = roles.some(r => r === 'bod' || r === 'admin');
      const hasTeam = roles.some(r => TEAM_ROLES.has(r));
      const list = document.getElementById('season-list');
      list.innerHTML = '';

      SEASONS.forEach(s => {
        const cfg = config[s] || {};
        const canSeeResults = cfg.revealed || isBod;

        if (canSeeResults) {
          const a = document.createElement('a');
          a.className = 'season-card';
          a.href = `/awards/${s}/results/`;
          const ballotLink = hasTeam ? ` · <a href="/awards/${s}/vote/" style="color:#60a5fa">My Ballot →</a>` : '';
          const sub = cfg.revealed
            ? `View results →${ballotLink}`
            : `Preview (BOD only)${ballotLink}`;
          a.innerHTML = `
            <div>
              <div class="season-label">${SEASON_LABELS[s] || s}</div>
              <div class="season-sub">${sub}</div>
            </div>
            <span class="season-arrow">›</span>
          `;
          list.appendChild(a);
        } else if (hasTeam) {
          const a = document.createElement('a');
          a.className = 'season-card';
          a.href = `/awards/${s}/vote/`;
          a.innerHTML = `
            <div>
              <div class="season-label">${SEASON_LABELS[s] || s}</div>
              <div class="season-sub">Submit your ballot →</div>
            </div>
            <span class="season-arrow">›</span>
          `;
          list.appendChild(a);
        } else {
          const div = document.createElement('div');
          div.className = 'pending-card';
          div.innerHTML = `
            <div class="pending-label">${SEASON_LABELS[s] || s}</div>
            <div class="pending-sub">Ballots pending — results will be revealed when all votes are in.</div>
          `;
          list.appendChild(div);
        }
      });
    });
  </script>
  <script src="/nav.js"></script>
</body>
</html>
