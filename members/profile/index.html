<script>
const TOKEN_KEY = 'nbn_token';

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function relTime(iso) {
  const s = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (s < 60)  return 'just now';
  const m = Math.floor(s / 60);
  if (m < 60)  return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24)  return `${h}h ago`;
  const d = Math.floor(h / 24);
  if (d < 30)  return `${d}d ago`;
  const mo = Math.floor(d / 30);
  if (mo < 12) return `${mo}mo ago`;
  return `${Math.floor(mo / 12)}y ago`;
}

function fmtDate(s) {
  if (!s) return '';
  const [y, m, d] = s.split('-');
  return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1] + ` ${+d}, ${y}`;
}

function activeTenure(tenures) {
  const active = (tenures || []).filter(t => !t.end);
  return active.length ? active.sort((a,b) => b.start.localeCompare(a.start))[0] : null;
}

function displayPos(p) {
  return p === 'owner' ? 'Owner' : p === 'gm' ? 'GM' : p === 'coach' ? 'Coach' : p || '—';
}

function seasonDateRange(season) {
  // "25-26" → {start: 2025-10-01, end: 2026-09-30}
  const [yy1, yy2] = season.split('-').map(y => 2000 + parseInt(y, 10));
  return { start: new Date(`${yy1}-10-01`), end: new Date(`${yy2}-09-30`) };
}

function memberWasAtTeamInSeason(tenures, team, season) {
  const { start: sStart, end: sEnd } = seasonDateRange(season);
  return (tenures || []).some(t => {
    if (t.team !== team) return false;
    const tStart = new Date(t.start);
    const tEnd   = t.end ? new Date(t.end) : new Date('9999-12-31');
    return tStart <= sEnd && tEnd >= sStart;
  });
}

function parseCSV(text) {
  const lines = (text || '').trim().split('\n').filter(Boolean);
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim());
  return lines.slice(1).map(line => {
    const vals = line.split(',');
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (vals[i] || '').trim(); });
    return obj;
  });
}

// Quote-aware CSV parser — needed for files with commas inside quoted fields
// (e.g. PLAYER = "Last, First" in player_seasons.csv / player_awards.csv).
function splitCSVLine(line) {
  const out = []; let cur = ''; let q = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (q) {
      if (c === '"') { if (line[i+1] === '"') { cur += '"'; i++; } else q = false; }
      else cur += c;
    } else {
      if (c === '"') q = true;
      else if (c === ',') { out.push(cur); cur = ''; }
      else cur += c;
    }
  }
  out.push(cur);
  return out;
}
function parseCSVQuoted(text) {
  const lines = (text || '').replace(/\r/g, '').trim().split('\n').filter(Boolean);
  if (lines.length < 2) return [];
  const headers = splitCSVLine(lines[0]).map(h => h.trim());
  return lines.slice(1).map(line => {
    const vals = splitCSVLine(line);
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (vals[i] || '').trim(); });
    return obj;
  });
}

function memberAtTeamOnDate(tenures, team, iso) {
  const d = new Date(iso);
  return (tenures || []).some(t => {
    if (t.team !== team) return false;
    const ts = new Date(t.start);
    const te = t.end ? new Date(t.end) : new Date('9999-12-31');
    return ts <= d && te >= d;
  });
}

function seasonStartYear(season) { return 2000 + parseInt(season.split('-')[0], 10); }

// A draft in calendar year Y feeds the season that starts that same year ("Y-(Y+1)").
function draftSeasonStr(year) {
  const a = year - 2000;
  return `${String(a).padStart(2, '0')}-${String(a + 1).padStart(2, '0')}`;
}

// Longest run of consecutive integers present in a Set<number>.
function longestConsecutiveRun(yearSet) {
  let best = 0;
  for (const y of yearSet) {
    if (yearSet.has(y - 1)) continue;       // only count from the start of a run
    let len = 1;
    while (yearSet.has(y + len)) len++;
    best = Math.max(best, len);
  }
  return best;
}

const CAT_LABELS = {
  gm:          'GM Performance',
  longevity:   'Longevity',
  draft:       'Draft',
  development: 'Player Development',
  trades:      'Front Office',
  rivalries:   'Rivalries',
  betting:     'Betting',
  investing:   'Investing',
};

function renderAchievements(achData) {
  const cats = ['gm', 'longevity', 'draft', 'development', 'trades', 'rivalries', 'betting', 'investing'];
  let html = '';

  for (const cat of cats) {
    const group = ACHIEVEMENTS.filter(a => a.cat === cat);
    html += `<div class="ach-cat"><div class="ach-cat-label">${CAT_LABELS[cat]}</div><div class="ach-grid">`;
    for (const ach of group) {
      // Find highest unlocked tier
      let unlockedTier = null;
      for (const tier of [...ach.tiers].reverse()) {
        try {
          if (tier.unlock(achData)) { unlockedTier = tier; break; }
        } catch(e) { /* skip */ }
      }
      const locked = !unlockedTier;
      const displayTier = unlockedTier || ach.tiers[0];
      const tierClass = locked ? 'tier-locked' : displayTier.tierClass;
      const tierLabel = locked ? 'Locked' : displayTier.label;
      const tierSub   = locked ? ach.desc : displayTier.sub;
      let valStr = '';
      if (ach.value) { try { valStr = ach.value(achData); } catch(e) { /* skip */ } }
      const titleText = valStr ? (tierSub ? `${tierSub} — ${valStr}` : valStr) : tierSub;

      html += `<div class="ach-card${locked ? ' locked' : ''}" title="${esc(titleText)}" tabindex="0">
        <span class="ach-icon">${ach.icon}</span>
        <div class="ach-name">${esc(ach.name)}</div>
        <span class="ach-tier ${tierClass}">${esc(tierLabel)}</span>
        <div class="ach-info">${esc(titleText)}</div>
      </div>`;
    }
    html += `</div></div>`;
  }
  return html;
}

const parts = location.pathname.replace(/\/$/, '').split('/').filter(Boolean);
const memberName = decodeURIComponent(parts[1] || '');
const token = localStorage.getItem(TOKEN_KEY) || '';

async function init() {
  if (!memberName) {
    document.getElementById('root').innerHTML = '<p class="error-state">Invalid URL.</p>';
    return;
  }
  document.title = `${memberName} — NBN`;

  const req1 = [
    fetch('/api/members/public').then(r => r.json()).catch(() => []),
    fetch(`/api/tips/${encodeURIComponent(memberName)}`).then(r => r.ok ? r.json() : []).catch(() => []),
    fetch(`/api/bets/balance/${encodeURIComponent(memberName)}`).then(r => r.ok ? r.json() : null).catch(() => null),
  ];
  if (token) req1.push(fetch('/api/me', { headers: { Authorization: `Bearer ${token}` } }).then(r => r.ok ? r.json() : null).catch(() => null));

  const req2 = [
    fetch('/data/owner_stats.csv').then(r => r.ok ? r.text() : '').catch(() => ''),
    fetch('/standings/standings-history.csv').then(r => r.ok ? r.text() : '').catch(() => ''),
    fetch(`/api/bets/stats/${encodeURIComponent(memberName)}`).then(r => r.ok ? r.json() : null).catch(() => null),
    fetch(`/api/invest/stats/${encodeURIComponent(memberName)}`).then(r => r.ok ? r.json() : null).catch(() => null),
    fetch('/api/players').then(r => r.ok ? r.json() : {}).catch(() => ({})),
    fetch('/players/player_awards.csv').then(r => r.ok ? r.text() : '').catch(() => ''),
    fetch('/api/transactions?limit=2000').then(r => r.ok ? r.json() : { transactions: [] }).catch(() => ({ transactions: [] })),
    fetch('/players/player_seasons.csv').then(r => r.ok ? r.text() : '').catch(() => ''),
    fetch('/data/h2h-owners.csv').then(r => r.ok ? r.text() : '').catch(() => ''),
  ];

  const [results1, results2] = await Promise.all([Promise.all(req1), Promise.all(req2)]);
  const [allMembers, tips, balData, me] = results1;
  const [ownerStatsCsv, standingsCsv, betsStats, investStats, bios, awardsCsv, txnResp, playerSeasonsCsv, h2hOwnersCsv] = results2;

  const member = allMembers.find(m => m.name === memberName);
  if (!member) {
    document.getElementById('root').innerHTML = `<p class="error-state">Member "${esc(memberName)}" not found.</p>`;
    return;
  }

  const cur = activeTenure(member.tenures);
  const sortedTenures = [...(member.tenures || [])].sort((a,b) => b.start.localeCompare(a.start));
  const balance = balData?.balance ?? null;
  const isOwn = me && me.name === memberName;
  const canTip = me && !isOwn;

  // Build achievement data
  const ownerRows   = parseCSV(ownerStatsCsv);
  const ownerRow    = ownerRows.find(r => r.owner === memberName) || null;
  const allSeasons  = parseCSV(standingsCsv);
  const memberSeasons = allSeasons.filter(r =>
    memberWasAtTeamInSeason(member.tenures, r.TEAM, r.SEASON)
  );

  const seasonBests = {};
  for (const row of allSeasons) {
    if (!seasonBests[row.SEASON]) seasonBests[row.SEASON] = { maxOff: -Infinity, maxDef: -Infinity };
    seasonBests[row.SEASON].maxOff = Math.max(seasonBests[row.SEASON].maxOff, +row.OFF_RTG);
    seasonBests[row.SEASON].maxDef = Math.max(seasonBests[row.SEASON].maxDef, +row.DEF_RTG);
  }

  const hadBestOffRtg = memberSeasons.some(ms => {
    const b = seasonBests[ms.SEASON];
    return b && +ms.OFF_RTG >= b.maxOff - 0.001;
  });
  const hadBestDefRtg = memberSeasons.some(ms => {
    const b = seasonBests[ms.SEASON];
    return b && +ms.DEF_RTG >= b.maxDef - 0.001;
  });

  const tipsReceived = tips.reduce((sum, t) => sum + (+t.amount || 0), 0);

  const regWins = memberSeasons.reduce((sum, s) => sum + (+s.W || 0), 0);

  const champSeasons   = memberSeasons.filter(s => s.PLAYOFF_RESULT === 'Champion').length;
  const finalsSeasons  = memberSeasons.filter(s => ['Champion','Runner-Up'].includes(s.PLAYOFF_RESULT)).length;
  const confSeasons    = memberSeasons.filter(s => ['Champion','Runner-Up','Conf Finals'].includes(s.PLAYOFF_RESULT)).length;
  const playoffSeasons = memberSeasons.filter(s => s.PLAYOFF_RESULT !== 'Missed').length;

  // Best single regular season (raw wins)
  const maxSeasonWins = memberSeasons.reduce((m, s) => Math.max(m, +s.W || 0), 0);

  // Longest streak of consecutive playoff appearances
  const playoffYears = new Set(
    memberSeasons.filter(s => s.PLAYOFF_RESULT !== 'Missed').map(s => seasonStartYear(s.SEASON))
  );
  const maxPlayoffStreak = longestConsecutiveRun(playoffYears);

  // Shared inputs for award / draft / trade attribution
  const allTxns    = (txnResp && txnResp.transactions) || [];
  const trades     = allTxns.filter(t => t.type === 'trade');
  const signs      = allTxns.filter(t => t.type === 'sign');
  const seasonRows = parseCSVQuoted(playerSeasonsCsv);
  const awardRows  = parseCSVQuoted(awardsCsv);

  // slug|season -> team (a player's roster home that regular season, for award attribution)
  const teamBySlugSeason = {};
  for (const r of seasonRows) teamBySlugSeason[`${r.SLUG}|${r.SEASON}`] = r.TEAM;

  // --- Draft-based achievements ---
  // Attribute a draftee to this member if they managed the drafting team in the
  // season that draft feeds (draft year Y → season "Y-(Y+1)").
  const myDraftees = [];
  for (const slug in bios) {
    const p = bios[slug];
    if (!p || !p.draft_team || !p.draft_year) continue;
    if (!memberWasAtTeamInSeason(member.tenures, p.draft_team, draftSeasonStr(+p.draft_year))) continue;
    myDraftees.push({ slug, year: +p.draft_year, round: +p.draft_round || null, pick: +p.draft_pick || null, team: p.draft_team });
  }

  // Award lookups (one pass over the awards table)
  const allNbnLevel = {};            // slug -> best All-NBN team level (1/2/3)
  const allStarSlugs = new Set();    // every player who ever made an All-Star team
  for (const a of awardRows) {
    if (a.AWARD === 'All-Star') allStarSlugs.add(a.SLUG);
    const m = /All-NBN (First|Second|Third) Team/.exec(a.AWARD || '');
    if (m) {
      const lvl = m[1] === 'First' ? 1 : m[1] === 'Second' ? 2 : 3;
      if (!(a.SLUG in allNbnLevel) || lvl < allNbnLevel[a.SLUG]) allNbnLevel[a.SLUG] = lvl;
    }
  }

  // Draft Whisperer: best All-NBN team level reached by any of my draftees
  let bestDrafteeAllNbn = 99;
  for (const d of myDraftees) {
    if (d.slug in allNbnLevel) bestDrafteeAllNbn = Math.min(bestDrafteeAllNbn, allNbnLevel[d.slug]);
  }

  // Steal of the Draft: latest draft slot (#) among my draftees who became All-Stars
  let stealPick = 0;
  for (const d of myDraftees) {
    if (d.pick && allStarSlugs.has(d.slug)) stealPick = Math.max(stealPick, d.pick);
  }

  // Lottery Darling: consecutive years with a top-4 (1st round, pick ≤ 4) selection
  const top4Years = new Set(myDraftees.filter(d => d.round === 1 && d.pick && d.pick <= 4).map(d => d.year));
  const lotteryStreak = longestConsecutiveRun(top4Years);

  // --- Player development: awards earned by players while on this member's team ---
  let mvpMaker = false, allStarCount = 0;
  for (const a of awardRows) {
    const baseSeason = (a.SEASON || '').split(' ')[0];   // "20-21 Playoffs" -> "20-21"
    const team = teamBySlugSeason[`${a.SLUG}|${baseSeason}`];
    if (!team || !memberWasAtTeamInSeason(member.tenures, team, baseSeason)) continue;
    if (a.AWARD === 'Most Valuable Player') mvpMaker = true;
    if (a.AWARD === 'All-Star') allStarCount++;
  }

  // Draft Architect: most homegrown (self-drafted) players on a championship roster
  let maxHomegrown = 0;
  for (const c of memberSeasons.filter(s => s.PLAYOFF_RESULT === 'Champion')) {
    let n = 0;
    for (const r of seasonRows) {
      if (r.SEASON !== c.SEASON || r.TEAM !== c.TEAM) continue;
      const bio = bios[r.SLUG];
      if (bio && bio.draft_team === c.TEAM) n++;
    }
    maxHomegrown = Math.max(maxHomegrown, n);
  }

  // Cinderella: deep playoff run as a #6 seed or lower
  const lowSeed = memberSeasons.filter(s => +s.SEED_NUM >= 6);
  const cinderellaConf   = lowSeed.some(s => ['Conf Finals', 'Runner-Up', 'Champion'].includes(s.PLAYOFF_RESULT));
  const cinderellaFinals = lowSeed.some(s => ['Runner-Up', 'Champion'].includes(s.PLAYOFF_RESULT));
  const cinderellaTitle  = lowSeed.some(s => s.PLAYOFF_RESULT === 'Champion');

  // Dynasty: consecutive championship seasons
  const champYears = new Set(memberSeasons.filter(s => s.PLAYOFF_RESULT === 'Champion').map(s => seasonStartYear(s.SEASON)));
  const dynastyStreak = longestConsecutiveRun(champYears);

  // Tankathon: finished with the league's worst record in a season
  const seasonWorstPct = {};
  for (const r of allSeasons) {
    const p = +r.PCT;
    if (!(r.SEASON in seasonWorstPct) || p < seasonWorstPct[r.SEASON]) seasonWorstPct[r.SEASON] = p;
  }
  const tankathon = memberSeasons.some(s => +s.PCT <= seasonWorstPct[s.SEASON] + 1e-9);

  // --- Trade / front-office achievements ---
  const parseMoney = v => Number(String(v).replace(/[^0-9.]/g, '')) || 0;
  let maxFirstsSent = 0, maxFirstsRecv = 0, tradeCount = 0, maxTradeTeams = 0;
  for (const txn of trades) {
    const teamsInvolved = (txn.details && txn.details.teams) || [];
    if (teamsInvolved.some(t => memberAtTeamOnDate(member.tenures, t, txn.date))) {
      tradeCount++;
      maxTradeTeams = Math.max(maxTradeTeams, teamsInvolved.length);
    }
    let sent = 0, recv = 0;
    for (const tr of (txn.details && txn.details.transfers) || []) {
      const firsts = (tr.assets || []).filter(a => a.type === 'pick' && a.round === 1).length;
      if (!firsts) continue;
      if (memberAtTeamOnDate(member.tenures, tr.from_team, txn.date)) sent += firsts;
      if (memberAtTeamOnDate(member.tenures, tr.to_team, txn.date)) recv += firsts;
    }
    maxFirstsSent = Math.max(maxFirstsSent, sent);
    maxFirstsRecv = Math.max(maxFirstsRecv, recv);
  }

  // Blank Check: largest total-value free-agent signing
  let maxSignValue = 0;
  for (const txn of signs) {
    const d = txn.details || {};
    if (!memberAtTeamOnDate(member.tenures, d.team, txn.date)) continue;
    const sals = (d.contract && d.contract.salaries) || {};
    let total = 0;
    for (const k in sals) total += parseMoney(sals[k]);
    maxSignValue = Math.max(maxSignValue, total);
  }

  // --- Rivalries: best / worst all-time head-to-head (min 10 games) ---
  const myH2H = parseCSV(h2hOwnersCsv).find(r => r.OWNER === memberName);
  let nemesis = null, punchingBag = null;
  if (myH2H) {
    for (const k in myH2H) {
      if (k === 'OWNER') continue;
      const m = /^(\d+)-(\d+)$/.exec(myH2H[k] || '');
      if (!m) continue;
      const w = +m[1], l = +m[2], g = w + l;
      if (g < 10) continue;
      const pct = w / g;
      if (!nemesis || pct > nemesis.pct) nemesis = { team: k, w, l, pct };
      if (!punchingBag || pct < punchingBag.pct) punchingBag = { team: k, w, l, pct };
    }
  }

  const achData = {
    owner: ownerRow,
    seasons: memberSeasons,
    regWins,
    champSeasons,
    finalsSeasons,
    confSeasons,
    playoffSeasons,
    hadBestOffRtg,
    hadBestDefRtg,
    maxSeasonWins,
    maxPlayoffStreak,
    bestDrafteeAllNbn,
    stealPick,
    lotteryStreak,
    maxHomegrown,
    mvpMaker,
    allStarCount,
    cinderellaConf,
    cinderellaFinals,
    cinderellaTitle,
    dynastyStreak,
    tankathon,
    maxFirstsSent,
    maxFirstsRecv,
    tradeCount,
    maxTradeTeams,
    maxSignValue,
    nemesis,
    punchingBag,
    bets: betsStats || {},
    invest: investStats || {},
    tipsReceived,
  };

  let html = '';

  // Header
  html += `<h1 class="profile-name">${esc(member.name)}</h1>`;
  html += `<div class="profile-meta">`;
  if (cur) {
    html += `${displayPos(cur.position)} · <span class="team-badge"><a href="/teams/${cur.team.toLowerCase()}/">${cur.team}</a></span>`;
  } else {
    html += `<span style="color:#6b7280">No active tenure</span>`;
  }
  html += `</div>`;

  // Balance
  if (balance !== null) {
    html += `<div class="balance-pill">
      <span class="balance-label">NB¥ balance</span>
      <span class="balance-amount">NB¥${balance.toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:2})}</span>
    </div>`;
  }

  // Tenure history
  if (sortedTenures.length) {
    html += `<div class="section"><div class="section-title">Tenure History</div><table class="tenure-table">`;
    for (const t of sortedTenures) {
      const end = t.end ? fmtDate(t.end) : '<span class="ongoing">present</span>';
      html += `<tr>
        <td><span class="team-badge"><a href="/teams/${t.team.toLowerCase()}/">${t.team}</a></span></td>
        <td>${displayPos(t.position)}</td>
        <td>${fmtDate(t.start)} – ${end}</td>
      </tr>`;
    }
    html += `</table></div>`;
  }

  // Achievements
  const unlockedCount = ACHIEVEMENTS.reduce((n, ach) => {
    return n + (ach.tiers.some(tier => { try { return tier.unlock(achData); } catch(e) { return false; } }) ? 1 : 0);
  }, 0);
  html += `<div class="section">
    <div class="section-title">Achievements (${unlockedCount}/${ACHIEVEMENTS.length})</div>
    ${renderAchievements(achData)}
  </div>`;

  // Tips section
  const tipCount = tips.length;
  html += `<div class="section"><div class="section-title">Tips${tipCount ? ` (${tipCount})` : ''}</div>`;

  if (!token) {
    html += `<div class="signin-prompt">Sign in at <a href="/members/">Members</a> to tip this member.</div>`;
  } else if (isOwn) {
    // no tip form on own page
  } else if (canTip) {
    html += `<div class="tip-form" id="tip-form">
      <div class="tip-form-title">Send NB¥ to ${esc(member.name)}</div>
      <div class="tip-row">
        <div class="tip-input-wrap">
          <span class="tip-prefix">NB¥</span>
          <input type="number" class="tip-amount" id="tip-amount" min="1" step="1" placeholder="10">
        </div>
        <button class="btn-tip" id="tip-btn">Send Tip</button>
      </div>
      <div id="tip-msg-wrap" style="display:none" class="tip-msg-wrap">
        <textarea class="tip-msg" id="tip-msg" placeholder="Add a message…" maxlength="280"></textarea>
        <p class="tip-msg-hint">Publicly visible on ${esc(member.name)}'s page.</p>
      </div>
      <div id="tip-feedback"></div>
    </div>`;
  }

  if (!tipCount) {
    html += `<p class="empty-state">No tips received yet.</p>`;
  } else {
    html += `<div class="tips-list">`;
    for (const t of tips) {
      html += `<div class="tip-item">
        <div class="tip-item-header">
          <span class="tip-from">${esc(t.from)}</span>
          <span class="tip-amt">NB¥${(+t.amount).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</span>
          <span class="tip-time">${relTime(t.ts)}</span>
        </div>
        ${t.message ? `<div class="tip-message">${esc(t.message)}</div>` : ''}
      </div>`;
    }
    html += `</div>`;
  }

  html += `</div>`; // end tips section
  document.getElementById('root').innerHTML = html;

  // Tap/click (or Enter/Space) an achievement card to reveal its detail line.
  document.querySelectorAll('.ach-card').forEach(card => {
    const toggle = () => {
      const wasOpen = card.classList.contains('open');
      document.querySelectorAll('.ach-card.open').forEach(c => c.classList.remove('open'));
      if (!wasOpen) card.classList.add('open');
    };
    card.addEventListener('click', toggle);
    card.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); }
    });
  });

  if (canTip) {
    const amtEl  = document.getElementById('tip-amount');
    const msgWrap = document.getElementById('tip-msg-wrap');
    const btn    = document.getElementById('tip-btn');
    const fb     = document.getElementById('tip-feedback');

    amtEl.addEventListener('input', () => {
      msgWrap.style.display = parseFloat(amtEl.value) >= 25 ? '' : 'none';
    });

    btn.addEventListener('click', async () => {
      const amount = parseFloat(amtEl.value);
      if (!amount || amount <= 0) { fb.innerHTML = '<div class="tip-error">Enter a valid amount.</div>'; return; }
      const message = document.getElementById('tip-msg')?.value?.trim() || '';
      btn.disabled = true; btn.textContent = 'Sending…'; fb.innerHTML = '';
      try {
        const res = await fetch('/api/tips', {
          method: 'POST',
          headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ to: memberName, amount, message }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || res.statusText);
        fb.innerHTML = `<div class="tip-success">Sent NB¥${amount} to ${esc(memberName)}. Your new balance: NB¥${(+data.new_balance).toLocaleString('en-US',{minimumFractionDigits:2})}</div>`;
        amtEl.value = ''; msgWrap.style.display = 'none';
        if (document.getElementById('tip-msg')) document.getElementById('tip-msg').value = '';
        setTimeout(() => location.reload(), 1800);
      } catch(err) {
        fb.innerHTML = `<div class="tip-error">${esc(err.message)}</div>`;
      } finally {
        btn.disabled = false; btn.textContent = 'Send Tip';
      }
    });
  }
}

init();
</script>
<script src="/token-badge.js"></script>
</body>
</html>
