<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Agency — NBN</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111827;
      color: #f3f4f6;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    a { color: #60a5fa; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .page { max-width: 1100px; margin: 0 auto; }

    .nav { margin-bottom: 1.75rem; font-size: 0.875rem; color: #9ca3af; }
    .nav a { color: #9ca3af; }
    .nav a:hover { color: #f3f4f6; }

    header { margin-bottom: 1.5rem; }
    header h1 { font-size: 1.875rem; font-weight: 700; letter-spacing: -0.02em; }
    header p { color: #9ca3af; margin-top: 0.4rem; font-size: 0.9rem; }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 0.75rem;
    }

    .chip {
      background: transparent;
      border: 1px solid #374151;
      border-radius: 20px;
      color: #9ca3af;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.2rem 0.7rem;
      letter-spacing: 0.04em;
    }
    .chip:hover { border-color: #6b7280; color: #d1d5db; }
    .chip.active { background: #1d4ed8; border-color: #3b82f6; color: #fff; }
    .chip.year-chip.active { background: #065f46; border-color: #10b981; color: #d1fae5; }

    .table-wrap {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 12px;
      overflow-x: auto;
    }

    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; white-space: nowrap; }

    thead th {
      padding: 0.7rem 1rem;
      text-align: left;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #6b7280;
      border-bottom: 1px solid #374151;
      cursor: pointer;
      user-select: none;
    }
    thead th:hover { color: #d1d5db; }
    thead th[data-active="true"] { color: #f3f4f6; }

    .sort-arrow { margin-left: 4px; opacity: 0.4; font-size: 0.65rem; }
    th[data-active="true"] .sort-arrow { opacity: 1; }

    tbody tr:nth-child(odd)  { background: #111827; }
    tbody tr:nth-child(even) { background: #1a2234; }
    tbody tr:hover { background: #263044; }

    td { padding: 0.55rem 1rem; color: #d1d5db; border-top: 1px solid #1f2937; }
    td.right  { text-align: right; }
    td.center { text-align: center; }
    td.muted  { color: #6b7280; }
    td.bold   { font-weight: 600; color: #f3f4f6; }
    td.ovr-cell { font-weight: 700; text-align: right; }
    td.salary-cell { text-align: right; }

    td.cap-ufa        { background: hsl(45,  60%, 20%); color: hsl(45,  90%, 72%); }
    td.cap-rfa        { background: hsl(25,  60%, 20%); color: hsl(25,  90%, 72%); }
    td.cap-player-opt { background: hsl(120, 50%, 17%); color: hsl(120, 75%, 68%); }
    td.cap-team-opt   { background: hsl(210, 55%, 20%); color: hsl(210, 75%, 70%); }
    td.cap-non-gtd    { color: #4b5563; text-decoration: line-through; }

    .cap-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem 1.25rem;
      padding: 0.6rem 1rem 0.75rem;
      font-size: 0.75rem;
      color: #9ca3af;
      border-top: 1px solid #283141;
    }
    .cap-legend-item { display: flex; align-items: center; gap: 0.35rem; }
    .cap-swatch { display: inline-block; width: 10px; height: 10px; border-radius: 2px; }

    #status { text-align: center; padding: 3rem; color: #6b7280; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="page">
    <nav class="nav"><a href="/">← Home</a></nav>
    <header>
      <h1>Free Agency</h1>
      <p>Players with non-guaranteed salary. Click any column to sort.</p>
    </header>

    <div class="filter-row" id="year-filter"></div>
    <div class="filter-row" id="pos-filter"></div>

    <div class="table-wrap" id="table-wrap">
      <div id="status">Loading…</div>
    </div>
  </div>

  <script>
    const FILTER_DEFS = [
      { id: 'PG', pos: ['PG'] },
      { id: 'SG', pos: ['SG'] },
      { id: 'SF', pos: ['SF'] },
      { id: 'PF', pos: ['PF'] },
      { id: 'C',  pos: ['C']  },
      { id: 'G',  pos: ['PG', 'SG'] },
      { id: 'W',  pos: ['SG', 'SF'] },
      { id: 'F',  pos: ['SF', 'PF'] },
    ];

    const TEAM_NAMES = {
      ATL:'Atlanta', BKN:'Brooklyn', BOS:'Boston', CHA:'Charlotte', CHI:'Chicago',
      CLE:'Cleveland', DAL:'Dallas', DEN:'Denver', DET:'Detroit', GSW:'Golden State',
      HOU:'Houston', IND:'Indiana', LAC:'LA Clippers', LAL:'LA Lakers', MEM:'Memphis',
      MIA:'Miami', MIL:'Milwaukee', MIN:'Minnesota', NOP:'New Orleans', NYK:'New York',
      OKC:'Oklahoma City', ORL:'Orlando', PHI:'Philadelphia', PHX:'Phoenix', POR:'Portland',
      SAC:'Sacramento', SAS:'San Antonio', TOR:'Toronto', UTA:'Utah', WAS:'Washington',
    };

    function displayName(canonical) {
      if (!canonical) return '';
      const toTitle = s => s.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
      if (canonical.includes(',')) {
        const [last, first] = canonical.split(',', 2);
        return toTitle(`${first.trim()} ${last.trim()}`);
      }
      return toTitle(canonical);
    }

    function calcAge(dob) {
      if (!dob) return '';
      return String(Math.floor((Date.now() - new Date(dob).getTime()) / (365.25 * 24 * 3600 * 1000)));
    }

    function formatSalary(v) {
      if (!v) return '—';
      const n = parseFloat(String(v).replace(/[$,\s]/g, ''));
      return isNaN(n) ? v : '$' + Math.round(n).toLocaleString('en-US');
    }

    function parseCapHolds(str) {
      const map = {};
      if (!str) return map;
      str.split(',').forEach(pair => {
        const [yr, type] = pair.split(':');
        if (yr && type) map[yr.trim()] = type.trim();
      });
      return map;
    }

    // ── State ─────────────────────────────────────────────────────────────────

    let allRows = {};        // year → row[]
    let activeYear = null;
    const activePos = new Set();
    let sortField = 'ovr';
    let sortDir = -1;
    let currentTbody = null;

    const CAP_HOLD_CSS = {
      UFA: 'cap-ufa', RFA: 'cap-rfa',
      PLAYER_OPT: 'cap-player-opt', TEAM_OPT: 'cap-team-opt', NON_GTD: 'cap-non-gtd',
    };
    const CAP_HOLD_LABELS = {
      UFA: 'UFA', RFA: 'RFA',
      PLAYER_OPT: 'Player Opt', TEAM_OPT: 'Team Opt', NON_GTD: 'Non-Gtd',
    };
    const CAP_SWATCH_COLORS = {
      UFA: 'hsl(45,60%,35%)', RFA: 'hsl(25,60%,35%)',
      PLAYER_OPT: 'hsl(120,50%,30%)', TEAM_OPT: 'hsl(210,55%,35%)', NON_GTD: '#374151',
    };

    const COLS = [
      { key: 'team',   label: 'Team',   sortField: 'team',   cls: '',             numeric: false, defaultDir:  1 },
      { key: 'player', label: 'Player', sortField: 'player', cls: 'bold',         numeric: false, defaultDir:  1 },
      { key: 'pos',    label: 'POS',    sortField: 'pos',    cls: 'muted center', numeric: false, defaultDir:  1 },
      { key: 'ovr',    label: 'OVR',    sortField: 'ovr',    cls: 'ovr-cell',     numeric: true,  defaultDir: -1 },
      { key: 'age',    label: 'Age',    sortField: 'age',    cls: 'right',        numeric: true,  defaultDir:  1 },
      { key: 'salary', label: 'Salary', sortField: 'salary', cls: 'salary-cell',  numeric: true,  defaultDir: -1 },
      { key: 'type',   label: 'Status', sortField: 'type',   cls: 'muted',        numeric: false, defaultDir:  1 },
    ];

    function visibleRows() {
      const rows = allRows[activeYear] || [];
      if (activePos.size === 0) return rows;
      return rows.filter(row => {
        const playerPos = new Set(row.pos === '—' ? [] : row.pos.split('/'));
        for (const id of activePos) {
          const def = FILTER_DEFS.find(d => d.id === id);
          if (def && def.pos.some(p => playerPos.has(p))) return true;
        }
        return false;
      });
    }

    function sortRows(rows) {
      return [...rows].sort((a, b) => {
        const col = COLS.find(c => c.sortField === sortField);
        let av = a[sortField], bv = b[sortField];
        if (col && col.numeric) {
          av = parseFloat(av) || 0;
          bv = parseFloat(bv) || 0;
        } else {
          av = (av || '').toLowerCase();
          bv = (bv || '').toLowerCase();
        }
        return av < bv ? -sortDir : av > bv ? sortDir : 0;
      });
    }

    function rebuildBody() {
      if (!currentTbody) return;
      currentTbody.innerHTML = '';
      const rows = sortRows(visibleRows());

      if (!rows.length) {
        const tr = currentTbody.insertRow();
        const td = tr.insertCell();
        td.colSpan = COLS.length;
        td.style.cssText = 'text-align:center;padding:3rem;color:#6b7280;font-size:0.9rem;';
        td.textContent = 'No non-guaranteed contracts for this year.';
        return;
      }

      const ovrVals = rows.map(r => parseFloat(r.ovr)).filter(v => !isNaN(v));
      const ovrMin = ovrVals.length ? Math.min(...ovrVals) : 60;
      const ovrMax = ovrVals.length ? Math.max(...ovrVals) : 99;

      rows.forEach(row => {
        const tr = currentTbody.insertRow();
        COLS.forEach(col => {
          const td = tr.insertCell();
          col.cls.split(' ').forEach(c => c && td.classList.add(c));

          if (col.key === 'team') {
            if (row.team) {
              const a = document.createElement('a');
              a.href = `/teams/${row.team}/`;
              a.textContent = row.team;
              td.appendChild(a);
            } else {
              td.textContent = '—';
              td.classList.add('muted');
            }
          } else if (col.key === 'player') {
            const a = document.createElement('a');
            a.href = `/players/?p=${row.slug}`;
            a.textContent = row.player;
            td.appendChild(a);
          } else if (col.key === 'ovr') {
            td.textContent = row.ovr || '—';
            if (row.ovr && ovrMax > ovrMin) {
              const t = (parseFloat(row.ovr) - ovrMin) / (ovrMax - ovrMin);
              td.style.background = `hsl(${Math.round(t * 120)},55%,18%)`;
              td.style.color      = `hsl(${Math.round(t * 120)},80%,72%)`;
            }
          } else if (col.key === 'salary') {
            td.textContent = row.salaryFmt;
            const cls = CAP_HOLD_CSS[row.capType];
            if (cls) td.classList.add(cls);
          } else if (col.key === 'type') {
            td.textContent = CAP_HOLD_LABELS[row.capType] || row.capType;
          } else {
            td.textContent = row[col.key] || '—';
          }
        });
      });
    }

    function buildTable() {
      const wrap = document.getElementById('table-wrap');
      wrap.innerHTML = '';

      const table = document.createElement('table');
      const thead = table.createTHead();
      const hr = thead.insertRow();

      COLS.forEach(col => {
        const th = document.createElement('th');
        const isActive = col.sortField === sortField;
        th.appendChild(document.createTextNode(col.label));
        const arrow = document.createElement('span');
        arrow.className = 'sort-arrow';
        arrow.textContent = isActive ? (sortDir === -1 ? '↓' : '↑') : '↓';
        th.appendChild(arrow);
        th.dataset.active = isActive;
        if (col.cls.includes('right') || col.cls.includes('ovr-cell') || col.cls.includes('salary-cell')) th.style.textAlign = 'right';
        if (col.cls.includes('center')) th.style.textAlign = 'center';

        th.addEventListener('click', () => {
          if (sortField === col.sortField) { sortDir *= -1; }
          else { sortField = col.sortField; sortDir = col.defaultDir; }
          thead.querySelectorAll('th').forEach(t => {
            t.dataset.active = false;
            t.querySelector('.sort-arrow').textContent = '↓';
          });
          th.dataset.active = true;
          th.querySelector('.sort-arrow').textContent = sortDir === -1 ? '↓' : '↑';
          rebuildBody();
        });

        hr.appendChild(th);
      });

      currentTbody = table.createTBody();
      rebuildBody();
      wrap.appendChild(table);
    }

    function buildYearChips(years) {
      const container = document.getElementById('year-filter');
      container.innerHTML = '';
      years.forEach(yr => {
        const btn = document.createElement('button');
        btn.className = 'chip year-chip' + (yr === activeYear ? ' active' : '');
        btn.textContent = yr;
        btn.addEventListener('click', () => {
          if (yr === activeYear) return;
          activeYear = yr;
          container.querySelectorAll('.year-chip').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          rebuildBody();
        });
        container.appendChild(btn);
      });
    }

    function buildPosChips() {
      const container = document.getElementById('pos-filter');
      container.innerHTML = '';
      FILTER_DEFS.forEach(def => {
        const btn = document.createElement('button');
        btn.className = 'chip';
        btn.textContent = def.id;
        btn.addEventListener('click', () => {
          if (activePos.has(def.id)) activePos.delete(def.id);
          else activePos.add(def.id);
          btn.classList.toggle('active');
          rebuildBody();
        });
        container.appendChild(btn);
      });
    }

    // ── Main ─────────────────────────────────────────────────────────────────

    (async () => {
      const statusEl = document.getElementById('status');
      try {
        const [biosJson, ovrJson, teamMapJson] = await Promise.all([
          fetch('/api/players').then(r => r.ok ? r.json() : {}),
          fetch('/api/ovr/current').then(r => r.ok ? r.json() : {}),
          fetch('/api/team-map').then(r => r.ok ? r.json() : {}),
        ]);

        const slugToTeam = teamMapJson; // already slug → team

        // Build rows grouped by year
        Object.entries(biosJson).forEach(([slug, bio]) => {
          const capMap = parseCapHolds(bio.cap_holds || '');
          const salaries = bio.salaries || {};

          Object.entries(capMap).forEach(([yr, type]) => {
            if (!salaries[yr]) return;

            const salaryRaw = salaries[yr];
            const salaryNum = parseFloat(String(salaryRaw).replace(/[$,\s]/g, '')) || 0;

            const row = {
              slug,
              player: displayName(bio.name || slug),
              team: slugToTeam[slug] || '',
              pos: (bio.pos || []).join('/') || '—',
              ovr: String(ovrJson[slug] || ''),
              age: calcAge(bio.dob),
              salary: salaryNum,
              salaryFmt: formatSalary(salaryRaw),
              capType: type,
              type: CAP_HOLD_LABELS[type] || type,
            };

            if (!allRows[yr]) allRows[yr] = [];
            allRows[yr].push(row);
          });
        });

        const years = Object.keys(allRows).sort();
        if (!years.length) {
          statusEl.textContent = 'No non-guaranteed contracts found.';
          return;
        }

        activeYear = years[0];
        buildYearChips(years);
        buildPosChips();
        statusEl.remove();
        buildTable();

        const legend = document.createElement('div');
        legend.className = 'cap-legend';
        ['PLAYER_OPT', 'TEAM_OPT', 'UFA', 'RFA', 'NON_GTD'].forEach(type => {
          const item = document.createElement('span');
          item.className = 'cap-legend-item';
          const swatch = document.createElement('span');
          swatch.className = 'cap-swatch';
          swatch.style.background = CAP_SWATCH_COLORS[type];
          item.appendChild(swatch);
          item.appendChild(document.createTextNode(
            { PLAYER_OPT: 'Player Option', TEAM_OPT: 'Team Option', UFA: 'UFA Hold', RFA: 'RFA Hold', NON_GTD: 'Non-Guaranteed' }[type]
          ));
          legend.appendChild(item);
        });
        document.getElementById('table-wrap').appendChild(legend);
      } catch (e) {
        statusEl.textContent = 'Failed to load data.';
      }
    })();
  </script>
  <script src="/nav.js"></script>
  <script src="/token-badge.js"></script>
</body>
</html>
