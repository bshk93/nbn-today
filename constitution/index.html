<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/logo.png">
  <title>NBN Constitution</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111827; color: #d1d5db; min-height: 100vh;
      font-size: 0.925rem; line-height: 1.7;
    }
    a { color: #60a5fa; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .page { max-width: 1160px; margin: 0 auto; padding: 2rem 1rem 6rem; }
    .breadcrumb { font-size: 0.8rem; color: #6b7280; margin-bottom: 1.5rem; }
    .breadcrumb a { color: #6b7280; }
    .breadcrumb a:hover { color: #d1d5db; }

    /* ── Header ── */
    .doc-header {
      margin-bottom: 2rem; border-bottom: 1px solid #374151; padding-bottom: 1.25rem;
      display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
    }
    .doc-header h1 { font-size: 2rem; font-weight: 800; color: #f3f4f6; letter-spacing: -0.025em; }
    .doc-meta { margin-top: 0.4rem; font-size: 0.8rem; color: #6b7280; display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
    .version-chip {
      background: #1e3a5f; border: 1px solid #2563eb; color: #93c5fd;
      padding: 0.1rem 0.55rem; border-radius: 20px; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.04em;
    }
    .btn-edit {
      background: #1f2937; border: 1px solid #374151; color: #d1d5db;
      border-radius: 6px; padding: 0.4rem 0.9rem; font-size: 0.82rem; font-weight: 500;
      cursor: pointer; font-family: inherit; white-space: nowrap; flex-shrink: 0;
    }
    .btn-edit:hover { background: #263244; border-color: #4b5563; }

    /* ── Layout ── */
    .doc-layout { display: grid; grid-template-columns: 200px 1fr; gap: 2.5rem; align-items: start; }

    /* ── Sidebar TOC ── */
    .toc {
      position: sticky; top: 1.5rem; background: #1f2937; border: 1px solid #374151;
      border-radius: 10px; padding: 1rem 0; font-size: 0.78rem;
      max-height: calc(100vh - 3rem); overflow-y: auto;
    }
    .toc-heading {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      color: #6b7280; padding: 0 1rem 0.5rem; border-bottom: 1px solid #374151; margin-bottom: 0.4rem;
    }
    .toc a { display: block; color: #9ca3af; padding: 0.22rem 1rem; border-left: 2px solid transparent; line-height: 1.4; }
    .toc a:hover { color: #f3f4f6; text-decoration: none; background: rgba(255,255,255,0.03); }
    .toc a.toc-h2 { font-weight: 600; color: #d1d5db; font-size: 0.78rem; }
    .toc a.toc-h3 { font-size: 0.7rem; color: #6b7280; padding-left: 1.6rem; }
    .toc a.toc-h2:hover, .toc a.toc-h3:hover { color: #f3f4f6; }

    /* ── Rendered markdown content ── */
    .doc-content { min-width: 0; }
    .doc-content h1 { font-size: 1.7rem; font-weight: 800; color: #f3f4f6; margin: 0 0 1rem; letter-spacing: -0.02em; display: none; }
    .doc-content h2 {
      font-size: 1.35rem; font-weight: 800; color: #f3f4f6; letter-spacing: -0.01em;
      border-bottom: 2px solid #1d4ed8; padding-bottom: 0.45rem;
      margin: 2.75rem 0 1.25rem;
    }
    .doc-content h2:first-of-type { margin-top: 0; }
    .doc-content h3 { font-size: 1rem; font-weight: 700; color: #f3f4f6; margin: 1.5rem 0 0.5rem; }
    .doc-content h4 { font-size: 0.9rem; font-weight: 700; color: #e5e7eb; margin: 1rem 0 0.4rem; }
    .doc-content p { margin-bottom: 0.75rem; color: #d1d5db; }
    .doc-content ul, .doc-content ol { padding-left: 1.4rem; margin-bottom: 0.75rem; }
    .doc-content li { margin-bottom: 0.2rem; }
    .doc-content li > ul, .doc-content li > ol { margin-top: 0.2rem; margin-bottom: 0.1rem; }
    .doc-content strong { color: #f3f4f6; font-weight: 600; }
    .doc-content em { color: #9ca3af; }
    .doc-content a { color: #60a5fa; }
    .doc-content a:hover { text-decoration: underline; }
    .doc-content hr { border: none; border-top: 1px solid #374151; margin: 2.5rem 0; }
    .doc-content blockquote {
      border-left: 3px solid #2563eb; background: rgba(29,78,216,0.08);
      border-radius: 0 6px 6px 0; padding: 0.65rem 1rem; margin: 0.75rem 0 1rem;
      color: #93c5fd; font-size: 0.875rem;
    }
    .doc-content blockquote p { color: #93c5fd; margin: 0; }
    .doc-content blockquote a { color: #93c5fd; text-decoration: underline; }
    .doc-content blockquote a:hover { color: #bfdbfe; }
    .doc-content code { background: #1f2937; border-radius: 4px; padding: 0.1em 0.35em; font-size: 0.85em; color: #a5b4fc; }
    .doc-content pre { background: #1f2937; border-radius: 6px; padding: 0.9em 1em; overflow-x: auto; margin: 0.75em 0; }
    .doc-content pre code { background: none; padding: 0; color: #e5e7eb; }

    /* ── Version history ── */
    .history-toggle {
      margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid #374151;
      display: flex; align-items: center; gap: 0.5rem; cursor: pointer;
      font-size: 0.8rem; color: #6b7280; user-select: none;
    }
    .history-toggle:hover { color: #9ca3af; }
    .history-toggle .chevron { font-size: 0.6rem; transition: transform 0.15s; }
    .history-toggle.open .chevron { transform: rotate(180deg); }
    .history-table-wrap { display: none; margin-top: 0.75rem; }
    .history-table-wrap.open { display: block; }
    .history-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    .history-table th {
      text-align: left; padding: 0.3rem 0.75rem; font-size: 0.67rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em; color: #6b7280; border-bottom: 1px solid #374151;
    }
    .history-table td { padding: 0.4rem 0.75rem; border-top: 1px solid #1a2332; color: #d1d5db; }
    .history-table td.ht-ver { color: #4b5563; font-size: 0.75rem; font-variant-numeric: tabular-nums; }
    .history-table td.ht-date { color: #6b7280; white-space: nowrap; }
    .history-table td.ht-author { color: #9ca3af; white-space: nowrap; }

    /* ── Editor ── */
    #edit-mode { display: none; }
    .edit-layout { display: grid; grid-template-columns: 1fr; gap: 1rem; }

    .editor-wrap {
      background: #1f2937; border: 1px solid #374151; border-radius: 10px; overflow: hidden;
    }
    .editor-bar {
      display: flex; align-items: center; gap: 0.2rem;
      padding: 0.35rem 0.5rem; border-bottom: 1px solid #374151; background: #18212f;
    }
    .fmt-btn {
      background: transparent; border: none; border-radius: 4px; color: #6b7280;
      cursor: pointer; font-family: inherit; font-size: 0.73rem; font-weight: 700;
      line-height: 1; padding: 0.28rem 0.42rem; min-width: 1.6rem; text-align: center;
    }
    .fmt-btn:hover { background: #374151; color: #d1d5db; }
    .fmt-sep { width: 1px; height: 13px; background: #2d3748; margin: 0 0.1rem; flex-shrink: 0; }
    .mode-tabs { display: flex; background: #111827; border-radius: 5px; padding: 2px; margin-left: auto; }
    .mode-tab {
      padding: 0.18rem 0.6rem; font-size: 0.72rem; font-weight: 600; color: #4b5563;
      background: transparent; border: none; border-radius: 3px; cursor: pointer; font-family: inherit;
    }
    .mode-tab:hover { color: #9ca3af; }
    .mode-tab.active { background: #374151; color: #e5e7eb; }
    #body-write {
      display: block; width: 100%; min-height: 480px; background: transparent; border: none;
      color: #e5e7eb; caret-color: #60a5fa; outline: none; resize: vertical;
      font-family: ui-monospace, 'Cascadia Code', 'SF Mono', Menlo, monospace;
      font-size: 0.875rem; line-height: 1.8; padding: 1rem 1.25rem;
    }
    #body-preview {
      display: none; min-height: 480px; padding: 1.1rem 1.4rem;
      color: #d1d5db; font-size: 0.9rem; line-height: 1.75;
    }
    /* reuse doc-content styles for preview */
    #body-preview h2 { font-size: 1.2rem; font-weight: 700; color: #f3f4f6; border-bottom: 2px solid #1d4ed8; padding-bottom: 0.3rem; margin: 2rem 0 0.9rem; }
    #body-preview h3 { font-size: 0.95rem; font-weight: 700; color: #f3f4f6; margin: 1.2rem 0 0.4rem; }
    #body-preview p { margin-bottom: 0.65rem; }
    #body-preview ul, #body-preview ol { padding-left: 1.4rem; margin-bottom: 0.65rem; }
    #body-preview li { margin-bottom: 0.15rem; }
    #body-preview strong { color: #f3f4f6; }
    #body-preview em { color: #9ca3af; }
    #body-preview hr { border: none; border-top: 1px solid #374151; margin: 1.75rem 0; }
    #body-preview a { color: #60a5fa; }
    #body-preview blockquote {
      border-left: 3px solid #2563eb; background: rgba(29,78,216,0.08);
      border-radius: 0 6px 6px 0; padding: 0.65rem 1rem; margin: 0.75rem 0;
      color: #93c5fd; font-size: 0.875rem;
    }
    #body-preview blockquote p { color: #93c5fd; margin: 0; }

    .summary-row {
      display: flex; gap: 0.75rem; align-items: flex-end; flex-wrap: wrap; margin-top: 0.75rem;
    }
    .summary-field { flex: 1; min-width: 200px; }
    .summary-field label {
      display: block; font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; color: #6b7280; margin-bottom: 0.3rem;
    }
    .summary-field input {
      width: 100%; background: #1f2937; border: 1px solid #374151; color: #f3f4f6;
      border-radius: 6px; padding: 0.45rem 0.75rem; font-size: 0.875rem; font-family: inherit;
    }
    .summary-field input:focus { outline: none; border-color: #3b82f6; }

    .edit-actions { display: flex; align-items: center; gap: 0.65rem; flex-wrap: wrap; }
    .btn-primary { background: #2563eb; border: 1px solid #3b82f6; color: #fff; border-radius: 6px; padding: 0.45rem 1rem; font-size: 0.85rem; font-weight: 500; cursor: pointer; font-family: inherit; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-secondary { background: #1f2937; border: 1px solid #374151; color: #d1d5db; border-radius: 6px; padding: 0.45rem 1rem; font-size: 0.85rem; font-weight: 500; cursor: pointer; font-family: inherit; }
    .btn-secondary:hover { background: #263244; }
    .save-status { font-size: 0.8rem; color: #6b7280; }
    .save-status.ok { color: #4ade80; }
    .save-status.err { color: #f87171; }

    .loading { color: #6b7280; font-size: 0.875rem; }

    @media (max-width: 768px) {
      .doc-layout { grid-template-columns: 1fr; }
      .toc { position: static; max-height: none; }
    }
  </style>
</head>
<body>
<div class="page">
  <div class="breadcrumb"><a href="/">← Home</a></div>

  <header class="doc-header">
    <div>
      <h1>NBN Constitution</h1>
      <div class="doc-meta">
        <span class="version-chip" id="version-chip"></span>
        <span id="version-date"></span>
        <span>League governance — membership, committees, and operating procedures</span>
      </div>
    </div>
    <button class="btn-edit" id="edit-btn" style="display:none" onclick="enterEdit()">Edit</button>
  </header>

  <!-- ── View mode ── -->
  <div id="view-mode">
    <div class="doc-layout">
      <nav class="toc" id="toc">
        <div class="toc-heading">Contents</div>
        <div id="toc-links"><span class="loading" style="padding:0 1rem;display:block">Loading…</span></div>
      </nav>
      <div class="doc-content" id="doc-content">
        <span class="loading">Loading…</span>
      </div>
    </div>
  </div>

  <!-- ── Edit mode ── -->
  <div id="edit-mode">
    <div class="editor-wrap">
      <div class="editor-bar">
        <button type="button" class="fmt-btn" title="Bold (Ctrl+B)" onclick="fmt('**','**')"><b>B</b></button>
        <button type="button" class="fmt-btn" title="Italic (Ctrl+I)" onclick="fmt('_','_')"><i style="font-style:italic">I</i></button>
        <div class="fmt-sep"></div>
        <button type="button" class="fmt-btn" title="Heading 2" onclick="fmtLine('## ')">H2</button>
        <button type="button" class="fmt-btn" title="Heading 3" onclick="fmtLine('### ')">H3</button>
        <div class="fmt-sep"></div>
        <button type="button" class="fmt-btn" title="Blockquote" onclick="fmtLine('> ')">❝</button>
        <button type="button" class="fmt-btn" title="Bullet list" onclick="fmtLine('- ')">• —</button>
        <button type="button" class="fmt-btn" title="Link (Ctrl+K)" onclick="fmtLink()">🔗</button>
        <div class="mode-tabs">
          <button type="button" class="mode-tab active" data-mode="write" onclick="setPreviewMode('write')">Write</button>
          <button type="button" class="mode-tab" data-mode="preview" onclick="setPreviewMode('preview')">Preview</button>
        </div>
      </div>
      <textarea id="body-write"></textarea>
      <div id="body-preview"></div>
    </div>
    <div class="summary-row">
      <div class="summary-field">
        <label for="edit-summary">Summary of changes</label>
        <input type="text" id="edit-summary" placeholder="e.g. Updated committee members in Article V">
      </div>
      <div class="edit-actions">
        <button class="btn-primary" id="save-btn" onclick="saveEdit()">Save Amendment</button>
        <button class="btn-secondary" onclick="cancelEdit()">Cancel</button>
        <span class="save-status" id="save-status"></span>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script>
const API = '/api';
let constitutionData = null;
let isBod = false;

// ── marked.js setup: add IDs to headings ──────────────────────────────────
const tocEntries = [];
const renderer = new marked.Renderer();
renderer.heading = function({ text, depth }) {
  const raw = text.replace(/<[^>]+>/g, '');
  const id = raw.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  tocEntries.push({ depth, text: raw, id });
  return `<h${depth} id="${id}">${text}</h${depth}>`;
};
marked.use({ renderer, breaks: false });

// ── Render & TOC ─────────────────────────────────────────────────────────
function renderContent(content) {
  tocEntries.length = 0;
  const html = marked.parse(content || '');
  document.getElementById('doc-content').innerHTML = html + buildHistoryHTML();
  buildToc();
  // Attach history toggle
  const tog = document.getElementById('history-toggle');
  if (tog) tog.addEventListener('click', () => {
    tog.classList.toggle('open');
    document.getElementById('history-body').classList.toggle('open');
  });
}

function buildHistoryHTML() {
  if (!constitutionData?.history?.length) return '';
  const rows = constitutionData.history.slice().reverse().map(h => `
    <tr>
      <td class="ht-ver">v${h.version}</td>
      <td class="ht-date">${fmtDate(h.date)}</td>
      <td>${h.summary}</td>
      <td class="ht-author">${h.author || ''}</td>
    </tr>`).join('');
  const count = constitutionData.history.length;
  return `
    <div class="history-toggle" id="history-toggle">
      <span class="chevron">▼</span>
      <span>Amendment History (${count} ${count === 1 ? 'entry' : 'entries'})</span>
    </div>
    <div class="history-table-wrap" id="history-body">
      <table class="history-table">
        <thead><tr><th>Ver</th><th>Date</th><th>Summary</th><th>Author</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function buildToc() {
  const wrap = document.getElementById('toc-links');
  if (!tocEntries.length) { wrap.innerHTML = ''; return; }
  wrap.innerHTML = tocEntries
    .filter(e => e.depth === 2 || e.depth === 3)
    .map(e => `<a href="#${e.id}" class="toc-h${e.depth}">${e.text}</a>`)
    .join('');
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
}

// ── Load ─────────────────────────────────────────────────────────────────
async function load() {
  try {
    const r = await fetch(`${API}/constitution`);
    constitutionData = await r.json();
    const v = constitutionData.version;
    document.getElementById('version-chip').textContent = `v${v}`;
    document.getElementById('version-date').textContent = constitutionData.date ? `Amended ${fmtDate(constitutionData.date)}` : '';
    renderContent(constitutionData.content || '');
  } catch (e) {
    document.getElementById('doc-content').innerHTML = `<span class="loading" style="color:#f87171">${e.message}</span>`;
  }
}

async function initAuth() {
  const token = localStorage.getItem('nbn_token');
  if (!token) return;
  try {
    const r = await fetch(`${API}/members/me`, { headers: { Authorization: `Bearer ${token}` } });
    if (!r.ok) return;
    const me = await r.json();
    if ((me.roles || []).some(r => r === 'bod' || r === 'admin')) {
      isBod = true;
      document.getElementById('edit-btn').style.display = '';
    }
  } catch { /* ignore */ }
}

// ── Edit mode ─────────────────────────────────────────────────────────────
function enterEdit() {
  document.getElementById('view-mode').style.display = 'none';
  document.getElementById('edit-mode').style.display = 'block';
  document.getElementById('body-write').value = constitutionData?.content || '';
  document.getElementById('edit-summary').value = '';
  document.getElementById('save-status').textContent = '';
  setPreviewMode('write');
  document.getElementById('body-write').focus();
}

function cancelEdit() {
  document.getElementById('edit-mode').style.display = 'none';
  document.getElementById('view-mode').style.display = 'block';
}

function setSaveStatus(msg, cls) {
  const el = document.getElementById('save-status');
  el.textContent = msg;
  el.className = 'save-status' + (cls ? ' ' + cls : '');
}

async function saveEdit() {
  const content = document.getElementById('body-write').value;
  const summary = document.getElementById('edit-summary').value.trim();
  if (!summary) { setSaveStatus('Summary is required.', 'err'); document.getElementById('edit-summary').focus(); return; }
  const token = localStorage.getItem('nbn_token');
  document.getElementById('save-btn').disabled = true;
  setSaveStatus('Saving…');
  try {
    const r = await fetch(`${API}/constitution`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ content, summary }),
    });
    if (!r.ok) { const e = await r.json(); throw new Error(e.detail || 'Save failed'); }
    // Reload and return to view
    await load();
    cancelEdit();
  } catch (e) { setSaveStatus(e.message, 'err'); }
  finally { document.getElementById('save-btn').disabled = false; }
}

// ── Editor helpers ────────────────────────────────────────────────────────
function setPreviewMode(mode) {
  const write = document.getElementById('body-write');
  const preview = document.getElementById('body-preview');
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  if (mode === 'preview') {
    preview.innerHTML = marked.parse(write.value || '');
    write.style.display = 'none'; preview.style.display = 'block';
  } else {
    write.style.display = 'block'; preview.style.display = 'none'; write.focus();
  }
}
function fmt(before, after) {
  const ta = document.getElementById('body-write');
  const s = ta.selectionStart, e = ta.selectionEnd;
  const sel = ta.value.slice(s, e);
  ta.setRangeText(before + (sel || 'text') + after, s, e, 'select');
  if (!sel) { ta.selectionStart = s + before.length; ta.selectionEnd = s + before.length + 4; }
  ta.focus();
}
function fmtLine(prefix) {
  const ta = document.getElementById('body-write');
  const lineStart = ta.value.lastIndexOf('\n', ta.selectionStart - 1) + 1;
  const has = ta.value.slice(lineStart).startsWith(prefix);
  ta.setRangeText('', lineStart, lineStart + (has ? prefix.length : 0), 'end');
  if (!has) ta.setRangeText(prefix, lineStart, lineStart, 'end');
  ta.focus();
}
function fmtLink() {
  const ta = document.getElementById('body-write');
  const s = ta.selectionStart, e = ta.selectionEnd;
  const sel = ta.value.slice(s, e);
  ta.setRangeText(`[${sel || 'link text'}](url)`, s, e, 'select');
  if (!sel) { ta.selectionStart = s + 1; ta.selectionEnd = s + 9; }
  ta.focus();
}
document.addEventListener('keydown', e => {
  if (document.activeElement.id !== 'body-write') return;
  if ((e.ctrlKey || e.metaKey) && e.key === 'b') { e.preventDefault(); fmt('**','**'); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'i') { e.preventDefault(); fmt('_','_'); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); fmtLink(); }
});

(async () => { await initAuth(); await load(); })();
</script>
<script src="/nav.js"></script>
<script src="/token-badge.js"></script>
</body>
</html>
