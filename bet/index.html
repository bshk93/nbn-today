<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bets — NBN</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #111827; color: #f3f4f6; min-height: 100vh; padding: 2rem 1rem 4rem; }
    .page { max-width: 700px; margin: 0 auto; }
    .nav { margin-bottom: 1.75rem; font-size: 0.875rem; color: #9ca3af; }
    .nav a { color: #9ca3af; text-decoration: none; }
    .nav a:hover { color: #f3f4f6; }

    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.75rem; gap: 1rem; flex-wrap: wrap; }
    header h1 { font-size: 1.875rem; font-weight: 700; letter-spacing: -0.02em; }
    .header-right { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }

    .balance-chip { font-size: 0.82rem; font-weight: 700; color: #fbbf24; background: #1c1710; border: 1px solid #78350f; border-radius: 20px; padding: 0.25rem 0.75rem; white-space: nowrap; }

    .new-bet-btn { background: none; border: 1px solid #4b5563; color: #34d399; border-radius: 6px; padding: 0.3rem 0.75rem; cursor: pointer; font-size: 0.8rem; font-weight: 500; }
    .new-bet-btn:hover { border-color: #34d399; background: #0a1f15; }

    /* Tabs */
    .tabs { display: flex; gap: 2px; background: #1f2937; border-radius: 8px; padding: 3px; margin-bottom: 1.5rem; width: fit-content; }
    .tab-btn { background: none; border: none; color: #9ca3af; padding: 0.35rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.82rem; font-weight: 500; white-space: nowrap; }
    .tab-btn.active { background: #374151; color: #f3f4f6; }
    .tab-btn:hover:not(.active) { color: #d1d5db; }

    /* New bet form */
    .new-bet-form { background: #0a1f15; border: 1px solid #065f46; border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 0.6rem; }
    .new-bet-form label { font-size: 0.78rem; color: #6ee7b7; font-weight: 600; }
    .new-bet-form input[type="text"], .new-bet-form textarea {
      background: #111827; border: 1px solid #374151; color: #f3f4f6; border-radius: 5px;
      padding: 0.35rem 0.65rem; font-size: 0.85rem; outline: none; width: 100%; font-family: inherit;
    }
    .new-bet-form input:focus, .new-bet-form textarea:focus { border-color: #10b981; }
    .new-bet-form textarea { resize: vertical; min-height: 48px; }
    .opt-row { display: flex; gap: 0.4rem; align-items: center; }
    .opt-row input { flex: 1; }
    .opt-del { background: none; border: none; color: #374151; cursor: pointer; font-size: 1.1rem; padding: 0 0.2rem; }
    .opt-del:hover { color: #f87171; }
    .add-opt-btn { background: none; border: 1px dashed #374151; color: #6b7280; border-radius: 5px; padding: 0.2rem 0.6rem; cursor: pointer; font-size: 0.78rem; width: fit-content; }
    .add-opt-btn:hover { border-color: #6b7280; color: #9ca3af; }
    .form-actions { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .form-submit { background: #059669; border: none; color: #fff; border-radius: 5px; padding: 0.3rem 0.85rem; cursor: pointer; font-size: 0.82rem; font-weight: 600; }
    .form-submit:hover { background: #047857; }
    .form-submit:disabled { opacity: 0.5; cursor: default; }
    .form-cancel-btn { background: none; border: none; color: #6b7280; cursor: pointer; font-size: 0.82rem; padding: 0.3rem 0.5rem; }
    .form-cancel-btn:hover { color: #9ca3af; }
    .form-err { font-size: 0.75rem; color: #f87171; }

    /* Bet card */
    .bet-card { background: #1f2937; border: 1px solid #374151; border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
    .bet-card.locked { background: #16172a; border-color: #2d2d54; }
    .bet-card.closed { background: #171f2a; border-color: #2d3748; }
    .locked-notice { font-size: 0.78rem; color: #818cf8; margin-top: 0.6rem; }
    .bet-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.75rem; margin-bottom: 0.6rem; }
    .bet-title { font-size: 1rem; font-weight: 700; color: #f3f4f6; }
    .bet-status-badge { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; border-radius: 4px; padding: 0.15rem 0.45rem; white-space: nowrap; flex-shrink: 0; }
    .badge-open   { background: #064e3b; color: #34d399; }
    .badge-locked { background: #1e1b4b; color: #818cf8; border: 1px solid #3730a3; }
    .badge-closed { background: #1f2937; color: #6b7280; border: 1px solid #374151; }
    .badge-voided { background: #292008; color: #f59e0b; }
    .bet-meta { font-size: 0.72rem; color: #6b7280; margin-bottom: 0.75rem; }
    .bet-desc { font-size: 0.82rem; color: #9ca3af; margin-bottom: 0.75rem; }
    .pool-total { font-size: 0.75rem; color: #6b7280; margin: 0.5rem 0 0.9rem; }
    .pool-total .nby { color: #fbbf24; }

    /* Option bars */
    .options-list { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 0.5rem; }
    .opt-bar-row { display: flex; align-items: center; gap: 0.5rem; }
    .opt-label { font-size: 0.8rem; color: #d1d5db; min-width: 90px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .opt-label.winner { color: #fbbf24; font-weight: 700; }
    .opt-label.my-pick::after { content: ' ✓'; color: #60a5fa; font-size: 0.7rem; }
    .bar-wrap { flex: 1; height: 8px; background: #374151; border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; background: #3b82f6; transition: width 0.3s; }
    .bar-fill.winner { background: #f59e0b; }
    .bar-fill.zero   { background: #374151; }
    .opt-pct  { font-size: 0.72rem; color: #9ca3af; min-width: 36px; text-align: right; }
    .opt-amt  { font-size: 0.72rem; color: #fbbf24; min-width: 60px; text-align: right; }
    .opt-winner-badge { font-size: 0.6rem; font-weight: 700; color: #fbbf24; background: #292008; border-radius: 3px; padding: 0.1rem 0.3rem; }

    /* My current bet info */
    .my-bet-info { font-size: 0.78rem; color: #93c5fd; background: #0c1929; border: 1px solid #1d4ed8; border-radius: 6px; padding: 0.4rem 0.75rem; margin: 0.75rem 0 0; display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .my-bet-info .nby { color: #fbbf24; font-weight: 700; }

    /* Wager form */
    .wager-form { margin-top: 0.75rem; display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; }
    .wager-form input[type="number"] {
      background: #111827; border: 1px solid #374151; color: #fbbf24; border-radius: 5px;
      padding: 0.3rem 0.6rem; font-size: 0.85rem; outline: none; width: 100px; font-family: inherit;
    }
    .wager-form input[type="number"]:focus { border-color: #f59e0b; }
    .wager-form select {
      background: #111827; border: 1px solid #374151; color: #f3f4f6; border-radius: 5px;
      padding: 0.3rem 0.6rem; font-size: 0.82rem; outline: none; font-family: inherit; cursor: pointer;
    }
    .wager-form select:focus { border-color: #3b82f6; }
    .wager-form .place-btn { background: #1d4ed8; border: none; color: #fff; border-radius: 5px; padding: 0.3rem 0.8rem; cursor: pointer; font-size: 0.82rem; font-weight: 600; }
    .wager-form .place-btn:hover { background: #1e40af; }
    .wager-form .place-btn:disabled { opacity: 0.5; cursor: default; }
    .wager-avail { font-size: 0.72rem; color: #6b7280; }
    .wager-avail .nby { color: #fbbf24; }
    .wager-err { font-size: 0.73rem; color: #f87171; width: 100%; }

    /* Close bet (bets role) */
    .close-bet-section { margin-top: 0.75rem; border-top: 1px solid #374151; padding-top: 0.75rem; display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .close-toggle { background: none; border: 1px solid #4b5563; color: #9ca3af; border-radius: 5px; padding: 0.25rem 0.65rem; cursor: pointer; font-size: 0.78rem; }
    .close-toggle:hover { border-color: #f87171; color: #f87171; }
    .close-form { display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; }
    .close-form select { background: #111827; border: 1px solid #374151; color: #f3f4f6; border-radius: 5px; padding: 0.3rem 0.6rem; font-size: 0.82rem; outline: none; font-family: inherit; }
    .close-confirm { background: #dc2626; border: none; color: #fff; border-radius: 5px; padding: 0.3rem 0.75rem; cursor: pointer; font-size: 0.82rem; font-weight: 600; }
    .close-confirm:hover { background: #b91c1c; }
    .close-confirm:disabled { opacity: 0.5; cursor: default; }
    .delete-btn { background: none; border: none; color: #374151; cursor: pointer; font-size: 0.78rem; padding: 0.25rem 0.5rem; margin-left: auto; }
    .delete-btn:hover { color: #f87171; }

    /* Payout info (closed bets) */
    .payout-section { margin-top: 0.75rem; border-top: 1px solid #2d3748; padding-top: 0.75rem; font-size: 0.78rem; }
    .payout-hdr { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #4b5563; margin-bottom: 0.4rem; }
    .payout-row { display: flex; justify-content: space-between; padding: 0.15rem 0; color: #9ca3af; }
    .payout-row .payout-winner { color: #fbbf24; font-weight: 600; }
    .payout-row .payout-profit { font-size: 0.72rem; color: #34d399; }
    .voided-notice { color: #f59e0b; font-size: 0.78rem; font-weight: 600; margin-top: 0.5rem; }

    /* Balances leaderboard */
    .balances-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .balances-table th { text-align: left; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #6b7280; padding: 0 0.5rem 0.5rem; border-bottom: 1px solid #374151; }
    .balances-table th.num { text-align: right; }
    .balances-table td { padding: 0.45rem 0.5rem; border-bottom: 1px solid #1f2937; color: #d1d5db; }
    .balances-table td.num { text-align: right; }
    .balances-table tr:last-child td { border-bottom: none; }
    .balances-table tr.me td { color: #f3f4f6; background: #1a2535; }
    .rank-cell { color: #6b7280; font-size: 0.8rem; }
    .name-cell { font-weight: 500; }
    .bal-cell  { color: #fbbf24; font-weight: 700; }
    .pl-pos    { color: #34d399; }
    .pl-neg    { color: #f87171; }
    .pl-zero   { color: #6b7280; }

    .empty-state { color: #6b7280; font-size: 0.875rem; padding: 2rem 0; text-align: center; }
    .loading { color: #6b7280; font-size: 0.875rem; }

    /* Fixed-odds type badge */
    .bet-type-badge { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; border-radius: 3px; padding: 0.1rem 0.35rem; background: #1e1b4b; color: #a78bfa; border: 1px solid #4c1d95; margin-left: 0.4rem; vertical-align: middle; }
    /* Form type toggle */
    .type-toggle-wrap { display: flex; gap: 0.35rem; }
    .type-toggle-btn { background: none; border: 1px solid #374151; color: #6b7280; border-radius: 5px; padding: 0.25rem 0.75rem; cursor: pointer; font-size: 0.78rem; font-weight: 500; }
    .type-toggle-btn.active { background: #1e1b4b; border-color: #4c1d95; color: #a78bfa; }
    .type-toggle-btn:hover:not(.active) { border-color: #6b7280; color: #9ca3af; }
    /* Odds multiplier chip on option row */
    .opt-odds { font-size: 0.65rem; font-weight: 700; color: #a78bfa; background: #1e1b4b; border-radius: 3px; padding: 0.1rem 0.3rem; white-space: nowrap; flex-shrink: 0; margin-left: 0.2rem; }
    /* Potential payout preview in wager form */
    .payout-preview { font-size: 0.72rem; color: #34d399; padding: 0.15rem 0 0; }
    /* Prob sum indicator in form */
    .prob-sum-row { font-size: 0.72rem; font-weight: 600; }
    /* Shortfall/surplus notice on closed fixed-odds bets */
    .shortfall-notice { font-size: 0.72rem; color: #f59e0b; margin-top: 0.35rem; }
    .surplus-notice   { font-size: 0.72rem; color: #34d399;  margin-top: 0.35rem; }

    /* Canned bet button */
    .new-canned-btn { background: none; border: 1px solid #4b5563; color: #60a5fa; border-radius: 6px; padding: 0.3rem 0.75rem; cursor: pointer; font-size: 0.8rem; font-weight: 500; }
    .new-canned-btn:hover { border-color: #60a5fa; background: #0c1929; }

    /* Canned bet form — uses same .new-bet-form shell but with blue accent */
    .canned-bet-form { background: #0c1929; border: 1px solid #1d4ed8; }
    .canned-bet-form label { color: #93c5fd; }
    .canned-bet-form input[type="text"]:focus,
    .canned-bet-form textarea:focus,
    .canned-select:focus { border-color: #3b82f6; }
    .canned-select {
      background: #111827; border: 1px solid #374151; color: #f3f4f6; border-radius: 5px;
      padding: 0.35rem 0.65rem; font-size: 0.85rem; outline: none; font-family: inherit; cursor: pointer; width: 100%;
    }
    .canned-info { font-size: 0.78rem; color: #9ca3af; background: #1a2535; border: 1px solid #1e3a5f; border-radius: 5px; padding: 0.4rem 0.75rem; }
    .canned-opts-preview { display: flex; flex-wrap: wrap; align-items: center; gap: 0.35rem; font-size: 0.78rem; color: #6b7280; }
    .canned-opt-chip { background: #1f2937; border: 1px solid #374151; border-radius: 4px; padding: 0.15rem 0.5rem; color: #d1d5db; font-size: 0.75rem; }
    .canned-adj-row { display: flex; align-items: center; gap: 0.5rem; }
    .canned-adj-btn { background: #1f2937; border: 1px solid #374151; color: #f3f4f6; border-radius: 4px; padding: 0.2rem 0.65rem; cursor: pointer; font-size: 1rem; font-family: inherit; line-height: 1; }
    .canned-adj-btn:hover { border-color: #6b7280; }
    .canned-line-val { font-weight: 700; font-size: 1.05rem; color: #f3f4f6; min-width: 3rem; text-align: center; }
  </style>
</head>
<body>
  <div class="page">
    <nav class="nav"><a href="/">← Home</a></nav>
    <header>
      <h1>🎲 NBN Bets</h1>
      <div class="header-right">
        <span class="balance-chip" id="balance-chip" style="display:none"></span>
        <button class="new-canned-btn" id="new-canned-btn" style="display:none">+ New Bet</button>
        <button class="new-bet-btn" id="new-bet-btn" style="display:none">+ New Custom Bet</button>
      </div>
    </header>

    <div class="tabs">
      <button class="tab-btn active" id="tab-open">Open</button>
      <button class="tab-btn"        id="tab-closed">Closed</button>
      <button class="tab-btn"        id="tab-balances">Balances</button>
    </div>

    <div id="new-bet-form-wrap" style="display:none"></div>
    <div id="content"><span class="loading">Loading…</span></div>
  </div>

  <script>
    const TOKEN = localStorage.getItem('nbn_token');
    let currentUser   = null;   // {name, roles}
    let allBets       = [];
    let balancesList  = [];
    let currentTab    = 'open';
    let showNewForm   = false;
    let showCannedForm = false;

    // Canned bet data caches
    let _futureGamesCache  = null;
    let _playersCache      = null;
    let _teamDiffCache     = {};    // abbr.lower → number
    let _rosterCache       = {};    // abbr.lower → [{slug, name}]
    let _playerStatsCache  = null;  // slug → most-recent-season row

    const nby = (n, decimals = 2) => {
      const v = Number(n);
      if (isNaN(v)) return 'NB¥0';
      const str = Math.abs(v).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: decimals });
      return `NB¥${str}`;
    };

    const fmtDate = iso => {
      if (!iso) return '';
      const d = new Date(iso);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    };

    // American odds ↔ probability conversions
    const pctToOdds = pct => {
      const p = pct / 100;
      if (p <= 0 || p >= 1) return '';
      if (Math.abs(p - 0.5) < 0.0001) return '+100';
      if (p > 0.5) return String(Math.round(-p / (1 - p) * 100));
      return '+' + Math.round((1 - p) / p * 100);
    };
    const oddsToPct = str => {
      const n = parseFloat(str);
      if (isNaN(n) || n === 0) return null;
      return n > 0 ? 100 / (n + 100) * 100 : Math.abs(n) / (Math.abs(n) + 100) * 100;
    };

    // ── Data ─────────────────────────────────────────────────────────────────

    async function loadData() {
      const [betsRes, balsRes] = await Promise.allSettled([
        fetch('/api/bets').then(r => r.json()),
        fetch('/api/bets/balances').then(r => r.json()),
      ]);
      if (betsRes.status === 'fulfilled') allBets      = betsRes.value;
      if (balsRes.status === 'fulfilled') balancesList = balsRes.value;
    }

    async function checkAuth() {
      if (!TOKEN) return;
      try {
        const me = await fetch('/api/me', { headers: { 'Authorization': `Bearer ${TOKEN}` } }).then(r => r.ok ? r.json() : null);
        if (!me) return;
        currentUser = { name: me.name || me.username, roles: me.roles || [] };
      } catch {}
    }

    function myBalance() {
      if (!currentUser) return null;
      const row = balancesList.find(b => b.name === currentUser.name);
      return row ? row.balance : 1000;
    }

    function isBetsRole() {
      return currentUser && (
        currentUser.roles.includes('bookie') ||
        currentUser.roles.includes('admin')
      );
    }

    // ── Init ─────────────────────────────────────────────────────────────────

    async function init() {
      await Promise.all([loadData(), checkAuth()]);

      if (currentUser) {
        const chip = document.getElementById('balance-chip');
        chip.textContent = nby(myBalance());
        chip.style.display = '';
      }

      if (isBetsRole()) {
        const cannedBtn = document.getElementById('new-canned-btn');
        cannedBtn.style.display = '';
        cannedBtn.onclick = () => {
          showCannedForm = !showCannedForm;
          showNewForm    = false;
          renderFormArea();
        };

        const btn = document.getElementById('new-bet-btn');
        btn.style.display = '';
        btn.onclick = () => {
          showNewForm    = !showNewForm;
          showCannedForm = false;
          renderFormArea();
        };
      }

      document.getElementById('tab-open').onclick     = () => switchTab('open');
      document.getElementById('tab-closed').onclick   = () => switchTab('closed');
      document.getElementById('tab-balances').onclick = () => switchTab('balances');

      renderView();
    }

    function renderFormArea() {
      if (showCannedForm) {
        renderCannedBetForm();
      } else if (showNewForm) {
        renderNewBetForm();
      } else {
        const wrap = document.getElementById('new-bet-form-wrap');
        wrap.style.display = 'none';
        wrap.innerHTML = '';
      }
    }

    function switchTab(t) {
      currentTab    = t;
      showNewForm   = false;
      showCannedForm = false;
      renderFormArea();
      ['open','closed','balances'].forEach(id => {
        document.getElementById(`tab-${id}`).classList.toggle('active', id === t);
      });
      renderView();
    }

    function renderView() {
      if (currentTab === 'open')     renderOpenBets();
      else if (currentTab === 'closed')   renderClosedBets();
      else                                renderBalances();
    }

    // ── New Bet Form ──────────────────────────────────────────────────────────

    function renderNewBetForm() {
      const wrap = document.getElementById('new-bet-form-wrap');
      if (!showNewForm) { wrap.style.display = 'none'; wrap.innerHTML = ''; return; }

      const form = document.createElement('div');
      form.className = 'new-bet-form';

      let betType     = 'pool';
      const probInputs = [];  // parallel to optInputs

      const addField = (labelText, el) => {
        const lbl = document.createElement('label');
        lbl.textContent = labelText;
        form.appendChild(lbl);
        form.appendChild(el);
      };

      const titleIn = document.createElement('input');
      titleIn.type = 'text';
      titleIn.placeholder = 'e.g. Who wins the Western Conference?';
      addField('Title *', titleIn);

      const descIn = document.createElement('textarea');
      descIn.placeholder = 'Description (optional)';
      addField('Description', descIn);

      // ── Bet type toggle ──────────────────────────────────────────────────────
      const typeLbl = document.createElement('label');
      typeLbl.textContent = 'Bet Type *';
      form.appendChild(typeLbl);

      const typeWrap = document.createElement('div');
      typeWrap.className = 'type-toggle-wrap';
      const poolBtn = document.createElement('button');
      poolBtn.type = 'button'; poolBtn.className = 'type-toggle-btn active'; poolBtn.textContent = '🪣 Pool';
      const oddsBtn = document.createElement('button');
      oddsBtn.type = 'button'; oddsBtn.className = 'type-toggle-btn'; oddsBtn.textContent = '🎯 Fixed Odds';

      // defined after optsWrap is created; called via onclick
      function setTypeToggle(type) {
        betType = type;
        poolBtn.classList.toggle('active', type === 'pool');
        oddsBtn.classList.toggle('active', type === 'fixed_odds');
        optsWrap.querySelectorAll('.prob-wrap').forEach(w => {
          w.style.display = type === 'fixed_odds' ? 'flex' : 'none';
        });
        updateProbSum();
      }
      poolBtn.onclick = () => setTypeToggle('pool');
      oddsBtn.onclick = () => setTypeToggle('fixed_odds');
      typeWrap.append(poolBtn, oddsBtn);
      form.appendChild(typeWrap);

      // ── Options ──────────────────────────────────────────────────────────────
      const optsLbl = document.createElement('label');
      optsLbl.textContent = 'Options *';
      form.appendChild(optsLbl);

      const optsWrap = document.createElement('div');
      optsWrap.style.cssText = 'display:flex;flex-direction:column;gap:0.3rem';
      form.appendChild(optsWrap);
      const optInputs = [];

      const probSumEl = document.createElement('div');
      probSumEl.className = 'prob-sum-row';
      probSumEl.style.display = 'none';

      function updateProbSum() {
        if (betType !== 'fixed_odds') { probSumEl.style.display = 'none'; return; }
        const sum = probInputs.reduce((acc, inp) => acc + (parseFloat(inp.value) || 0), 0);
        const ok  = Math.abs(sum - 100) < 0.1;
        probSumEl.textContent = `Sum: ${sum.toFixed(1)}%${ok ? ' ✓' : ''}`;
        probSumEl.style.color   = ok ? '#34d399' : '#f87171';
        probSumEl.style.display = '';
      }

      function addOptRow(val = '') {
        const row = document.createElement('div');
        row.className = 'opt-row';

        const inp = document.createElement('input');
        inp.type = 'text'; inp.value = val;
        inp.placeholder = `Option ${optInputs.length + 1}`;

        // Probability wrap (shown only in fixed_odds mode)
        const probWrap = document.createElement('span');
        probWrap.className = 'prob-wrap';
        probWrap.style.cssText = `display:${betType === 'fixed_odds' ? 'flex' : 'none'};align-items:center;gap:3px;flex-shrink:0`;

        const probInp = document.createElement('input');
        probInp.type = 'number'; probInp.min = '0.1'; probInp.max = '99.9'; probInp.step = '0.1';
        probInp.placeholder = '%';
        probInp.style.cssText = 'width:52px;background:#111827;border:1px solid #374151;color:#f3f4f6;border-radius:5px;padding:0.3rem 0.4rem;font-size:0.82rem;outline:none;font-family:inherit;';

        const pctLbl = document.createElement('span');
        pctLbl.textContent = '%';
        pctLbl.style.cssText = 'font-size:0.72rem;color:#6b7280;margin-right:2px;';

        const divLbl = document.createElement('span');
        divLbl.textContent = '/';
        divLbl.style.cssText = 'font-size:0.72rem;color:#4b5563;';

        const oddsInp = document.createElement('input');
        oddsInp.type = 'text'; oddsInp.placeholder = 'odds';
        oddsInp.style.cssText = 'width:62px;background:#111827;border:1px solid #374151;color:#a78bfa;border-radius:5px;padding:0.3rem 0.4rem;font-size:0.82rem;outline:none;font-family:inherit;';

        // Cross-sync: % ↔ American odds
        probInp.oninput = () => {
          const pct = parseFloat(probInp.value);
          if (!isNaN(pct) && pct > 0 && pct < 100) oddsInp.value = pctToOdds(pct);
          else oddsInp.value = '';
          updateProbSum();
        };
        oddsInp.oninput = () => {
          const pct = oddsToPct(oddsInp.value);
          if (pct !== null && pct > 0 && pct < 100) {
            probInp.value = pct.toFixed(1);
            updateProbSum();
          }
        };

        probWrap.append(probInp, pctLbl, divLbl, oddsInp);

        const del = document.createElement('button');
        del.className = 'opt-del';
        del.textContent = '×';
        del.onclick = () => {
          if (optInputs.length <= 2) return;
          const idx = optInputs.indexOf(inp);
          if (idx !== -1) { optInputs.splice(idx, 1); probInputs.splice(idx, 1); }
          row.remove();
          updateProbSum();
        };

        optInputs.push(inp);
        probInputs.push(probInp);
        row.append(inp, probWrap, del);
        optsWrap.appendChild(row);
      }
      addOptRow('');
      addOptRow('');

      form.appendChild(probSumEl);

      const addOptBtn = document.createElement('button');
      addOptBtn.className = 'add-opt-btn';
      addOptBtn.textContent = '＋ Add option';
      addOptBtn.onclick = () => addOptRow('');
      form.appendChild(addOptBtn);

      const actions = document.createElement('div');
      actions.className = 'form-actions';
      const submitBtn = document.createElement('button');
      submitBtn.className = 'form-submit';
      submitBtn.textContent = 'Create Bet';
      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'form-cancel-btn';
      cancelBtn.textContent = 'Cancel';
      cancelBtn.onclick = () => { showNewForm = false; renderFormArea(); };
      const errEl = document.createElement('div');
      errEl.className = 'form-err';

      submitBtn.onclick = async () => {
        const title   = titleIn.value.trim();
        const rawOpts = optInputs.map((inp, i) => {
          const label = inp.value.trim();
          if (!label) return null;
          const obj = { label };
          if (betType === 'fixed_odds') {
            const pct = parseFloat(probInputs[i].value);
            if (isNaN(pct) || pct <= 0) { errEl.textContent = `Enter a probability % for "${label}".`; return null; }
            obj.probability = pct / 100;
          }
          return obj;
        });
        if (!title)                        { errEl.textContent = 'Title is required.'; return; }
        if (rawOpts.some(o => o === null)) return;
        const opts = rawOpts.filter(Boolean);
        if (opts.length < 2)               { errEl.textContent = 'At least 2 options required.'; return; }
        if (betType === 'fixed_odds') {
          const sum = opts.reduce((acc, o) => acc + o.probability, 0);
          if (Math.abs(sum - 1.0) > 0.005) {
            errEl.textContent = `Probabilities must sum to 100% (currently ${(sum * 100).toFixed(1)}%).`;
            return;
          }
        }
        submitBtn.disabled = true; submitBtn.textContent = 'Creating…';
        errEl.textContent = '';
        try {
          const res = await fetch('/api/bets', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}` },
            body: JSON.stringify({ title, description: descIn.value.trim(), options: opts, bet_type: betType }),
          });
          const body = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(body.detail || `HTTP ${res.status}`);
          allBets.unshift(body);
          showNewForm = false;
          renderFormArea();
          currentTab = 'open';
          ['open','closed','balances'].forEach(id => document.getElementById(`tab-${id}`).classList.toggle('active', id === 'open'));
          renderView();
        } catch(e) {
          errEl.textContent = e.message;
          submitBtn.disabled = false; submitBtn.textContent = 'Create Bet';
        }
      };

      actions.append(submitBtn, cancelBtn, errEl);
      form.appendChild(actions);
      wrap.innerHTML = '';
      wrap.appendChild(form);
      wrap.style.display = '';
    }

    // ── Open Bets ─────────────────────────────────────────────────────────────

    function renderOpenBets() {
      const content = document.getElementById('content');
      const open = allBets.filter(b => b.status === 'open' || b.status === 'locked');
      if (!open.length) {
        content.innerHTML = '<div class="empty-state">No open bets right now.</div>';
        return;
      }
      content.innerHTML = '';
      open.forEach(bet => content.appendChild(makeBetCard(bet)));
    }

    // ── Closed Bets ───────────────────────────────────────────────────────────

    function renderClosedBets() {
      const content = document.getElementById('content');
      const closed = allBets.filter(b => b.status === 'closed');
      if (!closed.length) {
        content.innerHTML = '<div class="empty-state">No closed bets yet.</div>';
        return;
      }
      content.innerHTML = '';
      // Most recent first
      [...closed].reverse().forEach(bet => content.appendChild(makeBetCard(bet)));
    }

    // ── Balances ─────────────────────────────────────────────────────────────

    function renderBalances() {
      const content = document.getElementById('content');
      if (!balancesList.length) {
        content.innerHTML = '<div class="empty-state">No balance data yet.</div>';
        return;
      }
      const table = document.createElement('table');
      table.className = 'balances-table';
      const thead = table.createTHead();
      const hrow  = thead.insertRow();
      ['#', 'Member', 'NB¥ Balance', 'P/L'].forEach((h, i) => {
        const th = document.createElement('th');
        th.textContent = h;
        if (i >= 2) th.className = 'num';
        hrow.appendChild(th);
      });
      const tbody = table.createTBody();
      balancesList.forEach((row, idx) => {
        const tr = tbody.insertRow();
        if (currentUser && row.name === currentUser.name) tr.className = 'me';
        const pl = row.balance - 1000;
        const plClass = pl > 0 ? 'pl-pos' : pl < 0 ? 'pl-neg' : 'pl-zero';
        const plSign  = pl >= 0 ? '+' : '';

        const rankTd = tr.insertCell(); rankTd.className = 'rank-cell'; rankTd.style.textAlign = 'right'; rankTd.textContent = idx + 1;
        const nameTd = tr.insertCell(); nameTd.className = 'name-cell'; nameTd.textContent = row.name;
        if (currentUser && row.name === currentUser.name) {
          const you = document.createElement('span');
          you.style.cssText = 'font-size:0.68rem;color:#6b7280;margin-left:0.4rem';
          you.textContent = '(you)';
          nameTd.appendChild(you);
        }
        const balTd = tr.insertCell(); balTd.className = 'bal-cell'; balTd.style.textAlign = 'right'; balTd.textContent = nby(row.balance);
        const plTd  = tr.insertCell(); plTd.className  = plClass;    plTd.style.textAlign  = 'right'; plTd.textContent  = `${plSign}${nby(pl)}`;
      });

      content.innerHTML = '';
      content.appendChild(table);
    }

    // ── Bet Card ──────────────────────────────────────────────────────────────

    function makeBetCard(bet) {
      const isOpen      = bet.status === 'open';
      const isLocked    = bet.status === 'locked';
      const isClosed    = bet.status === 'closed';
      const voided      = bet.resolution?.voided;
      const isFixedOdds = bet.bet_type === 'fixed_odds';
      const myWager     = currentUser ? bet.wagers?.[currentUser.name] : null;
      const optMap      = Object.fromEntries(bet.options.map(o => [o.id, o.label]));
      const totals      = bet.option_totals || {};
      const pool        = bet.total_pool || 0;

      const card = document.createElement('div');
      card.className = `bet-card${isLocked ? ' locked' : isClosed ? ' closed' : ''}`;

      // Header
      const hdr = document.createElement('div');
      hdr.className = 'bet-header';
      const title = document.createElement('div');
      title.className = 'bet-title';
      title.textContent = bet.title;
      const badge = document.createElement('span');
      badge.className = `bet-status-badge ${voided ? 'badge-voided' : isOpen ? 'badge-open' : isLocked ? 'badge-locked' : 'badge-closed'}`;
      badge.textContent = voided ? 'Voided' : isOpen ? 'Open' : isLocked ? 'Locked' : 'Closed';
      hdr.append(title, badge);
      card.appendChild(hdr);

      // Meta
      const meta = document.createElement('div');
      meta.className = 'bet-meta';
      let metaText = `Created by ${bet.created_by} · ${fmtDate(bet.created_at)}`;
      if (isLocked && bet.locked_at) metaText += ` · Locked ${fmtDate(bet.locked_at)}`;
      if (isClosed && bet.closed_at) metaText += ` · Closed ${fmtDate(bet.closed_at)}`;
      meta.textContent = metaText;
      if (isFixedOdds) {
        const typeBadge = document.createElement('span');
        typeBadge.className = 'bet-type-badge';
        typeBadge.textContent = 'Fixed Odds';
        meta.appendChild(typeBadge);
      }
      card.appendChild(meta);

      if (bet.description) {
        const desc = document.createElement('div');
        desc.className = 'bet-desc';
        desc.textContent = bet.description;
        card.appendChild(desc);
      }

      // Options bars
      const optsList = document.createElement('div');
      optsList.className = 'options-list';
      bet.options.forEach(opt => {
        const amt      = totals[opt.id] || 0;
        const prob     = isFixedOdds ? (opt.probability || 0) : 0;
        const mult     = isFixedOdds && prob > 0 ? (1 / prob) : 0;
        // Fixed-odds: bar = stated probability; Pool: bar = stake share
        const barPct   = isFixedOdds ? prob * 100 : (pool > 0 ? amt / pool * 100 : 0);
        const isWin    = isClosed && bet.winning_option_id === opt.id;
        const isMyPick = myWager && myWager.option_id === opt.id;

        const row = document.createElement('div');
        row.className = 'opt-bar-row';

        const lbl = document.createElement('span');
        lbl.className = `opt-label${isWin ? ' winner' : ''}${isMyPick ? ' my-pick' : ''}`;
        lbl.textContent = opt.label;
        lbl.title = opt.label;
        row.appendChild(lbl);

        // Multiplier chip for fixed-odds
        if (isFixedOdds && mult > 0) {
          const oddsChip = document.createElement('span');
          oddsChip.className = 'opt-odds';
          oddsChip.textContent = `${mult.toFixed(2)}×`;
          row.appendChild(oddsChip);
        }

        const barWrap = document.createElement('div');
        barWrap.className = 'bar-wrap';
        const barFill = document.createElement('div');
        barFill.className = `bar-fill${isWin ? ' winner' : barPct === 0 ? ' zero' : ''}`;
        barFill.style.width = `${barPct}%`;
        if (isFixedOdds && !isWin) barFill.style.background = '#7c3aed';
        barWrap.appendChild(barFill);

        const pctEl = document.createElement('span');
        pctEl.className = 'opt-pct';
        pctEl.textContent = isFixedOdds
          ? `${(prob * 100).toFixed(1)}%`
          : (pool > 0 ? `${barPct.toFixed(1)}%` : '—');

        const amtEl = document.createElement('span');
        amtEl.className = 'opt-amt';
        amtEl.textContent = nby(amt);

        row.append(barWrap, pctEl, amtEl);

        if (isWin) {
          const winBadge = document.createElement('span');
          winBadge.className = 'opt-winner-badge';
          winBadge.textContent = '🏆 WIN';
          row.appendChild(winBadge);
        }

        optsList.appendChild(row);
      });
      card.appendChild(optsList);

      // Pool total / staked
      const poolEl = document.createElement('div');
      poolEl.className = 'pool-total';
      poolEl.innerHTML = `${isFixedOdds ? 'Total staked' : 'Total pool'}: <span class="nby">${nby(pool)}</span>`;
      card.appendChild(poolEl);

      // My current bet
      if (myWager) {
        const myInfo = document.createElement('div');
        myInfo.className = 'my-bet-info';
        let myInfoHtml = `Your bet: <span class="nby">${nby(myWager.amount)}</span> on <strong>${optMap[myWager.option_id] || myWager.option_id}</strong>`;
        if (isFixedOdds && myWager.potential_payout) {
          myInfoHtml += ` · potential payout: <span class="nby">${nby(myWager.potential_payout)}</span>`;
        }
        myInfo.innerHTML = myInfoHtml;
        card.appendChild(myInfo);
      }

      // Wager form (open bets only, logged in)
      if (isOpen && currentUser) {
        const wagerSection = makeWagerForm(bet, myWager, optMap, pool);
        card.appendChild(wagerSection);
      }

      // Locked notice (locked bets, non-admin users with a bet placed)
      if (isLocked && currentUser && !isBetsRole()) {
        const notice = document.createElement('div');
        notice.className = 'locked-notice';
        notice.textContent = '🔒 Betting is closed — awaiting result.';
        card.appendChild(notice);
      }

      // Close bet controls (open or locked bets, bets role)
      if ((isOpen || isLocked) && isBetsRole()) {
        const closeSec = makeCloseSection(bet, optMap, isLocked);
        card.appendChild(closeSec);
      }

      // Payout section (closed bets)
      if (isClosed && bet.resolution) {
        card.appendChild(makePayoutSection(bet, optMap));
      }

      // Delete button (open/locked bets, bets role, no wagers OR admin)
      if ((isOpen || isLocked) && isBetsRole()) {
        const noWagers = !bet.wagers || Object.keys(bet.wagers).length === 0;
        const isAdmin  = currentUser?.roles?.includes('admin');
        if (noWagers || isAdmin) {
          const delBtn = document.createElement('button');
          delBtn.className = 'delete-btn';
          delBtn.textContent = '✕ Delete bet';
          delBtn.style.cssText = 'display:block;margin-top:0.5rem;font-size:0.72rem;color:#4b5563;background:none;border:none;cursor:pointer;padding:0';
          delBtn.onclick = async () => {
            if (!confirm(`Delete "${bet.title}"?`)) return;
            const res = await fetch(`/api/bets/${bet.id}`, {
              method: 'DELETE',
              headers: { 'Authorization': `Bearer ${TOKEN}` },
            });
            if (res.ok) {
              allBets = allBets.filter(b => b.id !== bet.id);
              renderView();
            } else {
              const err = await res.json().catch(() => ({}));
              alert(err.detail || 'Delete failed');
            }
          };
          card.appendChild(delBtn);
        }
      }

      return card;
    }

    function makeWagerForm(bet, myWager, optMap, pool) {
      const wrap        = document.createElement('div');
      const locked      = !!myWager;
      const isFixedOdds = bet.bet_type === 'fixed_odds';
      const optProbMap  = isFixedOdds
        ? Object.fromEntries(bet.options.map(o => [o.id, o.probability || 0]))
        : {};

      const form = document.createElement('div');
      form.className = 'wager-form';

      const amtIn = document.createElement('input');
      amtIn.type = 'number'; amtIn.min = '1'; amtIn.step = '1'; amtIn.placeholder = 'NB¥';

      let chosenOptionId = myWager?.option_id || bet.options[0]?.id;

      // Potential payout preview (fixed-odds only)
      const payoutPreviewEl = document.createElement('div');
      payoutPreviewEl.className = 'payout-preview';
      payoutPreviewEl.style.display = 'none';

      function updatePayoutPreview() {
        if (!isFixedOdds) return;
        const amount = parseFloat(amtIn.value);
        const optId  = locked ? myWager.option_id : chosenOptionId;
        const prob   = optProbMap[optId] || 0;
        if (amount > 0 && prob > 0) {
          const pp   = amount / prob;
          const mult = (1 / prob).toFixed(2);
          payoutPreviewEl.textContent = `→ potential payout: ${nby(pp)} (${mult}×)`;
          payoutPreviewEl.style.display = '';
        } else {
          payoutPreviewEl.style.display = 'none';
        }
      }
      amtIn.oninput = updatePayoutPreview;

      let selectEl = null;
      if (locked) {
        const lockLabel = document.createElement('span');
        lockLabel.style.cssText = 'font-size:0.78rem;color:#9ca3af';
        lockLabel.innerHTML = `on <strong style="color:#d1d5db">${optMap[myWager.option_id]}</strong> (add more)`;
        form.append(amtIn, lockLabel);
      } else {
        selectEl = document.createElement('select');
        bet.options.forEach(opt => {
          const o = document.createElement('option');
          o.value = opt.id;
          const multStr = isFixedOdds && opt.probability ? ` (${(1/opt.probability).toFixed(2)}×)` : '';
          o.textContent = opt.label + multStr;
          selectEl.appendChild(o);
        });
        selectEl.value = chosenOptionId;
        selectEl.onchange = () => { chosenOptionId = selectEl.value; updatePayoutPreview(); };
        const onLbl = document.createElement('span');
        onLbl.style.cssText = 'font-size:0.78rem;color:#6b7280';
        onLbl.textContent = 'on';
        form.append(amtIn, onLbl, selectEl);
      }

      const placeBtn = document.createElement('button');
      placeBtn.className = 'place-btn';
      placeBtn.textContent = locked ? 'Add More' : 'Place Bet';
      form.appendChild(placeBtn);

      // Available balance
      const bal = myBalance();
      if (bal !== null) {
        const avail = document.createElement('span');
        avail.className = 'wager-avail';
        avail.innerHTML = `Available: <span class="nby">${nby(bal)}</span>`;
        form.appendChild(avail);
      }

      const errEl = document.createElement('div');
      errEl.className = 'wager-err';
      form.appendChild(errEl);

      placeBtn.onclick = async () => {
        const amount = parseFloat(amtIn.value);
        if (!amount || amount <= 0) { errEl.textContent = 'Enter a positive amount.'; return; }
        const optId = locked ? myWager.option_id : chosenOptionId;
        placeBtn.disabled = true;
        placeBtn.textContent = 'Placing…';
        errEl.textContent = '';
        try {
          const res = await fetch(`/api/bets/${bet.id}/wager`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}` },
            body: JSON.stringify({ option_id: optId, amount }),
          });
          const body = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(body.detail || `HTTP ${res.status}`);
          const idx = allBets.findIndex(b => b.id === bet.id);
          if (idx !== -1) allBets[idx] = body;
          await refreshBalance();
          renderView();
        } catch(e) {
          errEl.textContent = e.message;
          placeBtn.disabled = false;
          placeBtn.textContent = locked ? 'Add More' : 'Place Bet';
        }
      };

      wrap.appendChild(form);
      if (isFixedOdds) wrap.appendChild(payoutPreviewEl);
      return wrap;
    }

    function makeCloseSection(bet, optMap, alreadyLocked = false) {
      const sec = document.createElement('div');
      sec.className = 'close-bet-section';

      // ── Lock button (only on open bets) ──────────────────────────────────────
      if (!alreadyLocked) {
        const lockBtn = document.createElement('button');
        lockBtn.className = 'close-toggle';
        lockBtn.textContent = '🔒 Lock Bet';
        lockBtn.style.cssText = 'border-color:#3730a3;color:#818cf8';
        lockBtn.onclick = async () => {
          if (!confirm('Lock this bet? No more wagers will be accepted until an outcome is set.')) return;
          lockBtn.disabled = true;
          lockBtn.textContent = 'Locking…';
          try {
            const res = await fetch(`/api/bets/${bet.id}/lock`, {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${TOKEN}` },
            });
            const body = await res.json().catch(() => ({}));
            if (!res.ok) throw new Error(body.detail || `HTTP ${res.status}`);
            const idx = allBets.findIndex(b => b.id === bet.id);
            if (idx !== -1) allBets[idx] = body;
            renderView();
          } catch(e) {
            alert(e.message);
            lockBtn.disabled = false;
            lockBtn.textContent = '🔒 Lock Bet';
          }
        };
        sec.appendChild(lockBtn);
      }

      // ── Set Outcome toggle + form ─────────────────────────────────────────────
      let formVisible = false;
      const toggleBtn = document.createElement('button');
      toggleBtn.className = 'close-toggle';
      toggleBtn.textContent = alreadyLocked ? 'Set Outcome…' : 'Close with Outcome…';
      sec.appendChild(toggleBtn);

      const closeForm = document.createElement('div');
      closeForm.className = 'close-form';
      closeForm.style.display = 'none';

      const winSel = document.createElement('select');
      winSel.style.cssText = 'background:#111827;border:1px solid #374151;color:#f3f4f6;border-radius:5px;padding:0.3rem 0.6rem;font-size:0.82rem;outline:none;font-family:inherit';
      bet.options.forEach(opt => {
        const o = document.createElement('option');
        o.value = opt.id;
        o.textContent = opt.label;
        winSel.appendChild(o);
      });

      const confirmBtn = document.createElement('button');
      confirmBtn.className = 'close-confirm';
      confirmBtn.textContent = 'Confirm';

      const closeErr = document.createElement('span');
      closeErr.style.cssText = 'font-size:0.72rem;color:#f87171';

      confirmBtn.onclick = async () => {
        if (!confirm(`Set "${optMap[winSel.value]}" as the winner and pay out?`)) return;
        confirmBtn.disabled = true;
        confirmBtn.textContent = 'Closing…';
        closeErr.textContent = '';
        try {
          const res = await fetch(`/api/bets/${bet.id}/close`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}` },
            body: JSON.stringify({ winning_option_id: winSel.value }),
          });
          const body = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(body.detail || `HTTP ${res.status}`);
          const idx = allBets.findIndex(b => b.id === bet.id);
          if (idx !== -1) allBets[idx] = body;
          const newBals = await fetch('/api/bets/balances').then(r => r.json()).catch(() => balancesList);
          balancesList = newBals;
          await refreshBalance();
          renderView();
        } catch(e) {
          closeErr.textContent = e.message;
          confirmBtn.disabled = false;
          confirmBtn.textContent = 'Confirm';
        }
      };

      closeForm.append(winSel, confirmBtn, closeErr);
      sec.appendChild(closeForm);

      toggleBtn.onclick = () => {
        formVisible = !formVisible;
        closeForm.style.display = formVisible ? '' : 'none';
        toggleBtn.textContent = formVisible ? '✕ Cancel' : (alreadyLocked ? 'Set Outcome…' : 'Close with Outcome…');
      };

      return sec;
    }

    function makePayoutSection(bet, optMap) {
      const res = bet.resolution;
      const sec = document.createElement('div');
      sec.className = 'payout-section';

      const hdr = document.createElement('div');
      hdr.className = 'payout-hdr';

      if (res.voided) {
        hdr.textContent = 'Result: Voided — stakes refunded';
        sec.appendChild(hdr);
        const notice = document.createElement('div');
        notice.className = 'voided-notice';
        notice.textContent = '⚠️ No one picked the winning option — all bets were refunded.';
        sec.appendChild(notice);
        return sec;
      }

      hdr.textContent = `Winning option: ${optMap[bet.winning_option_id] || '?'}`;
      sec.appendChild(hdr);

      // Payouts list
      const entries = Object.entries(res.payouts || {});
      if (entries.length) {
        entries.sort((a, b) => b[1] - a[1]).forEach(([member, payout]) => {
          const wager  = bet.wagers?.[member]?.amount || 0;
          const profit = payout - wager;
          const row    = document.createElement('div');
          row.className = 'payout-row';
          const nameEl = document.createElement('span');
          nameEl.className = 'payout-winner';
          nameEl.textContent = member;
          const amtEl  = document.createElement('div');
          amtEl.style.cssText = 'display:flex;gap:0.5rem;align-items:center';
          const payEl  = document.createElement('span');
          payEl.style.color = '#fbbf24';
          payEl.textContent = `won ${nby(payout)}`;
          const profitEl = document.createElement('span');
          profitEl.className = 'payout-profit';
          profitEl.textContent = `+${nby(profit)} profit`;
          amtEl.append(payEl, profitEl);
          row.append(nameEl, amtEl);
          sec.appendChild(row);
        });
      }

      // My payout highlight
      if (currentUser && res.payouts?.[currentUser.name]) {
        const myPayout = res.payouts[currentUser.name];
        const myWager  = bet.wagers?.[currentUser.name]?.amount || 0;
        const myProfit = myPayout - myWager;
        const myRow = document.createElement('div');
        myRow.style.cssText = 'margin-top:0.4rem;font-size:0.75rem;color:#34d399;font-weight:600';
        myRow.textContent = `✓ You won ${nby(myPayout)} (+${nby(myProfit)} profit)`;
        sec.appendChild(myRow);
      }

      // Shortfall / surplus for fixed-odds bets
      if (bet.bet_type === 'fixed_odds' && !res.voided) {
        const shortfall = res.net_shortfall || 0;
        if (shortfall > 0) {
          const notice = document.createElement('div');
          notice.className = 'shortfall-notice';
          notice.textContent = `⚠️ Shortfall: ${nby(shortfall)} — admin top-up needed`;
          sec.appendChild(notice);
        } else if (shortfall < 0) {
          const notice = document.createElement('div');
          notice.className = 'surplus-notice';
          notice.textContent = `✓ House surplus: ${nby(Math.abs(shortfall))}`;
          sec.appendChild(notice);
        }
      }

      return sec;
    }

    async function refreshBalance() {
      if (!currentUser) return;
      try {
        balancesList = await fetch('/api/bets/balances').then(r => r.json());
        const chip = document.getElementById('balance-chip');
        chip.textContent = nby(myBalance());
        chip.style.display = '';
      } catch {}
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // CANNED BET — helpers & form
    // ═══════════════════════════════════════════════════════════════════════════

    function _parseCSV(text) {
      const lines = text.trim().split('\n').filter(l => l.trim());
      if (lines.length < 2) return [];
      const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
      return lines.slice(1).map(line => {
        const cells = [];
        let inQ = false, cur = '';
        for (const ch of line) {
          if (ch === '"') { inQ = !inQ; continue; }
          if (ch === ',' && !inQ) { cells.push(cur.trim()); cur = ''; continue; }
          cur += ch;
        }
        cells.push(cur.trim());
        const obj = {};
        headers.forEach((h, i) => { obj[h] = cells[i] ?? ''; });
        return obj;
      });
    }

    const _roundHalf = x => Math.round(x * 2) / 2;

    function _fmtBioName(raw) {
      const comma = raw.indexOf(',');
      const tc = s => s.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
      if (comma === -1) return tc(raw);
      return `${tc(raw.slice(comma + 1).trim())} ${tc(raw.slice(0, comma).trim())}`;
    }

    async function _getFutureGames() {
      if (_futureGamesCache) return _futureGamesCache;
      const today = new Date().toISOString().slice(0, 10);
      const games = await fetch('/api/calendar/games').then(r => r.json());
      _futureGamesCache = games.filter(g => g.date >= today);
      return _futureGamesCache;
    }

    async function _getPlayers() {
      if (_playersCache) return _playersCache;
      _playersCache = await fetch('/api/players').then(r => r.json());
      return _playersCache;
    }

    async function _getTeamDiff(abbr) {
      const key = abbr.toLowerCase();
      if (key in _teamDiffCache) return _teamDiffCache[key];
      try {
        const text = await fetch(`/data/${key}-seasons.csv`).then(r => r.text());
        const rows = _parseCSV(text);
        if (!rows.length) { _teamDiffCache[key] = 0; return 0; }
        rows.sort((a, b) => b.SEASON.localeCompare(a.SEASON));
        const val = parseFloat(rows[0].DIFF) || 0;
        _teamDiffCache[key] = val;
        return val;
      } catch {
        _teamDiffCache[key] = 0;
        return 0;
      }
    }

    async function _getRosterPlayers(abbr) {
      const key = abbr.toLowerCase();
      if (_rosterCache[key]) return _rosterCache[key];
      try {
        const [txt, players] = await Promise.all([
          fetch(`/data/${key}-roster.csv`).then(r => r.text()),
          _getPlayers(),
        ]);
        const rows = _parseCSV(txt).filter(r => r.SLUG);
        const result = rows.map(r => {
          const bio = players[r.SLUG] || {};
          return { slug: r.SLUG, name: bio.name ? _fmtBioName(bio.name) : r.SLUG };
        });
        _rosterCache[key] = result;
        return result;
      } catch {
        _rosterCache[key] = [];
        return [];
      }
    }

    async function _getPlayerStats() {
      if (_playerStatsCache) return _playerStatsCache;
      const text = await fetch('/players/player_seasons.csv').then(r => r.text());
      const rows = _parseCSV(text);
      const bySlug = {};
      rows.forEach(row => {
        const s = row.SLUG;
        if (!s) return;
        if (!bySlug[s] || row.SEASON > bySlug[s].SEASON) bySlug[s] = row;
      });
      _playerStatsCache = bySlug;
      return bySlug;
    }

    function _mkAdjBtn(text) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'canned-adj-btn';
      btn.textContent = text;
      return btn;
    }

    async function _submitCannedBet(btn, errEl, payload) {
      const title = (payload.title || '').trim();
      if (!title) { errEl.textContent = 'Title is required.'; return; }
      btn.disabled = true; btn.textContent = 'Creating…';
      errEl.textContent = '';
      try {
        const res = await fetch('/api/bets', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}` },
          body: JSON.stringify({
            title,
            description: (payload.description || '').trim(),
            options:     payload.options,
            bet_type:    'pool',
          }),
        });
        const body = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(body.detail || `HTTP ${res.status}`);
        allBets.unshift(body);
        showCannedForm = false;
        renderFormArea();
        currentTab = 'open';
        ['open','closed','balances'].forEach(id =>
          document.getElementById(`tab-${id}`).classList.toggle('active', id === 'open'));
        renderView();
      } catch(e) {
        errEl.textContent = e.message;
        btn.disabled = false; btn.textContent = 'Create Bet';
      }
    }

    async function renderCannedBetForm() {
      const wrap = document.getElementById('new-bet-form-wrap');
      if (!showCannedForm) { wrap.style.display = 'none'; wrap.innerHTML = ''; return; }

      wrap.innerHTML = '';
      const form = document.createElement('div');
      form.className = 'new-bet-form canned-bet-form';

      // ── Game selector ──────────────────────────────────────────────────────────
      const gameLbl = document.createElement('label');
      gameLbl.textContent = 'Game *';
      form.appendChild(gameLbl);

      const gameSel = document.createElement('select');
      gameSel.className = 'canned-select';
      const gDef = document.createElement('option');
      gDef.value = ''; gDef.textContent = 'Loading games…'; gDef.disabled = true; gDef.selected = true;
      gameSel.appendChild(gDef);
      form.appendChild(gameSel);

      // ── Bet type toggle ────────────────────────────────────────────────────────
      const typeLbl = document.createElement('label');
      typeLbl.textContent = 'Bet Type *';
      form.appendChild(typeLbl);

      const typeWrap = document.createElement('div');
      typeWrap.className = 'type-toggle-wrap';
      const movBtn   = document.createElement('button');
      movBtn.type = 'button'; movBtn.className = 'type-toggle-btn active';
      movBtn.textContent = '📊 Margin of Victory';
      const propsBtn = document.createElement('button');
      propsBtn.type = 'button'; propsBtn.className = 'type-toggle-btn';
      propsBtn.textContent = '🏀 Player Props';
      typeWrap.append(movBtn, propsBtn);
      form.appendChild(typeWrap);

      // ── Dynamic content area ───────────────────────────────────────────────────
      const dynWrap = document.createElement('div');
      dynWrap.style.cssText = 'display:flex;flex-direction:column;gap:0.6rem';
      form.appendChild(dynWrap);

      wrap.appendChild(form);
      wrap.style.display = '';

      // ── State ──────────────────────────────────────────────────────────────────
      let selectedGame  = null;
      let betTypeMode   = 'mov';  // 'mov' | 'props'

      // Load & populate games dropdown
      try {
        const games = await _getFutureGames();
        gDef.textContent = games.length ? 'Select a game…' : 'No upcoming games scheduled';
        games.forEach(g => {
          const d  = new Date(g.date + 'T00:00:00');
          const ds = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
          const opt = document.createElement('option');
          opt.value = g.id;
          opt.textContent = `${ds} — ${g.away_team} @ ${g.home_team}${g.note ? ' (' + g.note + ')' : ''}`;
          gameSel.appendChild(opt);
        });
      } catch {
        gDef.textContent = 'Failed to load games';
      }

      const rebuild = () => {
        if (!selectedGame) return;
        dynWrap.innerHTML = '';
        const loadEl = document.createElement('div');
        loadEl.className = 'loading';
        loadEl.textContent = 'Loading stats…';
        dynWrap.appendChild(loadEl);
        const fn = betTypeMode === 'mov' ? buildMovContent : buildPropsContent;
        fn(dynWrap).catch(e => { loadEl.textContent = `Error: ${e.message}`; });
      };

      gameSel.onchange = () => {
        const games = _futureGamesCache || [];
        selectedGame = games.find(g => g.id === gameSel.value) || null;
        rebuild();
      };
      movBtn.onclick = () => {
        betTypeMode = 'mov';
        movBtn.classList.add('active'); propsBtn.classList.remove('active');
        rebuild();
      };
      propsBtn.onclick = () => {
        betTypeMode = 'props';
        propsBtn.classList.add('active'); movBtn.classList.remove('active');
        rebuild();
      };

      // ── MoV content ────────────────────────────────────────────────────────────
      async function buildMovContent(container) {
        container.innerHTML = '';
        const g = selectedGame;
        const [dA, dH] = await Promise.all([_getTeamDiff(g.away_team), _getTeamDiff(g.home_team)]);

        const isFavAway = dA >= dH;
        const favTeam   = isFavAway ? g.away_team : g.home_team;
        const dogTeam   = isFavAway ? g.home_team : g.away_team;
        let line        = _roundHalf(Math.abs(dA - dH));

        // Stats info
        const infoEl = document.createElement('div');
        infoEl.className = 'canned-info';
        const updateInfo = () => {
          infoEl.innerHTML =
            `<span style="color:#9ca3af">${g.away_team} diff:</span> ` +
            `<strong style="color:${dA >= 0 ? '#34d399' : '#f87171'}">${dA >= 0 ? '+' : ''}${dA.toFixed(1)}</strong>` +
            `&ensp;<span style="color:#9ca3af">${g.home_team} diff:</span> ` +
            `<strong style="color:${dH >= 0 ? '#34d399' : '#f87171'}">${dH >= 0 ? '+' : ''}${dH.toFixed(1)}</strong>` +
            `&ensp;<span style="color:#6b7280">→</span>&ensp;` +
            `<strong style="color:#d1d5db">${favTeam}</strong> <span style="color:#9ca3af">fav by</span> ` +
            `<strong style="color:#f3f4f6">${line}</strong>`;
        };
        updateInfo();
        container.appendChild(infoEl);

        // Line adjuster
        const adjRow = document.createElement('div');
        adjRow.className = 'canned-adj-row';
        const adjLbl = document.createElement('label');
        adjLbl.style.margin = '0';
        adjLbl.textContent = `Line (${favTeam} wins by)`;
        const minBtn  = _mkAdjBtn('−');
        const lineSpan = document.createElement('span');
        lineSpan.className = 'canned-line-val';
        lineSpan.textContent = line;
        const plusBtn = _mkAdjBtn('+');
        adjRow.append(adjLbl, minBtn, lineSpan, plusBtn);
        container.appendChild(adjRow);

        // Options preview
        const prevEl = document.createElement('div');
        prevEl.className = 'canned-opts-preview';
        const updatePreview = () => {
          prevEl.innerHTML =
            `<span>Options:</span>` +
            `<span class="canned-opt-chip">Over ${line} — ${favTeam} wins by &gt;${line}</span>` +
            `<span class="canned-opt-chip">Under ${line} — ${dogTeam} wins or ${favTeam} by &lt;${line}</span>`;
        };
        updatePreview();
        container.appendChild(prevEl);

        // Title + description
        const titleLbl = document.createElement('label'); titleLbl.textContent = 'Title';
        const titleIn  = document.createElement('input');
        titleIn.type = 'text';
        const descLbl = document.createElement('label'); descLbl.textContent = 'Description';
        const descIn  = document.createElement('textarea');
        descIn.placeholder = 'Description (optional)';

        let titleEdited = false, descEdited = false;
        const autoTitle = () => `${g.away_team} @ ${g.home_team} — O/U MoV ${favTeam} by ${line}`;
        const autoDesc  = () =>
          `${g.away_team} avg differential: ${dA >= 0 ? '+' : ''}${dA.toFixed(1)}, ` +
          `${g.home_team} avg differential: ${dH >= 0 ? '+' : ''}${dH.toFixed(1)} ` +
          `→ ${favTeam} favored by ${line}`;

        titleIn.value = autoTitle();
        descIn.value  = autoDesc();
        titleIn.oninput = () => { titleEdited = true; };
        descIn.oninput  = () => { descEdited  = true; };

        container.append(titleLbl, titleIn, descLbl, descIn);

        // Actions
        const actions = document.createElement('div');
        actions.className = 'form-actions';
        const submitBtn = document.createElement('button');
        submitBtn.className = 'form-submit'; submitBtn.textContent = 'Create Bet';
        const cancelBtn = document.createElement('button');
        cancelBtn.className = 'form-cancel-btn'; cancelBtn.textContent = 'Cancel';
        cancelBtn.onclick = () => { showCannedForm = false; renderFormArea(); };
        const errEl = document.createElement('div'); errEl.className = 'form-err';

        submitBtn.onclick = () => _submitCannedBet(submitBtn, errEl, {
          title:       titleIn.value,
          description: descIn.value,
          options: [
            { label: `Over ${line} (${favTeam} wins by >${line})` },
            { label: `Under ${line} (${dogTeam} wins or ${favTeam} by <${line})` },
          ],
        });
        actions.append(submitBtn, cancelBtn, errEl);
        container.appendChild(actions);

        // Line change handler (wired after all elements are created)
        const onLineChange = (delta) => {
          line = Math.max(0.5, line + delta);
          lineSpan.textContent = line;
          updateInfo();
          updatePreview();
          if (!titleEdited) titleIn.value = autoTitle();
          if (!descEdited)  descIn.value  = autoDesc();
        };
        minBtn.onclick  = () => onLineChange(-0.5);
        plusBtn.onclick = () => onLineChange(+0.5);
      }

      // ── Player Props content ───────────────────────────────────────────────────
      async function buildPropsContent(container) {
        container.innerHTML = '';
        const g = selectedGame;
        const [awayP, homeP] = await Promise.all([
          _getRosterPlayers(g.away_team),
          _getRosterPlayers(g.home_team),
        ]);

        // Player dropdown
        const playerLbl = document.createElement('label'); playerLbl.textContent = 'Player *';
        container.appendChild(playerLbl);

        const playerSel = document.createElement('select');
        playerSel.className = 'canned-select';
        const pDef = document.createElement('option');
        pDef.value = ''; pDef.textContent = 'Select a player…'; pDef.disabled = true; pDef.selected = true;
        playerSel.appendChild(pDef);

        [{ abbr: g.away_team, players: awayP }, { abbr: g.home_team, players: homeP }].forEach(({ abbr, players }) => {
          if (!players.length) return;
          const grp = document.createElement('optgroup');
          grp.label = abbr;
          players.forEach(p => {
            const o = document.createElement('option');
            o.value = p.slug; o.textContent = p.name;
            grp.appendChild(o);
          });
          playerSel.appendChild(grp);
        });
        container.appendChild(playerSel);

        // Stat selector
        const statLbl = document.createElement('label'); statLbl.textContent = 'Stat *';
        container.appendChild(statLbl);

        const STATS = [
          { key: 'P',   label: 'Points',     col: 'PTS' },
          { key: 'R',   label: 'Rebounds',   col: 'REB' },
          { key: 'A',   label: 'Assists',    col: 'AST' },
          { key: '3PM', label: '3-Pointers', col: '3PM' },
        ];
        let activeStat = STATS[0];

        const statWrap = document.createElement('div');
        statWrap.className = 'type-toggle-wrap';
        const statBtns = {};
        STATS.forEach(s => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = `type-toggle-btn${s === activeStat ? ' active' : ''}`;
          btn.textContent = s.label;
          btn.onclick = () => {
            activeStat = s;
            STATS.forEach(ss => statBtns[ss.key].classList.toggle('active', ss === s));
            if (playerSel.value) refreshStatLine();
          };
          statBtns[s.key] = btn;
          statWrap.appendChild(btn);
        });
        container.appendChild(statWrap);

        // Lower section (populated after player selected)
        const lowerSection = document.createElement('div');
        lowerSection.style.cssText = 'display:flex;flex-direction:column;gap:0.6rem';
        container.appendChild(lowerSection);

        async function refreshStatLine() {
          lowerSection.innerHTML = '';
          const slug   = playerSel.value;
          const allP   = [...awayP.map(p => ({ ...p, team: g.away_team })),
                          ...homeP.map(p => ({ ...p, team: g.home_team }))];
          const pInfo  = allP.find(x => x.slug === slug);
          const pName  = pInfo ? pInfo.name : slug;
          const opp    = pInfo ? (pInfo.team === g.away_team ? g.home_team : g.away_team) : '';

          // Stats info
          const infoEl = document.createElement('div');
          infoEl.className = 'canned-info';
          infoEl.textContent = 'Loading stats…';
          lowerSection.appendChild(infoEl);

          let line = 0.5;
          try {
            const allStats = await _getPlayerStats();
            const row = allStats[slug];
            const col = activeStat.col;
            let avg = null;
            if (row && parseFloat(row.G) > 0) avg = parseFloat(row[col]) / parseFloat(row.G);

            if (avg !== null && !isNaN(avg)) {
              line = _roundHalf(avg);
              infoEl.innerHTML =
                `<span style="color:#9ca3af">${pName} averaging </span>` +
                `<strong style="color:#d1d5db">${avg.toFixed(1)}</strong>` +
                `<span style="color:#9ca3af"> ${activeStat.label.toLowerCase()}/game (${row.SEASON})</span>` +
                `<span style="color:#6b7280"> → line: </span>` +
                `<strong style="color:#f3f4f6">${line}</strong>`;
            } else {
              infoEl.innerHTML =
                `<span style="color:#f59e0b">No current season stats for ${pName}. Adjust line manually.</span>`;
            }
          } catch {
            infoEl.innerHTML = `<span style="color:#f59e0b">Could not load stats. Set line manually.</span>`;
          }

          // Line adjuster
          const adjRow = document.createElement('div');
          adjRow.className = 'canned-adj-row';
          const adjLbl2 = document.createElement('label');
          adjLbl2.style.margin = '0';
          adjLbl2.textContent = `Line (${activeStat.label})`;
          const minBtn2  = _mkAdjBtn('−');
          const lineSpan = document.createElement('span');
          lineSpan.className = 'canned-line-val';
          lineSpan.textContent = line;
          const plusBtn2 = _mkAdjBtn('+');
          adjRow.append(adjLbl2, minBtn2, lineSpan, plusBtn2);
          lowerSection.appendChild(adjRow);

          // Options preview
          const prevEl = document.createElement('div');
          prevEl.className = 'canned-opts-preview';
          const updatePrev = () => {
            prevEl.innerHTML =
              `<span>Options:</span>` +
              `<span class="canned-opt-chip">Over ${line} ${activeStat.label}</span>` +
              `<span class="canned-opt-chip">Under ${line} ${activeStat.label}</span>`;
          };
          updatePrev();
          lowerSection.appendChild(prevEl);

          // Title + description
          const titleLbl2 = document.createElement('label'); titleLbl2.textContent = 'Title';
          const titleIn   = document.createElement('input');
          titleIn.type = 'text';
          const descLbl2 = document.createElement('label'); descLbl2.textContent = 'Description';
          const descIn   = document.createElement('textarea');
          descIn.placeholder = 'Description (optional)';

          let titleEdited = false;
          const autoTitle = () => `${pName} O/U ${line} ${activeStat.label}${opp ? ' vs ' + opp : ''}`;
          titleIn.value = autoTitle();
          titleIn.oninput = () => { titleEdited = true; };

          lowerSection.append(titleLbl2, titleIn, descLbl2, descIn);

          // Actions
          const actions = document.createElement('div');
          actions.className = 'form-actions';
          const submitBtn = document.createElement('button');
          submitBtn.className = 'form-submit'; submitBtn.textContent = 'Create Bet';
          const cancelBtn = document.createElement('button');
          cancelBtn.className = 'form-cancel-btn'; cancelBtn.textContent = 'Cancel';
          cancelBtn.onclick = () => { showCannedForm = false; renderFormArea(); };
          const errEl = document.createElement('div'); errEl.className = 'form-err';

          submitBtn.onclick = () => _submitCannedBet(submitBtn, errEl, {
            title:       titleIn.value,
            description: descIn.value,
            options: [
              { label: `Over ${line} ${activeStat.label}` },
              { label: `Under ${line} ${activeStat.label}` },
            ],
          });
          actions.append(submitBtn, cancelBtn, errEl);
          lowerSection.appendChild(actions);

          // Line change handler
          const onLineChange = (delta) => {
            line = Math.max(0.5, line + delta);
            lineSpan.textContent = line;
            updatePrev();
            if (!titleEdited) titleIn.value = autoTitle();
          };
          minBtn2.onclick  = () => onLineChange(-0.5);
          plusBtn2.onclick = () => onLineChange(+0.5);
        }

        playerSel.onchange = refreshStatLine;
      }
    }

    init();
  </script>
