<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/logo.png">
  <link rel="stylesheet" href="/css/shared.css">
  <title>poopoo — NBN</title>
  <style>

    .page {
      max-width: 1100px;
      margin: 0 auto;
    }

    header h1 {
      font-size: 1.875rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    header p {
      color: #9ca3af;
      margin-top: 0.4rem;
      font-size: 0.9rem;
    }

    .freshness {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
      font-size: 0.8rem;
      color: #9ca3af;
      margin: 0.9rem 0 1.4rem;
    }

    .freshness b { color: #e5e7eb; }

    .clean-banner {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      color: #9ca3af;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    /* ── Legend / rubric ─────────────────────────────────────────── */

    .legend {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 10px;
      margin-bottom: 1rem;
      overflow: hidden;
    }

    .legend summary {
      list-style: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1.1rem;
      font-weight: 600;
      font-size: 0.9rem;
      color: #e5e7eb;
    }

    .legend summary::-webkit-details-marker { display: none; }
    .legend summary::after {
      content: "▾";
      color: #9ca3af;
      transition: transform 0.15s;
    }
    .legend[open] summary::after { transform: rotate(180deg); }

    .legend-body {
      padding: 0 1.1rem 1rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 0.6rem 1.2rem;
    }

    .legend-item {
      display: flex;
      gap: 0.55rem;
      font-size: 0.8rem;
      color: #9ca3af;
      line-height: 1.35;
    }

    .legend-swatch {
      flex: 0 0 auto;
      width: 0.55rem;
      height: 0.55rem;
      border-radius: 999px;
      margin-top: 0.35rem;
    }

    .legend-item b { color: #e5e7eb; display: block; font-weight: 600; }

    /* ── League summary strip ────────────────────────────────────── */

    .summary-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.1rem;
    }

    .summary-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.3rem 0.7rem;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 500;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: #d1d5db;
    }

    .summary-pill .dot {
      width: 0.5rem;
      height: 0.5rem;
      border-radius: 999px;
    }

    /* ── Team cards ───────────────────────────────────────────────── */

    .team-card {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 10px;
      margin-bottom: 0.75rem;
      overflow: hidden;
    }

    .team-card summary {
      list-style: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1.1rem;
      font-weight: 600;
    }

    .team-card summary::-webkit-details-marker { display: none; }

    .team-card summary .count {
      font-weight: 500;
      font-size: 0.8rem;
      color: #f59e0b;
      background: rgba(245,158,11,0.12);
      border-radius: 999px;
      padding: 0.15rem 0.65rem;
    }

    .table-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table.diff-table {
      width: 100%;
      min-width: 480px;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    table.diff-table th, table.diff-table td {
      padding: 0.5rem 1.1rem;
      border-top: 1px solid #374151;
      text-align: left;
      white-space: nowrap;
    }

    table.diff-table th {
      color: #9ca3af;
      font-weight: 500;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .cat-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      font-weight: 600;
      white-space: nowrap;
    }

    .cat-badge .dot {
      width: 0.5rem;
      height: 0.5rem;
      border-radius: 999px;
      flex: 0 0 auto;
    }

    /* Grouped "known/systemic" diffs (e.g. uncalculated cap holds) get a
       single collapsed summary row per team instead of one row each, so 30+
       league-wide instances of the same known gap don't bury the handful of
       diffs that actually need a human decision. */
    .grouped-row {
      padding: 0.65rem 1.1rem;
      border-top: 1px solid #374151;
      font-size: 0.82rem;
      color: #9ca3af;
    }

    .grouped-row summary {
      list-style: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .grouped-row summary::-webkit-details-marker { display: none; }
    .grouped-row summary::before {
      content: "▸";
      color: #6b7280;
    }
    .grouped-row[open] summary::before { content: "▾"; }

    .grouped-row .names {
      margin-top: 0.4rem;
      padding-left: 1.1rem;
      color: #d1d5db;
    }

    #status { padding: 1rem; color: #9ca3af; }

  </style>
</head>
<body>
  <div class="page">
    <nav class="nav"></nav>

    <header>
      <h1>poopoo</h1>
      <p>Live diff between nbn.today and the league's published roster/cap spreadsheet — flags things worth investigating, not necessarily errors on either side.</p>
    </header>

    <div class="freshness" id="freshness"></div>

    <details class="legend" id="legend">
      <summary>What the categories mean</summary>
      <div class="legend-body" id="legend-body"></div>
    </details>

    <div class="summary-strip" id="summary-strip"></div>

    <div id="status">Loading…</div>
    <div id="teams"></div>
  </div>

  <script src="/nav.js"></script>
  <script>
    const TEAMS = {
      ATL: "Atlanta Hawks",     BKN: "Brooklyn Nets",       BOS: "Boston Celtics",
      CHA: "Charlotte Hornets", CHI: "Chicago Bulls",        CLE: "Cleveland Cavaliers",
      DAL: "Dallas Mavericks",  DEN: "Denver Nuggets",       DET: "Detroit Pistons",
      GSW: "Golden State Warriors", HOU: "Houston Rockets",  IND: "Indiana Pacers",
      LAC: "LA Clippers",       LAL: "Los Angeles Lakers",   MEM: "Memphis Grizzlies",
      MIA: "Miami Heat",        MIL: "Milwaukee Bucks",      MIN: "Minnesota Timberwolves",
      NOP: "New Orleans Pelicans", NYK: "New York Knicks",   OKC: "Oklahoma City Thunder",
      ORL: "Orlando Magic",     PHI: "Philadelphia 76ers",   PHX: "Phoenix Suns",
      POR: "Portland Trail Blazers", SAC: "Sacramento Kings", SAS: "San Antonio Spurs",
      TOR: "Toronto Raptors",   UTA: "Utah Jazz",            WAS: "Washington Wizards",
    };

    // Category rubric: color, display label, and what the category actually
    // means. `grouped: true` categories get collapsed into a single "N of
    // these" line per team instead of one table row each -- for gaps that
    // are real but systemic/known rather than a fresh, individually
    // actionable disagreement.
    const CATEGORY_META = {
      aggregate:                { label: "Aggregate",         color: "#f87171", desc: "Guaranteed salary or hard-cap status disagrees at the team level." },
      picks:                    { label: "Draft Pick",        color: "#a78bfa", desc: "Sheet and site disagree on who currently owns a future draft pick." },
      mle:                      { label: "MLE",               color: "#38bdf8", desc: "Mid-level exception usage disagrees." },
      bae:                      { label: "BAE",               color: "#38bdf8", desc: "Bi-annual exception availability disagrees." },
      tpe:                      { label: "TPE",               color: "#38bdf8", desc: "Trade exception remaining amount disagrees." },
      player_salary:            { label: "Salary",            color: "#f87171", desc: "A signed player's real contract amount disagrees between sheet and site." },
      player_hold:              { label: "Cap Hold",          color: "#fb923c", desc: "A free agent's cap-hold amount disagrees — both sides have computed a real number, they just don't match (e.g. a Bird-rights tier dispute)." },
      player_hold_uncalculated: { label: "Hold Not Calculated", color: "#facc15", desc: "The site has never computed a real cap-hold amount for this free agent — it's sitting at a $1 placeholder. A known, systemic gap, not a fresh dispute.", grouped: true },
      player_status:            { label: "Status",            color: "#e879f9", desc: "One side treats this player as signed to a contract, the other as an unsigned free-agent hold." },
      player_team_conflict:     { label: "Team Conflict",     color: "#2dd4bf", desc: "Sheet and site disagree on which team currently holds this player's rights." },
      player_missing:           { label: "Missing on Site",   color: "#94a3b8", desc: "The sheet lists this player on this team; the site has no record of him on any roster." },
      player_extra:             { label: "Extra on Site",     color: "#94a3b8", desc: "The site has this player on the roster; the sheet doesn't list him anywhere in the league." },
      pick_signed:              { label: "Pick Signed Early", color: "#dc2626", desc: "The sheet still shows this pick as unsigned draft rights, but the site already has him fully signed to a contract (the 2026 mass-autosign bug, recurring)." },
    };

    const CATEGORY_ORDER = [
      "pick_signed", "player_status", "player_team_conflict", "aggregate",
      "player_salary", "player_hold", "picks", "mle", "bae", "tpe",
      "player_missing", "player_extra", "player_hold_uncalculated",
    ];

    function fmtMoney(n) {
      if (n === null || n === undefined) return '—';
      const sign = n < 0 ? '−' : '';
      return sign + '$' + Math.abs(Math.round(n)).toLocaleString('en-US');
    }

    function fmtVal(field, v) {
      if (field === 'Hard Cap') return v || 'none';
      if (field === 'BAE Availability') return v;
      if (typeof v === 'number') return fmtMoney(v);
      return v ?? '—';
    }

    function catMeta(cat) {
      return CATEGORY_META[cat] || { label: cat, color: '#9ca3af', desc: '' };
    }

    function badge(cat) {
      const m = catMeta(cat);
      return `<span class="cat-badge" style="color:${m.color}"><span class="dot" style="background:${m.color}"></span>${m.label}</span>`;
    }

    function nextRefreshLabel(generatedAt) {
      const gen = new Date(generatedAt);
      const next = new Date(gen);
      next.setUTCMinutes(Math.ceil((gen.getUTCMinutes() + 1) / 10) * 10, 0, 0);
      const fmt = d => d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
      return { last: fmt(gen), next: fmt(next) };
    }

    function renderLegend() {
      document.getElementById('legend-body').innerHTML = CATEGORY_ORDER.map(cat => {
        const m = catMeta(cat);
        return `
          <div class="legend-item">
            <span class="legend-swatch" style="background:${m.color}"></span>
            <span><b>${m.label}</b>${m.desc}</span>
          </div>
        `;
      }).join('');
    }

    function renderSummaryStrip(teams) {
      const counts = {};
      teams.forEach(t => t.diffs.forEach(d => { counts[d.category] = (counts[d.category] || 0) + 1; }));
      const strip = document.getElementById('summary-strip');
      const pills = CATEGORY_ORDER.filter(cat => counts[cat]).map(cat => {
        const m = catMeta(cat);
        return `<span class="summary-pill"><span class="dot" style="background:${m.color}"></span>${counts[cat]} ${m.label}</span>`;
      });
      strip.innerHTML = pills.join('');
    }

    function sortDiffs(diffs) {
      return [...diffs].sort((a, b) => {
        const ai = CATEGORY_ORDER.indexOf(a.category);
        const bi = CATEGORY_ORDER.indexOf(b.category);
        return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
      });
    }

    function renderTeamCard(t) {
      const sorted = sortDiffs(t.diffs);
      const grouped = sorted.filter(d => catMeta(d.category).grouped);
      const individual = sorted.filter(d => !catMeta(d.category).grouped);

      const groupsByCategory = {};
      grouped.forEach(d => {
        (groupsByCategory[d.category] = groupsByCategory[d.category] || []).push(d);
      });

      const tableHtml = individual.length ? `
        <div class="table-scroll">
          <table class="diff-table">
            <thead><tr><th>Category</th><th>Field</th><th>Sheet</th><th>Site</th></tr></thead>
            <tbody>
              ${individual.map(d => `
                <tr>
                  <td>${badge(d.category)}</td>
                  <td>${d.field}</td>
                  <td>${fmtVal(d.field, d.sheet)}</td>
                  <td>${fmtVal(d.field, d.site)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      ` : '';

      const groupedHtml = Object.entries(groupsByCategory).map(([cat, items]) => {
        const m = catMeta(cat);
        return `
          <details class="grouped-row">
            <summary>${badge(cat)} <span>${items.length} player${items.length === 1 ? '' : 's'}</span></summary>
            <div class="names">
              ${items.map(d => `${d.field} — sheet ${fmtVal(d.field, d.sheet)}`).join('<br>')}
            </div>
          </details>
        `;
      }).join('');

      return `
        <details class="team-card">
          <summary>
            <span>${TEAMS[t.team] || t.team} <span style="color:#9ca3af;font-weight:400">(${t.team})</span></span>
            <span class="count">${t.diff_count} diff${t.diff_count === 1 ? '' : 's'}</span>
          </summary>
          ${tableHtml}
          ${groupedHtml}
        </details>
      `;
    }

    async function load() {
      let data;
      try {
        const r = await fetch('/data/poopoo.json', { cache: 'no-store' });
        if (!r.ok) throw new Error('not found');
        data = await r.json();
      } catch (e) {
        document.getElementById('status').textContent = 'No data yet — the job hasn\'t run.';
        return;
      }

      renderLegend();

      const { last, next } = nextRefreshLabel(data.generated_at);
      document.getElementById('freshness').innerHTML = `
        <span>Season <b>${data.season}</b></span>
        <span>Last checked <b>${last}</b></span>
        <span>Next check <b>${next}</b></span>
      `;

      const teamsWithDiffs = data.teams.filter(t => t.diff_count > 0)
        .sort((a, b) => b.diff_count - a.diff_count);

      document.getElementById('status').remove();

      if (teamsWithDiffs.length === 0) {
        document.getElementById('summary-strip').remove();
        document.getElementById('teams').innerHTML = '<div class="clean-banner">No diffs — everything tracked matches the sheet.</div>';
        return;
      }

      renderSummaryStrip(teamsWithDiffs);

      document.getElementById('teams').innerHTML = teamsWithDiffs.map(renderTeamCard).join('');
    }

    load();
  </script>
</body>
</html>
