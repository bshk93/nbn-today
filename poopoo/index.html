<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/logo.png">
  <link rel="stylesheet" href="/css/shared.css">
  <title>poopoo — NBN</title>
  <style>

    .page {
      max-width: 1100px;
      margin: 0 auto;
    }

    header h1 {
      font-size: 1.875rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    header p {
      color: #9ca3af;
      margin-top: 0.4rem;
      font-size: 0.9rem;
    }

    .freshness {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
      font-size: 0.8rem;
      color: #9ca3af;
      margin: 0.9rem 0 1.4rem;
    }

    .freshness b { color: #e5e7eb; }

    .clean-banner {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      color: #9ca3af;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    .team-card {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 10px;
      margin-bottom: 0.75rem;
      overflow: hidden;
    }

    .team-card summary {
      list-style: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1.1rem;
      font-weight: 600;
    }

    .team-card summary::-webkit-details-marker { display: none; }

    .team-card summary .count {
      font-weight: 500;
      font-size: 0.8rem;
      color: #f59e0b;
      background: rgba(245,158,11,0.12);
      border-radius: 999px;
      padding: 0.15rem 0.65rem;
    }

    .table-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table.diff-table {
      width: 100%;
      min-width: 480px;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    table.diff-table th, table.diff-table td {
      padding: 0.5rem 1.1rem;
      border-top: 1px solid #374151;
      text-align: left;
      white-space: nowrap;
    }

    table.diff-table th {
      color: #9ca3af;
      font-weight: 500;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .cat-badge {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: #9ca3af;
    }

    #status { padding: 1rem; color: #9ca3af; }

  </style>
</head>
<body>
  <div class="page">
    <nav class="nav"></nav>

    <header>
      <h1>poopoo</h1>
      <p>Live diff between nbn.today and the league's published roster/cap spreadsheet — flags things worth investigating, not necessarily errors on either side.</p>
    </header>

    <div class="freshness" id="freshness"></div>

    <div id="status">Loading…</div>
    <div id="teams"></div>
  </div>

  <script src="/nav.js"></script>
  <script>
    const TEAMS = {
      ATL: "Atlanta Hawks",     BKN: "Brooklyn Nets",       BOS: "Boston Celtics",
      CHA: "Charlotte Hornets", CHI: "Chicago Bulls",        CLE: "Cleveland Cavaliers",
      DAL: "Dallas Mavericks",  DEN: "Denver Nuggets",       DET: "Detroit Pistons",
      GSW: "Golden State Warriors", HOU: "Houston Rockets",  IND: "Indiana Pacers",
      LAC: "LA Clippers",       LAL: "Los Angeles Lakers",   MEM: "Memphis Grizzlies",
      MIA: "Miami Heat",        MIL: "Milwaukee Bucks",      MIN: "Minnesota Timberwolves",
      NOP: "New Orleans Pelicans", NYK: "New York Knicks",   OKC: "Oklahoma City Thunder",
      ORL: "Orlando Magic",     PHI: "Philadelphia 76ers",   PHX: "Phoenix Suns",
      POR: "Portland Trail Blazers", SAC: "Sacramento Kings", SAS: "San Antonio Spurs",
      TOR: "Toronto Raptors",   UTA: "Utah Jazz",            WAS: "Washington Wizards",
    };

    function fmtMoney(n) {
      if (n === null || n === undefined) return '—';
      const sign = n < 0 ? '−' : '';
      return sign + '$' + Math.abs(Math.round(n)).toLocaleString('en-US');
    }

    function fmtVal(field, v) {
      if (field === 'Hard Cap') return v || 'none';
      if (field === 'BAE Availability') return v;
      if (typeof v === 'number') return fmtMoney(v);
      return v ?? '—';
    }

    function nextRefreshLabel(generatedAt) {
      const gen = new Date(generatedAt);
      const next = new Date(gen);
      next.setUTCMinutes(Math.ceil((gen.getUTCMinutes() + 1) / 10) * 10, 0, 0);
      const fmt = d => d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
      return { last: fmt(gen), next: fmt(next) };
    }

    async function load() {
      let data;
      try {
        const r = await fetch('/data/poopoo.json', { cache: 'no-store' });
        if (!r.ok) throw new Error('not found');
        data = await r.json();
      } catch (e) {
        document.getElementById('status').textContent = 'No data yet — the job hasn\'t run.';
        return;
      }

      const { last, next } = nextRefreshLabel(data.generated_at);
      document.getElementById('freshness').innerHTML = `
        <span>Season <b>${data.season}</b></span>
        <span>Last checked <b>${last}</b></span>
        <span>Next check <b>${next}</b></span>
      `;

      const teamsWithDiffs = data.teams.filter(t => t.diff_count > 0)
        .sort((a, b) => b.diff_count - a.diff_count);

      document.getElementById('status').remove();

      if (teamsWithDiffs.length === 0) {
        document.getElementById('teams').innerHTML = '<div class="clean-banner">No diffs — everything tracked matches the sheet.</div>';
        return;
      }

      const wrap = document.getElementById('teams');
      wrap.innerHTML = teamsWithDiffs.map(t => `
        <details class="team-card">
          <summary>
            <span>${TEAMS[t.team] || t.team} <span style="color:#9ca3af;font-weight:400">(${t.team})</span></span>
            <span class="count">${t.diff_count} diff${t.diff_count === 1 ? '' : 's'}</span>
          </summary>
          <div class="table-scroll">
            <table class="diff-table">
              <thead><tr><th>Category</th><th>Field</th><th>Sheet</th><th>Site</th></tr></thead>
              <tbody>
                ${t.diffs.map(d => `
                  <tr>
                    <td class="cat-badge">${d.category}</td>
                    <td>${d.field}</td>
                    <td>${fmtVal(d.field, d.sheet)}</td>
                    <td>${fmtVal(d.field, d.site)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </details>
      `).join('');
    }

    load();
  </script>
</body>
</html>
